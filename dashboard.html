<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الألعاب التعليمية - لوحة التحكم</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-bg">

    <div class="dashboard-wrapper">
        <div class="header glass-container" style="padding: 1rem 2rem; margin-bottom: 2rem;">
            <div class="logo-container">
                <img src="images/logo_icon.png" alt="Logo" class="logo-icon">
                <div class="dashboard-header">
        <h2 style="color: white; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">بوابة الألعاب 🎮</h2>
        <div>
            <span id="user-display" style="margin-left: 15px; font-weight: bold; font-size: 1.1rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);"></span>
            <button id="admin-btn-link" onclick="window.location.href='admin.html'" class="admin-btn" style="display: none;">إضافة طلاب ⚙️</button>
            <button onclick="logout()" class="logout-btn">تسجيل الخروج</button>
        </div>
    </div>
        </div>

        <div class="grid-container" id="grades-container" style="padding: 2rem;">
            <!-- Grades will be loaded here dynamically -->
        </div>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Protect route
        checkAuth();

        const currentUser = localStorage.getItem('currentUser');
        document.getElementById('user-display').innerText = 'أهلاً، ' + currentUser;
        
        if (currentUser === 'admin') {
            document.getElementById('admin-btn-link').style.display = 'inline-block';
        }

        // Render Grades
        const container = document.getElementById('grades-container');
        const allowedGrade = localStorage.getItem('allowedGrade') || 'all';

        GRADES_DATA.forEach(grade => {
            // Filter logic
            if (allowedGrade !== 'all' && allowedGrade !== grade.id && localStorage.getItem('currentUser') !== 'admin') {
                return; // skip rendering this grade
            }

            const card = document.createElement('a');
            card.href = `grade.html?id=${grade.id}`;
            card.className = 'glass-container grade-card';
            card.style.backgroundImage = `url('${grade.image}')`;
            card.style.backgroundSize = 'cover';
            card.style.backgroundPosition = 'center';
            card.innerHTML = `<span class="card-text">${grade.name}</span>`;
            container.appendChild(card);
        });

        // Register Service Worker for Offline PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
