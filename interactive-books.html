<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الكتاب التفاعلي الممتاز - Primary 1 English Workbook</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- FontAwesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Canvas Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="css/p1_interactive_styles.css?v=20260723_revert_colors_light">
</head>
<body>
    <div id="app" class="clean-app">
        <!-- Top Navbar Header -->
        <header class="top-navbar">
            <div class="nav-left">
                <a href="dashboard.html" class="btn-sidebar-trigger" style="text-decoration:none; background:#ecfdf5; color:#047857; border-color:#a7f3d0;" title="العودة للرئيسية">
                    <i class="fa-solid fa-house"></i>
                    <span>الرئيسية</span>
                </a>

                <button id="btn-toggle-sidebar" class="btn-sidebar-trigger" title="فهرس الـ 72 صفحة">
                    <i class="fa-solid fa-list-check"></i>
                    <span>الفهرس (72 صفحة)</span>
                </button>
                <div class="book-grade-selector-wrap" style="margin: 0 4px;">
                    <select id="book-grade-selector" class="page-dropdown-select" style="background:#EEF2FF; color:#4F46E5; border-color:#C7D2FE; font-weight:800; padding:4px 8px;">
                        <option value="p2" selected>📘 الصف الثاني الابتدائي (2027)</option>
                        <option value="p1">📗 الصف الأول الابتدائي</option>
                        <option value="p3">⏳ الصف الثالث (قريباً)</option>
                    </select>
                </div>
                <h1 class="app-title" id="app-header-title">📘 كتاب تقييمات الصف الثاني الابتدائي 2027</h1>
            </div>

            <div class="nav-center">
                <div class="page-nav-group">
                    <button id="btn-prev-page" class="nav-circle-btn" title="الصفحة السابقة">
                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                    <div style="display:flex; align-items:center; gap:4px; font-weight:800; font-size:14px;">
                        <span>صفحة</span>
                        <select id="page-select" class="page-dropdown-select"></select>
                        <span style="color:var(--text-muted);">/ 72</span>
                    </div>
                    <button id="btn-next-page" class="nav-circle-btn" title="الصفحة التالية">
                        <i class="fa-solid fa-chevron-left"></i>
                    </button>
                </div>
            </div>

            <div class="nav-right">
                <!-- 💡 HELP & ACTIONS DROPDOWN MENU -->
                <div class="help-dropdown-wrap">
                    <button id="btn-help-dropdown" class="btn-help-trigger" title="خيارات المساعدة والتصحيح">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span>مساعدة 🔻</span>
                    </button>
                    <div id="help-dropdown-menu" class="help-dropdown-menu hidden">
                        <button id="btn-check-answers" class="help-menu-item item-check">
                            <i class="fa-solid fa-circle-check"></i>
                            <span>تصحح تلقائياً (تحقق)</span>
                        </button>
                        <button id="btn-send-whatsapp" class="help-menu-item item-whatsapp">
                            <i class="fa-brands fa-whatsapp"></i>
                            <span>إرسال الإجابات للمعلم</span>
                        </button>
                        <button id="btn-show-answers" class="help-menu-item item-show">
                            <i class="fa-solid fa-eye"></i>
                            <span>إظهار الحلول الصحيحة</span>
                        </button>
                        <button id="btn-reset-page" class="help-menu-item item-reset">
                            <i class="fa-solid fa-rotate-right"></i>
                            <span>إعادة الصفحة</span>
                        </button>
                    </div>
                </div>

                <div class="star-score-badge" title="النجوم المكتسبة">
                    <span>⭐</span>
                    <span id="total-stars-count">0</span>
                </div>
                <button id="btn-sound-toggle" class="sound-btn" title="تشغيل/إيقاف الأصوات">
                    <i class="fa-solid fa-volume-high"></i>
                </button>
            </div>
        </header>

        <!-- Page Stage Area (Exact Fit) -->
        <main class="page-stage-container" id="stage-container">
            <!-- Exact-Fit Page Card -->
            <div id="page-card" class="exact-page-card">
                <!-- Content Rendered Dynamically -->
            </div>
        </main>

        <!-- Sidebar Drawer Index -->
        <aside id="sidebar" class="sidebar-panel">
            <div class="sidebar-header-row">
                <h2><i class="fa-solid fa-book-open"></i> فهرس الـ 72 صفحة</h2>
                <button id="btn-close-sidebar" class="close-panel-btn">&times;</button>
            </div>
            <div class="search-field">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="sidebar-search" placeholder="ابحث برقم الصفحة أو الدرس...">
            </div>
            <div class="overall-progress-card">
                <div class="progress-header">
                    <span>التقدم الإجمالي:</span>
                    <strong id="overall-progress-text">0%</strong>
                </div>
                <div class="progress-track-bar">
                    <div id="overall-progress-bar" class="progress-track-fill" style="width: 0%"></div>
                </div>
            </div>
            <div id="pages-grid" class="pages-grid-box">
                <!-- Dynamic Page Grid -->
            </div>
        </aside>
        <div id="sidebar-overlay" class="sidebar-overlay-bg"></div>

        <!-- Celebration Modal -->
        <div id="result-modal" class="modal-mask hidden">
            <div class="modal-window animate-pop">
                <div class="trophy-badge">🏆</div>
                <h2 id="modal-title" style="font-size:22px; color:var(--primary); margin-bottom:6px;">ممتاز جـداً! إجابة كاملة!</h2>
                <p id="modal-message" style="font-size:15px; color:var(--text-muted);">لقد أجبت على جميع تمارين الصفحة بنجاح!</p>
                <div class="stars-row">
                    <span>⭐</span>
                    <span>⭐</span>
                    <span>⭐</span>
                </div>
                <div style="font-size:18px; font-weight:800; margin-bottom:16px;">
                    النتيجة: <strong id="modal-score-text">10 / 10</strong>
                </div>
                <div style="display:flex; gap:8px; justify-content:center; flex-wrap:wrap;">
                    <button id="btn-modal-whatsapp" class="btn-action btn-whatsapp">
                        <i class="fa-brands fa-whatsapp"></i>
                        <span>إرسال النتيجة للمعلم</span>
                    </button>
                    <button id="btn-modal-next" class="btn-action btn-grade">
                        <span>الصفحة التالية</span>
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <button id="btn-modal-close" class="btn-action btn-show">إغلاق</button>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="js/pagesData.js?v=20260723_v2027_cover"></script>
    <script src="js/p2_pagesData.js?v=20260723_v2027_cover"></script>
    <script src="js/p1_interactive_app.js?v=20260723_v2027_cover"></script>
</body>
</html>
