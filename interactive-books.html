<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Toon — الكتاب التفاعلي المزدوج</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --emerald: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── TOP NAV ── */
        .top-nav {
            background: rgba(15, 23, 42, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .nav-brand {
            font-size: 1rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-brand span { color: var(--cyan); }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .nav-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .nav-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .nav-btn:hover { background: var(--border); }
        .page-counter {
            background: linear-gradient(135deg, var(--primary), var(--cyan));
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.85rem;
            color: #fff;
        }

        /* ── MOBILE TABS (FOR PHONE VIEW) ── */
        .mobile-tabs {
            display: none;
            background: #1e293b;
            padding: 6px 10px;
            gap: 6px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: var(--text-muted);
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: center;
        }
        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary-light);
        }

        /* ── SPLIT LAYOUT ── */
        .split-wrap {
            display: flex;
            width: 100%;
            flex: 1;
            min-height: calc(100vh - 60px);
        }

        /* Book panel */
        .panel-book {
            flex: 1;
            background: #0f172a;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            border-left: 2px solid var(--border);
            position: sticky;
            top: 50px;
            height: calc(100vh - 50px);
            overflow-y: auto;
            padding: 10px;
        }
        .panel-book img {
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .img-error-msg {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Exercises panel */
        .panel-exercises {
            flex: 1;
            background: #f8fafc;
            min-height: calc(100vh - 50px);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            color: #0f172a;
        }

        /* Exercises header */
        .ex-header {
            background: #fff;
            border-bottom: 2px solid #e2e8f0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .ex-header-info h2 {
            font-size: 0.95rem;
            font-weight: 900;
            color: #0f172a;
        }
        .ex-header-info p {
            font-size: 0.78rem;
            color: #64748b;
            font-weight: 600;
            margin-top: 2px;
        }
        .score-badge {
            background: linear-gradient(135deg, var(--emerald), #059669);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* Exercises body */
        .ex-body {
            flex: 1;
            padding: 14px 16px;
        }

        /* ── SECTION BLOCK ── */
        .section-block {
            margin-bottom: 20px;
        }
        .section-title {
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 0.9rem;
            margin-bottom: 12px;
        }

        /* ── ACTIVITY BLOCK ── */
        .activity-block {
            margin-bottom: 16px;
        }
        .activity-label {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            color: #78350f;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: inline-block;
        }

        /* ── WORD BOX ── */
        .word-box {
            background: #dbeafe;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            padding: 8px 14px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .word-box span {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 0.95rem;
            color: #1e40af;
        }

        /* ── ITEMS GRID ── */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        .item-card {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: border-color 0.2s;
        }
        .item-card:hover { border-color: #818cf8; }
        .item-scrambled {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 0.9rem;
            color: #7c3aed;
            background: #f3f0ff;
            border-radius: 6px;
            padding: 2px 8px;
            letter-spacing: 1px;
        }
        .item-word-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            color: #475569;
            direction: ltr;
        }
        .item-input {
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 6px 8px;
            width: 100%;
            text-align: center;
            direction: ltr;
            transition: all 0.15s;
        }
        .item-input:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        .item-input.correct { border-color: #10b981 !important; background: #ecfdf5 !important; color: #065f46 !important; }
        .item-input.wrong   { border-color: #ef4444 !important; background: #fef2f2 !important; color: #991b1b !important; }
        .sound-btn {
            background: #6366f1;
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .sound-btn:hover { background: #4f46e5; }

        /* ── REORDER ── */
        .reorder-item {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .reorder-words {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #6d28d9;
            font-size: 0.9rem;
            margin-bottom: 6px;
            direction: ltr;
            text-align: left;
        }
        .reorder-input {
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 8px 10px;
            width: 100%;
            direction: ltr;
        }
        .reorder-input:focus { outline: none; border-color: #6366f1; }
        .reorder-input.correct { border-color: #10b981 !important; background: #ecfdf5 !important; }
        .reorder-input.wrong   { border-color: #ef4444 !important; background: #fef2f2 !important; }

        /* ── MCQ ── */
        .mcq-item {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
        }
        .mcq-label {
            font-weight: 800;
            color: #334155;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .mcq-opts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .opt-btn {
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            color: #0f172a;
            padding: 6px 14px;
            border-radius: 8px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .opt-btn.correct { background: #10b981 !important; border-color: #059669 !important; color: #fff !important; }
        .opt-btn.wrong   { background: #ef4444 !important; border-color: #dc2626 !important; color: #fff !important; }

        /* ── CHOOSE FROM BOX & FREEWRITE ── */
        .cfb-item {
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cfb-prompt {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.9rem;
            color: #334155;
        }
        .cfb-input {
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            color: #0f172a;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            padding: 5px 10px;
            min-width: 100px;
            direction: ltr;
        }
        .cfb-input.correct { border-color: #10b981 !important; background: #ecfdf5 !important; }
        .cfb-input.wrong   { border-color: #ef4444 !important; background: #fef2f2 !important; }

        /* ── BOTTOM ACTIONS ── */
        .ex-actions {
            background: #fff;
            border-top: 2px solid #e2e8f0;
            padding: 10px 14px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            position: sticky;
            bottom: 0;
        }
        .btn-check {
            flex: 2;
            min-width: 140px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 900;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn-reveal, .btn-speak {
            flex: 1;
            min-width: 100px;
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            color: #334155;
            padding: 10px 12px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .btn-speak { background: #e0e7ff; border-color: #818cf8; color: #3730a3; }

        /* ── RESPONSIVE MOBILE ADJUSTMENTS ── */
        @media (max-width: 850px) {
            .mobile-tabs { display: flex; }
            .split-wrap { flex-direction: column; }
            .panel-book {
                position: relative;
                top: 0;
                height: auto;
                max-height: 50vh;
                border-left: none;
                border-bottom: 2px solid var(--border);
            }
            .panel-book.hide-mobile { display: none; }
            .panel-exercises.hide-mobile { display: none; }
            .items-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }
        }
    </style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav class="top-nav">
    <a href="dashboard.html" class="nav-brand">🏠 <span>English Toon</span></a>
    <div class="nav-controls">
        <select class="nav-select" id="book-sel" onchange="changeBook()">
            <option value="1">🎒 الصف الأول الابتدائي</option>
            <option value="2">📖 الصف الثاني الابتدائي</option>
            <option value="3">✏️ الصف الثالث الابتدائي</option>
        </select>
        <select class="nav-select" id="page-sel" onchange="jumpTo(this.value)"></select>
        <button class="nav-btn" onclick="prevPage()">◀ السابقة</button>
        <span class="page-counter" id="page-counter">3 / 72</span>
        <button class="nav-btn" onclick="nextPage()">التالية ▶</button>
    </div>
</nav>

<!-- ── MOBILE TABS SWITCHER ── -->
<div class="mobile-tabs">
    <button class="tab-btn active" id="tab-both" onclick="setMobileView('both')">📱 عرض مزدوج</button>
    <button class="tab-btn" id="tab-book" onclick="setMobileView('book')">📖 الكتاب فقط</button>
    <button class="tab-btn" id="tab-ex" onclick="setMobileView('ex')">📝 الأسئلة فقط</button>
</div>

<!-- ── SPLIT LAYOUT ── -->
<div class="split-wrap">

    <!-- Left: Original Book Page -->
    <div class="panel-book" id="panel-book">
        <img id="book-img" src="" alt="صفحة الكتاب"
             onerror="this.style.display='none'; document.getElementById('img-err').style.display='block'">
        <div id="img-err" class="img-error-msg" style="display:none">
            📷 صورة الصفحة غير متوفرة بعد<br><small>ستظهر بعد رفع الصور</small>
        </div>
    </div>

    <!-- Right: Interactive Exercises -->
    <div class="panel-exercises" id="panel-exercises">
        <div class="ex-header">
            <div class="ex-header-info">
                <h2 id="ex-unit">📝 تمارين الصفحة التفاعلية</h2>
                <p id="ex-lesson">الدرس التفاعلي المطابق للصفحة</p>
            </div>
            <div class="score-badge" id="score-badge">النتيجة: — / —</div>
        </div>

        <div class="ex-body" id="ex-body"></div>

        <div class="ex-actions">
            <button class="btn-check"  onclick="checkAll()">✅ تصحيح النتيجة</button>
            <button class="btn-reveal" onclick="revealAll()">👁️ الإجابات</button>
            <button class="btn-speak"  onclick="speakPage()">🔊 نطق</button>
        </div>
    </div>

</div>

<script src="js/p1_book_data.js"></script>
<script>
    let bookId = 1;
    let pageNum = 3;
    const TOTAL = 72;

    // ── SPEECH ──
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.rate = 0.85;
        window.speechSynthesis.speak(u);
    }

    // ── MOBILE VIEW TOGGLE ──
    function setMobileView(mode) {
        const pb = document.getElementById('panel-book');
        const pe = document.getElementById('panel-exercises');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        if (mode === 'book') {
            pb.classList.remove('hide-mobile'); pb.style.maxHeight = 'none';
            pe.classList.add('hide-mobile');
            document.getElementById('tab-book').classList.add('active');
        } else if (mode === 'ex') {
            pb.classList.add('hide-mobile');
            pe.classList.remove('hide-mobile');
            document.getElementById('tab-ex').classList.add('active');
        } else {
            pb.classList.remove('hide-mobile'); pb.style.maxHeight = '50vh';
            pe.classList.remove('hide-mobile');
            document.getElementById('tab-both').classList.add('active');
        }
    }

    // ── PAGE SELECT INIT ──
    function initPageSel() {
        const s = document.getElementById('page-sel');
        s.innerHTML = '';
        for (let i = 1; i <= TOTAL; i++) {
            const o = document.createElement('option');
            o.value = i; o.text = `صفحة ${i}`;
            if (i === pageNum) o.selected = true;
            s.appendChild(o);
        }
    }

    function changeBook() { bookId = +document.getElementById('book-sel').value; pageNum = 3; render(); }
    function jumpTo(p) { pageNum = +p; render(); }
    function prevPage() { if (pageNum > 1) { pageNum--; render(); } }
    function nextPage() { if (pageNum < TOTAL) { pageNum++; render(); } }

    // ── MAIN RENDER ──
    function render() {
        initPageSel();
        document.getElementById('page-counter').textContent = `${pageNum} / ${TOTAL}`;

        // Book image
        const imgEl = document.getElementById('book-img');
        const errEl = document.getElementById('img-err');
        const folder = bookId === 1 ? 'p1' : bookId === 2 ? 'p2' : 'p3';
        imgEl.style.display = 'block';
        errEl.style.display = 'none';
        imgEl.src = `images/books/${folder}/${pageNum}.jpg`;
        imgEl.onerror = function() {
            this.onerror = null;
            this.src = `images/books/${folder}/page_${pageNum}.png`;
            this.onerror = function() {
                this.style.display = 'none';
                errEl.style.display = 'block';
            };
        };

        // Exercises
        const body = document.getElementById('ex-body');
        body.innerHTML = '';

        let db = null;
        if (bookId === 1 && typeof P1_EXERCISES_DATABASE !== 'undefined' && P1_EXERCISES_DATABASE[pageNum]) {
            db = P1_EXERCISES_DATABASE[pageNum];
        }

        if (!db) {
            document.getElementById('ex-unit').textContent = `📝 تمارين الصفحة ${pageNum}`;
            document.getElementById('ex-lesson').textContent = `الأسئلة التفاعلية لهذه الصفحة قيد الإضافة`;
            document.getElementById('score-badge').textContent = 'النتيجة: — / —';
            body.innerHTML = `<div class="no-ex" style="text-align:center;padding:40px 10px;color:#94a3b8"><h3>🚧 قيد الإضافة</h3><p>أسئلة هذه الصفحة ستُضاف قريباً</p></div>`;
            return;
        }

        document.getElementById('ex-unit').textContent   = `📖 ${db.unit}`;
        document.getElementById('ex-lesson').textContent = db.lesson;
        document.getElementById('score-badge').textContent = 'النتيجة: 0 / 0';

        db.sections.forEach(sec => {
            const secDiv = document.createElement('div');
            secDiv.className = 'section-block';

            const secTitle = document.createElement('div');
            secTitle.className = 'section-title';
            secTitle.textContent = sec.title;
            secDiv.appendChild(secTitle);

            sec.activities.forEach(act => {
                const actDiv = document.createElement('div');
                actDiv.className = 'activity-block';

                const lbl = document.createElement('div');
                lbl.className = 'activity-label';
                lbl.textContent = act.label;
                actDiv.appendChild(lbl);

                // ── WORD BOX ──
                if (act.type === 'choose_from_box' && act.box) {
                    const wb = document.createElement('div');
                    wb.className = 'word-box';
                    act.box.forEach(w => { const sp = document.createElement('span'); sp.textContent = w; wb.appendChild(sp); });
                    actDiv.appendChild(wb);
                }

                // ── ITEMS (unscramble / look_write / missing_sound) ──
                if (act.type === 'unscramble' || act.type === 'look_write' || act.type === 'missing_sound') {
                    const grid = document.createElement('div');
                    grid.className = 'items-grid';

                    act.items.forEach((item, i) => {
                        const card = document.createElement('div');
                        card.className = 'item-card';

                        // ── High-Quality Image ──
                        if (item.img) {
                            const imgWrap = document.createElement('div');
                            imgWrap.style.cssText = 'width:100%;height:100px;overflow:hidden;border-radius:8px;border:1px solid #cbd5e1;background:#f1f5f9;display:flex;align-items:center;justify-content:center;margin-bottom:4px;';
                            const bookImg = document.createElement('img');
                            bookImg.src = item.img;
                            bookImg.alt = item.answer;
                            bookImg.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:6px;';
                            bookImg.onerror = function() {
                                this.parentElement.innerHTML = '<span style="font-size:2rem">🖼️</span>';
                            };
                            imgWrap.appendChild(bookImg);
                            card.appendChild(imgWrap);
                        }

                        // Scrambled label (for unscramble only)
                        if (item.scrambled) {
                            const sc = document.createElement('div');
                            sc.className = 'item-scrambled';
                            sc.textContent = item.scrambled;
                            card.appendChild(sc);
                        }

                        // Partial word (for missing_sound ONLY, e.g. "1. ...omato" — NEVER whole word)
                        if (item.word && act.type === 'missing_sound') {
                            const wl = document.createElement('div');
                            wl.className = 'item-word-label';
                            wl.textContent = item.word;
                            card.appendChild(wl);
                        }

                        // Sound button (ONLY speaker icon 🔊 — NEVER prints target word text!)
                        if (item.speech) {
                            const sb = document.createElement('button');
                            sb.className = 'sound-btn';
                            sb.innerHTML = '🔊';
                            sb.title = 'استمع للنطق';
                            sb.onclick = () => speak(item.speech);
                            card.appendChild(sb);
                        }

                        // Input
                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'item-input';
                        inp.placeholder = act.type === 'look_write' ? 'اكتب الكلمة...' : act.type === 'missing_sound' ? 'الحرف...' : '...';
                        inp.dataset.answer = item.answer.toLowerCase();
                        inp.dataset.idx = i;
                        card.appendChild(inp);

                        grid.appendChild(card);
                    });
                    actDiv.appendChild(grid);
                }

                // ── REORDER ──
                if (act.type === 'reorder') {
                    act.items.forEach((item, i) => {
                        const ri = document.createElement('div');
                        ri.className = 'reorder-item';

                        const wds = document.createElement('div');
                        wds.className = 'reorder-words';
                        wds.textContent = `🔀 ${item.words}`;
                        ri.appendChild(wds);

                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'reorder-input';
                        inp.placeholder = 'رتّب الكلمات واكتب الجملة...';
                        inp.dataset.answer = item.answer.toLowerCase();
                        inp.dataset.idx = i;
                        ri.appendChild(inp);

                        actDiv.appendChild(ri);
                    });
                }

                // ── MCQ ──
                if (act.type === 'mcq') {
                    act.items.forEach((item, i) => {
                        const mi = document.createElement('div');
                        mi.className = 'mcq-item';

                        if (item.img) {
                            const imgWrap = document.createElement('div');
                            imgWrap.style.cssText = 'width:120px;height:100px;overflow:hidden;border-radius:8px;border:1px solid #cbd5e1;background:#f1f5f9;display:inline-flex;align-items:center;justify-content:center;margin-bottom:6px;';
                            const bookImg = document.createElement('img');
                            bookImg.src = item.img;
                            bookImg.alt = item.answer;
                            bookImg.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:6px;';
                            bookImg.onerror = function() { this.parentElement.innerHTML = '<span style="font-size:2rem">🖼️</span>'; };
                            imgWrap.appendChild(bookImg);
                            mi.appendChild(imgWrap);
                        }

                        const lbDiv = document.createElement('div');
                        lbDiv.className = 'mcq-label';
                        lbDiv.innerHTML = item.label + (item.speech ? ` <button class="sound-btn" onclick="speak('${item.speech}')">🔊</button>` : '');
                        mi.appendChild(lbDiv);

                        const opts = document.createElement('div');
                        opts.className = 'mcq-opts';
                        opts.dataset.answer = item.answer.toLowerCase();

                        item.options.forEach(opt => {
                            const btn = document.createElement('button');
                            btn.className = 'opt-btn';
                            btn.textContent = opt;
                            btn.dataset.val = opt.toLowerCase();
                            btn.onclick = function() {
                                opts.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('correct','wrong'));
                                if (opt.toLowerCase() === item.answer.toLowerCase()) {
                                    btn.classList.add('correct');
                                    speak("Excellent! " + opt);
                                } else {
                                    btn.classList.add('wrong');
                                    speak("Try again!");
                                }
                            };
                            opts.appendChild(btn);
                        });
                        mi.appendChild(opts);
                        actDiv.appendChild(mi);
                    });
                }

                // ── CHOOSE FROM BOX ──
                if (act.type === 'choose_from_box') {
                    act.items.forEach((item, i) => {
                        const cfb = document.createElement('div');
                        cfb.className = 'cfb-item';

                        const pr = document.createElement('div');
                        pr.className = 'cfb-prompt';
                        pr.textContent = item.prompt;
                        cfb.appendChild(pr);

                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'cfb-input';
                        inp.placeholder = '...';
                        inp.dataset.answer = item.answer.toLowerCase();

                        if (item.speech) {
                            const sb = document.createElement('button');
                            sb.className = 'sound-btn';
                            sb.innerHTML = '🔊';
                            sb.title = 'استمع للنطق';
                            sb.onclick = () => speak(item.speech);
                            cfb.appendChild(inp);
                            cfb.appendChild(sb);
                        } else {
                            cfb.appendChild(inp);
                        }
                        actDiv.appendChild(cfb);
                    });
                }

                // ── FREEWRITE ──
                if (act.type === 'freewrite') {
                    act.items.forEach(item => {
                        const fw = document.createElement('div');
                        fw.className = 'cfb-item';
                        const pr = document.createElement('div');
                        pr.className = 'cfb-prompt';
                        pr.textContent = item.prompt;
                        fw.appendChild(pr);
                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'cfb-input';
                        inp.placeholder = 'اكتب اسمك...';
                        inp.dataset.answer = '__free__';
                        fw.appendChild(inp);
                        actDiv.appendChild(fw);
                    });
                }

                secDiv.appendChild(actDiv);
            });

            body.appendChild(secDiv);
        });

        updateScoreLabel();
    }

    // ── CHECK ALL ──
    function checkAll() {
        const body = document.getElementById('ex-body');
        let correct = 0, total = 0;

        body.querySelectorAll('.item-input, .reorder-input, .cfb-input').forEach(el => {
            const ans = el.dataset.answer;
            if (ans === '__free__') return;
            total++;
            const val = el.value.trim().toLowerCase();
            if (val === ans) { el.classList.remove('wrong'); el.classList.add('correct'); correct++; }
            else { el.classList.remove('correct'); el.classList.add('wrong'); }
        });

        body.querySelectorAll('.mcq-opts').forEach(opts => {
            total++;
            const chosen = opts.querySelector('.opt-btn.correct');
            if (chosen) correct++;
        });

        document.getElementById('score-badge').textContent = `النتيجة: ${correct} / ${total}`;
        if (correct === total && total > 0) {
            speak(`Excellent! Perfect score! ${correct} out of ${total}`);
            setTimeout(() => alert(`🎉 ممتاز جداً! حصلت على العلامة الكاملة (${correct}/${total}) ⭐⭐⭐`), 100);
        } else {
            speak(`Your score is ${correct} out of ${total}`);
        }
    }

    // ── REVEAL ALL ──
    function revealAll() {
        const body = document.getElementById('ex-body');
        body.querySelectorAll('.item-input, .reorder-input, .cfb-input').forEach(el => {
            const ans = el.dataset.answer;
            if (ans === '__free__') return;
            el.value = ans;
            el.classList.remove('wrong'); el.classList.add('correct');
        });
        body.querySelectorAll('.mcq-opts').forEach(opts => {
            const ans = opts.dataset.answer;
            opts.querySelectorAll('.opt-btn').forEach(b => {
                b.classList.remove('correct','wrong');
                if (b.dataset.val === ans) b.classList.add('correct');
            });
        });
        speak("Model answers are now shown!");
        updateScoreLabel();
    }

    function updateScoreLabel() {
        const body = document.getElementById('ex-body');
        let total = 0;
        body.querySelectorAll('.item-input, .reorder-input, .cfb-input').forEach(el => { if (el.dataset.answer !== '__free__') total++; });
        body.querySelectorAll('.mcq-opts').forEach(() => total++);
        document.getElementById('score-badge').textContent = `النتيجة: 0 / ${total}`;
    }

    // ── SPEAK PAGE ──
    function speakPage() {
        if (bookId === 1 && typeof P1_EXERCISES_DATABASE !== 'undefined' && P1_EXERCISES_DATABASE[pageNum]) {
            const db = P1_EXERCISES_DATABASE[pageNum];
            speak(`${db.unit}. ${db.lesson}`);
        } else {
            speak(`Page ${pageNum}`);
        }
    }

    // ── INIT ──
    render();
</script>
</body>
