<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Toon — الكتاب التفاعلي المزدوج (صفحات A4)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --emerald: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --bg: #1e293b;
            --surface: #334155;
            --border: #475569;
            --text: #f8fafc;
            --paper-bg: #ffffff;
            --paper-border: #cbd5e1;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── TOP NAV BAR ── */
        .top-nav {
            background: #0f172a;
            border-bottom: 2px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 300;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .nav-brand {
            font-size: 1.1rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand span { color: var(--cyan); }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .nav-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .nav-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .nav-btn:hover { background: #475569; }
        .page-counter {
            background: linear-gradient(135deg, var(--primary), var(--cyan));
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.9rem;
            color: #fff;
        }

        /* ── MOBILE TAB SWITCHER ── */
        .mobile-tabs {
            display: none;
            background: #0f172a;
            padding: 6px 12px;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            border: 1px solid var(--border);
            background: #1e293b;
            color: #94a3b8;
            border-radius: 8px;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: center;
        }
        .tab-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary-light);
        }

        /* ── MAIN WORKSPACE (SLOT FOR TWO A4 PAGES) ── */
        .workspace {
            display: flex;
            gap: 20px;
            padding: 20px;
            justify-content: center;
            align-items: flex-start;
            flex: 1;
            max-width: 1500px;
            margin: 0 auto;
            width: 100%;
        }

        /* ── A4 PAPER FRAME SHEET CONTAINER ── */
        .a4-container {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .a4-sheet {
            background: var(--paper-bg);
            color: #0f172a;
            width: 100%;
            max-width: 650px;
            aspect-ratio: 1 / 1.414; /* Standard A4 Paper Aspect Ratio */
            min-height: 800px;
            border-radius: 12px;
            border: 3px solid #cbd5e1;
            box-shadow: 0 15px 35px rgba(0,0,0,0.35), 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .a4-header {
            background: #f1f5f9;
            border-bottom: 2px solid #e2e8f0;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .a4-header-title {
            font-size: 0.95rem;
            font-weight: 900;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Book Image Frame inside A4 */
        .a4-book-body {
            flex: 1;
            background: #fff;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }
        .a4-book-body img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Interactive Exercises Frame inside A4 */
        .a4-ex-body {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            background: #ffffff;
        }

        .a4-footer {
            background: #f8fafc;
            border-top: 2px solid #e2e8f0;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        /* ── EXERCISES STYLING ── */
        .section-block {
            margin-bottom: 18px;
        }
        .section-title {
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            color: #fff;
            padding: 7px 12px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.88rem;
            margin-bottom: 10px;
        }
        .activity-block {
            margin-bottom: 14px;
        }
        .activity-label {
            background: #fef3c7;
            border: 2px solid #f59e0b;
            color: #78350f;
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 0.82rem;
            margin-bottom: 8px;
            display: inline-block;
        }

        .word-box {
            background: #dbeafe;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            padding: 6px 12px;
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .word-box span {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 0.9rem;
            color: #1e40af;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }
        .item-card {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .item-img-box {
            width: 100%;
            height: 85px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            background: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .item-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-scrambled {
            font-family: 'Outfit', sans-serif;
            font-weight: 900;
            font-size: 0.85rem;
            color: #6d28d9;
            background: #f3f0ff;
            border-radius: 6px;
            padding: 2px 6px;
        }
        .item-word-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            color: #334155;
            direction: ltr;
        }
        .item-input {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            color: #0f172a;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            padding: 5px;
            width: 100%;
            text-align: center;
            direction: ltr;
        }
        .item-input:focus { outline: none; border-color: #6366f1; }
        .item-input.correct { border-color: #10b981 !important; background: #ecfdf5 !important; color: #065f46 !important; }
        .item-input.wrong   { border-color: #ef4444 !important; background: #fef2f2 !important; color: #991b1b !important; }

        .sound-btn {
            background: #6366f1;
            color: #fff;
            border: none;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 800;
            cursor: pointer;
        }

        .reorder-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
        }
        .reorder-words {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            color: #6d28d9;
            font-size: 0.88rem;
            margin-bottom: 4px;
            direction: ltr;
        }
        .reorder-input {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            color: #0f172a;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            padding: 6px;
            width: 100%;
            direction: ltr;
        }

        .mcq-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
        }
        .mcq-opts {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .opt-btn {
            background: #fff;
            border: 2px solid #cbd5e1;
            color: #0f172a;
            padding: 5px 12px;
            border-radius: 6px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .opt-btn.correct { background: #10b981 !important; border-color: #059669 !important; color: #fff !important; }
        .opt-btn.wrong   { background: #ef4444 !important; border-color: #dc2626 !important; color: #fff !important; }

        .cfb-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            padding: 6px 10px;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .cfb-prompt {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 0.88rem;
            color: #334155;
        }
        .cfb-input {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            color: #0f172a;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            padding: 4px 8px;
            min-width: 90px;
            direction: ltr;
        }

        .btn-check {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 900;
            font-size: 0.88rem;
            cursor: pointer;
        }
        .btn-reveal, .btn-speak {
            background: #fff;
            border: 2px solid #cbd5e1;
            color: #334155;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 800;
            font-size: 0.82rem;
            cursor: pointer;
        }

        /* ── RESPONSIVE MOBILE STYLES ── */
        @media (max-width: 850px) {
            .mobile-tabs { display: flex; }
            .workspace { padding: 10px; flex-direction: column; }
            .a4-sheet { aspect-ratio: auto; min-height: auto; height: auto; max-width: 100%; }
            .a4-container.hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<!-- ── TOP NAV BAR ── -->
<nav class="top-nav">
    <a href="dashboard.html" class="nav-brand">🏠 <span>English Toon A4 Book</span></a>
    <div class="nav-controls">
        <select class="nav-select" id="book-sel" onchange="changeBook()">
            <option value="1">🎒 الصف الأول الابتدائي</option>
            <option value="2">📖 الصف الثاني الابتدائي</option>
            <option value="3">✏️ الصف الثالث الابتدائي</option>
        </select>
        <select class="nav-select" id="page-sel" onchange="jumpTo(this.value)"></select>
        <button class="nav-btn" onclick="prevPage()">◀ السابقة</button>
        <span class="page-counter" id="page-counter">3 / 72</span>
        <button class="nav-btn" onclick="nextPage()">التالية ▶</button>
    </div>
</nav>

<!-- ── MOBILE TABS ── -->
<div class="mobile-tabs">
    <button class="tab-btn active" id="tab-both" onclick="setMobileView('both')">📱 العرض المزدوج (A4)</button>
    <button class="tab-btn" id="tab-book" onclick="setMobileView('book')">📖 الكتاب الأصلي</button>
    <button class="tab-btn" id="tab-ex" onclick="setMobileView('ex')">📝 الصفحة التفاعلية</button>
</div>

<!-- ── WORKSPACE: TWO SIDE-BY-SIDE A4 SHEETS ── -->
<div class="workspace">

    <!-- LEFT A4 SHEET: Original Printed Book Page -->
    <div class="a4-container" id="container-book">
        <div class="a4-sheet">
            <div class="a4-header">
                <div class="a4-header-title">📖 صفحة الكتاب الأصلية (A4)</div>
                <div style="font-size:0.8rem;font-weight:800;color:#64748b" id="lbl-page-left">Page 3</div>
            </div>
            <div class="a4-book-body">
                <img id="book-img" src="" alt="صفحة الكتاب"
                     onerror="this.style.display='none'; document.getElementById('img-err').style.display='block'">
                <div id="img-err" style="display:none;text-align:center;color:#94a3b8;padding:40px">
                    📷 صورة الصفحة غير متوفرة بعد
                </div>
            </div>
            <div class="a4-footer" style="justify-content:center;font-weight:800;font-size:0.8rem;color:#64748b">
                English Language — Primary Stage
            </div>
        </div>
    </div>

    <!-- RIGHT A4 SHEET: Interactive Digital Replica Sheet -->
    <div class="a4-container" id="container-ex">
        <div class="a4-sheet">
            <div class="a4-header">
                <div class="a4-header-title">📝 التطبيق التفاعلي المطابق (A4)</div>
                <div class="score-badge" id="score-badge">النتيجة: — / —</div>
            </div>

            <div class="a4-ex-body" id="ex-body"></div>

            <div class="a4-footer">
                <button class="btn-check"  onclick="checkAll()">✅ تصحيح</button>
                <button class="btn-reveal" onclick="revealAll()">👁️ الإجابات</button>
                <button class="btn-speak"  onclick="speakPage()">🔊 نطق</button>
            </div>
        </div>
    </div>

</div>

<script src="js/p1_book_data.js"></script>
<script>
    let bookId = 1;
    let pageNum = 3;
    const TOTAL = 72;

    // ── SPEECH ──
    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.rate = 0.85;
        window.speechSynthesis.speak(u);
    }

    // ── MOBILE VIEW TOGGLE ──
    function setMobileView(mode) {
        const cb = document.getElementById('container-book');
        const ce = document.getElementById('container-ex');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

        if (mode === 'book') {
            cb.classList.remove('hide-mobile'); ce.classList.add('hide-mobile');
            document.getElementById('tab-book').classList.add('active');
        } else if (mode === 'ex') {
            cb.classList.add('hide-mobile'); ce.classList.remove('hide-mobile');
            document.getElementById('tab-ex').classList.add('active');
        } else {
            cb.classList.remove('hide-mobile'); ce.classList.remove('hide-mobile');
            document.getElementById('tab-both').classList.add('active');
        }
    }

    // ── PAGE SELECT INIT ──
    function initPageSel() {
        const s = document.getElementById('page-sel');
        s.innerHTML = '';
        for (let i = 1; i <= TOTAL; i++) {
            const o = document.createElement('option');
            o.value = i; o.text = `صفحة ${i}`;
            if (i === pageNum) o.selected = true;
            s.appendChild(o);
        }
    }

    function changeBook() { bookId = +document.getElementById('book-sel').value; pageNum = 3; render(); }
    function jumpTo(p) { pageNum = +p; render(); }
    function prevPage() { if (pageNum > 1) { pageNum--; render(); } }
    function nextPage() { if (pageNum < TOTAL) { pageNum++; render(); } }

    // ── SVG ARTWORK FALLBACK CREATOR ──
    function getSvgFallback(label) {
        const bgColors = ['#fef3c7', '#dbeafe', '#e0e7ff', '#d1fae5', '#fce7f3'];
        const c = bgColors[Math.floor(Math.random() * bgColors.length)];
        const text = encodeURIComponent(label || 'Pic');
        return `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="85" viewBox="0 0 100 85"><rect width="100" height="85" fill="${encodeURIComponent(c)}"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="%23475569">${text}</text></svg>`;
    }

    // ── MAIN RENDER ──
    function render() {
        initPageSel();
        document.getElementById('page-counter').textContent = `${pageNum} / ${TOTAL}`;
        document.getElementById('lbl-page-left').textContent = `Page ${pageNum}`;

        // Book image on Left A4 Sheet
        const imgEl = document.getElementById('book-img');
        const errEl = document.getElementById('img-err');
        const folder = bookId === 1 ? 'p1' : bookId === 2 ? 'p2' : 'p3';
        imgEl.style.display = 'block';
        errEl.style.display = 'none';
        imgEl.src = `images/books/${folder}/${pageNum}.jpg`;
        imgEl.onerror = function() {
            this.onerror = null;
            this.src = `images/books/${folder}/page_${pageNum}.png`;
            this.onerror = function() {
                this.style.display = 'none';
                errEl.style.display = 'block';
            };
        };

        // Exercises on Right A4 Sheet
        const body = document.getElementById('ex-body');
        body.innerHTML = '';

        let db = null;
        if (bookId === 1 && typeof P1_EXERCISES_DATABASE !== 'undefined' && P1_EXERCISES_DATABASE[pageNum]) {
            db = P1_EXERCISES_DATABASE[pageNum];
        }

        if (!db) {
            document.getElementById('score-badge').textContent = 'النتيجة: — / —';
            body.innerHTML = `<div style="text-align:center;padding:50px 10px;color:#94a3b8"><h3>🚧 صفحة قيد الإضافة</h3><p>أسئلة صفحة ${pageNum} قيد الإعداد</p></div>`;
            return;
        }

        document.getElementById('score-badge').textContent = 'النتيجة: 0 / 0';

        db.sections.forEach(sec => {
            const secDiv = document.createElement('div');
            secDiv.className = 'section-block';

            const secTitle = document.createElement('div');
            secTitle.className = 'section-title';
            secTitle.textContent = sec.title;
            secDiv.appendChild(secTitle);

            sec.activities.forEach(act => {
                const actDiv = document.createElement('div');
                actDiv.className = 'activity-block';

                const lbl = document.createElement('div');
                lbl.className = 'activity-label';
                lbl.textContent = act.label;
                actDiv.appendChild(lbl);

                if (act.type === 'choose_from_box' && act.box) {
                    const wb = document.createElement('div');
                    wb.className = 'word-box';
                    act.box.forEach(w => { const sp = document.createElement('span'); sp.textContent = w; wb.appendChild(sp); });
                    actDiv.appendChild(wb);
                }

                if (act.type === 'unscramble' || act.type === 'look_write' || act.type === 'missing_sound') {
                    const grid = document.createElement('div');
                    grid.className = 'items-grid';

                    act.items.forEach((item, i) => {
                        const card = document.createElement('div');
                        card.className = 'item-card';

                        // ── Image Box with Guaranteed SVG Fallback ──
                        const imgBox = document.createElement('div');
                        imgBox.className = 'item-img-box';
                        const itemImg = document.createElement('img');
                        itemImg.src = item.img || getSvgFallback(item.answer);
                        itemImg.alt = item.answer || 'picture';
                        itemImg.onerror = function() {
                            this.onerror = null;
                            this.src = getSvgFallback(item.answer || 'Item');
                        };
                        imgBox.appendChild(itemImg);
                        card.appendChild(imgBox);

                        if (item.scrambled) {
                            const sc = document.createElement('div');
                            sc.className = 'item-scrambled';
                            sc.textContent = item.scrambled;
                            card.appendChild(sc);
                        }

                        if (item.word && act.type === 'missing_sound') {
                            const wl = document.createElement('div');
                            wl.className = 'item-word-label';
                            wl.textContent = item.word;
                            card.appendChild(wl);
                        }

                        if (item.speech) {
                            const sb = document.createElement('button');
                            sb.className = 'sound-btn';
                            sb.innerHTML = '🔊';
                            sb.title = 'استمع للنطق';
                            sb.onclick = () => speak(item.speech);
                            card.appendChild(sb);
                        }

                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'item-input';
                        inp.placeholder = act.type === 'look_write' ? 'اكتب...' : act.type === 'missing_sound' ? 'حرف...' : '...';
                        inp.dataset.answer = item.answer.toLowerCase();
                        inp.dataset.idx = i;
                        card.appendChild(inp);

                        grid.appendChild(card);
                    });
                    actDiv.appendChild(grid);
                }

                if (act.type === 'reorder') {
                    act.items.forEach((item, i) => {
                        const ri = document.createElement('div');
                        ri.className = 'reorder-item';
                        const wds = document.createElement('div');
                        wds.className = 'reorder-words';
                        wds.textContent = `🔀 ${item.words}`;
                        ri.appendChild(wds);

                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'reorder-input';
                        inp.placeholder = 'رتّب الكلمات...';
                        inp.dataset.answer = item.answer.toLowerCase();
                        inp.dataset.idx = i;
                        ri.appendChild(inp);
                        actDiv.appendChild(ri);
                    });
                }

                if (act.type === 'mcq') {
                    act.items.forEach((item, i) => {
                        const mi = document.createElement('div');
                        mi.className = 'mcq-item';

                        if (item.img) {
                            const imgBox = document.createElement('div');
                            imgBox.className = 'item-img-box';
                            imgBox.style.cssText = 'width:90px;height:70px;margin-bottom:6px;';
                            const mImg = document.createElement('img');
                            mImg.src = item.img;
                            mImg.onerror = function() { this.src = getSvgFallback(item.answer); };
                            imgBox.appendChild(mImg);
                            mi.appendChild(imgBox);
                        }

                        const lbDiv = document.createElement('div');
                        lbDiv.style.cssText = 'font-weight:800;font-size:0.88rem;margin-bottom:6px;';
                        lbDiv.innerHTML = item.label + (item.speech ? ` <button class="sound-btn" onclick="speak('${item.speech}')">🔊</button>` : '');
                        mi.appendChild(lbDiv);

                        const opts = document.createElement('div');
                        opts.className = 'mcq-opts';
                        opts.dataset.answer = item.answer.toLowerCase();

                        item.options.forEach(opt => {
                            const btn = document.createElement('button');
                            btn.className = 'opt-btn';
                            btn.textContent = opt;
                            btn.dataset.val = opt.toLowerCase();
                            btn.onclick = function() {
                                opts.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('correct','wrong'));
                                if (opt.toLowerCase() === item.answer.toLowerCase()) {
                                    btn.classList.add('correct');
                                    speak("Excellent! " + opt);
                                } else {
                                    btn.classList.add('wrong');
                                    speak("Try again!");
                                }
                            };
                            opts.appendChild(btn);
                        });
                        mi.appendChild(opts);
                        actDiv.appendChild(mi);
                    });
                }

                if (act.type === 'choose_from_box') {
                    act.items.forEach((item, i) => {
                        const cfb = document.createElement('div');
                        cfb.className = 'cfb-item';
                        const pr = document.createElement('div');
                        pr.className = 'cfb-prompt';
                        pr.textContent = item.prompt;
                        cfb.appendChild(pr);
                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'cfb-input';
                        inp.placeholder = '...';
                        inp.dataset.answer = item.answer.toLowerCase();

                        if (item.speech) {
                            const sb = document.createElement('button');
                            sb.className = 'sound-btn';
                            sb.innerHTML = '🔊';
                            sb.onclick = () => speak(item.speech);
                            cfb.appendChild(inp);
                            cfb.appendChild(sb);
                        } else {
                            cfb.appendChild(inp);
                        }
                        actDiv.appendChild(cfb);
                    });
                }

                if (act.type === 'freewrite') {
                    act.items.forEach(item => {
                        const fw = document.createElement('div');
                        fw.className = 'cfb-item';
                        const pr = document.createElement('div');
                        pr.className = 'cfb-prompt';
                        pr.textContent = item.prompt;
                        fw.appendChild(pr);
                        const inp = document.createElement('input');
                        inp.type = 'text';
                        inp.className = 'cfb-input';
                        inp.placeholder = 'اكتب اسمك...';
                        inp.dataset.answer = '__free__';
                        fw.appendChild(inp);
                        actDiv.appendChild(fw);
                    });
                }

                secDiv.appendChild(actDiv);
            });

            body.appendChild(secDiv);
        });

        updateScoreLabel();
    }

    function checkAll() {
        const body = document.getElementById('ex-body');
        let correct = 0, total = 0;

        body.querySelectorAll('.item-input, .reorder-input, .cfb-input').forEach(el => {
            const ans = el.dataset.answer;
            if (ans === '__free__') return;
            total++;
            const val = el.value.trim().toLowerCase();
            if (val === ans) { el.classList.remove('wrong'); el.classList.add('correct'); correct++; }
            else { el.classList.remove('correct'); el.classList.add('wrong'); }
        });

        body.querySelectorAll('.mcq-opts').forEach(opts => {
            total++;
            const chosen = opts.querySelector('.opt-btn.correct');
            if (chosen) correct++;
        });

        document.getElementById('score-badge').textContent = `النتيجة: ${correct} / ${total}`;
        if (correct === total && total > 0) {
            speak(`Excellent! Perfect score! ${correct} out of ${total}`);
            setTimeout(() => alert(`🎉 ممتاز جداً! حصلت على العلامة الكاملة (${correct}/${total}) ⭐⭐⭐`), 100);
        } else {
            speak(`Your score is ${correct} out of ${total}`);
        }
    }

    function revealAll() {
        const body = document.getElementById('ex-body');
        body.querySelectorAll('.item-input, .reorder-input, .cfb-input').forEach(el => {
            const ans = el.dataset.answer;
            if (ans === '__free__') return;
            el.value = ans;
            el.classList.remove('wrong'); el.classList.add('correct');
        });
        body.querySelectorAll('.mcq-opts').forEach(opts => {
            const ans = opts.dataset.answer;
            opts.querySelectorAll('.opt-btn').forEach(b => {
                b.classList.remove('correct','wrong');
                if (b.dataset.val === ans) b.classList.add('correct');
            });
        });
        speak("Model answers are now shown!");
        updateScoreLabel();
    }

    function updateScoreLabel() {
        const body = document.getElementById('ex-body');
        let total = 0;
        body.querySelectorAll('.item-input, .reorder-input, .cfb-input').forEach(el => { if (el.dataset.answer !== '__free__') total++; });
        body.querySelectorAll('.mcq-opts').forEach(() => total++);
        document.getElementById('score-badge').textContent = `النتيجة: 0 / ${total}`;
    }

    function speakPage() {
        if (bookId === 1 && typeof P1_EXERCISES_DATABASE !== 'undefined' && P1_EXERCISES_DATABASE[pageNum]) {
            const db = P1_EXERCISES_DATABASE[pageNum];
            speak(`${db.unit}. ${db.lesson}`);
        } else {
            speak(`Page ${pageNum}`);
        }
    }

    render();
</script>
</body>
</html>
