<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Toon — الكتاب التفاعلي المباشر (Overlay)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --emerald: #10b981;
            --red: #ef4444;
            --amber: #f59e0b;
            --cyan: #06b6d4;
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden; /* Lock viewport completely — no body scrolling */
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ── TOP NAV BAR ── */
        .top-nav {
            height: 55px;
            background: #090d16;
            border-bottom: 2px solid var(--border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            z-index: 300;
            flex-shrink: 0;
        }
        .nav-brand {
            font-size: 1.05rem;
            font-weight: 900;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-brand span { color: var(--cyan); }
        .nav-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 5px 10px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .nav-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.82rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .nav-btn:hover { background: #475569; }
        .page-counter {
            background: linear-gradient(135deg, var(--primary), var(--cyan));
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.85rem;
            color: #fff;
        }

        /* ── MAIN OVERLAY STAGE ── */
        .overlay-stage {
            flex: 1;
            height: calc(100vh - 55px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
            position: relative;
        }

        /* ── A4 PAGE CONTAINER WRAPPER ── */
        .a4-overlay-wrapper {
            position: relative;
            height: 100%;
            max-height: calc(100vh - 120px);
            aspect-ratio: 1 / 1.414; /* A4 aspect ratio */
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 0 3px #cbd5e1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Original Book Page Image */
        .a4-overlay-img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
        }

        /* ── INTERACTIVE OVERLAY INPUT FIELDS ── */
        .page-overlay-input {
            position: absolute;
            font-family: 'Outfit', sans-serif;
            font-size: 1.05rem;
            font-weight: 900;
            color: #1e1b4b;
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid #6366f1;
            border-radius: 6px;
            padding: 0 6px;
            text-align: center;
            direction: ltr;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
            transition: all 0.2s ease;
            z-index: 50;
        }
        .page-overlay-input:focus {
            outline: none;
            background: #ffffff;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.35);
            transform: scale(1.02);
        }
        .page-overlay-input.correct {
            background: #ecfdf5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3) !important;
        }
        .page-overlay-input.wrong {
            background: #fef2f2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.3) !important;
        }

        /* ── BOTTOM TOOLBAR & ACTION BAR ── */
        .bottom-action-bar {
            height: 50px;
            background: #0f172a;
            border-top: 2px solid var(--border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            width: 100%;
            max-width: 800px;
            border-radius: 12px 12px 0 0;
            flex-shrink: 0;
        }

        .score-badge {
            background: linear-gradient(135deg, var(--emerald), #059669);
            color: #fff;
            padding: 5px 14px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 0.85rem;
        }

        .btn-check-main {
            flex: 2;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 900;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
            transition: all 0.15s ease;
        }
        .btn-check-main:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.45);
        }
        .btn-reveal-main, .btn-speak-main {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 800;
            font-size: 0.82rem;
            cursor: pointer;
        }
        .btn-reveal-main:hover, .btn-speak-main:hover { background: #475569; }

        @media (max-width: 650px) {
            .a4-overlay-wrapper { aspect-ratio: auto; width: 100%; height: calc(100vh - 120px); }
            .page-overlay-input { font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<!-- ── TOP NAV BAR ── -->
<nav class="top-nav">
    <a href="dashboard.html" class="nav-brand">🏠 <span>English Toon Overlay Book</span></a>
    <div class="nav-controls">
        <select class="nav-select" id="book-sel" onchange="changeBook()">
            <option value="1">🎒 الصف الأول الابتدائي</option>
            <option value="2">📖 الصف الثاني الابتدائي</option>
            <option value="3">✏️ الصف الثالث الابتدائي</option>
        </select>
        <select class="nav-select" id="page-sel" onchange="jumpTo(this.value)"></select>
        <button class="nav-btn" onclick="prevPage()">◀ السابقة</button>
        <span class="page-counter" id="page-counter">3 / 72</span>
        <button class="nav-btn" onclick="nextPage()">التالية ▶</button>
    </div>
</nav>

<!-- ── MAIN OVERLAY STAGE ── -->
<div class="overlay-stage">

    <!-- A4 Original Book Page Frame Wrapper -->
    <div class="a4-overlay-wrapper" id="a4-wrapper">
        <img id="book-page-img" class="a4-overlay-img" src="" alt="صفحة الكتاب الأصلية"
             onerror="this.style.display='none'; document.getElementById('img-err').style.display='block'">
        <div id="img-err" style="display:none;text-align:center;color:#94a3b8;padding:40px">
            📷 صورة الصفحة غير متوفرة بعد
        </div>

        <!-- Overlay Input Fields will be dynamically injected here -->
        <div id="overlay-inputs-container"></div>
    </div>

    <!-- Bottom Action Bar -->
    <div class="bottom-action-bar">
        <div class="score-badge" id="score-badge">النتيجة: — / —</div>
        <button class="btn-check-main" onclick="checkAll()">✅ تصحيح الإجابات وحساب الدرجة</button>
        <button class="btn-reveal-main" onclick="revealAll()">👁️ الإجابات النموذجية</button>
        <button class="btn-speak-main" onclick="speakPage()">🔊 نطق الصفحة</button>
    </div>

</div>

<script src="js/p1_book_data.js"></script>
<script>
    let bookId = 1;
    let pageNum = 3;
    const TOTAL = 72;

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US'; u.rate = 0.85;
        window.speechSynthesis.speak(u);
    }

    function initPageSel() {
        const s = document.getElementById('page-sel');
        s.innerHTML = '';
        for (let i = 1; i <= TOTAL; i++) {
            const o = document.createElement('option');
            o.value = i; o.text = `صفحة ${i}`;
            if (i === pageNum) o.selected = true;
            s.appendChild(o);
        }
    }

    function changeBook() { bookId = +document.getElementById('book-sel').value; pageNum = 3; render(); }
    function jumpTo(p) { pageNum = +p; render(); }
    function prevPage() { if (pageNum > 1) { pageNum--; render(); } }
    function nextPage() { if (pageNum < TOTAL) { pageNum++; render(); } }

    function render() {
        initPageSel();
        document.getElementById('page-counter').textContent = `${pageNum} / ${TOTAL}`;

        const imgEl = document.getElementById('book-page-img');
        const errEl = document.getElementById('img-err');
        const container = document.getElementById('overlay-inputs-container');
        container.innerHTML = '';

        const folder = bookId === 1 ? 'p1' : bookId === 2 ? 'p2' : 'p3';
        imgEl.style.display = 'block';
        errEl.style.display = 'none';

        // Load original page image
        imgEl.src = `images/books/${folder}/${pageNum}.jpg`;
        imgEl.onerror = function() {
            this.onerror = null;
            this.src = `images/books/${folder}/page_${pageNum}.png`;
            this.onerror = function() {
                this.style.display = 'none';
                errEl.style.display = 'block';
            };
        };

        let db = null;
        if (bookId === 1 && typeof P1_OVERLAY_DATABASE !== 'undefined' && P1_OVERLAY_DATABASE[pageNum]) {
            db = P1_OVERLAY_DATABASE[pageNum];
        }

        if (!db || !db.inputs || db.inputs.length === 0) {
            document.getElementById('score-badge').textContent = 'النتيجة: — / —';
            return;
        }

        document.getElementById('score-badge').textContent = `النتيجة: 0 / ${db.inputs.filter(x => x.answer !== '__free__').length}`;

        // Inject direct overlay inputs over the original book page image
        db.inputs.forEach((inpData) => {
            const inp = document.createElement('input');
            inp.type = 'text';
            inp.className = 'page-overlay-input';
            inp.style.top = inpData.top;
            inp.style.left = inpData.left;
            inp.style.width = inpData.width;
            inp.style.height = inpData.height;
            inp.placeholder = inpData.placeholder || '...';
            inp.dataset.answer = inpData.answer.toLowerCase();
            inp.id = inpData.id;

            container.appendChild(inp);
        });
    }

    function checkAll() {
        const container = document.getElementById('overlay-inputs-container');
        const inputs = container.querySelectorAll('.page-overlay-input');
        let correct = 0, total = 0;

        inputs.forEach(el => {
            const ans = el.dataset.answer;
            if (ans === '__free__') return;
            total++;
            const val = el.value.trim().toLowerCase();
            if (val === ans) {
                el.classList.remove('wrong');
                el.classList.add('correct');
                correct++;
            } else {
                el.classList.remove('correct');
                el.classList.add('wrong');
            }
        });

        document.getElementById('score-badge').textContent = `النتيجة: ${correct} / ${total}`;

        if (correct === total && total > 0) {
            speak(`Excellent! Perfect score! ${correct} out of ${total}`);
            setTimeout(() => alert(`🎉 ممتاز جداً! اجتزت صفحة ${pageNum} بنجاح وحصلت على العلامة الكاملة (${correct}/${total}) ⭐⭐⭐`), 100);
        } else {
            speak(`Your score is ${correct} out of ${total}`);
        }
    }

    function revealAll() {
        const container = document.getElementById('overlay-inputs-container');
        const inputs = container.querySelectorAll('.page-overlay-input');

        inputs.forEach(el => {
            const ans = el.dataset.answer;
            if (ans === '__free__') return;
            el.value = ans;
            el.classList.remove('wrong');
            el.classList.add('correct');
        });

        speak("Model answers are now shown!");
    }

    function speakPage() {
        speak(`Page ${pageNum}`);
    }

    render();
</script>
</body>
</html>
