<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Toon — الكتاب التفاعلي المزدوج (Exact Split-Screen E-Book)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Nunito:wght@400;700;800;900&family=Outfit:wght@600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260722_v15">
    <style>
        :root {
            --bg-dark: #070913;
            --panel-bg: rgba(15, 23, 42, 0.95);
            --primary: #6366f1;
            --secondary: #ff007a;
            --accent-cyan: #00f2fe;
            --accent-emerald: #10b981;
            --card-bg: #ffffff;
            --text-dark: #0f172a;
        }

        body {
            background: radial-gradient(ellipse at 55% 35%, #1e3a5f, #0f172a 80%);
            color: #fff;
            font-family: 'Cairo', 'Nunito', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Top Bar Navigation */
        .split-top-bar {
            background: rgba(10, 18, 38, 0.95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .controls-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .select-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 7px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .nav-btn-icon {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 7px 16px;
            border-radius: 999px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s;
        }
        .nav-btn-icon:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-1px); }

        /* Main Split Container Layout */
        .split-main-container {
            display: flex;
            width: 100%;
            max-width: 1440px;
            margin: 16px auto;
            gap: 20px;
            padding: 0 16px 80px 16px;
        }

        @media (max-width: 920px) {
            .split-main-container {
                flex-direction: column;
            }
        }

        /* Half 1: Book Page Display Panel */
        .split-panel-book {
            flex: 1;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 25px 65px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            border: 3.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 620px;
        }

        .page-img-display {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            user-select: none;
        }

        /* Half 2: Interactive Exercises Panel */
        .split-panel-exercises {
            flex: 1;
            background: #ffffff;
            color: var(--text-dark);
            border-radius: 20px;
            box-shadow: 0 25px 65px rgba(0, 0, 0, 0.6);
            padding: 24px;
            border: 3.5px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 620px;
        }

        .panel-header-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2.5px solid #e2e8f0;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .panel-header-title h2 {
            font-size: 1.25rem;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
        }

        .score-pill-badge {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            padding: 6px 16px;
            border-radius: 999px;
            font-weight: 900;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Exercise Question Card */
        .q-card-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .q-card-item:hover { border-color: #cbd5e1; }

        .q-card-item h3 {
            font-size: 1.05rem;
            font-weight: 800;
            color: #334155;
            margin: 0 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .q-input-text {
            background: #fff;
            border: 2px solid #94a3b8;
            border-radius: 8px;
            padding: 8px 14px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            color: #0f172a;
            width: 100%;
            max-width: 320px;
            direction: ltr;
            transition: all 0.15s;
        }
        .q-input-text:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
        }

        .q-input-text.is-correct { border-color: #10b981 !important; background: #ecfdf5 !important; color: #047857 !important; }
        .q-input-text.is-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; color: #b91c1c !important; }

        /* MCQ Options Buttons */
        .mcq-options-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .opt-btn {
            background: #fff;
            border: 2px solid #cbd5e1;
            color: #0f172a;
            padding: 8px 18px;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .opt-btn:hover { border-color: #6366f1; background: #eef2ff; }
        .opt-btn.selected-correct { background: #10b981 !important; border-color: #059669 !important; color: #fff !important; }
        .opt-btn.selected-wrong { background: #ef4444 !important; border-color: #dc2626 !important; color: #fff !important; }

        /* Action Buttons Area */
        .actions-bar-bottom {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 2.5px solid #e2e8f0;
        }

        .btn-action-primary {
            flex: 1;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.15s;
        }
        .btn-action-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }

        .btn-action-secondary {
            background: #f1f5f9;
            border: 2px solid #cbd5e1;
            color: #334155;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-action-secondary:hover { background: #e2e8f0; }
    </style>
</head>
<body>

    <!-- Top Navigation Controls -->
    <div class="split-top-bar">
        <a href="dashboard.html" style="color:#fff; text-decoration:none; font-weight:800; font-size:1.1rem; display:flex; align-items:center; gap:8px;">
            <span>🏠 الرئيسية</span> | <span style="color:var(--accent-cyan);">English Toon Split E-Book</span>
        </a>

        <div class="controls-group">
            <label style="font-weight:800;">الكتاب:</label>
            <select class="select-btn" id="book-select" onchange="changeBook()">
                <option value="1">🎒 الصف الأول الابتدائي</option>
                <option value="2">📖 الصف الثاني الابتدائي</option>
                <option value="3">✏️ الصف الثالث الابتدائي</option>
            </select>

            <label style="font-weight:800; margin-right:10px;">الصفحة:</label>
            <select class="select-btn" id="page-select" onchange="jumpToPage(this.value)">
                <!-- Pages 1 to 72 generated -->
            </select>

            <button class="nav-btn-icon" onclick="prevPage()">◀️ السابقة</button>
            <span style="font-weight:800; color:var(--accent-cyan);" id="page-label">3 / 72</span>
            <button class="nav-btn-icon" onclick="nextPage()">التالية ▶️</button>
        </div>
    </div>

    <!-- Split Screen Main Container -->
    <div class="split-main-container">

        <!-- Left Half: Book Page HD Display -->
        <div class="split-panel-book">
            <img src="images/books/p1/page_3.png" alt="Book Page" class="page-img-display" id="book-page-img">
        </div>

        <!-- Right Half: Programmed HTML Interactive Exercises -->
        <div class="split-panel-exercises">
            <div>
                <div class="panel-header-title">
                    <div>
                        <h2 id="exercise-title">📝 تمارين واختبارات الصفحة التفاعلية</h2>
                        <div style="font-size:0.85rem; color:#64748b; font-weight:700; margin-top:2px;" id="exercise-subtitle">الدرس التفاعلي المطابق لصفحة الكتاب</div>
                    </div>
                    <div class="score-pill-badge" id="score-badge">النتيجة: 0 / 0</div>
                </div>

                <!-- Exercise Items Container -->
                <div id="exercise-items-list">
                    <!-- Loaded dynamically per page -->
                </div>
            </div>

            <!-- Bottom Actions -->
            <div class="actions-bar-bottom">
                <button class="btn-action-primary" onclick="checkCurrentPageAnswers()">✅ تصحيح الإجابات وحساب الدرجة</button>
                <button class="btn-action-secondary" onclick="revealAnswers()">👁️ إظهار الإجابات النموذجية</button>
                <button class="btn-action-secondary" onclick="speakPageText()">🔊 نطق الصفحة</button>
            </div>
        </div>

    </div>

    <!-- Database Script -->
    <script src="js/p1_book_data.js"></script>

    <script>
        let currentBookId = 1;
        let currentPageNum = 3;

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utt = new SpeechSynthesisUtterance(text);
                utt.lang = 'en-US';
                utt.rate = 0.88;
                window.speechSynthesis.speak(utt);
            }
        }

        function initPageSelect() {
            const sel = document.getElementById('page-select');
            sel.innerHTML = '';
            for (let i = 1; i <= 72; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `صفحة ${i}`;
                if (i === currentPageNum) opt.selected = true;
                sel.appendChild(opt);
            }
        }

        function changeBook() {
            currentBookId = parseInt(document.getElementById('book-select').value);
            currentPageNum = currentBookId === 2 ? 5 : 3;
            renderSplitPage();
        }

        function jumpToPage(pNum) {
            currentPageNum = parseInt(pNum);
            renderSplitPage();
        }

        function prevPage() {
            if (currentPageNum > 1) {
                currentPageNum--;
                renderSplitPage();
            }
        }

        function nextPage() {
            if (currentPageNum < 72) {
                currentPageNum++;
                renderSplitPage();
            }
        }

        function renderSplitPage() {
            const folder = currentBookId === 1 ? 'p1' : (currentBookId === 2 ? 'p2' : 'p3');
            const imgEl = document.getElementById('book-page-img');
            imgEl.src = `images/books/${folder}/${currentPageNum}.jpg`;
            imgEl.onerror = function() {
                this.onerror = null;
                this.src = `images/books/${folder}/page_${currentPageNum}.png`;
            };
            document.getElementById('page-label').innerText = `${currentPageNum} / 72`;
            initPageSelect();

            const container = document.getElementById('exercise-items-list');
            container.innerHTML = '';

            // Retrieve from P1_EXERCISES_DATABASE if available
            let pData = null;
            if (currentBookId === 1 && typeof P1_EXERCISES_DATABASE !== 'undefined' && P1_EXERCISES_DATABASE[currentPageNum]) {
                pData = P1_EXERCISES_DATABASE[currentPageNum];
            } else {
                pData = {
                    unit: `Primary ${currentBookId}`,
                    lesson: `تمارين واختبارات الصفحة ${currentPageNum}`,
                    items: [
                        { id: `q_${currentPageNum}_1`, type: "input", label: "1. Complete the word (أكتب الكلمة الصحيحة):", answer: "hello", speech: "hello" },
                        { id: `q_${currentPageNum}_2`, type: "mcq", label: "2. Choose the correct answer (اختر الإجابة):", audio: "hello", options: ["Hello", "Goodbye", "Play"], answer: "Hello" }
                    ]
                };
            }

            document.getElementById('exercise-title').innerText = pData.unit || `تمارين الصفحة ${currentPageNum}`;
            document.getElementById('exercise-subtitle').innerText = pData.lesson || `أسئلة وتقييمات الصفحة ${currentPageNum}`;
            document.getElementById('score-badge').innerText = `النتيجة: 0 / ${pData.items.length}`;

            pData.items.forEach((item, idx) => {
                const card = document.createElement('div');
                card.className = 'q-card-item';

                if (item.type === 'input') {
                    card.innerHTML = `
                        <h3>
                            <span>${item.label}</span>
                            ${item.speech ? `<button onclick="speakText('${item.speech}')" style="border:none; background:none; cursor:pointer; font-size:1.2rem;" title="نطق الكلمة 🔊">🔊</button>` : ''}
                        </h3>
                        <input type="text" class="q-input-text" id="input-${item.id}" data-answer="${item.answer}" placeholder="أكتب الإجابة هنا...">
                    `;
                } else if (item.type === 'mcq') {
                    let optsHTML = '';
                    item.options.forEach(opt => {
                        optsHTML += `<button class="opt-btn" onclick="selectMCQOption(this, '${opt}', '${item.answer}')">${opt}</button>`;
                    });

                    card.innerHTML = `
                        <h3>
                            <span>${item.label}</span>
                            ${item.audio ? `<button onclick="speakText('${item.audio}')" style="background:#4f46e5; color:#fff; border:none; padding:4px 10px; border-radius:6px; font-weight:800; cursor:pointer;" title="استمع للصوت 🔊">🔊 استمع</button>` : ''}
                        </h3>
                        <div class="mcq-options-grid" id="mcq-grid-${item.id}">
                            ${optsHTML}
                        </div>
                    `;
                }

                container.appendChild(card);
            });
        }

        function selectMCQOption(btn, selected, correct) {
            const grid = btn.parentElement;
            grid.querySelectorAll('.opt-btn').forEach(b => {
                b.className = 'opt-btn';
            });

            btn.setAttribute('data-selected', selected);
            btn.setAttribute('data-correct', correct);

            if (selected.toLowerCase() === correct.toLowerCase()) {
                btn.className = 'opt-btn selected-correct';
                speakText("Good job!");
            } else {
                btn.className = 'opt-btn selected-wrong';
                speakText("Try again!");
            }
        }

        function checkCurrentPageAnswers() {
            let correctCount = 0;
            const container = document.getElementById('exercise-items-list');

            // Check Inputs
            const inputs = container.querySelectorAll('.q-input-text');
            inputs.forEach(el => {
                const val = el.value.trim().toLowerCase().replace(/\s+/g, ' ');
                const ans = el.getAttribute('data-answer').toLowerCase().replace(/\s+/g, ' ');
                if (val && val === ans) {
                    el.className = 'q-input-text is-correct';
                    correctCount++;
                } else {
                    el.className = 'q-input-text is-wrong';
                }
            });

            // Check MCQ Options
            const mcqGrids = container.querySelectorAll('.mcq-options-grid');
            mcqGrids.forEach(grid => {
                const selectedBtn = grid.querySelector('.opt-btn.selected-correct');
                if (selectedBtn) {
                    correctCount++;
                }
            });

            const total = inputs.length + mcqGrids.length;
            document.getElementById('score-badge').innerText = `النتيجة: ${correctCount} / ${total}`;

            if (correctCount === total && total > 0) {
                speakText(`Excellent! Perfect score ${correctCount} out of ${total}!`);
                alert(`🎉 أحسنت صنعاً! إجابات أسئلة الصفحة كاملة صحيحة (${correctCount}/${total}) ⭐⭐⭐`);
            } else {
                speakText(`Your score is ${correctCount} out of ${total}`);
            }
        }

        function revealAnswers() {
            const container = document.getElementById('exercise-items-list');
            
            // Fill Inputs
            const inputs = container.querySelectorAll('.q-input-text');
            inputs.forEach(el => {
                const ans = el.getAttribute('data-answer');
                el.value = ans;
                el.className = 'q-input-text is-correct';
            });

            // Select MCQ Correct Options
            const mcqGrids = container.querySelectorAll('.mcq-options-grid');
            mcqGrids.forEach(grid => {
                grid.querySelectorAll('.opt-btn').forEach(btn => {
                    const cor = btn.getAttribute('data-correct') || '';
                    if (btn.innerText.trim().toLowerCase() === cor.toLowerCase()) {
                        btn.className = 'opt-btn selected-correct';
                    }
                });
            });

            speakText("Model answers revealed!");
        }

        function speakPageText() {
            if (currentBookId === 1 && P1_EXERCISES_DATABASE[currentPageNum]) {
                const pObj = P1_EXERCISES_DATABASE[currentPageNum];
                speakText(`${pObj.unit}. ${pObj.lesson}`);
            } else {
                speakText(`Page ${currentPageNum}`);
            }
        }

        // Initial Load
        renderSplitPage();
    </script>
</body>
</html>
