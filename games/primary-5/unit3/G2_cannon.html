<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannon Parachute Siege 💣 - primary-5 Unit 3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { background: #0f172a; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  
  /* Standardized Full-Scale HUD */
  .g-hud { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); border-bottom: 2px solid #f39c12; z-index: 10; height: 60px; }
  .g-title { font-size: 1.3rem; font-weight: bold; color: #f39c12; text-shadow: 0 0 12px #f39c1255; }
  .g-qnum { font-size: 1.1rem; color: #ecf0f1; background: rgba(255,255,255,0.12); padding: 6px 16px; border-radius: 20px; font-weight: 600; }
  .g-score { font-size: 1.3rem; font-weight: bold; color: #2ecc71; }
  
  /* Standardized Full-Scale Question Panel */
  .g-qpanel { background: rgba(0, 0, 0, 0.85); padding: 18px 24px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.12); z-index: 10; min-height: 90px; display: flex; align-items: center; justify-content: center; }
  #qt { font-size: 1.8rem !important; color: #ffffff !important; font-weight: 700 !important; line-height: 1.4 !important; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
  
  /* Container for moving target buttons */
  .g-targets { position: absolute; inset: 0; z-index: 8; pointer-events: none; }

  /* Continuously Moving Choice Buttons */
  .tbtn { position: absolute; pointer-events: auto; background: linear-gradient(135deg, rgba(255,255,255,0.26), rgba(255,255,255,0.1)); border: 2.5px solid #f39c12; color: #fff; padding: 14px 26px !important; font-size: 1.3rem !important; font-weight: bold !important; border-radius: 22px; cursor: pointer; transition: background 0.2s, transform 0.1s; backdrop-filter: blur(12px); box-shadow: 0 8px 24px rgba(0,0,0,0.6); white-space: nowrap; text-align: center; }
  .tbtn:hover { transform: scale(1.08); background: #f39c12; color: #111; box-shadow: 0 12px 30px #f39c12bb; }
  .tbtn.correct { background: #2ecc71 !important; border-color: #27ae60 !important; color: #fff !important; transform: scale(1.15); box-shadow: 0 0 35px #2ecc71; }
  .tbtn.wrong { background: #e74c3c !important; border-color: #c0392b !important; color: #fff !important; opacity: 0.55; transform: scale(0.92); }

  .g-canvas { flex: 1; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
  .g-pbar { height: 6px; background: #f39c12; width: 0%; transition: width 0.3s ease; position: absolute; bottom: 0; left: 0; z-index: 10; box-shadow: 0 0 10px #f39c12; }

  .g-end { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94); backdrop-filter: blur(18px); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; }
  .g-end h1 { font-size: 3.2rem; color: #f39c12; text-shadow: 0 0 20px #f39c12; }
  .g-end p { font-size: 2rem; color: #2ecc71; font-weight: bold; }
  .g-end button { padding: 16px 40px; font-size: 1.4rem; font-weight: bold; background: #f39c12; border: none; color: #111; border-radius: 35px; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 25px #f39c1266; }
  .g-end button:hover { transform: scale(1.08); box-shadow: 0 0 35px #f39c12; }
</style>
</head>
<body>

<div class="g-hud" id="hud">
  <div class="g-title">Cannon Parachute Siege 💣</div>
  <div id="qn" class="g-qnum">Q 1/5</div>
  <div class="g-score">Score: <span id="sc">0</span></div>
</div>

<div class="g-qpanel"><div id="qt">Loading...</div></div>
<div id="tg" class="g-targets"></div>
<canvas id="cv" class="g-canvas"></canvas>
<div id="pb" class="g-pbar"></div>

<div id="end" class="g-end">
  <h1 id="eh">Awesome! 🎉</h1>
  <p id="es">Score: 0</p>
  <button onclick="location.reload()">Play Again 🔄</button>
</div>

<script>
const QS = [{"q_num": 119, "q": "Trees give us _____ to eat.", "choices": ["beautiful", "scary", "ugly", "br-"], "answer": 0}, {"q_num": 130, "q": "The consonant cluster in 'crown' is _____.", "choices": ["car", "tree", "house", "crowns"], "answer": 0}, {"q_num": 139, "q": "It's important to share good food, not to be _____.", "choices": ["cr-", "sh-", "br-", "br-"], "answer": 0}, {"q_num": 151, "q": "Then, add some _____.", "choices": ["recipe", "flyer", "Koshari", "smaller"], "answer": 0}, {"q_num": 163, "q": "The restaurant put up a colorful _____ to attract customers.", "choices": ["Cut", "Boil", "Pour", "bad"], "answer": 0}, {"q_num": 175, "q": "To advertise a restaurant, you make a _____.", "choices": ["book", "recipe", "story", "recipe"], "answer": 0}, {"q_num": 180, "q": "Lentils are boiled in _____.", "choices": ["bad", "sad", "tasty", "first"], "answer": 0}];
let qi=0, score=0, locked=false, parts=[], animId=null, time=0;
let cv, ctx, W, H, AC;
let hookY = 140, hookTargetY = 140, hookX = 0;
let mouseX = 0, mouseY = 0;

// Dynamic Moving Targets Array
let targets = [];

window.addEventListener('load', () => {
  cv = document.getElementById('cv'); ctx = cv.getContext('2d');
  resize(); window.addEventListener('resize', resize);
  cv.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
  AC = new (window.AudioContext || window.webkitAudioContext)();
  loadQ(); loop();
});

function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; mouseX = W/2; hookX = W/2; }

function tone(f,d,t,v) {
  if(!AC) return; if(AC.state==='suspended') AC.resume();
  const o=AC.createOscillator(), gn=AC.createGain(); o.connect(gn); gn.connect(AC.destination);
  o.type=t||'sine'; o.frequency.value=f; gn.gain.setValueAtTime(v||0.3, AC.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+d); o.start(); o.stop(AC.currentTime+d);
}

/* Real Crowd Applause Synth + Winning Melody Chime */
function playApplauseSnd() {
  if(!AC) return; if(AC.state==='suspended') AC.resume();
  tone(523.25, 0.1, 'sine', 0.4);
  setTimeout(()=> tone(659.25, 0.1, 'sine', 0.4), 90);
  setTimeout(()=> tone(783.99, 0.12, 'sine', 0.4), 180);
  setTimeout(()=> tone(1046.50, 0.35, 'triangle', 0.5), 270);

  for(let i=0; i<35; i++) {
    const delay = Math.random() * 0.7;
    const dur = 0.04 + Math.random() * 0.05;
    const freq = 1200 + Math.random() * 1800;
    setTimeout(() => {
      try {
        const bufferSize = AC.sampleRate * dur;
        const buffer = AC.createBuffer(1, bufferSize, AC.sampleRate);
        const data = buffer.getChannelData(0);
        for (let j = 0; j < bufferSize; j++) data[j] = Math.random() * 2 - 1;
        const noise = AC.createBufferSource(); noise.buffer = buffer;
        const filter = AC.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = 3;
        const gain = AC.createGain();
        gain.gain.setValueAtTime(0.18 + Math.random()*0.15, AC.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
        noise.connect(filter); filter.connect(gain); gain.connect(AC.destination);
        noise.start();
      } catch(e) {}
    }, delay * 1000);
  }
}

function fail_snd() { tone(200,.2,'sawtooth'); setTimeout(()=>tone(150,.35,'sawtooth'),200); }

function burst(x,y,color,n=35) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=Math.random()*9+2;
    parts.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color, sz:Math.random()*6+3});
  }
}

/* ---------------- CONTINUOUS MOVING TARGETS & CANVAS RENDERING ---------------- */

function initTargets(choices, correctText) {
  targets = [];
  const n = choices.length;
  const spacing = W / (n + 1);

  choices.forEach((text, i) => {
    let startX = spacing * (i + 1);
    let startY = H * 0.38 + (i % 2) * 80;
    let vx = (i % 2 === 0 ? 1 : -1) * (1.2 + Math.random() * 0.8);
    let vy = (0.5 + Math.random() * 0.5);

    if ('cannon' === 'balloon') startY = H * 0.55 + (i * 30);
    if ('cannon' === 'cannon') startY = 160 + (i * 45);

    targets.push({
      text: text,
      ok: text === correctText,
      x: startX,
      y: startY,
      vx: vx,
      vy: vy,
      baseY: startY,
      color: ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7'][i % 4],
      btnEl: null
    });
  });
}

function updateTargetPositions() {
  time += 0.03;

  targets.forEach((t, i) => {
    if ('cannon' === 'fishing') {
      // Swimming Fish movement left/right + wave float
      t.x += t.vx * 1.5;
      t.y = t.baseY + Math.sin(time * 3 + i) * 18;
      if (t.vx > 0 && t.x > W + 80) t.x = -80;
      if (t.vx < 0 && t.x < -80) t.x = W + 80;
    }
    else if ('cannon' === 'cannon') {
      // Descending parachutes slowly float down + sway
      t.y += 0.6;
      t.x += Math.sin(time * 2 + i) * 1.8;
      if (t.y > H - 150) t.y = 150;
    }
    else if ('cannon' === 'balloon') {
      // Floating balloons float up + gentle wind sway
      t.y -= 0.9;
      t.x += Math.sin(time * 2.5 + i) * 2;
      if (t.y < 130) t.y = H + 60;
    }
    else if ('cannon' === 'space') {
      // Alien space drones weave down & across
      t.y += 0.7;
      t.x += Math.cos(time * 2 + i) * 2.5;
      if (t.y > H - 140) t.y = 150;
    }
    else if ('cannon' === 'archery') {
      // Archery target boards slide horizontally back & forth
      t.x += t.vx * 2;
      if (t.x > W - 100 || t.x < 100) t.vx *= -1;
    }

    // Update DOM button position directly over canvas object
    if (t.btnEl) {
      const btnW = t.btnEl.offsetWidth || 140;
      const btnH = t.btnEl.offsetHeight || 50;
      t.btnEl.style.left = (t.x - btnW / 2) + 'px';
      t.btnEl.style.top = (t.y - btnH / 2) + 'px';
    }
  });
}

/* Render Canvas Visual Graphics Surrounding Moving Targets */
function renderCanvasGraphics() {
  if ('cannon' === 'fishing') {
    // Underwater Ocean Background & Waves
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#031024'); grad.addColorStop(0.4, '#0077b6'); grad.addColorStop(1, '#001838');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.beginPath();
    for(let x=0; x<W; x+=15) {
      const y = 140 + Math.sin(x*0.02 + time)*12;
      if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

    // Fisherman Boat at top
    ctx.fillStyle = '#b45309'; ctx.beginPath(); ctx.arc(W/2, 135, 55, 0, Math.PI); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '28px sans-serif'; ctx.fillText('🎣', W/2 - 14, 130);

    // Fishing Hook
    hookY += (hookTargetY - hookY) * 0.12;
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(W/2, 135); ctx.lineTo(hookX, hookY); ctx.stroke();
    ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(hookX, hookY, 6, 0, Math.PI*2); ctx.fill();

    // Swimming Fish shapes behind moving choice buttons
    targets.forEach((t, i) => {
      const tailWiggle = Math.sin(time*6 + i)*14;
      ctx.fillStyle = t.color;
      ctx.beginPath(); ctx.ellipse(t.x, t.y, 85, 40, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(t.x + 75, t.y); ctx.lineTo(t.x + 105, t.y - 18 + tailWiggle); ctx.lineTo(t.x + 105, t.y + 18 + tailWiggle); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(t.x - 60, t.y - 6, 5, 0, Math.PI*2); ctx.fill();
    });
  }
  else if ('cannon' === 'cannon') {
    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

    // Parachute Canopies over moving buttons
    targets.forEach((t) => {
      ctx.fillStyle = '#ef4444';
      ctx.beginPath(); ctx.arc(t.x, t.y - 35, 50, Math.PI, 0); ctx.fill();
      ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(t.x - 45, t.y - 35); ctx.lineTo(t.x - 25, t.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(t.x + 45, t.y - 35); ctx.lineTo(t.x + 25, t.y); ctx.stroke();
    });

    // Cannon Barrel
    const angle = Math.atan2(mouseY - (H-30), mouseX - W/2);
    ctx.save(); ctx.translate(W/2, H-30); ctx.rotate(angle);
    ctx.fillStyle = '#64748b'; ctx.fillRect(0, -14, 65, 28); ctx.restore();
    ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.arc(W/2, H-30, 40, Math.PI, 0); ctx.fill();
  }
  else if ('cannon' === 'balloon') {
    ctx.fillStyle = '#1b1947'; ctx.fillRect(0, 0, W, H);

    // Glossy 3D Balloons & Strings under moving buttons
    targets.forEach((t, i) => {
      ctx.fillStyle = t.color;
      ctx.beginPath(); ctx.ellipse(t.x, t.y, 80, 42, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
      ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(t.x, t.y + 35); ctx.quadraticCurveTo(t.x + Math.sin(time*4 + i)*15, t.y + 70, t.x, t.y + 95); ctx.stroke();
    });
  }
  else if ('cannon' === 'space') {
    ctx.fillStyle = '#050515'; ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = '#fff';
    for(let i=0; i<35; i++) ctx.fillRect((i*47)%W, (i*83 + time*90)%H, 2, 2);

    // Alien Drones surrounding moving targets
    targets.forEach((t) => {
      ctx.fillStyle = '#9333ea';
      ctx.beginPath(); ctx.ellipse(t.x, t.y, 85, 38, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#c084fc'; ctx.lineWidth = 2; ctx.stroke();
    });

    // Player Spacecraft
    ctx.fillStyle = '#38bdf8';
    ctx.beginPath(); ctx.moveTo(mouseX, H - 75); ctx.lineTo(mouseX - 30, H - 25); ctx.lineTo(mouseX + 30, H - 25); ctx.closePath(); ctx.fill();
  }
  else if ('cannon' === 'archery') {
    ctx.fillStyle = '#0d1b2a'; ctx.fillRect(0, 0, W, H);

    // Moving Archery Target Boards
    targets.forEach((t) => {
      ctx.fillStyle = '#b45309'; ctx.fillRect(t.x - 85, t.y - 35, 170, 70);
      ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 3; ctx.strokeRect(t.x - 80, t.y - 30, 160, 60);
    });

    // Wooden Bow
    ctx.strokeStyle = '#b45309'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(W/2, H - 10, 85, Math.PI*1.15, Math.PI*1.85); ctx.stroke();
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);

  updateTargetPositions();
  renderCanvasGraphics();

  // Burst Particles
  parts = parts.filter(p=>p.life>0);
  parts.forEach(p=> {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life-=0.022;
    ctx.globalAlpha=Math.max(0, p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  });

  animId = requestAnimationFrame(loop);
}

function loadQ() {
  if(qi >= QS.length) { endGame(); return; }
  const q = QS[qi]; locked = false;
  document.getElementById('qt').textContent = q.q;
  document.getElementById('qn').textContent = 'Q ' + (qi+1) + '/' + QS.length;
  document.getElementById('pb').style.width = (qi/QS.length*100) + '%';
  const cont = document.getElementById('tg'); cont.innerHTML = '';

  const correctText = q.choices[q.answer] || q.choices[0];
  let ch = [...q.choices];
  ch.sort(() => Math.random() - 0.5);

  initTargets(ch, correctText);

  targets.forEach((t) => {
    const btn = document.createElement('button');
    btn.className = 'tbtn';
    btn.textContent = t.text;
    btn.onclick = () => pick(btn, t);
    cont.appendChild(btn);
    t.btnEl = btn;
  });
}

function pick(btn, targetObj) {
  if(locked) return; locked = true;
  hookX = targetObj.x;
  hookTargetY = targetObj.y;

  if(targetObj.ok) {
    btn.classList.add('correct'); playApplauseSnd(); burst(targetObj.x, targetObj.y, '#2ecc71', 45);
    score += 10; document.getElementById('sc').textContent = score;
  } else {
    btn.classList.add('wrong'); fail_snd(); burst(targetObj.x, targetObj.y, '#e74c3c', 25);
    targets.forEach(t => {
      if(t.ok && t.btnEl) t.btnEl.classList.add('correct');
    });
  }
  setTimeout(() => { hookTargetY = 140; qi++; loadQ(); }, 1600);
}

function endGame() {
  document.getElementById('end').style.display = 'flex';
  document.getElementById('es').textContent = 'Final Score: ' + score + ' / ' + (QS.length*10);
}
</script>
</body>
</html>
