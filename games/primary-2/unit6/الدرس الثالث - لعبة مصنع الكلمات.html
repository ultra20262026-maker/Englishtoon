<style>
/* ═══════════════════════════════════════════════════════════
   🎮 GAME SHELL — Shared CSS for ALL 24 games
   Each game includes this file for the common chrome
═══════════════════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&family=Orbitron:wght@700;900&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  margin: 0; padding: 0;
  min-height: 100vh;
  background: #000;
  font-family: 'Nunito', sans-serif;
  color: #f0f0ff;
  user-select: none;
  -webkit-user-select: none;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  overflow-y: auto;
}

#game-wrap {
  flex: 1;
  width: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* ── HUD ─────────────────────────────────────────────────── */
#hud {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
  pointer-events: none;
}
#hud > * { pointer-events: all; }
.hud-left, .hud-right { display: flex; align-items: center; gap: 10px; }
.btn-back {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 10px; padding: 7px 14px; color: white; cursor: pointer;
  font-family: 'Nunito', sans-serif; font-size: 0.8rem; font-weight: 800; transition: .2s;
}
.btn-back:hover { background: rgba(255,255,255,0.2); }
.score-box {
  font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.85rem;
  color: #fbbf24; background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.3);
  border-radius: 10px; padding: 5px 12px;
}
.level-box {
  font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.75rem;
  color: #a78bfa; background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.3);
  border-radius: 10px; padding: 5px 12px;
}
.lives-box { display: flex; gap: 4px; align-items: center; }
.life { font-size: 1.1rem; transition: all .3s; }
.life.lost { opacity: 0.2; filter: grayscale(1); transform: scale(0.8); }
#mute-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px; padding: 7px 10px; color: white; cursor: pointer;
  font-size: 1rem; transition: .2s;
}
#mute-btn:hover { background: rgba(255,255,255,0.18); }

/* ── Timer Bar ───────────────────────────────────────────── */
#timer-bar-wrap {
  position: absolute; top: 48px; left: 0; right: 0; height: 4px; z-index: 20;
}
#timer-bar {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #7c3aed, #06b6d4);
  transition: width .1s linear;
}
#timer-bar.danger { background: linear-gradient(90deg, #ef4444, #dc2626); }

/* ── Feedback Flash ──────────────────────────────────────── */
#feedback-flash {
  position: absolute; inset: 0; z-index: 25; pointer-events: none;
  opacity: 0; transition: opacity .15s;
}
#feedback-flash.show-correct { background: rgba(34,197,94,0.18); opacity: 1; }
#feedback-flash.show-wrong   { background: rgba(239,68,68,0.18);  opacity: 1; }

/* ── Countdown ───────────────────────────────────────────── */
#countdown {
  position: absolute; inset: 0; z-index: 60;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.75);
  font-family: 'Orbitron', sans-serif; font-size: 8rem; font-weight: 900;
  color: white; 
}
#countdown.hidden { display: none; }

/* ── SCREENS ─────────────────────────────────────────────── */
.screen {
  position: absolute; inset: 0; z-index: 50;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 1.5rem;
  background: rgba(8,8,20,0.96); backdrop-filter: blur(20px);
}
.screen.hidden { display: none; }
.game-logo { font-size: 5rem; margin-bottom: 0.75rem; animation: float 2.5s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
.screen-title {
  font-family: 'Fredoka One', sans-serif; font-size: clamp(1.6rem,5vw,2.8rem);
  color: white; margin-bottom: 0.5rem;
}
.screen-sub {
  font-size: 0.95rem; color: rgba(255,255,255,0.55);
  max-width: 420px; line-height: 1.5; margin-bottom: 1.5rem;
}
.lesson-name-badge {
  font-size: 0.75rem; font-weight: 800; letter-spacing: .08em;
  background: rgba(124,58,237,0.2); border: 1px solid rgba(124,58,237,0.4);
  border-radius: 100px; padding: 4px 14px; color: #c4b5fd; margin-bottom: 1rem;
}

/* Level buttons */
.level-select { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
.level-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: .9rem 1.2rem; border-radius: 14px; border: 2px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06); color: white; cursor: pointer; transition: all .2s; min-width: 100px;
}
.level-btn:hover { transform: translateY(-3px); background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); }
.level-btn.active { border-color: #7c3aed; background: rgba(124,58,237,0.2); }
.level-btn-stars { font-size: 0.95rem; }
.level-btn-name  { font-weight: 900; font-size: 0.9rem; }
.level-btn-desc  { font-size: 0.7rem; color: rgba(255,255,255,0.45); }

/* Start button */
.btn-start {
  padding: 13px 38px; border-radius: 100px; border: none;
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  color: white; font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.05rem;
  cursor: pointer;  transition: all .2s;
}
.btn-start:hover { transform: translateY(-3px);  }

/* Result screen */
.stars-display { display: flex; justify-content: center; gap: 10px; margin: 0.75rem 0; }
.result-star { font-size: 3.2rem; opacity: 0.18; transition: all .4s; }
.result-star.lit { opacity: 1; animation: starPop .6s ease; }
@keyframes starPop { 0%{transform:scale(0.2) rotate(-30deg)} 70%{transform:scale(1.3) rotate(6deg)} 100%{transform:scale(1) rotate(0)} }
.result-score {
  font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 900; color: #fbbf24;
}
.result-msg { font-size: 1rem; color: rgba(255,255,255,0.6); margin: .4rem 0 1.5rem; max-width: 360px; }
.result-btns { display: flex; gap: .75rem; flex-wrap: wrap; justify-content: center; }
.btn-replay {
  padding: 11px 24px; border-radius: 100px; border: 2px solid rgba(255,255,255,0.25);
  background: transparent; color: white; font-family: 'Nunito', sans-serif;
  font-weight: 800; font-size: .95rem; cursor: pointer; transition: .2s;
}
.btn-replay:hover { background: rgba(255,255,255,0.1); }
.btn-home, .btn-next {
  padding: 11px 24px; border-radius: 100px; border: none;
  color: white; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem;
  cursor: pointer; transition: .2s;
}
.btn-next { background: linear-gradient(135deg, #22c55e, #16a34a);  }
.btn-home { background: linear-gradient(135deg, #7c3aed, #4f46e5);  }
.btn-next:hover, .btn-home:hover { transform: translateY(-2px); }

/* ═══════════════════════════════════════════════════════
   QUESTION LAYOUT — question top, choices bottom
   Game canvas is FULLY VISIBLE in between
═══════════════════════════════════════════════════════ */

/* Wrapper — invisible, just a container */
#question-zone {
  position: absolute;
  inset: 0;
  z-index: 20;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
#question-zone > * { pointer-events: all; }

/* ── Question text — TOP strip ───────────────────────── */
#question-text {
  font-family: 'Fredoka One', sans-serif;
  font-size: clamp(1.15rem, 3.8vw, 1.8rem);
  color: #ffffff;
  text-align: center;
  line-height: 1.35;
  font-weight: 900;
  /* dark pill background — only behind the text */
  background: rgba(5, 5, 20, 0.82);

  padding: 10px 18px 12px;
  border-bottom: 2px solid rgba(124,58,237,0.35);
  
  /* position at very top, below HUD */
  margin-top: 52px;
  pointer-events: none;
}

#q-counter {
  font-size: .7rem; color: rgba(255,255,255,0.55);
  margin-bottom: 4px; text-align: center;
  font-weight: 800; letter-spacing: .1em; text-transform: uppercase;
  display: block;
}

/* ── Choices — BOTTOM strip ──────────────────────────── */
#choices {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px,1fr));
  gap: 8px;
  max-width: 760px;
  margin: 0 auto;
  width: 100%;
  padding: 10px 12px 14px;
  background: linear-gradient(0deg, rgba(5,5,20,0.95) 0%, rgba(5,5,20,0.80) 80%, transparent 100%);
}

.choice-btn {
  padding: 12px 10px;
  border-radius: 14px;
  border: 2px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.10);
  color: white;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: clamp(0.9rem, 2.6vw, 1.1rem);
  cursor: pointer;
  transition: all .18s;
  text-align: center;
  line-height: 1.25;
}
.choice-btn:hover:not(:disabled) {
  background: rgba(255,255,255,0.20);
  border-color: rgba(255,255,255,0.55);
  transform: translateY(-2px);
}
.choice-btn.correct { background: rgba(34,197,94,0.35); border-color: #22c55e; }
.choice-btn.wrong   { background: rgba(239,68,68,0.35);  border-color: #ef4444; }


/* ALL QUESTIONS ARE MCQ — fill input always hidden */
#fill-wrap { display: none !important; }

#fill-input {
  font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 800; text-align: center;
  padding: 9px 18px; background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.25); border-radius: 12px; color: white;
  outline: none; width: 100%; max-width: 300px; caret-color: #7c3aed;
}
#fill-input::placeholder { color: rgba(255,255,255,0.3); }
#fill-submit {
  padding: 9px 28px; border-radius: 12px; border: none;
  background: linear-gradient(135deg,#7c3aed,#4f46e5); color: white;
  font-family: 'Nunito', sans-serif; font-size: .95rem; font-weight: 800;
  cursor: pointer; transition: .2s;
}
#fill-submit:hover { transform: translateY(-2px); }

/* ── Responsive ──────────────────────────────────────────── */
@media (max-width:500px) {
  #choices { grid-template-columns: 1fr 1fr; }
  .choice-btn { font-size: .82rem; padding: 8px 4px; }
  .level-btn { min-width: 88px; padding: .75rem .9rem; }
  .game-logo { font-size: 4rem; }
}

<script>
// ═══════════════════════════════════════════════════
//  🔊 SOUND ENGINE — Web Audio API (no external files)
// ═══════════════════════════════════════════════════
const SoundEngine = (() => {
  let ctx = null;
  let bgNode = null, bgGain = null;
  let muted = false;
  const KEY = 'eduquest-muted';
  muted = localStorage.getItem(KEY) === 'true';

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function beep(freq, type, duration, vol=0.3, startTime=0) {
    if (muted) return;
    try {
      const c = getCtx();
      const o = c.createOscillator();
      const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type;
      o.frequency.setValueAtTime(freq, c.currentTime + startTime);
      g.gain.setValueAtTime(vol, c.currentTime + startTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + startTime + duration);
      o.start(c.currentTime + startTime);
      o.stop(c.currentTime + startTime + duration + 0.01);
    } catch(e){}
  }

  const sounds = {
    correct: () => { beep(523,  'sine', 0.12, 0.3); beep(659, 'sine', 0.12, 0.3, 0.1); beep(784, 'sine', 0.2, 0.3, 0.22); },
    wrong:   () => { beep(220,  'sawtooth', 0.2, 0.25); beep(180, 'sawtooth', 0.25, 0.2, 0.15); },
    click:   () => { beep(880,  'square',   0.07, 0.1); },
    tick:    () => { beep(1100, 'square',   0.06, 0.08); },
    stars:   () => { beep(784,  'sine',     0.12, 0.25); beep(988, 'sine', 0.12, 0.25, 0.1); beep(1175,'sine',0.18,0.25,0.22); },
    levelup: () => {
      [523,659,784,1047].forEach((f,i) => beep(f, 'sine', 0.15, 0.3, i*0.12));
    },
    gameover:() => { beep(311, 'sawtooth', 0.3, 0.3); beep(233, 'sawtooth', 0.4, 0.3, 0.25); beep(196,'sawtooth',0.5,0.3,0.55); },
    shoot:   () => { beep(200, 'sawtooth', 0.08, 0.2); beep(100, 'sawtooth', 0.06, 0.15, 0.05); },
    pop:     () => { beep(600, 'triangle', 0.1,  0.2); beep(400, 'triangle', 0.08, 0.15, 0.08); },
    splash:  () => { beep(300, 'sine',     0.15, 0.2); beep(200, 'sine',     0.2,  0.2, 0.1); },
    whoosh:  () => { beep(800, 'sine',     0.06, 0.15); beep(200, 'sine',     0.08, 0.1, 0.06); },
    flip:    () => { beep(440, 'triangle', 0.08, 0.2); beep(550, 'triangle', 0.08, 0.2, 0.06); },
    match:   () => { beep(523, 'sine',0.1,0.3); beep(659,'sine',0.1,0.3,0.08); beep(784,'sine',0.15,0.3,0.18); },
    freeze:  () => { [1000,800,600,400].forEach((f,i)=>beep(f,'square',0.08,0.15,i*0.06)); },
    launch:  () => { beep(200,'sawtooth',0.3,0.3); beep(300,'sine',0.2,0.2,0.15); beep(500,'sine',0.15,0.2,0.3); },
    sword:   () => { beep(300,'sawtooth',0.06,0.3); beep(500,'square',0.06,0.2,0.05); },
    thunder: () => { beep(60,'sawtooth',0.3,0.4); beep(40,'sawtooth',0.2,0.3,0.1); },
  };

  // BG ambient loop
  function startBg(type='space') {
    if (muted) return;
    stopBg();
    try {
      const c = getCtx();
      bgGain = c.createGain();
      bgGain.gain.value = 0.04;
      bgGain.connect(c.destination);

      // simple drone
      const freqs = type==='space'?[55,110,165]:[65,130,195];
      freqs.forEach(f => {
        const o = c.createOscillator();
        o.type = 'sine'; o.frequency.value = f;
        o.connect(bgGain); o.start();
        if (!bgNode) bgNode = []; bgNode.push(o);
      });
    } catch(e){}
  }
  function stopBg() {
    try { if (bgNode) { (Array.isArray(bgNode)?bgNode:[bgNode]).forEach(n=>n.stop()); } } catch(e){}
    bgNode = null;
  }

  function play(name) { if (sounds[name]) sounds[name](); }
  function toggleMute() {
    muted = !muted;
    localStorage.setItem(KEY, muted);
    if (muted) stopBg();
    return muted;
  }
  function isMuted() { return muted; }

  return { play, startBg, stopBg, toggleMute, isMuted };
})();
window.SoundEngine = SoundEngine;

</script>

const Progress = (() => {
  const KEY = 'eduquest-progress-v2';
  function load()   { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ return {}; } }
  function save(d)  { localStorage.setItem(KEY, JSON.stringify(d)); }
  function setStars(lessonKey, stars) {
    const d = load();
    d[lessonKey] = Math.max(d[lessonKey] || 0, stars);
    save(d);
  }
  function getStars(lessonKey) { return load()[lessonKey] || 0; }
  function clearAll() { localStorage.removeItem(KEY); }
  return { setStars, getStars, clearAll };
})();
window.Progress = Progress;

<script>
// ═══════════════════════════════════════════════════════════════
//  🎮 GAME BASE ENGINE — Handles questions, HUD, timer, results
// ═══════════════════════════════════════════════════════════════

const GameBase = (() => {

  // ── URL Params ───────────────────────────────────────────────
  const params    = new URLSearchParams(location.search);
  const GRADE     = params.get('grade')  || 'grade2';
  const UNIT_ID = 'u6';
  const LES_ID = 'l3';
  const LESSON_KEY = `${GRADE}-${UNIT_ID}-${LES_ID}`;

  // ── State ────────────────────────────────────────────────────
  let _questions = [], _qIndex = 0, _score = 0, _lives = 3;
  let _timeLeft = 60, _totalTime = 60;
  let _timerInterval = null, _selectedLevel = 1;
  let _gameActive = false;
  let _callbacks = {};

  // ── Level config ─────────────────────────────────────────────
  const LEVELS = {
    1: { time:90, count:8,  label:'⭐ Easy',   hints:2 },
    2: { time:60, count:15, label:'⭐⭐ Medium', hints:0 },
    3: { time:45, count:25, label:'⭐⭐⭐ Hard',  hints:0 },
  };

  // ── Shuffle ──────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  // ── Prepare questions ────────────────────────────────────────
  function prepareQuestions(all, level) {
    const cfg = LEVELS[level];
    const picked = shuffle(all).slice(0, Math.min(cfg.count, all.length));
    return picked.map(q => {
      if (q.type === 'mcq') {
        const indexed = q.choices.map((c,i)=>({text:c,correct:i===q.answer}));
        const sc = shuffle(indexed);
        return { ...q, choices: sc.map(c=>c.text), answer: sc.findIndex(c=>c.correct) };
      }
      return {...q};
    });
  }

  // ── Stars ─────────────────────────────────────────────────────
  function calcStars(correct, total, timeLeft, totalTime) {
    const acc  = correct / total;
    const tBonus = timeLeft / totalTime;
    if (acc >= 0.9 && tBonus > 0.4) return 3;
    if (acc >= 0.7) return 2;
    if (acc >= 0.5) return 1;
    return 0;
  }

  // ── Timer ─────────────────────────────────────────────────────
  function startTimer() {
    stopTimer();
    const barEl = document.getElementById('timer-bar');
    _timerInterval = setInterval(() => {
      _timeLeft -= 0.1;
      if (barEl) barEl.style.width = Math.max(0, (_timeLeft/_totalTime)*100) + '%';
      if (_timeLeft <= 8) SoundEngine.play('tick');
      if (_timeLeft <= 0) { stopTimer(); endGame(); }
    }, 100);
  }
  function stopTimer() { clearInterval(_timerInterval); }

  // ── HUD ───────────────────────────────────────────────────────
  function updateHUD() {
    const scoreEl = document.getElementById('hud-score');
    const levelEl = document.getElementById('hud-level');
    if (scoreEl) scoreEl.textContent = _score;
    if (levelEl) levelEl.textContent = LEVELS[_selectedLevel].label;
    refreshLives();
  }
  function refreshLives() {
    for(let i=1;i<=3;i++){
      const el=document.getElementById(`life-${i}`);
      if(el) el.className = 'life' + (i > _lives ? ' lost' : '');
    }
  }

  // ── MCQ Choices Renderer ─────────────────────────────────────
  function renderChoices(q) {
    const choicesEl = document.getElementById('choices');
    const fillEl    = document.getElementById('fill-wrap');
    if (!choicesEl || !fillEl) return;

    if (q.type === 'fill') {
      choicesEl.style.display = 'none';
      fillEl.style.display    = 'flex';
      fillEl.innerHTML = `
        <input id="fill-input" type="text" placeholder="Type your answer..." autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button id="fill-btn" onclick="GameBase.checkFill()">✓ Submit</button>
      `;
      const inp = document.getElementById('fill-input');
      if (inp) {
        inp.focus();
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') GameBase.checkFill(); });
      }
    } else {
      fillEl.style.display    = 'none';
      choicesEl.style.display = 'grid';
      choicesEl.innerHTML = '';
      (q.choices || []).forEach((choice, idx) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = choice;
        btn.id = `choice-btn-${idx}`;
        btn.addEventListener('click', () => {
          if (!_gameActive) return;
          submitAnswer(idx);
        });
        choicesEl.appendChild(btn);
      });
    }
  }

  // ── Public: current question ──────────────────────────────────
  function currentQ() { return _questions[_qIndex]; }

  // ── Public: answer attempt (MCQ) ─────────────────────────────
  function submitAnswer(choiceIndex) {
    if (!_gameActive) return;
    const q = currentQ();
    if (!q) return;
    // Disable all buttons briefly
    document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
    if (choiceIndex === q.answer) handleCorrect();
    else handleWrong();
  }

  // ── Public: fill check ────────────────────────────────────────
  function checkFill() {
    if (!_gameActive) return;
    const inp = document.getElementById('fill-input');
    if (!inp) return;
    const val = inp.value.trim().toLowerCase();
    const q   = currentQ();
    const ans = (q.answer || '').toString().trim().toLowerCase();
    if (val === ans) handleCorrect();
    else handleWrong();
  }

  function handleCorrect() {
    _score++;
    updateHUD();
    SoundEngine.play('correct');
    flashFeedback('correct');
    if (_callbacks.onCorrect) _callbacks.onCorrect();
    setTimeout(() => advance(), 800);
  }
  function handleWrong() {
    _lives--;
    updateHUD();
    SoundEngine.play('wrong');
    flashFeedback('wrong');
    if (_callbacks.onWrong) _callbacks.onWrong();
    if (_lives <= 0) {
      setTimeout(() => endGame(), 700);
    } else {
      setTimeout(() => advance(), 800);
    }
  }
  function advance() {
    _qIndex++;
    if (_qIndex >= _questions.length) { endGame(); return; }
    const q = currentQ();
    if (_callbacks.onNextQ) _callbacks.onNextQ(q, _qIndex, _questions.length);
    renderChoices(q);
    updateQCounter();
  }

  function updateQCounter() {
    const el = document.getElementById('q-counter');
    if (el) el.textContent = `Q ${_qIndex+1} / ${_questions.length}`;
  }

  function flashFeedback(type) {
    const el = document.getElementById('feedback-flash');
    if (!el) return;
    el.className = 'show-' + type;
    setTimeout(() => el.className = '', 400);
  }

  // ── Start ─────────────────────────────────────────────────────
  function startGame(level, allQuestions, callbacks) {
    _selectedLevel = level;
    _callbacks     = callbacks || {};
    _questions     = prepareQuestions(allQuestions, level);
    _qIndex = 0; _score = 0; _lives = 3;
    _totalTime = LEVELS[level].time;
    _timeLeft  = _totalTime;
    _gameActive = true;
    updateHUD();
    startTimer();
    const q = _questions[0];
    if (_callbacks.onStart) _callbacks.onStart(q, 0, _questions.length);
    renderChoices(q);
    updateQCounter();
    SoundEngine.startBg('space');
  }

  // ── End ───────────────────────────────────────────────────────
  function endGame() {
    _gameActive = false;
    stopTimer();
    SoundEngine.stopBg();
    const total = _questions.length;
    const stars = calcStars(_score, total, _timeLeft, _totalTime);
    if (typeof Progress !== 'undefined') Progress.setStars(LESSON_KEY, stars);
    if (_callbacks.onGameEnd) _callbacks.onGameEnd(_score, total, stars);
    setTimeout(() => showResultScreen(_score, total, stars), 400);
  }

  function showResultScreen(score, total, stars) {
    // Hide all game screens/canvases
    const screen = document.getElementById('screen-result');
    if (!screen) return;
    screen.classList.remove('hidden');
    const titleEl = document.getElementById('result-title');
    const msgEl   = document.getElementById('result-msg');
    const scoreEl = document.getElementById('result-score');
    const emojiEl = document.getElementById('result-emoji');
    const titles = ['Mission Failed!','Keep Trying!','Well Done!','Perfect! 🏆'];
    const msgs   = ["Don't give up! Try again! 💪",'Good attempt! You can do better!','Great job! You\'re improving! 🌟','Outstanding! You mastered this lesson! 🚀'];
    if (titleEl) titleEl.textContent = titles[stars];
    if (msgEl)   msgEl.textContent   = msgs[stars];
    if (scoreEl) scoreEl.textContent = `${score} / ${total}`;
    if (emojiEl) emojiEl.textContent  = ['😅','🙂','😄','🏆'][stars];
    [1,2,3].forEach((n,i) => {
      const el = document.getElementById(`rstar-${n}`);
      if (!el) return;
      el.classList.remove('lit');
      if (i < stars) setTimeout(() => { el.classList.add('lit'); SoundEngine.play('stars'); }, 400+i*350);
    });
    if (stars >= 2) setTimeout(() => SoundEngine.play('levelup'), 1400);
    else setTimeout(() => SoundEngine.play('gameover'), 300);
  }

  // ── Navigation ────────────────────────────────────────────────
  function goBack()  { location.href = '../../index.html'; }

  function replayGame() {
    // Reset state visually
    const resultScreen = document.getElementById('screen-result');
    const introScreen  = document.getElementById('screen-intro');
    if (resultScreen) resultScreen.classList.add('hidden');
    if (introScreen)  introScreen.classList.remove('hidden');
    // Reset internal state so next startGame call starts fresh
    _gameActive = false;
    _qIndex = 0; _score = 0; _lives = 3;
    stopTimer();
    SoundEngine.stopBg();
  }

  function goNext()  { location.href = '../../index.html'; }

  // ── Countdown ─────────────────────────────────────────────────
  function runCountdown(onDone) {
    const el = document.getElementById('countdown');
    if (!el) { onDone(); return; }
    el.classList.remove('hidden');
    let n = 3;
    el.textContent = n;
    SoundEngine.play('tick');
    const iv = setInterval(() => {
      n--;
      if (n <= 0) { clearInterval(iv); el.classList.add('hidden'); onDone(); }
      else { el.textContent = n; SoundEngine.play('tick'); }
    }, 900);
  }

  // ── Level select helper ───────────────────────────────────────
  function bindLevelButtons() {
    document.querySelectorAll('[data-level]').forEach(btn => {
      btn.addEventListener('click', () => {
        _selectedLevel = parseInt(btn.dataset.level);
        document.querySelectorAll('[data-level]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  }

  // ── Getters ───────────────────────────────────────────────────
  function getLevel()     { return _selectedLevel; }
  function getScore()     { return _score; }
  function isActive()     { return _gameActive; }
  function getQuestions() { return _questions; }
  function getIndex()     { return _qIndex; }
  function getInfo()      { return { GRADE, UNIT_ID, LES_ID, LESSON_KEY }; }

  // ── Load questions from curriculum ────────────────────────────
  function loadQuestions() {
    const g = CURRICULUM[GRADE];
    const u = g?.units.find(x => x.id === UNIT_ID);
    const l = u?.lessons.find(x => x.id === LES_ID);
    return l?.questions || [];
  }

  // ── Expose ────────────────────────────────────────────────────
  return {
    startGame, endGame, submitAnswer, checkFill,
    currentQ, advance, renderChoices,
    goBack, replayGame, goNext,
    runCountdown, bindLevelButtons,
    getLevel, getScore, isActive, getIndex, getQuestions,
    getInfo, loadQuestions, shuffle,
    LEVELS
  };

})();

window.GameBase = GameBase;

</script>
<script>
// ── Animated Forge Background ──────────────────────────────
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
let BW, BH;
function resizeBg() { BW = bgCanvas.width = bgCanvas.offsetWidth; BH = bgCanvas.height = bgCanvas.offsetHeight; }
resizeBg(); window.addEventListener('resize', resizeBg);

const embers = [];
for (let i=0;i<80;i++) {
  embers.push({ x:Math.random(), y:0.6+Math.random()*0.4, vx:(Math.random()-.5)*0.003,
    vy:-(0.002+Math.random()*0.004), life:Math.random(), decay:0.005+Math.random()*0.008,
    size:1+Math.random()*3, hue:Math.random()<0.6?20:50 });
}

function drawBg() {
  // Dark forge room
  const bg=bgCtx.createLinearGradient(0,0,0,BH);
  bg.addColorStop(0,'#1c0a00'); bg.addColorStop(0.5,'#2d1100'); bg.addColorStop(1,'#0f0500');
  bgCtx.fillStyle=bg; bgCtx.fillRect(0,0,BW,BH);

  // Forge glow (bottom center)
  const glow=bgCtx.createRadialGradient(BW/2,BH*0.95,10,BW/2,BH*0.95,BH*0.55);
  glow.addColorStop(0,'rgba(251,146,60,0.35)'); glow.addColorStop(0.5,'rgba(220,80,0,0.15)'); glow.addColorStop(1,'transparent');
  bgCtx.fillStyle=glow; bgCtx.fillRect(0,0,BW,BH);

  // Forge body
  bgCtx.fillStyle='#292524';
  bgCtx.beginPath(); bgCtx.roundRect(BW/2-60,BH*0.78,120,BH*0.22,8); bgCtx.fill();
  bgCtx.strokeStyle='#57534e'; bgCtx.lineWidth=2; bgCtx.stroke();
  // Forge fire inside
  const fire=bgCtx.createRadialGradient(BW/2,BH*0.87,5,BW/2,BH*0.87,40);
  fire.addColorStop(0,'rgba(255,255,100,0.9)'); fire.addColorStop(0.5,'rgba(251,146,60,0.7)'); fire.addColorStop(1,'transparent');
  bgCtx.fillStyle=fire; bgCtx.fillRect(BW/2-50,BH*0.78,100,60);

  // Anvil
  bgCtx.fillStyle='#3f3f46';
  bgCtx.beginPath(); bgCtx.roundRect(BW/2-70,BH*0.72,140,25,4); bgCtx.fill();
  bgCtx.beginPath(); bgCtx.roundRect(BW/2-45,BH*0.75,90,15,3); bgCtx.fill();
  bgCtx.strokeStyle='#71717a'; bgCtx.lineWidth=1.5; bgCtx.stroke();

  // Embers
  embers.forEach(em => {
    em.x+=em.vx; em.y+=em.vy; em.life-=em.decay;
    if(em.life<=0||em.y<-0.05){
      em.x=0.4+Math.random()*0.2; em.y=0.78+Math.random()*0.05;
      em.vx=(Math.random()-.5)*0.003; em.vy=-(0.002+Math.random()*0.004);
      em.life=0.7+Math.random()*0.3;
    }
    bgCtx.globalAlpha=Math.max(0,em.life)*0.9;
    bgCtx.fillStyle=`hsl(${em.hue},100%,${50+em.life*30}%)`;
    bgCtx.beginPath(); bgCtx.arc(em.x*BW,em.y*BH,em.size*em.life,0,Math.PI*2); bgCtx.fill();
    bgCtx.globalAlpha=1;
  });

  requestAnimationFrame(drawBg);
}
drawBg();

// ── Game Logic ─────────────────────────────────────────────
const allQ = GameBase.loadQuestions();
GameBase.bindLevelButtons();

document.getElementById('btn-launch').addEventListener('click', () => {
  document.getElementById('screen-intro').classList.add('hidden');
  GameBase.runCountdown(() => {
    GameBase.startGame(GameBase.getLevel(), allQ, {
      onStart: showQuestion,
      onNextQ: showQuestion,
    });
  });
});

function showQuestion(q, idx, total) {
  GameBase.renderChoices(q);
  document.getElementById('q-counter').textContent = `Q ${idx+1} / ${total}`;
  document.getElementById('question-text').textContent = q.q;
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => {
      if (!GameBase.isActive()) return;
      document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      btn.classList.add(i === q.answer ? 'correct' : 'wrong');
      GameBase.submitAnswer(i);
    };
    choicesEl.appendChild(btn);
  });
} 
</script>
