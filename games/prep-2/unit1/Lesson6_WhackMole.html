<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whack-A-Mole - Unit 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }

/* Game Specific CSS */

body { background: #27ae60; }
.target-btn {
    width: 130px; height: 110px;
    background: #8e44ad;
    border-radius: 50% 50% 10% 10%;
    border: 4px solid #2c3e50;
    box-shadow: inset 0 -15px 0 rgba(0,0,0,0.2);
    transition: top 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

</style>
</head>
<body>

<div id="hud">
    <div>Whack-A-Mole - Unit 1</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">ðŸ”„ Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "We _____ a new project tomorrow morning.", "choices": ["start", "starts", "are starting"], "answer": 2}, {"type": "mcq", "q": "He _____ his friend for lunch today.", "choices": ["meets", "is meeting", "meet"], "answer": 1}, {"type": "mcq", "q": "They _____ the museum next weekend.", "choices": ["are visiting", "visits", "visit"], "answer": 0}, {"type": "mcq", "q": "I _____ a party on Saturday.", "choices": ["has", "have", "am having"], "answer": 2}, {"type": "mcq", "q": "Gen Z and Gen Alpha use social media to _____.", "choices": ["connect", "hide", "disconnect"], "answer": 0}, {"type": "mcq", "q": "They care a lot about the _____.", "choices": ["environment", "history", "past"], "answer": 0}, {"type": "mcq", "q": "A small digital image used to express an emotion is an _____.", "choices": ["email", "app", "emoji"], "answer": 2}, {"type": "mcq", "q": "Your identity is _____ you are.", "choices": ["what", "where", "who"], "answer": 2}, {"type": "mcq", "q": "Amal decided to build a _____ for the school fair.", "choices": ["robot", "car", "plane"], "answer": 0}, {"type": "mcq", "q": "Her friend Farida _____ her.", "choices": ["encouraged", "discouraged", "blamed"], "answer": 0}, {"type": "mcq", "q": "It's not good to laugh _____ others.", "choices": ["for", "with", "at"], "answer": 2}, {"type": "mcq", "q": "You should ask for _____ before going out.", "choices": ["food", "permission", "money"], "answer": 1}, {"type": "mcq", "q": "In my _____, spending too much time online is unhealthy.", "choices": ["truth", "fact", "opinion"], "answer": 2}, {"type": "mcq", "q": "We should put our phones _____ during dinner.", "choices": ["up", "on", "away"], "answer": 2}, {"type": "mcq", "q": "A blog is an online _____.", "choices": ["journal", "magazine", "newspaper"], "answer": 0}, {"type": "mcq", "q": "They are _____ football next Friday.", "choices": ["played", "playing", "play"], "answer": 1}, {"type": "mcq", "q": "He is _____ Koshari right now.", "choices": ["eats", "eat", "eating"], "answer": 2}, {"type": "mcq", "q": "She is _____ her laptop.", "choices": ["using", "uses", "use"], "answer": 0}, {"type": "mcq", "q": "The hybrid bus runs on both electricity and _____.", "choices": ["water", "diesel", "gas"], "answer": 1}, {"type": "mcq", "q": "The monorail runs _____ the ground.", "choices": ["inside", "under", "above"], "answer": 2}, {"type": "mcq", "q": "Technology helps us _____ pollution.", "choices": ["increase", "reduce", "worsen"], "answer": 1}, {"type": "mcq", "q": "We should be _____ when we use the internet.", "choices": ["careless", "careful", "bad"], "answer": 1}, {"type": "mcq", "q": "They are learning to _____ their emotions.", "choices": ["express", "ignore", "hide"], "answer": 0}, {"type": "mcq", "q": "Gen Alpha is hoped to _____ the future.", "choices": ["shape", "destroy", "ignore"], "answer": 0}, {"type": "mcq", "q": "We must treat people with _____.", "choices": ["kindness", "cruelty", "anger"], "answer": 0}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;

window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

// AUDIO
const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

// CORE GAME LOGIC
let qIdx = 0, score = 0, locked = false;
let particles = [];
let gameEntities = {}; // Custom state for each game

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); // Shuffle
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        
        // Let the specific game set the button's position and appearance
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    // Call specific game animation
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        // Action finished hitting target
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            // Show correct answer briefly
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        
        setTimeout(() => {
            qIdx++;
            loadQ();
        }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; // Gravity
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'ðŸ† Awesome!' : 'ðŸ’ª Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

// Request Animation Frame loop
function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}

// Init

let tTime = 0;
let mallet = null;

function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.dataset.x = spacing * (i + 1);
    btn.dataset.baseY = window.innerHeight * 0.6;
    
    btn.style.left = btn.dataset.x + 'px';
    btn.style.top = (parseFloat(btn.dataset.baseY) + 100) + 'px'; // Hidden initially
}

function gameOnLoadQ() { 
    mallet = null; 
    // Pop them up
    setTimeout(() => {
        document.querySelectorAll('.target-btn').forEach(btn => {
            btn.style.top = btn.dataset.baseY + 'px';
        });
    }, 100);
}

function gameAnimateAction(tx, ty, isCorrect, btn, onHitCallback) {
    // Mallet swings down
    mallet = { x: tx, y: ty - 150, angle: -Math.PI/4, state: 'swinging', cb: onHitCallback, target: btn };
}

function gameDrawBackground() {
    // Draw Holes behind buttons
    document.querySelectorAll('.target-btn').forEach(btn => {
        const x = parseFloat(btn.dataset.x);
        const y = parseFloat(btn.dataset.baseY) + 40;
        ctx.fillStyle = '#1e8449'; ctx.beginPath(); ctx.ellipse(x, y + 20, 80, 30, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111'; ctx.beginPath(); ctx.ellipse(x, y + 20, 60, 20, 0, 0, Math.PI*2); ctx.fill();
    });
}

function gameDrawForeground() {
    if(mallet) {
        if(mallet.state === 'swinging') {
            mallet.angle += 0.2;
            if(mallet.angle > Math.PI/4) {
                mallet.state = 'returning';
                sndShoot();
                mallet.cb();
            }
        } else if (mallet.state === 'returning') {
            mallet.angle -= 0.1;
            if(mallet.angle < -Math.PI/2) mallet = null;
        }
        
        if(mallet) {
            ctx.save();
            ctx.translate(mallet.x + 50, mallet.y + 50);
            ctx.rotate(mallet.angle);
            // Handle
            ctx.fillStyle = '#d35400'; ctx.fillRect(-10, -100, 20, 100);
            // Head
            ctx.fillStyle = '#7f8c8d'; ctx.fillRect(-40, -130, 80, 50);
            ctx.fillStyle = '#95a5a6'; ctx.fillRect(-30, -120, 60, 30);
            ctx.restore();
        }
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
