<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Fishing - Unit 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }

/* Game Specific CSS */

body { background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 35%, #006994 35%, #002d40 100%); }
.target-btn {
    width: 140px; height: 60px;
    background: #f39c12;
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    position: absolute;
    box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3);
    color: white; font-size: 1.2rem;
}
.target-btn::after {
    content: '';
    position: absolute;
    right: -20px; top: 15px;
    border-left: 25px solid #f39c12;
    border-top: 15px solid transparent;
    border-bottom: 15px solid transparent;
}
.target-btn::before {
    content: 'O';
    position: absolute; left: 10px; top: 15px;
    font-size: 15px; filter: grayscale(1);
}

</style>
</head>
<body>

<div id="hud">
    <div>Deep Fishing - Unit 1</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">ðŸ”„ Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "Amal's parents encourage her _____.", "choices": ["not to hope", "not to give up", "not to continue"], "answer": 1}, {"type": "mcq", "q": "Amal decided to build a robot to take part in a school _____.", "choices": ["bank", "fair", "hospital"], "answer": 1}, {"type": "mcq", "q": "Farida showed _____ when Amal felt frustrated.", "choices": ["anger", "empathy", "hatred"], "answer": 1}, {"type": "mcq", "q": "Amal's hard work and _____ were admired by the teacher.", "choices": ["fear", "laziness", "creativity"], "answer": 2}, {"type": "mcq", "q": "The robot blinked its eyes and said _____.", "choices": ["Stop!", "Hello!", "Goodbye!"], "answer": 1}, {"type": "mcq", "q": "Amal and Yara cheered with _____.", "choices": ["sadness", "anger", "joy"], "answer": 2}, {"type": "mcq", "q": "Amal used her tools _____.", "choices": ["carelessly", "responsibly", "badly"], "answer": 1}, {"type": "mcq", "q": "It's important to stay safe _____.", "choices": ["online", "inline", "offline"], "answer": 0}, {"type": "mcq", "q": "You should believe in _____.", "choices": ["nobody", "yourself", "everyone"], "answer": 1}, {"type": "mcq", "q": "How _____ do you spend using technology every day?", "choices": ["long", "much time", "many"], "answer": 1}, {"type": "mcq", "q": "_____ my opinion, it's okay to enjoy your screen.", "choices": ["In", "At", "On"], "answer": 0}, {"type": "mcq", "q": "Don't let the screen _____ you.", "choices": ["help", "control", "guide"], "answer": 1}, {"type": "mcq", "q": "A blog post is written on the _____.", "choices": ["paper", "board", "internet"], "answer": 2}, {"type": "mcq", "q": "Gen Alpha likes to create short _____.", "choices": ["books", "videos", "games"], "answer": 1}, {"type": "mcq", "q": "They use technology to express their _____.", "choices": ["clothes", "food", "emotions"], "answer": 2}, {"type": "mcq", "q": "We should use social media _____.", "choices": ["foolishly", "carelessly", "wisely"], "answer": 2}, {"type": "mcq", "q": "Emojis are small digital _____ used to express emotions.", "choices": ["images", "sounds", "videos"], "answer": 0}, {"type": "mcq", "q": "Interpersonal skills are important _____.", "choices": ["on TV", "online", "in books"], "answer": 1}, {"type": "mcq", "q": "Gen Alpha are digital _____.", "choices": ["cameras", "natives", "devices"], "answer": 1}, {"type": "mcq", "q": "They often learn to use technology before they can _____.", "choices": ["swim", "run", "read"], "answer": 2}, {"type": "mcq", "q": "They explore the latest _____ that spread quickly.", "choices": ["games", "sports", "trends"], "answer": 2}, {"type": "mcq", "q": "Parents want their children to _____ their screen time.", "choices": ["double", "increase", "limit"], "answer": 2}, {"type": "mcq", "q": "Parents want children to balance online activities with _____ connections.", "choices": ["real-life", "fake", "virtual"], "answer": 0}, {"type": "mcq", "q": "A blog is an online _____.", "choices": ["book", "game", "journal"], "answer": 2}, {"type": "mcq", "q": "You should explain your ideas _____ when talking to others.", "choices": ["rudely", "unclearly", "clearly"], "answer": 2}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;

window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

// AUDIO
const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

// CORE GAME LOGIC
let qIdx = 0, score = 0, locked = false;
let particles = [];
let gameEntities = {}; // Custom state for each game

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); // Shuffle
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        
        // Let the specific game set the button's position and appearance
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    // Call specific game animation
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        // Action finished hitting target
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            // Show correct answer briefly
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        
        setTimeout(() => {
            qIdx++;
            loadQ();
        }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; // Gravity
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'ðŸ† Awesome!' : 'ðŸ’ª Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

// Request Animation Frame loop
function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}

// Init

let tTime = 0;
let hook = { x: window.innerWidth/2, y: window.innerHeight*0.25 };
let hookTarget = null;
let caughtTargetBtn = null;
let hookState = 'idle'; // idle, down, up
let onHitCb = null;

function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.style.left = (spacing * (i + 1)) + 'px';
    btn.dataset.baseY = window.innerHeight * 0.65 + (i%2===1 ? 50 : 0);
    // Randomize fish colors
    const colors = ['#e74c3c', '#9b59b6', '#1abc9c'];
    btn.style.background = colors[i % colors.length];
    // inject dynamic style for the tail color based on background
    const style = document.createElement('style');
    style.innerHTML = `.target-btn:nth-child(${i+1})::after { border-left-color: ${colors[i % colors.length]}; }`;
    document.head.appendChild(style);
}

function gameOnLoadQ() { 
    hook.x = window.innerWidth/2;
    hook.y = window.innerHeight*0.25;
    hookState = 'idle';
    caughtTargetBtn = null;
}

function gameAnimateAction(tx, ty, isCorrect, btn, onHitCallback) {
    hookTarget = { x: tx - 40, y: ty - 10 }; // Target the fish's "mouth" (left side)
    hookState = 'down';
    onHitCb = onHitCallback;
    if(isCorrect) {
        caughtTargetBtn = btn; // we will pull it up
    }
}

function gameDrawBackground() {
    tTime++;
    // Draw Dock & Fisherman at top
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(cv.width/2 - 60, cv.height*0.25, 120, 20); // dock
    ctx.fillStyle = '#e67e22'; // fisherman body
    ctx.fillRect(cv.width/2 - 20, cv.height*0.25 - 40, 40, 40);
    ctx.fillStyle = '#f1c40f'; // hat
    ctx.beginPath(); ctx.arc(cv.width/2, cv.height*0.25 - 40, 25, Math.PI, 0); ctx.fill();
    // Fishing rod
    ctx.strokeStyle = '#5c2e0b'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(cv.width/2 + 10, cv.height*0.25 - 20); ctx.lineTo(hook.x + 20, cv.height*0.25 - 80); ctx.stroke();
    
    // Animate fish bobbing
    document.querySelectorAll('.target-btn').forEach((btn, i) => {
        if(btn !== caughtTargetBtn) {
            const baseY = parseFloat(btn.dataset.baseY);
            const offset = Math.sin(tTime * 0.05 + i) * 15;
            btn.style.top = (baseY + offset) + 'px';
        }
    });
}

function gameDrawForeground() {
    // Update hook physics
    if(hookState === 'down') {
        const dx = hookTarget.x - hook.x;
        const dy = hookTarget.y - hook.y;
        hook.x += dx * 0.08;
        hook.y += dy * 0.08;
        
        if(Math.hypot(dx, dy) < 10) {
            hookState = 'up';
            onHitCb(); // Trigger hit logic (sound, particles)
        }
    } else if (hookState === 'up') {
        // pull back to rod tip
        const rX = cv.width/2 + 20;
        const rY = cv.height*0.25 - 80;
        const dx = rX - hook.x;
        const dy = rY - hook.y;
        hook.x += dx * 0.1;
        hook.y += dy * 0.1;
        
        if(caughtTargetBtn) {
            caughtTargetBtn.style.left = (hook.x + 40) + 'px';
            caughtTargetBtn.style.top = (hook.y + 10) + 'px';
        }
    }
    
    // Draw Fishing Line
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cv.width/2 + 20, cv.height*0.25 - 80); ctx.lineTo(hook.x, hook.y); ctx.stroke();
    
    // Draw Hook
    ctx.strokeStyle = '#silver'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(hook.x, hook.y + 10, 10, 0, Math.PI); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(hook.x - 10, hook.y + 10); ctx.lineTo(hook.x - 10, hook.y); ctx.stroke();
}

loadQ();
mainLoop();
</script>
</body>
</html>
