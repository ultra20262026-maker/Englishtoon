<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bubble Popper - Unit 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }

/* Game Specific CSS */

body { background: #1a0b2e; }
.target-btn {
    width: 140px; height: 140px;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.1) 60%, rgba(255,255,255,0.3) 100%);
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(255,255,255,0.2), inset 0 0 20px rgba(255,255,255,0.5);
    color: #fff; text-shadow: 1px 1px 3px #000;
}

</style>
</head>
<body>

<div id="hud">
    <div>Bubble Popper - Unit 1</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">ðŸ”„ Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "Putting mobiles away during meals is a _____ habit.", "choices": ["good", "bad", "unhealthy"], "answer": 0}, {"type": "mcq", "q": "Spending too much time on screens is _____.", "choices": ["unhealthy", "safe", "healthy"], "answer": 0}, {"type": "mcq", "q": "We should find a _____ between screen time and family life.", "choices": ["problem", "balance", "conflict"], "answer": 1}, {"type": "mcq", "q": "Gen Z and Alpha speak the same digital _____.", "choices": ["sounds", "language", "words"], "answer": 1}, {"type": "mcq", "q": "Technology helps them _____ to make their world a better place.", "choices": ["cooperate", "fight", "argue"], "answer": 0}, {"type": "mcq", "q": "Many of them care about the _____.", "choices": ["environment", "pollution", "damage"], "answer": 0}, {"type": "mcq", "q": "They share their thoughts through using _____.", "choices": ["letters", "books", "technology"], "answer": 2}, {"type": "mcq", "q": "The time you spend looking at a screen is _____ time.", "choices": ["spare", "screen", "free"], "answer": 1}, {"type": "mcq", "q": "To have something in _____ means having the same ideas.", "choices": ["special", "common", "different"], "answer": 1}, {"type": "mcq", "q": "To _____ is to show or stand for something.", "choices": ["hide", "represent", "ignore"], "answer": 1}, {"type": "mcq", "q": "Gen Alpha children are constantly _____ new movements.", "choices": ["discovering", "hiding", "losing"], "answer": 0}, {"type": "mcq", "q": "A _____ trend is shaping the future.", "choices": ["powerful", "weak", "bad"], "answer": 0}, {"type": "mcq", "q": "To express emotions, people use _____.", "choices": ["numbers", "emojis", "letters"], "answer": 1}, {"type": "mcq", "q": "_____ is an important skill for Gen Alpha.", "choices": ["Hunting", "Farming", "Technology"], "answer": 2}, {"type": "mcq", "q": "They share hobbies and _____ online.", "choices": ["food", "clothes", "opinions"], "answer": 2}, {"type": "mcq", "q": "The generation born from 2010 to mid-2020s is Gen _____.", "choices": ["Alpha", "Z", "X"], "answer": 0}, {"type": "mcq", "q": "You should write a blog post about your digital _____.", "choices": ["food", "habits", "clothes"], "answer": 1}, {"type": "mcq", "q": "What is your favorite digital _____?", "choices": ["device", "color", "food"], "answer": 0}, {"type": "mcq", "q": "A robot is a type of _____.", "choices": ["animal", "plant", "machine"], "answer": 2}, {"type": "mcq", "q": "To take part in a school fair means to _____ in it.", "choices": ["hide", "ignore", "participate"], "answer": 2}, {"type": "mcq", "q": "Amal used old _____, wires and little machines.", "choices": ["toys", "clothes", "books"], "answer": 0}, {"type": "mcq", "q": "Gen Alpha are also called digital _____.", "choices": ["immigrants", "natives", "aliens"], "answer": 1}, {"type": "mcq", "q": "Parents should _____ their children's screen time.", "choices": ["ignore", "increase", "limit"], "answer": 2}, {"type": "mcq", "q": "It's important to _____ online activities with real life.", "choices": ["mix", "separate", "balance"], "answer": 2}, {"type": "mcq", "q": "She _____ to Alexandria next week. She has the tickets.", "choices": ["travel", "travels", "is traveling"], "answer": 2}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;

window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

// AUDIO
const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

// CORE GAME LOGIC
let qIdx = 0, score = 0, locked = false;
let particles = [];
let gameEntities = {}; // Custom state for each game

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); // Shuffle
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        
        // Let the specific game set the button's position and appearance
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    // Call specific game animation
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        // Action finished hitting target
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            // Show correct answer briefly
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        
        setTimeout(() => {
            qIdx++;
            loadQ();
        }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; // Gravity
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'ðŸ† Awesome!' : 'ðŸ’ª Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

// Request Animation Frame loop
function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}

// Init

let tTime = 0;
let dart = null;

function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.dataset.baseX = spacing * (i + 1);
    btn.dataset.baseY = window.innerHeight * 0.5;
    btn.dataset.phaseX = Math.random() * Math.PI * 2;
    btn.dataset.phaseY = Math.random() * Math.PI * 2;
    // Set initial
    btn.style.left = btn.dataset.baseX + 'px';
    btn.style.top = btn.dataset.baseY + 'px';
}

function gameOnLoadQ() { dart = null; }

function gameAnimateAction(tx, ty, isCorrect, btn, onHitCallback) {
    sndShoot();
    dart = { x: cv.width/2, y: cv.height, tx, ty, cb: onHitCallback, targetBtn: btn };
}

function gameDrawBackground() {
    tTime++;
    // Float bubbles around randomly
    if(!locked) {
        document.querySelectorAll('.target-btn').forEach(btn => {
            const bx = parseFloat(btn.dataset.baseX);
            const by = parseFloat(btn.dataset.baseY);
            const px = parseFloat(btn.dataset.phaseX);
            const py = parseFloat(btn.dataset.phaseY);
            
            btn.style.left = (bx + Math.sin(tTime * 0.02 + px) * 50) + 'px';
            btn.style.top = (by + Math.cos(tTime * 0.015 + py) * 30) + 'px';
        });
    }
}

function gameDrawForeground() {
    if(dart) {
        // Move dart
        const speed = 30;
        const dx = dart.tx - dart.x;
        const dy = dart.ty - dart.y;
        const angle = Math.atan2(dy, dx);
        
        dart.x += Math.cos(angle) * speed;
        dart.y += Math.sin(angle) * speed;
        
        // Draw Dart
        ctx.save();
        ctx.translate(dart.x, dart.y);
        ctx.rotate(angle);
        ctx.fillStyle = '#c0392b'; ctx.fillRect(-20, -3, 40, 6);
        ctx.fillStyle = '#ecf0f1'; ctx.beginPath(); ctx.moveTo(20, -5); ctx.lineTo(35, 0); ctx.lineTo(20, 5); ctx.fill();
        ctx.fillStyle = '#34495e'; ctx.beginPath(); ctx.moveTo(-20, 0); ctx.lineTo(-30, -10); ctx.lineTo(-30, 10); ctx.fill();
        ctx.restore();
        
        // Hit detection
        if(Math.hypot(dx, dy) < speed) {
            dart.cb();
            dart = null;
        }
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
