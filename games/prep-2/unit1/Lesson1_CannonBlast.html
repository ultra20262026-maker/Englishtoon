<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannon Blast - Unit 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }

/* Game Specific CSS */

body { background: linear-gradient(to bottom, #1a0b2e, #4a192c); }
.target-btn {
    width: 140px; height: 140px;
    background: radial-gradient(circle, #8B4513 40%, #5c2e0b 100%);
    border: 4px solid #3d1f05; border-radius: 50%;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 10px 20px rgba(0,0,0,0.5);
    /* Make it look like a wooden barrel top */
    background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.1) 10px, rgba(0,0,0,0.1) 20px);
}

</style>
</head>
<body>

<div id="hud">
    <div>Cannon Blast - Unit 1</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">ðŸ”„ Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "Individuals who have grown up with technology are known as digital _____.", "choices": ["natives", "cameras", "devices"], "answer": 0}, {"type": "mcq", "q": "Women and girls usually follow the latest _____ in fashion.", "choices": ["trends", "trams", "trees"], "answer": 0}, {"type": "mcq", "q": "Gen Alpha children are _____ discovering new movements in their communities.", "choices": ["constantly", "constant", "temporary"], "answer": 0}, {"type": "mcq", "q": "Nowadays, parents are trying to _____ the time their children spend using digital devices.", "choices": ["increase", "limit", "gain"], "answer": 1}, {"type": "mcq", "q": "Gen Alpha individuals like using technological devices to _____ their identity.", "choices": ["create", "decrease", "degrade"], "answer": 0}, {"type": "mcq", "q": "Gen Alpha are the children who were born from around _____ to the mid-2020s.", "choices": ["2000", "2010", "1990"], "answer": 1}, {"type": "mcq", "q": "They like creating short _____ to show their hobbies and opinions.", "choices": ["memes", "photos", "videos"], "answer": 2}, {"type": "mcq", "q": "They share _____ and send emojis to show their emotions.", "choices": ["balance", "memes", "photos"], "answer": 1}, {"type": "mcq", "q": "They are learning to _____ online activities with real-life connections.", "choices": ["balance", "represent", "videos"], "answer": 0}, {"type": "mcq", "q": "They _____ a powerful trend that is shaping the future.", "choices": ["memes", "represent", "videos"], "answer": 1}, {"type": "mcq", "q": "Working women try hard to _____ their personal life with their work.", "choices": ["limit", "decrease", "balance"], "answer": 2}, {"type": "mcq", "q": "Nowadays, people use emojis to _____ their emotions.", "choices": ["limit", "express", "extend"], "answer": 1}, {"type": "mcq", "q": "Gen Alpha generation should use social media _____.", "choices": ["foolishly", "carelessly", "wisely"], "answer": 2}, {"type": "mcq", "q": "Using social media, generations Z and Alpha can _____ and have fun with others.", "choices": ["connect", "contact", "correct"], "answer": 0}, {"type": "mcq", "q": "If people live _____, they can communicate using mobile phones.", "choices": ["apart", "near", "far apart"], "answer": 2}, {"type": "mcq", "q": "Gen Z and Gen Alpha are interested in treating people with _____.", "choices": ["fair", "careless", "fairness"], "answer": 2}, {"type": "mcq", "q": "People use technology to share their thoughts and _____ important issues.", "choices": ["contact", "relax", "support"], "answer": 2}, {"type": "mcq", "q": "If people have something in _____, they have the same ideas and interests.", "choices": ["special", "particular", "common"], "answer": 2}, {"type": "mcq", "q": "Gen Z and Gen Alpha like short videos, emojis, and _____.", "choices": ["books", "memes", "games"], "answer": 1}, {"type": "mcq", "q": "Both generations speak the same digital _____.", "choices": ["about", "language", "thoughts"], "answer": 1}, {"type": "mcq", "q": "Technology helps them _____ each other and cooperate.", "choices": ["to", "understand", "language"], "answer": 1}, {"type": "mcq", "q": "The time people spend using a screen is called _____.", "choices": ["screen time", "spare time", "free time"], "answer": 0}, {"type": "mcq", "q": "We should all treat old people _____ kindness.", "choices": ["for", "with", "to"], "answer": 1}, {"type": "mcq", "q": "_____ are small digital images used to express emotions or ideas.", "choices": ["Sites", "Emojis", "Websites"], "answer": 1}, {"type": "mcq", "q": "Many parents encourage their children to use _____ skills online.", "choices": ["digital", "manual", "interpersonal"], "answer": 0}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;

window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

// AUDIO
const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

// CORE GAME LOGIC
let qIdx = 0, score = 0, locked = false;
let particles = [];
let gameEntities = {}; // Custom state for each game

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); // Shuffle
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        
        // Let the specific game set the button's position and appearance
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    // Call specific game animation
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        // Action finished hitting target
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            // Show correct answer briefly
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        
        setTimeout(() => {
            qIdx++;
            loadQ();
        }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; // Gravity
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'ðŸ† Awesome!' : 'ðŸ’ª Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

// Request Animation Frame loop
function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}

// Init

let cannonAngle = -Math.PI/2;
let cannonball = null;

function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    const x = spacing * (i + 1);
    const y = window.innerHeight * 0.55 + (i%2===1 ? 40 : 0); // Staggered heights
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
}

function gameOnLoadQ() { cannonball = null; }

function gameAnimateAction(tx, ty, isCorrect, btn, onHitCallback) {
    sndShoot();
    const startX = cv.width/2;
    const startY = cv.height - 60;
    cannonAngle = Math.atan2(ty - startY, tx - startX);
    
    // Shoot ball
    const speed = 25;
    cannonball = {
        x: startX + Math.cos(cannonAngle)*50,
        y: startY + Math.sin(cannonAngle)*50,
        vx: Math.cos(cannonAngle) * speed,
        vy: Math.sin(cannonAngle) * speed,
        tx, ty, cb: onHitCallback
    };
}

function gameDrawBackground() {
    // Ground
    ctx.fillStyle = '#2c1308';
    ctx.fillRect(0, cv.height - 80, cv.width, 80);
    ctx.fillStyle = '#170903';
    ctx.fillRect(0, cv.height - 70, cv.width, 10);
}

function gameDrawForeground() {
    // Cannon Base
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(cv.width/2, cv.height - 40, 40, Math.PI, 0); ctx.fill();
    
    // Cannon Barrel
    ctx.save();
    ctx.translate(cv.width/2, cv.height - 40);
    ctx.rotate(cannonAngle);
    ctx.fillStyle = '#333';
    ctx.fillRect(0, -20, 80, 40);
    ctx.fillStyle = '#111';
    ctx.fillRect(70, -25, 15, 50);
    ctx.restore();
    
    // Cannonball
    if(cannonball) {
        cannonball.x += cannonball.vx;
        cannonball.y += cannonball.vy;
        
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(cannonball.x, cannonball.y, 12, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#555';
        ctx.beginPath(); ctx.arc(cannonball.x - 4, cannonball.y - 4, 4, 0, Math.PI*2); ctx.fill();
        
        // Add trail
        createParticles(cannonball.x, cannonball.y, '#e74c3c', 1);
        
        // Check hit
        const dist = Math.hypot(cannonball.x - cannonball.tx, cannonball.y - cannonball.ty);
        if(dist < 30) {
            cannonball.cb();
            cannonball = null;
        }
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
