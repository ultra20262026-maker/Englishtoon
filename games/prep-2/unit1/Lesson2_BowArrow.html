<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bow & Arrow - Unit 1</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }

/* Game Specific CSS */

body { background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364); }
.target-btn {
    width: 130px; height: 130px;
    background: radial-gradient(circle, red 10%, white 11%, white 30%, red 31%, red 50%, white 51%, white 70%, red 71%);
    border: 5px solid #8B4513; border-radius: 50%;
    box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    color: black !important;
    text-shadow: 0 0 5px white, 0 0 5px white !important;
}

</style>
</head>
<body>

<div id="hud">
    <div>Bow & Arrow - Unit 1</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">ðŸ”„ Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "Gen Alpha is a generation that is hoped to _____ the future.", "choices": ["ship", "shape", "tape"], "answer": 1}, {"type": "mcq", "q": "They learn to use technology before they can _____.", "choices": ["speak", "read", "walk"], "answer": 1}, {"type": "mcq", "q": "They rarely spend a day _____ using technology.", "choices": ["with", "in", "without"], "answer": 2}, {"type": "mcq", "q": "Many of them care _____ the environment.", "choices": ["with", "about", "for"], "answer": 1}, {"type": "mcq", "q": "They share their _____ through using technology.", "choices": ["understand", "thoughts", "language"], "answer": 1}, {"type": "mcq", "q": "They are _____ their homework now.", "choices": ["does", "do", "doing"], "answer": 2}, {"type": "mcq", "q": "He _____ a new movie next Friday. He has already bought the tickets.", "choices": ["is watching", "watch", "will watch"], "answer": 0}, {"type": "mcq", "q": "She is _____ to Aswan next week.", "choices": ["traveling", "travel", "travels"], "answer": 0}, {"type": "mcq", "q": "Adel _____ Koshari right now.", "choices": ["is eating", "eat", "eats"], "answer": 0}, {"type": "mcq", "q": "They _____ football next Friday. They have arranged to do that.", "choices": ["played", "play", "are playing"], "answer": 2}, {"type": "mcq", "q": "At the moment, he _____ Science.", "choices": ["study", "studies", "is studying"], "answer": 2}, {"type": "mcq", "q": "Adel _____ his grandparents next Friday.", "choices": ["is visit", "is visiting", "visits"], "answer": 1}, {"type": "mcq", "q": "They _____ dinner now.", "choices": ["prepare", "prepares", "are preparing"], "answer": 2}, {"type": "mcq", "q": "She _____ her laptop right now.", "choices": ["uses", "using", "is using"], "answer": 2}, {"type": "mcq", "q": "We _____ a match in Cairo Stadium next Friday. We have prepared everything.", "choices": ["watches", "watch", "are watching"], "answer": 2}, {"type": "mcq", "q": "My sister _____ online games now.", "choices": ["is playing", "play", "plays"], "answer": 0}, {"type": "mcq", "q": "They _____ dinner outdoors tomorrow. They have arranged everything.", "choices": ["have", "having", "are having"], "answer": 2}, {"type": "mcq", "q": "This week, they _____ Tennis. (Correct the mistake: play ->)", "choices": ["are playing", "plays", "playing"], "answer": 0}, {"type": "mcq", "q": "He is _____ a new project right now. (Correct the mistake: done ->)", "choices": ["do", "doing", "does"], "answer": 1}, {"type": "mcq", "q": "I _____ to Alexandria tomorrow. I've bought the tickets.", "choices": ["travel", "am travelling", "travels"], "answer": 1}, {"type": "mcq", "q": "We _____ our friends tonight. It's arranged.", "choices": ["meets", "are meeting", "meet"], "answer": 1}, {"type": "mcq", "q": "She _____ a party next weekend.", "choices": ["has", "have", "is having"], "answer": 2}, {"type": "mcq", "q": "What _____ you doing tomorrow evening?", "choices": ["are", "is", "do"], "answer": 0}, {"type": "mcq", "q": "He _____ not playing football today.", "choices": ["is", "are", "does"], "answer": 0}, {"type": "mcq", "q": "They _____ leaving at 8 AM tomorrow.", "choices": ["will", "are", "do"], "answer": 1}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;

window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

// AUDIO
const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

// CORE GAME LOGIC
let qIdx = 0, score = 0, locked = false;
let particles = [];
let gameEntities = {}; // Custom state for each game

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); // Shuffle
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        
        // Let the specific game set the button's position and appearance
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    // Call specific game animation
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        // Action finished hitting target
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            // Show correct answer briefly
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        
        setTimeout(() => {
            qIdx++;
            loadQ();
        }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; // Gravity
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'ðŸ† Awesome!' : 'ðŸ’ª Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

// Request Animation Frame loop
function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}

// Init

let bowAngle = -Math.PI/2;
let arrow = null;

function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.style.left = (spacing * (i + 1)) + 'px';
    btn.style.top = (window.innerHeight * 0.45) + 'px';
}

function gameOnLoadQ() { arrow = null; }

function gameAnimateAction(tx, ty, isCorrect, btn, onHitCallback) {
    sndShoot();
    const startX = cv.width/2;
    const startY = cv.height - 80;
    
    // Arching trajectory calculation
    const dx = tx - startX;
    const dy = ty - startY;
    const time = 30; // frames
    const vx = dx / time;
    const gravity = 0.5;
    const vy = (dy - 0.5 * gravity * time * time) / time;
    
    arrow = { x: startX, y: startY, vx, vy, gravity, cb: onHitCallback, target: btn };
}

function gameDrawBackground() {
    // Grass
    ctx.fillStyle = '#1e3d23';
    ctx.fillRect(0, cv.height - 100, cv.width, 100);
}

function gameDrawForeground() {
    // Archer (Stick figure holding bow)
    ctx.save();
    ctx.translate(cv.width/2, cv.height - 80);
    // Body
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 40); ctx.stroke();
    // Head
    ctx.beginPath(); ctx.arc(0, -10, 10, 0, Math.PI*2); ctx.stroke();
    // Bow
    ctx.strokeStyle = '#c8d6e5'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(15, 10, 30, -Math.PI/2, Math.PI/2); ctx.stroke();
    // String
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(15, -20); ctx.lineTo(0, 10); ctx.lineTo(15, 40); ctx.stroke();
    ctx.restore();

    if(arrow) {
        arrow.vy += arrow.gravity;
        arrow.x += arrow.vx;
        arrow.y += arrow.vy;
        
        const angle = Math.atan2(arrow.vy, arrow.vx);
        
        ctx.save();
        ctx.translate(arrow.x, arrow.y);
        ctx.rotate(angle);
        // Arrow shaft
        ctx.fillStyle = '#e1b12c'; ctx.fillRect(-20, -2, 40, 4);
        // Arrow head
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.moveTo(20, -6); ctx.lineTo(30, 0); ctx.lineTo(20, 6); ctx.fill();
        // Feathers
        ctx.fillStyle = '#e84118'; ctx.fillRect(-25, -5, 10, 10);
        ctx.restore();
        
        // Hit detection
        const rect = arrow.target.getBoundingClientRect();
        if(arrow.x > rect.left && arrow.x < rect.right && arrow.y > rect.top && arrow.y < rect.bottom) {
            arrow.cb();
            arrow = null;
        } else if (arrow.y > cv.height) {
            arrow.cb(); // missed or passed
            arrow = null;
        }
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
