<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UFO Abduction - Unit 6</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }


body { background: #1a252c; }
.target-btn {
    width: 140px; height: 100px;
    background: #e67e22; border-radius: 10px; border: 4px solid #d35400;
}

</style>
</head>
<body>

<div id="hud">
    <div>UFO Abduction - Unit 6</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "I have lots of _____ for the new project in Sharm El Sheikh.", "choices": ["thoughts", "solve", "decide"], "answer": 0}, {"type": "mcq", "q": "To succeed in life, you have to follow some _____ to reach your goals.", "choices": ["steps", "inventions", "problems"], "answer": 0}, {"type": "mcq", "q": "When you face a problem, you should _____ ideas to solve it.", "choices": ["brainstorm", "feel", "Invent"], "answer": 0}, {"type": "mcq", "q": "The engineers built a _____ of the new smartphone before making the last version.", "choices": ["impact", "prototype", "plan"], "answer": 1}, {"type": "mcq", "q": "Many famous _____ have changed the world with their amazing ideas.", "choices": ["athletes", "painters", "inventors"], "answer": 2}, {"type": "mcq", "q": "When engineers create a new app, they first try to _____ any problems.", "choices": ["identify", "impact", "version"], "answer": 0}, {"type": "mcq", "q": "Some apps are very _____, meaning they are not simple.", "choices": ["easy", "complex", "clear"], "answer": 1}, {"type": "mcq", "q": "The way people use an app can have a big _____ on their daily lives.", "choices": ["identify", "impact", "version"], "answer": 1}, {"type": "mcq", "q": "Then they make a new _____ that works better.", "choices": ["inventors", "impact", "version"], "answer": 2}, {"type": "mcq", "q": "After washing the clothes, she put them in the _____ to remove the water.", "choices": ["dryer", "fridge", "oven"], "answer": 0}, {"type": "mcq", "q": "His room was so _____ that it was hard to find his clothes under the bed.", "choices": ["messy", "neat", "clean"], "answer": 0}, {"type": "mcq", "q": "Be careful! The floor is wet and you might start _____.", "choices": ["jumping", "slipping", "running"], "answer": 1}, {"type": "mcq", "q": "She used a bottle of water to _____ the plants every morning.", "choices": ["drink", "collect", "spray"], "answer": 2}, {"type": "mcq", "q": "The student felt _____ before the exam because she had studied hard.", "choices": ["afraid", "nervous", "confident"], "answer": 2}, {"type": "mcq", "q": "_____ engineers use special tools to help patients.", "choices": ["Civil", "Biomedical", "Musical"], "answer": 1}, {"type": "mcq", "q": "Many young players see Mohamed Salah as their _____ because of his success.", "choices": ["role model", "enemy", "Stranger"], "answer": 0}, {"type": "mcq", "q": "_____ can help people with problems such as movement difficulties.", "choices": ["Sensors", "Buttons", "Screens"], "answer": 0}, {"type": "mcq", "q": "Hany Azer is known for his _____ of science and young inventors.", "choices": ["movement", "support", "need"], "answer": 1}, {"type": "mcq", "q": "_____ can change lives and help those in need.", "choices": ["Hunger", "Technology", "Sensor"], "answer": 1}, {"type": "mcq", "q": "Hany Azer made a great _____ in the world of engineering.", "choices": ["civil", "impact", "sensors"], "answer": 1}, {"type": "mcq", "q": "He has a relative who works as a _____ engineer.", "choices": ["biomedical", "civil", "role model"], "answer": 0}, {"type": "mcq", "q": "We have different _____ of smartphones in our company.", "choices": ["materials", "steps", "versions"], "answer": 2}, {"type": "mcq", "q": "Inventions don't have to be _____. What matters is the impact.", "choices": ["complex", "easy", "simple"], "answer": 0}, {"type": "mcq", "q": "The scientist tested a _____ of the machine to see how it worked.", "choices": ["prototype", "type", "version"], "answer": 0}, {"type": "mcq", "q": "My teacher always _____ ideas before starting the lesson.", "choices": ["brainstorms", "thinks", "storms"], "answer": 0}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

let qIdx = 0, score = 0, locked = false;
let particles = [];

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); 
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            if(typeof btnSuccessAnim === 'function') btnSuccessAnim(btn);
            else btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            if(typeof btnFailAnim === 'function') btnFailAnim(btn);
            else btn.style.transform += ' scale(0)';
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        setTimeout(() => { qIdx++; loadQ(); }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'Awesome!' : 'Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}


let ufo = null;
function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.style.left = (spacing * (i + 1)) + 'px';
    btn.style.top = (window.innerHeight * 0.8) + 'px';
}
function gameOnLoadQ() { ufo = null; }
function gameAnimateAction(tx, ty, isCorrect, btn, cb) {
    sndShoot();
    ufo = { x: -100, y: ty - 300, tx, ty, btn, cb, state: 'flyIn' };
}
function gameDrawBackground() {}
function gameDrawForeground() {
    if(ufo) {
        if(ufo.state === 'flyIn') {
            ufo.x += (ufo.tx - ufo.x) * 0.1;
            if(Math.abs(ufo.tx - ufo.x) < 5) ufo.state = 'beam';
        } else if(ufo.state === 'beam') {
            // Draw Beam
            ctx.fillStyle = 'rgba(46, 204, 113, 0.4)';
            ctx.beginPath(); ctx.moveTo(ufo.x - 30, ufo.y + 20); ctx.lineTo(ufo.x + 30, ufo.y + 20);
            ctx.lineTo(ufo.tx + 80, ufo.ty + 50); ctx.lineTo(ufo.tx - 80, ufo.ty + 50); ctx.fill();
            
            // Abduct button
            let by = parseFloat(ufo.btn.style.top);
            by -= 5;
            ufo.btn.style.top = by + 'px';
            if(by < ufo.y + 20) ufo.state = 'flyOut';
        } else if(ufo.state === 'flyOut') {
            ufo.x += 15;
            ufo.btn.style.left = ufo.x + 'px';
            if(ufo.x > cv.width + 100) { ufo.cb(); ufo = null; }
        }
        
        if(ufo) {
            ctx.save();
            ctx.translate(ufo.x, ufo.y);
            ctx.fillStyle = '#34495e'; ctx.beginPath(); ctx.ellipse(0, 0, 70, 20, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.arc(0, -10, 30, Math.PI, 0); ctx.fill();
            ctx.restore();
        }
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
