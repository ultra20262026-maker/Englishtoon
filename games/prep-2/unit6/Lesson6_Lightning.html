<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thunder Strike - Unit 6</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }


body { background: #111; }
.target-btn {
    width: 140px; height: 140px;
    background: #34495e; border-radius: 20px; border: 4px solid #2c3e50;
    transition: filter 0.2s;
}

</style>
</head>
<body>

<div id="hud">
    <div>Thunder Strike - Unit 6</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "Your _____ footprint includes posts you choose to share.", "choices": ["active", "weak", "passive"], "answer": 0}, {"type": "mcq", "q": "We should _____ a good online balance for both learning and fun.", "choices": ["take", "find", "leave"], "answer": 1}, {"type": "mcq", "q": "The _____ in Tokyo is large, and the people are polite.", "choices": ["continent", "pollution", "population"], "answer": 2}, {"type": "mcq", "q": "I worked hard, _____ I improved my skills.", "choices": ["although", "so", "because"], "answer": 1}, {"type": "mcq", "q": "Reading short stories is much _____ than watching movies.", "choices": ["most useful", "more useful", "useful"], "answer": 1}, {"type": "mcq", "q": "January is usually the _____ month in Egypt.", "choices": ["colder", "coldest", "cold"], "answer": 1}, {"type": "mcq", "q": "The Sphinx is an _____ example of ancient Egyptian greatness.", "choices": ["impressive", "medical", "agricultural"], "answer": 0}, {"type": "mcq", "q": "Gen Alpha are true _____ as they are born with technology all around them.", "choices": ["engineers", "digital natives", "citizens"], "answer": 1}, {"type": "mcq", "q": "Hany Azer made a great _____ in the world of civil engineering.", "choices": ["impact", "Mathematics", "Science"], "answer": 0}, {"type": "mcq", "q": "Hany Azer moved to _____.", "choices": ["Germany", "England", "France"], "answer": 0}, {"type": "mcq", "q": "Together they believe in using _____ and technology to help people.", "choices": ["science", "sports", "arts"], "answer": 0}, {"type": "mcq", "q": "The writer was sitting by the open window reading a new _____.", "choices": ["story", "book", "newspaper"], "answer": 1}, {"type": "mcq", "q": "The writer used a _____ to see his way.", "choices": ["torch", "ruler", "knife"], "answer": 0}, {"type": "mcq", "q": "It was a _____ that cried 'help'.", "choices": ["parrot", "lady", "boy"], "answer": 0}, {"type": "mcq", "q": "The word 'near' is the opposite of _____.", "choices": ["far", "large", "close"], "answer": 0}, {"type": "mcq", "q": "While _____ yesterday, the light went out.", "choices": ["studied", "studying", "I was studying"], "answer": 1}, {"type": "mcq", "q": "Schools _____ clean with the help of the students.", "choices": ["should be kept", "keep", "be keeping"], "answer": 0}, {"type": "mcq", "q": "If you practiced well, you _____ well in the exam.", "choices": ["do", "would do", "did"], "answer": 1}, {"type": "mcq", "q": "I _____ to school on foot.", "choices": ["usually going", "usually go", "am usually going"], "answer": 1}, {"type": "mcq", "q": "They have arranged to spend their holiday in Alex. They _____ their holiday in Alex.", "choices": ["spend", "are spending", "will spend"], "answer": 1}, {"type": "mcq", "q": "They played well, _____ they lost.", "choices": ["Although", "but", "so"], "answer": 1}, {"type": "mcq", "q": "Traffic rules should _____ everywhere.", "choices": ["followed", "follow", "be followed"], "answer": 2}, {"type": "mcq", "q": "She _____ a new story now.", "choices": ["read", "reads", "is reading"], "answer": 2}, {"type": "mcq", "q": "Tarek: Your computer is very nice, is it new? Mona: _____.", "choices": ["I bought it a week ago.", "Yes, it is.", "No, it isn't."], "answer": 1}, {"type": "mcq", "q": "Tarek: Where is it made? Mona: _____.", "choices": ["I bought it a week ago.", "It is made in Japan.", "Yes, I can."], "answer": 1}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

let qIdx = 0, score = 0, locked = false;
let particles = [];

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); 
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            if(typeof btnSuccessAnim === 'function') btnSuccessAnim(btn);
            else btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            if(typeof btnFailAnim === 'function') btnFailAnim(btn);
            else btn.style.transform += ' scale(0)';
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        setTimeout(() => { qIdx++; loadQ(); }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'Awesome!' : 'Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}


let bolt = null;
function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.style.left = (spacing * (i + 1)) + 'px';
    btn.style.top = (window.innerHeight * 0.7) + 'px';
}
function gameOnLoadQ() { bolt = null; }
function gameAnimateAction(tx, ty, isCorrect, btn, cb) {
    sndShoot();
    bolt = { tx, ty, cb, btn, time: 20 };
    btn.style.filter = 'brightness(5) contrast(2)';
    setTimeout(() => {
        btn.style.filter = 'brightness(0.2)';
    }, 200);
}
function btnSuccessAnim(btn) {}
function btnFailAnim(btn) {}

function gameDrawBackground() {
    ctx.fillStyle = '#2c3e50'; ctx.beginPath(); ctx.arc(cv.width/2, -50, 150, 0, Math.PI*2); ctx.fill(); // storm cloud
}
function gameDrawForeground() {
    if(bolt) {
        if(bolt.time > 0) {
            ctx.strokeStyle = '#f1c40f';
            ctx.lineWidth = 5;
            ctx.beginPath();
            let curX = cv.width/2, curY = 50;
            ctx.moveTo(curX, curY);
            while(curY < bolt.ty) {
                curX += (Math.random() - 0.5) * 50;
                curY += 50;
                // home in on target
                curX += (bolt.tx - curX) * 0.2;
                ctx.lineTo(curX, curY);
            }
            ctx.lineTo(bolt.tx, bolt.ty);
            ctx.stroke();
            
            bolt.time--;
            if(bolt.time === 0) {
                bolt.cb(); bolt = null;
            }
        }
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
