<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billiard Break - Unit 5</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }


body { background: #27ae60; }
.target-btn {
    width: 120px; height: 120px;
    background: radial-gradient(circle at 30% 30%, #fff 0%, #fff 20%, #e74c3c 21%, #c0392b 100%);
    border-radius: 50%; color: white !important; font-size: 1.8rem;
    box-shadow: inset -10px -10px 20px rgba(0,0,0,0.5), 0 10px 15px rgba(0,0,0,0.4);
    border: none;
}

</style>
</head>
<body>

<div id="hud">
    <div>Billiard Break - Unit 5</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "Egypt is located in the _____ of Africa.", "choices": ["continent", "country", "city"], "answer": 0}, {"type": "mcq", "q": "He studied hard, _____ he succeeded.", "choices": ["but", "so", "because"], "answer": 1}, {"type": "mcq", "q": "I have never read a _____ exciting story than this one.", "choices": ["most", "more", "less"], "answer": 1}, {"type": "mcq", "q": "Ali always smiles _____ he is facing many problems.", "choices": ["although", "so", "because"], "answer": 0}, {"type": "mcq", "q": "They have arranged to spend their holiday in Alex. They _____ to Alex.", "choices": ["travel", "traveled", "are traveling"], "answer": 2}, {"type": "mcq", "q": "While I _____ to school, I saw an accident.", "choices": ["was walking", "walked", "walk"], "answer": 0}, {"type": "mcq", "q": "I suggest _____ to the park on Friday.", "choices": ["go", "going", "went"], "answer": 1}, {"type": "mcq", "q": "A lot of videos _____ from the internet.", "choices": ["download", "is downloaded", "are downloaded"], "answer": 2}, {"type": "mcq", "q": "We should _____ a hand to the poor.", "choices": ["gave", "give", "given"], "answer": 1}, {"type": "mcq", "q": "It's important to _____ healthy food.", "choices": ["ate", "eating", "eat"], "answer": 2}, {"type": "mcq", "q": "Teachers help students _____ their lessons.", "choices": ["understood", "understanding", "understand"], "answer": 2}, {"type": "mcq", "q": "Your active footprint includes posts you _____ to share.", "choices": ["choose", "choosing", "choose to"], "answer": 0}, {"type": "mcq", "q": "A famous sculptor received _____ for his pieces of artistic work.", "choices": ["threat", "punishment", "recognition"], "answer": 2}, {"type": "mcq", "q": "The population in Tokyo is _____, and the people are polite.", "choices": ["large", "tiny", "small"], "answer": 0}, {"type": "mcq", "q": "I _____ a local trip for the Japanese tourists.", "choices": ["organizes", "organized", "organizing"], "answer": 1}, {"type": "mcq", "q": "The painting is _____ beautiful than the one in the living room.", "choices": ["much", "most", "more"], "answer": 2}, {"type": "mcq", "q": "They were playing tennis when it _____ to rain.", "choices": ["was starting", "starts", "started"], "answer": 2}, {"type": "mcq", "q": "She _____ her room every day.", "choices": ["is cleaning", "clean", "cleans"], "answer": 2}, {"type": "mcq", "q": "I was watching TV when the lights _____ out.", "choices": ["going", "went", "go"], "answer": 1}, {"type": "mcq", "q": "Look! Adel _____ memes with his friends.", "choices": ["share", "is sharing", "shares"], "answer": 1}, {"type": "mcq", "q": "You shouldn't _____ personal photos without permission.", "choices": ["taking", "be taken", "take"], "answer": 2}, {"type": "mcq", "q": "What does water _____ in our bodies?", "choices": ["do", "does", "did"], "answer": 0}, {"type": "mcq", "q": "Being close to nature made the trip a perfect way to _____.", "choices": ["work", "relax", "study"], "answer": 1}, {"type": "mcq", "q": "The Sphinx has the body of a _____ and the head of a king.", "choices": ["dog", "cat", "lion"], "answer": 2}, {"type": "mcq", "q": "You can visit the Blue _____ in Iceland.", "choices": ["Sea", "Lagoon", "River"], "answer": 1}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

let qIdx = 0, score = 0, locked = false;
let particles = [];

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); 
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            if(typeof btnSuccessAnim === 'function') btnSuccessAnim(btn);
            else btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            if(typeof btnFailAnim === 'function') btnFailAnim(btn);
            else btn.style.transform += ' scale(0)';
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        setTimeout(() => { qIdx++; loadQ(); }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'Awesome!' : 'Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}


let cue = null;
function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.style.left = (spacing * (i + 1)) + 'px';
    btn.style.top = (window.innerHeight * 0.3) + 'px';
}
function gameOnLoadQ() { cue = null; }
function gameAnimateAction(tx, ty, isCorrect, btn, cb) {
    sndShoot();
    cue = { x: cv.width/2, y: cv.height - 100, tx, ty, cb, btn, state: 'roll' };
}
function btnSuccessAnim(btn) {}
function btnFailAnim(btn) {}

function gameDrawBackground() {
    // Pool table edges
    ctx.fillStyle = '#1e8449'; ctx.fillRect(0, 0, cv.width, 20);
    ctx.fillRect(0, cv.height-20, cv.width, 20);
    ctx.fillRect(0, 0, 20, cv.height);
    ctx.fillRect(cv.width-20, 0, 20, cv.height);
}
function gameDrawForeground() {
    if(cue) {
        if(cue.state === 'roll') {
            cue.x += (cue.tx - cue.x) * 0.2;
            cue.y += (cue.ty - cue.y) * 0.2;
            if(Math.hypot(cue.tx - cue.x, cue.ty - cue.y) < 30) {
                // HIT!
                sndShoot();
                cue.state = 'fly';
                cue.vx = (cue.tx - cv.width/2) * 0.1;
                cue.vy = -30;
            }
        } else if (cue.state === 'fly') {
            let bx = parseFloat(cue.btn.style.left);
            let by = parseFloat(cue.btn.style.top);
            bx += cue.vx; by += cue.vy;
            cue.btn.style.left = bx + 'px';
            cue.btn.style.top = by + 'px';
            
            if(by < -100 || bx < -100 || bx > cv.width+100) {
                cue.cb(); cue = null;
            }
        }
        
        if(cue) {
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(cue.x, cue.y, 30, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath(); ctx.arc(cue.x-5, cue.y-5, 20, 0, Math.PI*2); ctx.fill();
        }
    } else {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(cv.width/2, cv.height - 100, 30, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.beginPath(); ctx.arc(cv.width/2-5, cv.height - 105, 20, 0, Math.PI*2); ctx.fill();
        
        // draw cue stick hint
        ctx.strokeStyle = '#d35400'; ctx.lineWidth = 10;
        ctx.beginPath(); ctx.moveTo(cv.width/2, cv.height - 50); ctx.lineTo(cv.width/2, cv.height + 50); ctx.stroke();
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
