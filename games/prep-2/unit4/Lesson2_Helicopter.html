<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heli Rescue - Unit 4</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }


body { background: #3498db; }
.target-btn {
    width: 140px; height: 100px;
    background: #e67e22;
    border-radius: 10px; border: 4px solid #8B4513;
    box-shadow: 0 10px 0 #d35400;
}

</style>
</head>
<body>

<div id="hud">
    <div>Heli Rescue - Unit 4</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "Making art requires a lot of _____ and creativity.", "choices": ["boredom", "rules", "imagination"], "answer": 2}, {"type": "mcq", "q": "She passed the final exam _____ she studied hard.", "choices": ["but", "because", "so"], "answer": 1}, {"type": "mcq", "q": "To _____ is to make a 3D shape from wood or stone.", "choices": ["sing", "paint", "sculpt"], "answer": 2}, {"type": "mcq", "q": "His work is full of creativity and _____.", "choices": ["imagination", "sense", "boring"], "answer": 0}, {"type": "mcq", "q": "The sculptures looked very _____ because they were different.", "choices": ["stunning", "ugly", "terrible"], "answer": 0}, {"type": "mcq", "q": "I always include interactive _____ in my big installations.", "choices": ["elements", "artworks", "awards"], "answer": 0}, {"type": "mcq", "q": "_____ she woke up early, she didn't catch the bus.", "choices": ["But", "So", "Although"], "answer": 2}, {"type": "mcq", "q": "He didn't win the race _____ he hurt his knee.", "choices": ["but", "although", "because"], "answer": 2}, {"type": "mcq", "q": "They played well, _____ they lost.", "choices": ["because", "but", "so"], "answer": 1}, {"type": "mcq", "q": "I eat unhealthy food, _____ I gained weight.", "choices": ["because", "so", "but"], "answer": 1}, {"type": "mcq", "q": "He was sick, _____ he finished his homework.", "choices": ["so", "because", "but"], "answer": 2}, {"type": "mcq", "q": "His work is very special, _____ he deserves recognition.", "choices": ["but", "so", "although"], "answer": 1}, {"type": "mcq", "q": "His paintings are original _____ they are made from different materials.", "choices": ["although", "because", "so"], "answer": 1}, {"type": "mcq", "q": "He is rich, _____ he is wearing old clothes.", "choices": ["because", "but", "so"], "answer": 1}, {"type": "mcq", "q": "Omar walked slowly _____ he was tired.", "choices": ["but", "because", "so"], "answer": 1}, {"type": "mcq", "q": "He was sick, _____ he didn't go to school.", "choices": ["because", "but", "so"], "answer": 2}, {"type": "mcq", "q": "_____ she doesn't draw well, she participated in the competition.", "choices": ["Although", "Because", "But"], "answer": 0}, {"type": "mcq", "q": "_____ his artworks are amazing, he doesn't deserve recognition. (Correct connector: )", "choices": ["Although", "So", "Because"], "answer": 0}, {"type": "mcq", "q": "He prepared well, _____ he won the race.", "choices": ["so", "because", "although"], "answer": 0}, {"type": "mcq", "q": "It was raining, _____ we played football.", "choices": ["because", "so", "but"], "answer": 2}, {"type": "mcq", "q": "I don't have much money, _____ I can't buy a new mobile.", "choices": ["but", "so", "because"], "answer": 1}, {"type": "mcq", "q": "She was very tired _____ she went to bed early.", "choices": ["but", "although", "so"], "answer": 2}, {"type": "mcq", "q": "_____ it was late, they continued working on the project.", "choices": ["Although", "So", "Because"], "answer": 0}, {"type": "mcq", "q": "The statue is beautiful, _____ it is very expensive.", "choices": ["because", "but", "so"], "answer": 1}, {"type": "mcq", "q": "He got an award _____ his sculpture was amazing.", "choices": ["because", "so", "but"], "answer": 0}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

let qIdx = 0, score = 0, locked = false;
let particles = [];

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); 
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        setTimeout(() => { qIdx++; loadQ(); }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'Awesome!' : 'Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}


let heli = { x: window.innerWidth/2, y: 100, state: 'idle', target: null };
let hTime = 0;
function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.style.left = (spacing * (i + 1)) + 'px';
    btn.style.top = (window.innerHeight * 0.8) + 'px';
}
function gameOnLoadQ() { 
    heli.state = 'idle'; heli.target = null;
    heli.x = window.innerWidth/2; heli.y = 100;
}
function gameAnimateAction(tx, ty, isCorrect, btn, cb) {
    sndShoot();
    heli.target = { tx, ty, cb, btn };
    heli.state = 'moving';
}
function gameDrawBackground() {
    ctx.fillStyle = '#ecf0f1';
    ctx.beginPath(); ctx.moveTo(0, cv.height); ctx.lineTo(cv.width*0.2, cv.height*0.6); 
    ctx.lineTo(cv.width*0.5, cv.height*0.8); ctx.lineTo(cv.width*0.8, cv.height*0.5); 
    ctx.lineTo(cv.width, cv.height); ctx.fill();
}
function gameDrawForeground() {
    hTime++;
    if(heli.state === 'moving') {
        const dx = heli.target.tx - heli.x;
        const dy = (heli.target.ty - 100) - heli.y;
        heli.x += dx * 0.05; heli.y += dy * 0.05;
        if(Math.hypot(dx, dy) < 5) { heli.state = 'lifting'; }
    } else if(heli.state === 'lifting') {
        ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(heli.x, heli.y + 20); ctx.lineTo(heli.target.tx, heli.target.ty); ctx.stroke();
        
        let btnY = parseFloat(heli.target.btn.style.top);
        btnY -= 4;
        heli.target.btn.style.top = btnY + 'px';
        if(btnY < heli.y + 50) {
            heli.target.cb(); heli.state = 'done';
        }
    } else if(heli.state === 'idle') {
        heli.y = 100 + Math.sin(hTime * 0.1) * 15;
    }
    
    ctx.save();
    ctx.translate(heli.x, heli.y);
    // Rotor
    ctx.fillStyle = '#555'; ctx.fillRect(-60 * Math.abs(Math.sin(hTime*0.5)), -30, 120 * Math.abs(Math.sin(hTime*0.5)), 5);
    ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.ellipse(0, 0, 40, 25, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ecf0f1'; ctx.beginPath(); ctx.arc(20, -5, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c0392b'; ctx.fillRect(-60, -5, 40, 10);
    ctx.fillStyle = '#333'; ctx.fillRect(-20, 25, 40, 5);
    ctx.restore();
}

loadQ();
mainLoop();
</script>
</body>
</html>
