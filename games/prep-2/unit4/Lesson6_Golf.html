<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf - Unit 4</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }


body { background: #27ae60; }
.target-btn {
    width: 120px; height: 40px;
    background: #000;
    border-radius: 50%; border: none;
    box-shadow: inset 0 5px 10px rgba(0,0,0,0.8);
    display: flex; align-items: flex-end; padding-bottom: 50px;
}
.target-btn::after {
    content: '🚩'; position: absolute; left: 50%; top: -60px; font-size: 50px;
}

</style>
</head>
<body>

<div id="hud">
    <div>Mini Golf - Unit 4</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "Mahmoud Mokhtar is a famous Egyptian _____.", "choices": ["actor", "sculptor", "singer"], "answer": 1}, {"type": "mcq", "q": "He gained international _____ for his artworks.", "choices": ["punishment", "recognition", "money"], "answer": 1}, {"type": "mcq", "q": "The opposite of 'imagination' is _____.", "choices": ["reality", "creativity", "dream"], "answer": 0}, {"type": "mcq", "q": "A/An _____ is an object made out of stone, wood, or clay.", "choices": ["painting", "sculpture", "drawing"], "answer": 1}, {"type": "mcq", "q": "They found an old _____ of a 'Hidden Island'.", "choices": ["book", "letter", "map"], "answer": 2}, {"type": "mcq", "q": "Teamwork means to _____ with each other.", "choices": ["ignore", "fight", "collaborate"], "answer": 2}, {"type": "mcq", "q": "They packed food, water, and a _____ for the journey.", "choices": ["fridge", "compass", "television"], "answer": 1}, {"type": "mcq", "q": "Photography captures moments through a camera _____.", "choices": ["pen", "lens", "brush"], "answer": 1}, {"type": "mcq", "q": "Drawing uses pencils or _____.", "choices": ["charcoal", "water", "oil"], "answer": 0}, {"type": "mcq", "q": "The gallery held a _____ competition among artists.", "choices": ["national", "boring", "useless"], "answer": 0}, {"type": "mcq", "q": "I always include interactive _____ in my installations.", "choices": ["sounds", "elements", "words"], "answer": 1}, {"type": "mcq", "q": "The statue is so _____ that people take photos of it.", "choices": ["terrible", "stunning", "ugly"], "answer": 1}, {"type": "mcq", "q": "He walked slowly _____ he was tired.", "choices": ["so", "although", "because"], "answer": 2}, {"type": "mcq", "q": "The weather was cold, _____ we stayed at home.", "choices": ["because", "so", "but"], "answer": 1}, {"type": "mcq", "q": "_____ it rained heavily, they went out for a walk.", "choices": ["So", "Although", "Because"], "answer": 1}, {"type": "mcq", "q": "Making art requires a lot of _____ and creativity.", "choices": ["math", "imagination", "rules"], "answer": 1}, {"type": "mcq", "q": "Sami felt _____ for sharing his ideas.", "choices": ["sad", "worried", "appreciated"], "answer": 2}, {"type": "mcq", "q": "Leadership is about caring for others and helping them _____.", "choices": ["shine", "cry", "fail"], "answer": 0}, {"type": "mcq", "q": "They agreed on a rule of collaboration and _____.", "choices": ["hate", "fear", "respect"], "answer": 2}, {"type": "mcq", "q": "Every piece of art carries a _____.", "choices": ["color", "price", "message"], "answer": 2}, {"type": "mcq", "q": "She used a piece of _____ to carve a statue.", "choices": ["water", "stone", "air"], "answer": 1}, {"type": "mcq", "q": "He prepared well, _____ he won the race.", "choices": ["although", "so", "because"], "answer": 1}, {"type": "mcq", "q": "_____ his artworks are amazing, he doesn't deserve recognition. (Correct: Although)", "choices": ["Because", "So", "Although"], "answer": 2}, {"type": "mcq", "q": "Artists _____ their original works in exhibitions.", "choices": ["destroy", "showcase", "hide"], "answer": 1}, {"type": "mcq", "q": "An artwork doesn't need to be _____ to be valuable.", "choices": ["worthless", "ugly", "perfect"], "answer": 2}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

let qIdx = 0, score = 0, locked = false;
let particles = [];

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); 
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        setTimeout(() => { qIdx++; loadQ(); }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'Awesome!' : 'Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}


let gball = null;
function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.style.left = (spacing * (i + 1)) + 'px';
    btn.style.top = (window.innerHeight * 0.3) + 'px';
}
function gameOnLoadQ() { gball = null; }
function gameAnimateAction(tx, ty, isCorrect, btn, cb) {
    sndShoot();
    gball = { x: cv.width/2, y: cv.height - 100, tx, ty, cb, size: 20 };
}
function gameDrawBackground() {}
function gameDrawForeground() {
    if(gball) {
        const dx = gball.tx - gball.x;
        const dy = gball.ty - gball.y;
        gball.x += dx * 0.05;
        gball.y += dy * 0.05;
        gball.size = Math.max(5, gball.size * 0.98); // Perspective shrink
        
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(gball.x, gball.y, gball.size, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(gball.x, gball.y, gball.size, 0, Math.PI*2); ctx.stroke();
        
        if(Math.hypot(dx, dy) < 10) {
            gball.cb(); gball = null;
        }
    } else {
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cv.width/2, cv.height - 100, 20, 0, Math.PI*2); ctx.fill();
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
