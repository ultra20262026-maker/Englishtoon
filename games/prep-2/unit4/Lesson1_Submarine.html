<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submarine Torpedo - Unit 4</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }


body { background: #1abc9c; }
.target-btn {
    width: 130px; height: 130px;
    background: radial-gradient(circle, #34495e, #2c3e50);
    border: 6px dotted #e74c3c; border-radius: 50%;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

</style>
</head>
<body>

<div id="hud">
    <div>Submarine Torpedo - Unit 4</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "You can see many different _____ in a gallery.", "choices": ["hidden", "valuable", "artworks"], "answer": 2}, {"type": "mcq", "q": "Every artwork has a powerful _____.", "choices": ["sculpture", "message", "hidden"], "answer": 1}, {"type": "mcq", "q": "Artists use different _____ to create sculptures.", "choices": ["materials", "hidden", "ways"], "answer": 0}, {"type": "mcq", "q": "_____ is a very important life skill.", "choices": ["Creativity", "Paintings", "Artists"], "answer": 0}, {"type": "mcq", "q": "The opposite of 'imagination' is _____.", "choices": ["creativity", "local", "reality"], "answer": 2}, {"type": "mcq", "q": "Last week, I visited an art _____ in Zamalek.", "choices": ["theater", "gallery", "stadium"], "answer": 1}, {"type": "mcq", "q": "The gallery was filled with _____ paintings and sculptures.", "choices": ["invisible", "boring", "colorful"], "answer": 2}, {"type": "mcq", "q": "Artists showcased their _____ artworks.", "choices": ["original", "copied", "fake"], "answer": 0}, {"type": "mcq", "q": "They _____ different kinds of material like paper, clay, and metal.", "choices": ["destroyed", "cut", "mixed"], "answer": 2}, {"type": "mcq", "q": "Using different materials makes the artworks special and _____.", "choices": ["meaningful", "meaningless", "bad"], "answer": 0}, {"type": "mcq", "q": "A _____ is a 3D work of art made from clay, stone, or metal.", "choices": ["drawing", "painting", "sculpture"], "answer": 2}, {"type": "mcq", "q": "_____ is an art form using brushes and colors.", "choices": ["Photography", "Music", "Painting"], "answer": 2}, {"type": "mcq", "q": "Photography captures moments through a camera _____.", "choices": ["lens", "brush", "pencil"], "answer": 0}, {"type": "mcq", "q": "Drawing is a basic form of art using pencils or _____.", "choices": ["metal", "stone", "charcoal"], "answer": 2}, {"type": "mcq", "q": "An artwork doesn't need to be _____ to be valuable or beautiful.", "choices": ["messy", "perfect", "ugly"], "answer": 1}, {"type": "mcq", "q": "Every piece of art carries a _____.", "choices": ["bag", "message", "box"], "answer": 1}, {"type": "mcq", "q": "The artist used _____ for making this amazing statue.", "choices": ["water", "paintings", "clay"], "answer": 2}, {"type": "mcq", "q": "The gallery is filled with amazing _____.", "choices": ["colorful", "pieces", "element"], "answer": 1}, {"type": "mcq", "q": "Every artwork expresses the artist's thoughts and _____.", "choices": ["installations", "feelings", "clay"], "answer": 1}, {"type": "mcq", "q": "We should promote creativity and _____ among students.", "choices": ["artworks", "hidden", "imagination"], "answer": 2}, {"type": "mcq", "q": "She used a piece of _____ to carve a beautiful statue.", "choices": ["stone", "air", "water"], "answer": 0}, {"type": "mcq", "q": "Artists like to _____ their new works in large exhibitions.", "choices": ["ignore", "hide", "exhibit"], "answer": 2}, {"type": "mcq", "q": "The opposite of 'national' is _____.", "choices": ["local", "private", "international"], "answer": 2}, {"type": "mcq", "q": "The antonym of 'beautiful' is _____.", "choices": ["ugly", "stunning", "perfect"], "answer": 0}, {"type": "mcq", "q": "He is a famous _____; he makes statues from metal.", "choices": ["sculptor", "photographer", "painter"], "answer": 0}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

let qIdx = 0, score = 0, locked = false;
let particles = [];

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); 
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        setTimeout(() => { qIdx++; loadQ(); }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'Awesome!' : 'Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}


let torpedo = null;
let bgTime = 0;
function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.dataset.baseX = spacing * (i + 1);
    btn.dataset.baseY = window.innerHeight * 0.4;
    btn.style.left = btn.dataset.baseX + 'px';
    btn.style.top = btn.dataset.baseY + 'px';
}
function gameOnLoadQ() { torpedo = null; }
function gameAnimateAction(tx, ty, isCorrect, btn, cb) {
    sndShoot();
    torpedo = { x: cv.width/2, y: cv.height - 100, tx, ty, cb };
}
function gameDrawBackground() {
    bgTime++;
    // Float targets slightly
    if(!locked) {
        document.querySelectorAll('.target-btn').forEach((btn, i) => {
            const bx = parseFloat(btn.dataset.baseX);
            const by = parseFloat(btn.dataset.baseY);
            btn.style.top = (by + Math.sin(bgTime * 0.05 + i) * 15) + 'px';
        });
    }
    // Submarine
    ctx.save();
    ctx.translate(cv.width/2, cv.height - 50);
    ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.ellipse(0, 0, 100, 40, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e67e22'; ctx.fillRect(-20, -60, 40, 40);
    ctx.fillStyle = '#bdc3c7'; ctx.beginPath(); ctx.arc(10, -70, 10, 0, Math.PI*2); ctx.fill();
    ctx.restore();
}
function gameDrawForeground() {
    if(torpedo) {
        const dx = torpedo.tx - torpedo.x;
        const dy = torpedo.ty - torpedo.y;
        const angle = Math.atan2(dy, dx);
        torpedo.x += Math.cos(angle) * 15;
        torpedo.y += Math.sin(angle) * 15;
        
        ctx.save();
        ctx.translate(torpedo.x, torpedo.y);
        ctx.rotate(angle);
        ctx.fillStyle = '#bdc3c7'; ctx.fillRect(-15, -5, 30, 10);
        ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(15, 0, 5, -Math.PI/2, Math.PI/2); ctx.fill();
        ctx.restore();
        
        // bubbles
        createParticles(torpedo.x, torpedo.y, 'rgba(255,255,255,0.5)', 1);
        
        if(Math.hypot(dx, dy) < 15) {
            torpedo.cb(); torpedo = null;
        }
    }
}

loadQ();
mainLoop();
</script>
</body>
</html>
