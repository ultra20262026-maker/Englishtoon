<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Drop - Unit 4</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; overflow: hidden; width: 100vw; height: 100vh; background: #000; user-select: none; }

/* HUD */
#hud { position: fixed; top: 0; left: 0; right: 0; padding: 15px 30px; display: flex; justify-content: space-between; color: white; font-size: 1.5rem; font-weight: 900; z-index: 200; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; }
#score-val { color: #f1c40f; }

/* Question Panel */
#q-panel { position: fixed; top: 70px; left: 0; right: 0; display: flex; justify-content: center; z-index: 150; pointer-events: none; }
#q-text { background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.2); padding: 15px 40px; border-radius: 30px; color: white; font-size: 1.8rem; font-weight: 900; max-width: 80%; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); line-height: 1.4; }

/* Targets Container */
#targets { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 100; pointer-events: none; }
.target-btn { position: absolute; transform: translate(-50%, -50%); pointer-events: auto; cursor: pointer; border: none; font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; display: flex; justify-content: center; align-items: center; text-align: center; line-height: 1.2; padding: 10px; transition: filter 0.2s; }
.target-btn:hover { filter: brightness(1.2); }
.target-btn:disabled { cursor: not-allowed; }

/* Canvas */
canvas { display: block; position: fixed; top: 0; left: 0; z-index: 10; }

/* End Screen */
#end-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 300; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
#end-screen.show { display: flex; }
#end-screen h1 { font-size: 4rem; margin-bottom: 20px; font-family: 'Fredoka One', cursive; }
#end-screen p { font-size: 2rem; color: #f1c40f; margin-bottom: 30px; font-weight: 900; }
#end-screen button { padding: 15px 50px; background: #e74c3c; color: white; border: none; border-radius: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; font-family: 'Nunito', sans-serif; transition: transform 0.2s; }
#end-screen button:hover { transform: scale(1.1); background: #c0392b; }


body { background: #222; }
.target-btn {
    width: 100px; height: 100px;
    background: radial-gradient(circle, #f1c40f, #e67e22);
    border-radius: 50%; border: 2px solid #fff;
    box-shadow: 0 0 20px #f1c40f; color: black !important; text-shadow: none !important;
}

</style>
</head>
<body>

<div id="hud">
    <div>Spider Drop - Unit 4</div>
    <div id="q-num">Q 1/25</div>
    <div>Score: <span id="score-val">0</span></div>
</div>

<div id="q-panel"><div id="q-text"></div></div>

<div id="targets"></div>
<canvas id="cv"></canvas>

<div id="end-screen">
    <h1 id="end-title">Game Over!</h1>
    <p id="end-score">Score: 0</p>
    <button onclick="location.reload()">Play Again</button>
</div>

<script>
const QS = [{"type": "mcq", "q": "We should _____ each other's thoughts although we are different.", "choices": ["report", "respect", "ignore"], "answer": 1}, {"type": "mcq", "q": "Malik used his _____ to draw maps of the island.", "choices": ["responsibility", "creativity", "respect"], "answer": 1}, {"type": "mcq", "q": "Leadership is about caring for others and helping them _____.", "choices": ["annoy", "shine", "fail"], "answer": 1}, {"type": "mcq", "q": "To come up with new ideas means _____.", "choices": ["collaboration", "museum", "creativity"], "answer": 2}, {"type": "mcq", "q": "Every piece of any artwork should be _____.", "choices": ["imagination", "original", "boring"], "answer": 1}, {"type": "mcq", "q": "They packed what they would need for the _____.", "choices": ["journey", "hospital", "school"], "answer": 0}, {"type": "mcq", "q": "A compass is used to find _____.", "choices": ["food", "water", "directions"], "answer": 2}, {"type": "mcq", "q": "The friends showed that _____ makes adventures more fun.", "choices": ["sadness", "laziness", "creativity"], "answer": 2}, {"type": "mcq", "q": "No one is the _____ in their group; they all collaborate.", "choices": ["friend", "boss", "helper"], "answer": 1}, {"type": "mcq", "q": "Working together on a ship requires _____.", "choices": ["teamwork", "fighting", "sleeping"], "answer": 0}, {"type": "mcq", "q": "They respected each other's _____.", "choices": ["clothes", "ideas", "shoes"], "answer": 1}, {"type": "mcq", "q": "Sami's ideas were _____ by the rest of the group.", "choices": ["ignored", "laughed at", "appreciated"], "answer": 2}, {"type": "mcq", "q": "The 'Hidden Island' was a _____ waiting to be discovered.", "choices": ["mystery", "boring place", "known place"], "answer": 0}, {"type": "mcq", "q": "They wrote down their plans in their _____.", "choices": ["notebooks", "water bottles", "compasses"], "answer": 0}, {"type": "mcq", "q": "The group realized that their _____ made them stronger.", "choices": ["weaknesses", "fights", "differences"], "answer": 2}, {"type": "mcq", "q": "True friends _____ each other in difficult times.", "choices": ["support", "leave", "ignore"], "answer": 0}, {"type": "mcq", "q": "You can see many different artworks in a _____.", "choices": ["bank", "hospital", "gallery"], "answer": 2}, {"type": "mcq", "q": "When you collaborate, you work _____.", "choices": ["alone", "against each other", "together"], "answer": 2}, {"type": "mcq", "q": "The map showed the way to the _____ island.", "choices": ["hidden", "famous", "crowded"], "answer": 0}, {"type": "mcq", "q": "Art doesn't have to be _____ to be valuable.", "choices": ["original", "ugly", "perfect"], "answer": 2}, {"type": "mcq", "q": "Exploring new places requires a lot of _____.", "choices": ["courage", "fear", "laziness"], "answer": 0}, {"type": "mcq", "q": "Artists use different _____ like paper, clay, and metal.", "choices": ["food", "drinks", "materials"], "answer": 2}, {"type": "mcq", "q": "I didn't go to school _____ I was sick.", "choices": ["so", "because", "but"], "answer": 1}, {"type": "mcq", "q": "He is very rich, _____ he is not happy.", "choices": ["but", "so", "because"], "answer": 0}, {"type": "mcq", "q": "_____ she studied hard, she failed the exam.", "choices": ["Because", "So", "Although"], "answer": 2}];
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
cv.width = window.innerWidth; cv.height = window.innerHeight;
window.addEventListener('resize', () => { cv.width = window.innerWidth; cv.height = window.innerHeight; });

const AC = new (window.AudioContext||window.webkitAudioContext)();
function tone(f,d,t='sine',v=0.4){
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
}
function sndCorrect(){ tone(523,.1); setTimeout(()=>tone(784,.3),100); }
function sndWrong(){ tone(150,.6,'sawtooth'); setTimeout(()=>tone(100,.6,'sawtooth'),150); }
function sndShoot(){ tone(300,.1,'square',0.1); }

let qIdx = 0, score = 0, locked = false;
let particles = [];

function loadQ() {
    if(qIdx >= QS.length) { showEndScreen(); return; }
    const q = QS[qIdx];
    locked = false;
    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-num').textContent = `Q ${qIdx+1}/${QS.length}`;
    
    const container = document.getElementById('targets');
    container.innerHTML = '';
    
    let choices = [...q.choices];
    while(choices.length < 3) choices.push('...');
    choices = choices.slice(0, 3);
    const correctText = q.choices[q.answer] || q.choices[0];
    
    const labeled = choices.map(c => ({ text: c, isCorrect: c === correctText }));
    labeled.sort(() => Math.random() - 0.5); 
    
    labeled.forEach((item, i) => {
        if(!item.text) return;
        const btn = document.createElement('button');
        btn.className = 'target-btn';
        btn.textContent = item.text;
        btn.onclick = () => handleChoice(btn, item.isCorrect, i);
        container.appendChild(btn);
        gameInitTarget(btn, i, labeled.length);
    });
    
    if(typeof gameOnLoadQ === 'function') gameOnLoadQ();
}

function handleChoice(btn, isCorrect, index) {
    if(locked) return;
    locked = true;
    document.querySelectorAll('.target-btn').forEach(b => b.disabled = true);
    
    const rect = btn.getBoundingClientRect();
    const tx = rect.left + rect.width / 2;
    const ty = rect.top + rect.height / 2;
    
    gameAnimateAction(tx, ty, isCorrect, btn, () => {
        if(isCorrect) {
            score += 100;
            document.getElementById('score-val').textContent = score;
            sndCorrect();
            createParticles(tx, ty, '#2ecc71', 30);
            btn.style.transform += ' scale(0)';
        } else {
            sndWrong();
            createParticles(tx, ty, '#e74c3c', 30);
            btn.style.transform += ' scale(0)';
            document.querySelectorAll('.target-btn').forEach(b => {
                if(b !== btn) b.style.opacity = '0.3';
            });
        }
        setTimeout(() => { qIdx++; loadQ(); }, isCorrect ? 1000 : 1500);
    });
}

function createParticles(x, y, color, count) {
    for(let i=0; i<count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 8 + 2;
        particles.push({
            x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            life: 1, color, size: Math.random() * 5 + 3
        });
    }
}

function updateAndDrawParticles() {
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.2; 
        p.life -= 0.02;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
    });
}

function showEndScreen() {
    document.getElementById('end-screen').classList.add('show');
    document.getElementById('end-title').textContent = score >= (QS.length*70) ? 'Awesome!' : 'Good Effort!';
    document.getElementById('end-score').textContent = `Final Score: ${score}`;
}

function mainLoop() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    gameDrawBackground();
    gameDrawForeground();
    updateAndDrawParticles();
    requestAnimationFrame(mainLoop);
}


let spider = { x: window.innerWidth/2, y: 0, state: 'idle', target: null };
let spTime = 0;
function gameInitTarget(btn, i, total) {
    const spacing = window.innerWidth / (total + 1);
    btn.dataset.baseX = spacing * (i + 1);
    btn.dataset.baseY = window.innerHeight * 0.7;
    btn.style.left = btn.dataset.baseX + 'px';
    btn.style.top = btn.dataset.baseY + 'px';
}
function gameOnLoadQ() { 
    spider.state = 'idle'; spider.target = null;
    spider.x = window.innerWidth/2; spider.y = 50;
}
function gameAnimateAction(tx, ty, isCorrect, btn, cb) {
    sndShoot();
    spider.target = { tx, ty, cb, btn };
    spider.state = 'dropping';
}
function gameDrawBackground() {
    spTime++;
    if(!locked) {
        document.querySelectorAll('.target-btn').forEach((btn, i) => {
            const bx = parseFloat(btn.dataset.baseX);
            const by = parseFloat(btn.dataset.baseY);
            btn.style.left = (bx + Math.sin(spTime * 0.1 + i) * 10) + 'px';
            btn.style.top = (by + Math.cos(spTime * 0.1 + i) * 10) + 'px';
        });
    }
}
function gameDrawForeground() {
    if(spider.state === 'dropping') {
        spider.x += (spider.target.tx - spider.x) * 0.1;
        spider.y += 15;
        if(spider.y >= spider.target.ty) { spider.state = 'pulling'; }
    } else if(spider.state === 'pulling') {
        spider.y -= 10;
        let btnY = parseFloat(spider.target.btn.style.top);
        spider.target.btn.style.top = (btnY - 10) + 'px';
        spider.target.btn.style.left = spider.x + 'px';
        if(spider.y <= 50) {
            spider.target.cb(); spider.state = 'done';
        }
    } else if(spider.state === 'idle') {
        spider.y = 50 + Math.sin(spTime * 0.05) * 10;
    }
    
    // Thread
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(spider.x, 0); ctx.lineTo(spider.x, spider.y); ctx.stroke();
    
    // Draw Spider
    ctx.save();
    ctx.translate(spider.x, spider.y);
    ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-5, 5, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, 5, 3, 0, Math.PI*2); ctx.fill();
    // Legs
    ctx.strokeStyle = '#8e44ad'; ctx.lineWidth = 4;
    for(let i=0; i<4; i++) {
        ctx.beginPath(); ctx.moveTo(-15, 0); ctx.lineTo(-30, -10 + i*10); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(30, -10 + i*10); ctx.stroke();
    }
    ctx.restore();
}

loadQ();
mainLoop();
</script>
</body>
</html>
