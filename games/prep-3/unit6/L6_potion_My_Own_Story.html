const QS = [{"q_num": 876, "q": "You must always _____ in yourself if you want to achieve success.", "choices": ["forget", "believe", "doubt", "ignore"], "answer": 1}, {"q_num": 877, "q": "We should show _____ to teachers, parents, and everyone in our society.", "choices": ["respect", "hate", "noise", "anger"], "answer": 0}, {"q_num": 878, "q": "With courage and _____, the team finished the race despite difficulties.", "choices": ["fear", "determination", "weakness", "laziness"], "answer": 1}, {"q_num": 879, "q": "The students _____ working on the project even after school ended.", "choices": ["failed", "continued", "stopped", "forgot"], "answer": 1}, {"q_num": 880, "q": "To form the word 'ambition', we add the suffix _____ to 'ambitious'.", "choices": ["-ion", "-ity", "-ment", "-ness"], "answer": 0}, {"q_num": 881, "q": "The antonym of the word 'leader' is _____.", "choices": ["failure", "follower", "anger", "important"], "answer": 1}, {"q_num": 882, "q": "To form the word 'leader', we add the suffix _____ to 'lead'.", "choices": ["-er", "-ion", "-ness", "-able"], "answer": 0}, {"q_num": 883, "q": "_____ means the person who commands a group, organization, or country.", "choices": ["Leader", "slow", "lazy", "fast"], "answer": 0}, {"q_num": 884, "q": "The synonym of the word 'ambition' is _____.", "choices": ["anger", "sad", "goal", "knowledge"], "answer": 2}, {"q_num": 885, "q": "_____ means a strong desire to do or to achieve something.", "choices": ["knowledge", "fast", "start", "Ambition"], "answer": 3}, {"q_num": 886, "q": "The synonym of the word 'leader' is _____.", "choices": ["smart", "failure", "boss", "slow"], "answer": 2}, {"q_num": 887, "q": "The antonym of the word 'debate' is _____.", "choices": ["slow", "knowledge", "agreement", "stop"], "answer": 2}, {"q_num": 888, "q": "The synonym of the word 'moral' is _____.", "choices": ["destroy", "lesson", "stop", "fear"], "answer": 1}, {"q_num": 889, "q": "The synonym of the word 'ambition' is _____.", "choices": ["smart", "goal", "fast", "destroy"], "answer": 1}, {"q_num": 890, "q": "The antonym of the word 'empathy' is _____.", "choices": ["smart", "important", "cruelty", "lazy"], "answer": 2}, {"q_num": 891, "q": "We add the prefix _____ to 'moral' to give the opposite or related meaning.", "choices": ["im-", "ir-", "il-", "dis-"], "answer": 0}, {"q_num": 892, "q": "The antonym of the word 'leader' is _____.", "choices": ["success", "start", "lazy", "follower"], "answer": 3}, {"q_num": 893, "q": "The antonym of the word 'moral' is _____.", "choices": ["sad", "fear", "stop", "immorality"], "answer": 3}, {"q_num": 894, "q": "To form the word 'confident', we add the suffix _____ to 'confide'.", "choices": ["-ent", "-ful", "-ness", "-ity"], "answer": 0}, {"q_num": 895, "q": "To form the word 'confident', we add the suffix _____ to 'confide'.", "choices": ["-ful", "-ly", "-ive", "-ent"], "answer": 3}, {"q_num": 896, "q": "To form the word 'confident', we add the suffix _____ to 'confide'.", "choices": ["-ion", "-ent", "-ly", "-ness"], "answer": 1}, {"q_num": 897, "q": "The antonym of the word 'leader' is _____.", "choices": ["destroy", "follower", "start", "stop"], "answer": 1}, {"q_num": 898, "q": "_____ means firmness of purpose.", "choices": ["Determination", "anger", "sad", "courage"], "answer": 0}, {"q_num": 899, "q": "The synonym of the word 'determination' is _____.", "choices": ["fast", "stop", "resolution", "smart"], "answer": 2}, {"q_num": 900, "q": "_____ means firmness of purpose.", "choices": ["knowledge", "sad", "Determination", "build"], "answer": 2}];
let qi=0,score=0,locked=false,parts=[],animId=null;
let cv,ctx,W,H,AC;


let pot=null;
function placeTarget(btn,i,n){const s=W/(n+1);btn.style.left=s*(i+1)+'px';btn.style.top=H*0.45+'px';}
function onLoadQ(){pot=null;}
function doShoot(tx,ty,ok,btn,cb){SS();pot={tx,ty,cb,t:0};}
function drawBG(){ctx.fillStyle='#240046';ctx.fillRect(0,0,W,H);}
function drawFG(){
  if(pot){pot.t++;burst(pot.tx,pot.ty,'#e0aaff',8);
    if(pot.t>25){pot.cb();pot=null;}
  }
}

function SS(){if(AC.state==='suspended')AC.resume();const o=AC.createOscillator(),gn=AC.createGain();o.connect(gn);gn.connect(AC.destination);o.type='square';o.frequency.value=400;gn.gain.setValueAtTime(0.15,AC.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.05);o.start();o.stop(AC.currentTime+0.05);}
function tone(f,d,t,v){if(!AC)return;if(AC.state==='suspended')AC.resume();const o=AC.createOscillator(),gn=AC.createGain();o.connect(gn);gn.connect(AC.destination);o.type=t||'sine';o.frequency.value=f;gn.gain.setValueAtTime(v||0.4,AC.currentTime);gn.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.start();o.stop(AC.currentTime+d);}
function ok_snd(){tone(523,.08);setTimeout(()=>tone(659,.08),90);setTimeout(()=>tone(784,.3),180);}
function fail_snd(){tone(200,.2,'sawtooth');setTimeout(()=>tone(150,.4,'sawtooth'),220);}
function burst(x,y,color,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*9+2;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,sz:Math.random()*5+2});};}
function drawParts(){parts=parts.filter(p=>p.life>0);parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.25;p.life-=0.018;ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});}

function loadQ(){
  if(qi>=QS.length){endGame();return;}
  const q=QS[qi];locked=false;
  document.getElementById('qt').textContent=q.q;
  document.getElementById('qn').textContent='Q '+(qi+1)+'/'+QS.length;
  document.getElementById('pb').style.width=(qi/QS.length*100)+'%';
  const cont=document.getElementById('tg');cont.innerHTML='';
  let ch=[...q.choices];while(ch.length<4)ch.push('?');ch=ch.slice(0,4);
  const correctText=q.choices[q.answer]||q.choices[0];
  const lab=ch.map(c=>({t:c,ok:c===correctText}));lab.sort(()=>Math.random()-0.5);
  lab.forEach((item,i)=>{
    const btn=document.createElement('button');btn.className='tbtn';btn.textContent=item.t;
    btn.onclick=()=>pick(btn,item.ok,i);cont.appendChild(btn);placeTarget(btn,i,lab.length);
  });
  if(typeof onLoadQ==='function')onLoadQ();
}

function pick(btn,good,i){
  if(locked)return;locked=true;
  document.querySelectorAll('.tbtn').forEach(b=>b.disabled=true);
  const r=btn.getBoundingClientRect();const tx=r.left+r.width/2,ty=r.top+r.height/2;
  doShoot(tx,ty,good,btn,()=>{
    if(good){score+=100;document.getElementById('sc').textContent=score;ok_snd();burst(tx,ty,'#2ecc71',35);btn.style.transition='all 0.3s';btn.style.transform+=' scale(0)';btn.style.opacity='0';}
    else{fail_snd();burst(tx,ty,'#e74c3c',25);btn.style.filter='brightness(0.15)';document.querySelectorAll('.tbtn').forEach(b=>{if(b!==btn)b.style.opacity='0.15';});}
    setTimeout(()=>{qi++;loadQ();},good?900:1400);
  });
}

function endGame(){
  document.getElementById('pb').style.width='100%';
  const ed=document.getElementById('end');ed.style.display='flex';
  document.getElementById('eh').textContent=score>=(QS.length*80)?'Awesome!':'Good Job!';
  document.getElementById('es').textContent='Score: '+score+' / '+(QS.length*100);
}

function loop(){ctx.clearRect(0,0,W,H);drawBG();drawFG();drawParts();animId=requestAnimationFrame(loop);}

window.onload = function(){
  cv=document.getElementById('cv');ctx=cv.getContext('2d');
  W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;
  AC=new(window.AudioContext||window.webkitAudioContext)();
  loadQ();loop();
};

window.onresize = function(){
  if(cv){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
};
</script>
</body>
</html>
