<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Sea Fishing Hunter 🎣 - prep-1 Unit 5</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { background: #0a192f; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  
  /* Standardized Full-Scale HUD */
  .g-hud { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: rgba(0,0,0,0.7); backdrop-filter: blur(12px); border-bottom: 2px solid #00d2d3; z-index: 10; height: 60px; }
  .g-title { font-size: 1.3rem; font-weight: bold; color: #00d2d3; text-shadow: 0 0 12px #00d2d355; }
  .g-qnum { font-size: 1.1rem; color: #ecf0f1; background: rgba(255,255,255,0.12); padding: 6px 16px; border-radius: 20px; font-weight: 600; }
  .g-score { font-size: 1.3rem; font-weight: bold; color: #2ecc71; }
  
  /* Standardized Full-Scale Question Panel (1.8rem font size) */
  .g-qpanel { background: rgba(0, 0, 0, 0.78); padding: 18px 24px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.12); z-index: 10; min-height: 90px; display: flex; align-items: center; justify-content: center; }
  #qt { font-size: 1.8rem !important; color: #ffffff !important; font-weight: 700 !important; line-height: 1.4 !important; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
  
  /* Standardized Target Choice Buttons */
  .g-targets { position: absolute; width: 100%; top: 40%; display: flex; justify-content: space-around; padding: 0 24px; z-index: 8; pointer-events: none; }
  .tbtn { pointer-events: auto; background: linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08)); border: 2.5px solid #00d2d3; color: #fff; padding: 16px 28px !important; font-size: 1.3rem !important; font-weight: bold !important; border-radius: 18px; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 140px; text-align: center; }
  .tbtn:hover { transform: translateY(-4px) scale(1.06); background: #00d2d3; color: #111; box-shadow: 0 12px 30px #00d2d3aa; }
  .tbtn.correct { background: #2ecc71 !important; border-color: #27ae60 !important; color: #fff !important; transform: scale(1.12); box-shadow: 0 0 35px #2ecc71; }
  .tbtn.wrong { background: #e74c3c !important; border-color: #c0392b !important; color: #fff !important; opacity: 0.55; transform: scale(0.94); }

  .g-canvas { flex: 1; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
  .g-pbar { height: 6px; background: #00d2d3; width: 0%; transition: width 0.3s ease; position: absolute; bottom: 0; left: 0; z-index: 10; box-shadow: 0 0 10px #00d2d3; }

  .g-end { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94); backdrop-filter: blur(18px); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; }
  .g-end h1 { font-size: 3.2rem; color: #00d2d3; text-shadow: 0 0 20px #00d2d3; }
  .g-end p { font-size: 2rem; color: #2ecc71; font-weight: bold; }
  .g-end button { padding: 16px 40px; font-size: 1.4rem; font-weight: bold; background: #00d2d3; border: none; color: #111; border-radius: 35px; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 25px #00d2d366; }
  .g-end button:hover { transform: scale(1.08); box-shadow: 0 0 35px #00d2d3; }
</style>
</head>
<body>

<div class="g-hud" id="hud">
  <div class="g-title">Deep Sea Fishing Hunter 🎣</div>
  <div id="qn" class="g-qnum">Q 1/5</div>
  <div class="g-score">Score: <span id="sc">0</span></div>
</div>

<div class="g-qpanel"><div id="qt">Loading...</div></div>
<div id="tg" class="g-targets"></div>
<canvas id="cv" class="g-canvas"></canvas>
<div id="pb" class="g-pbar"></div>

<div id="end" class="g-end">
  <h1 id="eh">Awesome! 🎉</h1>
  <p id="es">Score: 0</p>
  <button onclick="location.reload()">Play Again 🔄</button>
</div>

<script>
const QS = [{"q_num": 21, "q": "We use _____ to listen to musi", "choices": ["a) keyboards", "webcams", "headphones"], "answer": 0}, {"q_num": 22, "q": "My favorite _____ has lots of useful information.", "choices": ["radio", "website", "TV"], "answer": 0}, {"q_num": 23, "q": "A _____ produces sound from a computer.", "choices": ["speaker", "keyboard", "printer"], "answer": 0}, {"q_num": 24, "q": "Can you _____ me of the deadline of the interview?", "choices": ["forget", "remind", "remember"], "answer": 0}, {"q_num": 25, "q": "Something _____ means using computer technology.", "choices": ["manual", "digital", "natural"], "answer": 0}, {"q_num": 26, "q": "He uses his tablet for _____.", "choices": ["playing outdoors", "eating", "homework"], "answer": 0}, {"q_num": 27, "q": "I use a darker _____ to protect my eyes.", "choices": ["chair", "setting", "table"], "answer": 0}, {"q_num": 28, "q": "We need to _____ the computer in science class.", "choices": ["throw", "break", "use"], "answer": 0}, {"q_num": 29, "q": "Digital learning has become a _____ part of modern education.", "choices": ["bad", "key", "sad"], "answer": 0}, {"q_num": 30, "q": "Online learning needs focus and _____.", "choices": ["laziness", "fear", "motivation"], "answer": 0}];
let qi=0, score=0, locked=false, parts=[], animId=null, tAngle=0;
let cv, ctx, W, H, AC;
let gameEntities = [];

window.addEventListener('load', () => {
  cv = document.getElementById('cv'); ctx = cv.getContext('2d');
  resize(); window.addEventListener('resize', resize);
  AC = new (window.AudioContext || window.webkitAudioContext)();
  loadQ(); loop();
});

function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }

function tone(f,d,t,v) {
  if(!AC) return; if(AC.state==='suspended') AC.resume();
  const o=AC.createOscillator(), gn=AC.createGain(); o.connect(gn); gn.connect(AC.destination);
  o.type=t||'sine'; o.frequency.value=f; gn.gain.setValueAtTime(v||0.3, AC.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+d); o.start(); o.stop(AC.currentTime+d);
}

/* Real Crowd Applause Synth + Winning Chime */
function playApplauseSnd() {
  if(!AC) return; if(AC.state==='suspended') AC.resume();
  // Winning Chime
  tone(523.25, 0.1, 'sine', 0.4);
  setTimeout(()=> tone(659.25, 0.1, 'sine', 0.4), 90);
  setTimeout(()=> tone(783.99, 0.12, 'sine', 0.4), 180);
  setTimeout(()=> tone(1046.50, 0.35, 'triangle', 0.5), 270);

  // Crowd Applause Clapping Noise Bursts
  for(let i=0; i<35; i++) {
    const delay = Math.random() * 0.7;
    const dur = 0.04 + Math.random() * 0.05;
    const freq = 1200 + Math.random() * 1800;
    setTimeout(() => {
      try {
        const bufferSize = AC.sampleRate * dur;
        const buffer = AC.createBuffer(1, bufferSize, AC.sampleRate);
        const data = buffer.getChannelData(0);
        for (let j = 0; j < bufferSize; j++) data[j] = Math.random() * 2 - 1;
        const noise = AC.createBufferSource(); noise.buffer = buffer;
        const filter = AC.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = 3;
        const gain = AC.createGain();
        gain.gain.setValueAtTime(0.18 + Math.random()*0.15, AC.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
        noise.connect(filter); filter.connect(gain); gain.connect(AC.destination);
        noise.start();
      } catch(e) {}
    }, delay * 1000);
  }
}

function fail_snd() { tone(200,.2,'sawtooth'); setTimeout(()=>tone(150,.35,'sawtooth'),200); }

function burst(x,y,color,n=35) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=Math.random()*9+2;
    parts.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color, sz:Math.random()*6+3});
  }
}

/* ---------------- Real Canvas Animations for the 5 Game Engines ---------------- */

function drawFishingEngine() {
  // Water Gradient Background & Waves
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#0a192f'); grad.addColorStop(0.3, '#0984e3'); grad.addColorStop(1, '#001e3d');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  tAngle += 0.03;
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  for(let x=0; x<W; x+=20) {
    const y = 140 + Math.sin(x*0.02 + tAngle)*10;
    if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

  // Boat at top center
  ctx.fillStyle = '#d35400';
  ctx.beginPath(); ctx.arc(W/2, 130, 45, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#ecf0f1'; ctx.font = '24px sans-serif'; ctx.fillText('🎣', W/2 - 12, 125);
  
  // Fishing Line down to choices
  ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2, 130); ctx.lineTo(W/2, H*0.4); ctx.stroke();
}

function drawCannonEngine() {
  // Sky Background & Stars
  ctx.fillStyle = '#141e30'; ctx.fillRect(0,0,W,H);

  // Cannon Base & Barrel at bottom
  ctx.fillStyle = '#2c3e50'; ctx.beginPath(); ctx.arc(W/2, H-20, 50, Math.PI, 0); ctx.fill();
  ctx.save(); ctx.translate(W/2, H-20); ctx.rotate(-Math.PI/2);
  ctx.fillStyle = '#7f8c8d'; ctx.fillRect(-15, 0, 30, 70);
  ctx.restore();
}

function drawBalloonEngine() {
  // Cloud Sky Background
  ctx.fillStyle = '#1b1947'; ctx.fillRect(0,0,W,H);

  tAngle += 0.02;
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.beginPath(); ctx.arc(W*0.2, H*0.3 + Math.sin(tAngle)*15, 90, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*0.8, H*0.25 + Math.cos(tAngle)*15, 110, 0, Math.PI*2); ctx.fill();
}

function drawSpaceEngine() {
  // Deep Space Starfield
  ctx.fillStyle = '#0b0c10'; ctx.fillRect(0,0,W,H);

  tAngle += 0.05;
  ctx.fillStyle = '#45a29e';
  ctx.beginPath(); ctx.arc(W/2, H - 70, 25, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#66fcf1'; ctx.fillText('🚀', W/2 - 14, H - 62);
}

function drawArcheryEngine() {
  // Archery Field
  ctx.fillStyle = '#1b2a47'; ctx.fillRect(0,0,W,H);

  // Wooden Archery Bow at bottom
  ctx.strokeStyle = '#e67e22'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(W/2, H - 10, 80, Math.PI*1.15, Math.PI*1.85); ctx.stroke();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2 - 70, H - 25); ctx.lineTo(W/2 + 70, H - 25); ctx.stroke();
}

function loop() {
  ctx.clearRect(0,0,W,H);

  if ('fishing' === 'fishing') drawFishingEngine();
  else if ('fishing' === 'cannon') drawCannonEngine();
  else if ('fishing' === 'balloon') drawBalloonEngine();
  else if ('fishing' === 'space') drawSpaceEngine();
  else if ('fishing' === 'archery') drawArcheryEngine();
  else drawBalloonEngine();

  // Burst Particles
  parts = parts.filter(p=>p.life>0);
  parts.forEach(p=> {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life-=0.022;
    ctx.globalAlpha=Math.max(0, p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  });

  animId = requestAnimationFrame(loop);
}

function loadQ() {
  if(qi >= QS.length) { endGame(); return; }
  const q = QS[qi]; locked = false;
  document.getElementById('qt').textContent = q.q;
  document.getElementById('qn').textContent = 'Q ' + (qi+1) + '/' + QS.length;
  document.getElementById('pb').style.width = (qi/QS.length*100) + '%';
  const cont = document.getElementById('tg'); cont.innerHTML = '';
  const correctText = q.choices[q.answer] || q.choices[0];
  let ch = [...q.choices];
  const lab = ch.map(c => ({ t: c, ok: c === correctText }));
  lab.sort(() => Math.random() - 0.5);
  lab.forEach((item) => {
    const btn = document.createElement('button'); btn.className = 'tbtn';
    btn.textContent = item.t; btn.onclick = () => pick(btn, item.ok);
    cont.appendChild(btn);
  });
}

function pick(btn, good) {
  if(locked) return; locked = true;
  const rect = btn.getBoundingClientRect();
  if(good) {
    btn.classList.add('correct'); playApplauseSnd(); burst(rect.left+rect.width/2, rect.top+rect.height/2, '#2ecc71', 45);
    score += 10; document.getElementById('sc').textContent = score;
  } else {
    btn.classList.add('wrong'); fail_snd(); burst(rect.left+rect.width/2, rect.top+rect.height/2, '#e74c3c', 25);
    Array.from(document.getElementById('tg').children).forEach(b => {
      if(b.textContent === QS[qi].choices[QS[qi].answer]) b.classList.add('correct');
    });
  }
  setTimeout(() => { qi++; loadQ(); }, 1600);
}

function endGame() {
  document.getElementById('end').style.display = 'flex';
  document.getElementById('es').textContent = 'Final Score: ' + score + ' / ' + (QS.length*10);
}
</script>
</body>
</html>
