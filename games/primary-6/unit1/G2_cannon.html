<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannon Parachute Siege 💣 - primary-6 Unit 1</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  body { background: #0f172a; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
  
  /* Standardized Full-Scale HUD */
  .g-hud { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); border-bottom: 2px solid #f39c12; z-index: 10; height: 60px; }
  .g-title { font-size: 1.3rem; font-weight: bold; color: #f39c12; text-shadow: 0 0 12px #f39c1255; }
  .g-qnum { font-size: 1.1rem; color: #ecf0f1; background: rgba(255,255,255,0.12); padding: 6px 16px; border-radius: 20px; font-weight: 600; }
  .g-score { font-size: 1.3rem; font-weight: bold; color: #2ecc71; }
  
  /* Standardized Full-Scale Question Panel (1.8rem font size) */
  .g-qpanel { background: rgba(0, 0, 0, 0.85); padding: 18px 24px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.12); z-index: 10; min-height: 90px; display: flex; align-items: center; justify-content: center; }
  #qt { font-size: 1.8rem !important; color: #ffffff !important; font-weight: 700 !important; line-height: 1.4 !important; text-shadow: 0 2px 8px rgba(0,0,0,0.8); }
  
  /* Standardized Choice Buttons overlaying canvas targets */
  .g-targets { position: absolute; width: 100%; top: 40%; display: flex; justify-content: space-around; padding: 0 24px; z-index: 8; pointer-events: none; }
  .tbtn { pointer-events: auto; background: linear-gradient(135deg, rgba(255,255,255,0.24), rgba(255,255,255,0.08)); border: 2.5px solid #f39c12; color: #fff; padding: 16px 28px !important; font-size: 1.3rem !important; font-weight: bold !important; border-radius: 20px; cursor: pointer; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(12px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 140px; text-align: center; }
  .tbtn:hover { transform: translateY(-4px) scale(1.06); background: #f39c12; color: #111; box-shadow: 0 12px 30px #f39c12aa; }
  .tbtn.correct { background: #2ecc71 !important; border-color: #27ae60 !important; color: #fff !important; transform: scale(1.12); box-shadow: 0 0 35px #2ecc71; }
  .tbtn.wrong { background: #e74c3c !important; border-color: #c0392b !important; color: #fff !important; opacity: 0.55; transform: scale(0.94); }

  .g-canvas { flex: 1; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
  .g-pbar { height: 6px; background: #f39c12; width: 0%; transition: width 0.3s ease; position: absolute; bottom: 0; left: 0; z-index: 10; box-shadow: 0 0 10px #f39c12; }

  .g-end { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.94); backdrop-filter: blur(18px); z-index: 100; flex-direction: column; align-items: center; justify-content: center; gap: 20px; text-align: center; }
  .g-end h1 { font-size: 3.2rem; color: #f39c12; text-shadow: 0 0 20px #f39c12; }
  .g-end p { font-size: 2rem; color: #2ecc71; font-weight: bold; }
  .g-end button { padding: 16px 40px; font-size: 1.4rem; font-weight: bold; background: #f39c12; border: none; color: #111; border-radius: 35px; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 25px #f39c1266; }
  .g-end button:hover { transform: scale(1.08); box-shadow: 0 0 35px #f39c12; }
</style>
</head>
<body>

<div class="g-hud" id="hud">
  <div class="g-title">Cannon Parachute Siege 💣</div>
  <div id="qn" class="g-qnum">Q 1/5</div>
  <div class="g-score">Score: <span id="sc">0</span></div>
</div>

<div class="g-qpanel"><div id="qt">Loading...</div></div>
<div id="tg" class="g-targets"></div>
<canvas id="cv" class="g-canvas"></canvas>
<div id="pb" class="g-pbar"></div>

<div id="end" class="g-end">
  <h1 id="eh">Awesome! 🎉</h1>
  <p id="es">Score: 0</p>
  <button onclick="location.reload()">Play Again 🔄</button>
</div>

<script>
const QS = [{"q_num": 1, "q": "You _____ not eat unhealthy foo", "choices": ["a) do", "are", "does"], "answer": 0}, {"q_num": 2, "q": "He usually _____ stories at night.", "choices": ["read", "reading", "reads"], "answer": 0}, {"q_num": 3, "q": "She _____ to school every day.", "choices": ["walking", "walk", "walks"], "answer": 0}, {"q_num": 4, "q": "The nature in Ras Mohamed National Park is _____.", "choices": ["boring", "bad", "amazing"], "answer": 0}, {"q_num": 5, "q": "Ahmed sometimes _____ the floor.", "choices": ["sweeping", "sweeps", "sweep"], "answer": 0}, {"q_num": 6, "q": "_____ Asmaa visit the museum?", "choices": ["Does", "Do", "Is"], "answer": 0}, {"q_num": 7, "q": "_____ Ahmed visit the museum?", "choices": ["Is", "Does", "Do"], "answer": 0}, {"q_num": 8, "q": "Mona _____ to school every day.", "choices": ["walks", "walking", "walk"], "answer": 0}, {"q_num": 9, "q": "Asmaa _____ not play tennis.", "choices": ["is", "do", "does"], "answer": 0}, {"q_num": 10, "q": "My friends _____ to the club on Fridays.", "choices": ["going", "go", "goes"], "answer": 0}];
let qi=0, score=0, locked=false, parts=[], animId=null, time=0;
let cv, ctx, W, H, AC;
let hookY = 140, hookTargetY = 140, isHooking = false;
let mouseX = 0, mouseY = 0;

window.addEventListener('load', () => {
  cv = document.getElementById('cv'); ctx = cv.getContext('2d');
  resize(); window.addEventListener('resize', resize);
  cv.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
  AC = new (window.AudioContext || window.webkitAudioContext)();
  loadQ(); loop();
});

function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; mouseX = W/2; }

function tone(f,d,t,v) {
  if(!AC) return; if(AC.state==='suspended') AC.resume();
  const o=AC.createOscillator(), gn=AC.createGain(); o.connect(gn); gn.connect(AC.destination);
  o.type=t||'sine'; o.frequency.value=f; gn.gain.setValueAtTime(v||0.3, AC.currentTime);
  gn.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+d); o.start(); o.stop(AC.currentTime+d);
}

/* Real Crowd Applause Synth + Winning Melody Chime */
function playApplauseSnd() {
  if(!AC) return; if(AC.state==='suspended') AC.resume();
  tone(523.25, 0.1, 'sine', 0.4);
  setTimeout(()=> tone(659.25, 0.1, 'sine', 0.4), 90);
  setTimeout(()=> tone(783.99, 0.12, 'sine', 0.4), 180);
  setTimeout(()=> tone(1046.50, 0.35, 'triangle', 0.5), 270);

  for(let i=0; i<35; i++) {
    const delay = Math.random() * 0.7;
    const dur = 0.04 + Math.random() * 0.05;
    const freq = 1200 + Math.random() * 1800;
    setTimeout(() => {
      try {
        const bufferSize = AC.sampleRate * dur;
        const buffer = AC.createBuffer(1, bufferSize, AC.sampleRate);
        const data = buffer.getChannelData(0);
        for (let j = 0; j < bufferSize; j++) data[j] = Math.random() * 2 - 1;
        const noise = AC.createBufferSource(); noise.buffer = buffer;
        const filter = AC.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = freq; filter.Q.value = 3;
        const gain = AC.createGain();
        gain.gain.setValueAtTime(0.18 + Math.random()*0.15, AC.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
        noise.connect(filter); filter.connect(gain); gain.connect(AC.destination);
        noise.start();
      } catch(e) {}
    }, delay * 1000);
  }
}

function fail_snd() { tone(200,.2,'sawtooth'); setTimeout(()=>tone(150,.35,'sawtooth'),200); }

function burst(x,y,color,n=35) {
  for(let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, sp=Math.random()*9+2;
    parts.push({x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, color, sz:Math.random()*6+3});
  }
}

/* ---------------- AAA-QUALITY REALISTIC CANVAS ENGINES ---------------- */

/* 1. 🎣 Fishing Hunter Engine: Swimming Fish with Animated Tails & Hook Drop */
function renderFishing() {
  time += 0.03;
  // Underwater Ocean Gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#031024'); grad.addColorStop(0.4, '#0077b6'); grad.addColorStop(1, '#001838');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

  // Animated Water Waves Light Caustics
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath();
  for(let x=0; x<W; x+=15) {
    const y = 140 + Math.sin(x*0.02 + time)*12;
    if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.fill();

  // Swaying Sea Floor Plants
  ctx.fillStyle = '#10b981';
  for(let i=0; i<W; i+=60) {
    ctx.beginPath();
    ctx.moveTo(i, H);
    ctx.quadraticCurveTo(i + Math.sin(time + i)*20, H - 70, i + Math.sin(time + i)*10, H - 120);
    ctx.quadraticCurveTo(i - 10, H - 70, i, H);
    ctx.fill();
  }

  // Fisherman Boat at top
  ctx.fillStyle = '#b45309';
  ctx.beginPath(); ctx.arc(W/2, 135, 55, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = '28px sans-serif'; ctx.fillText('🎣', W/2 - 14, 130);

  // Fishing Hook Movement
  hookY += (hookTargetY - hookY) * 0.12;
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(W/2, 135); ctx.lineTo(W/2, hookY); ctx.stroke();
  ctx.fillStyle = '#cbd5e1'; ctx.beginPath(); ctx.arc(W/2, hookY, 6, 0, Math.PI*2); ctx.fill();

  // Swimming Fish Animation under target buttons
  const btns = Array.from(document.querySelectorAll('.tbtn'));
  btns.forEach((btn, idx) => {
    const rect = btn.getBoundingClientRect();
    const fishX = rect.left + rect.width/2;
    const fishY = rect.top + rect.height/2;

    // Draw Realistic Swimming Fish Shape around button
    const tailWiggle = Math.sin(time*6 + idx)*14;
    ctx.fillStyle = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7'][idx % 4];
    
    // Fish Body Oval
    ctx.beginPath();
    ctx.ellipse(fishX, fishY, rect.width/2 + 18, rect.height/2 + 12, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    // Fish Tail Fin
    ctx.beginPath();
    ctx.moveTo(fishX + rect.width/2 + 15, fishY);
    ctx.lineTo(fishX + rect.width/2 + 40, fishY - 18 + tailWiggle);
    ctx.lineTo(fishX + rect.width/2 + 40, fishY + 18 + tailWiggle);
    ctx.closePath(); ctx.fill();

    // Fish Eye
    ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(fishX - rect.width/2 - 4, fishY - 6, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(fishX - rect.width/2 - 6, fishY - 8, 2, 0, Math.PI*2); ctx.fill();
  });
}

/* 2. 💣 Cannon Parachute Siege Engine */
function renderCannon() {
  time += 0.03;
  ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);

  // Parachute Canopy over buttons
  const btns = Array.from(document.querySelectorAll('.tbtn'));
  btns.forEach((btn, idx) => {
    const rect = btn.getBoundingClientRect();
    const bx = rect.left + rect.width/2;
    const by = rect.top;

    ctx.fillStyle = '#ef4444';
    ctx.beginPath(); ctx.arc(bx, by - 25, 45, Math.PI, 0); ctx.fill();
    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(bx - 40, by - 25); ctx.lineTo(bx - 20, by); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx + 40, by - 25); ctx.lineTo(bx + 20, by); ctx.stroke();
  });

  // Cannon Base & Barrel rotating to mouse position
  const angle = Math.atan2(mouseY - (H-30), mouseX - W/2);
  ctx.save(); ctx.translate(W/2, H-30); ctx.rotate(angle);
  ctx.fillStyle = '#64748b'; ctx.fillRect(0, -14, 65, 28); ctx.restore();
  ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.arc(W/2, H-30, 40, Math.PI, 0); ctx.fill();
}

/* 3. 🎈 Glossy Balloon Popper Engine */
function renderBalloon() {
  time += 0.02;
  ctx.fillStyle = '#1b1947'; ctx.fillRect(0, 0, W, H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.beginPath(); ctx.arc(W*0.2, H*0.3 + Math.sin(time)*15, 90, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W*0.8, H*0.25 + Math.cos(time)*15, 110, 0, Math.PI*2); ctx.fill();

  // Balloon Strings underneath target buttons
  const btns = Array.from(document.querySelectorAll('.tbtn'));
  btns.forEach((btn, idx) => {
    const rect = btn.getBoundingClientRect();
    const bx = rect.left + rect.width/2;
    const by = rect.bottom;

    ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(bx, by);
    ctx.quadraticCurveTo(bx + Math.sin(time*4 + idx)*15, by + 40, bx, by + 70); ctx.stroke();
  });
}

/* 4. 🚀 Space Fighter Laser Engine */
function renderSpace() {
  time += 0.05;
  ctx.fillStyle = '#050515'; ctx.fillRect(0, 0, W, H);

  // Stars Scrolling
  ctx.fillStyle = '#fff';
  for(let i=0; i<40; i++) {
    const sx = (i*47) % W;
    const sy = (i*83 + time*100) % H;
    ctx.fillRect(sx, sy, 2, 2);
  }

  // Player Spacecraft
  ctx.fillStyle = '#38bdf8';
  ctx.beginPath(); ctx.moveTo(mouseX, H - 75); ctx.lineTo(mouseX - 30, H - 25); ctx.lineTo(mouseX + 30, H - 25); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#f97316'; ctx.beginPath(); ctx.arc(mouseX, H - 20, 8, 0, Math.PI*2); ctx.fill();
}

/* 5. 🏹 Archery Bow Target Engine */
function renderArchery() {
  time += 0.02;
  ctx.fillStyle = '#0d1b2a'; ctx.fillRect(0, 0, W, H);

  // Wooden Archery Bow at bottom
  ctx.strokeStyle = '#b45309'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(W/2, H - 10, 85, Math.PI*1.15, Math.PI*1.85); ctx.stroke();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2 - 75, H - 25); ctx.lineTo(W/2 + 75, H - 25); ctx.stroke();
}

function loop() {
  ctx.clearRect(0,0,W,H);

  if ('cannon' === 'fishing') renderFishing();
  else if ('cannon' === 'cannon') renderCannon();
  else if ('cannon' === 'balloon') renderBalloon();
  else if ('cannon' === 'space') renderSpace();
  else if ('cannon' === 'archery') renderArchery();
  else renderFishing();

  // Burst Particles
  parts = parts.filter(p=>p.life>0);
  parts.forEach(p=> {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life-=0.022;
    ctx.globalAlpha=Math.max(0, p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  });

  animId = requestAnimationFrame(loop);
}

function loadQ() {
  if(qi >= QS.length) { endGame(); return; }
  const q = QS[qi]; locked = false;
  document.getElementById('qt').textContent = q.q;
  document.getElementById('qn').textContent = 'Q ' + (qi+1) + '/' + QS.length;
  document.getElementById('pb').style.width = (qi/QS.length*100) + '%';
  const cont = document.getElementById('tg'); cont.innerHTML = '';
  const correctText = q.choices[q.answer] || q.choices[0];
  let ch = [...q.choices];
  const lab = ch.map(c => ({ t: c, ok: c === correctText }));
  lab.sort(() => Math.random() - 0.5);
  lab.forEach((item) => {
    const btn = document.createElement('button'); btn.className = 'tbtn';
    btn.textContent = item.t; btn.onclick = () => pick(btn, item.ok);
    cont.appendChild(btn);
  });
}

function pick(btn, good) {
  if(locked) return; locked = true;
  const rect = btn.getBoundingClientRect();
  const targetX = rect.left + rect.width/2;
  const targetY = rect.top + rect.height/2;

  if ('cannon' === 'fishing') {
    hookTargetY = targetY;
  }

  if(good) {
    btn.classList.add('correct'); playApplauseSnd(); burst(targetX, targetY, '#2ecc71', 45);
    score += 10; document.getElementById('sc').textContent = score;
  } else {
    btn.classList.add('wrong'); fail_snd(); burst(targetX, targetY, '#e74c3c', 25);
    Array.from(document.getElementById('tg').children).forEach(b => {
      if(b.textContent === QS[qi].choices[QS[qi].answer]) b.classList.add('correct');
    });
  }
  setTimeout(() => { hookTargetY = 140; qi++; loadQ(); }, 1600);
}

function endGame() {
  document.getElementById('end').style.display = 'flex';
  document.getElementById('es').textContent = 'Final Score: ' + score + ' / ' + (QS.length*10);
}
</script>
</body>
</html>
