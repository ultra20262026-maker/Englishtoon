            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding-top: 2rem;
            transition: all 1s ease;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 6, 23, 0.7); z-index: 1; backdrop-filter: blur(2px);
        }

        #loading-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #020617; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #fff; transition: opacity 0.5s ease;
        }
        .spinner {
            width: 60px; height: 60px; border: 6px solid rgba(255,255,255,0.2);
            border-top-color: #10B981; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .layout-container {
            position: relative; z-index: 10; width: 100%; max-width: 1200px;
            display: grid; grid-template-columns: 1fr 400px; gap: 2rem; padding: 0 2rem;
        }

        .left-col { display: flex; flex-direction: column; gap: 2rem; }

        .right-col {
            background: rgba(16, 185, 129, 0.05); border: 2px solid rgba(16, 185, 129, 0.3); border-radius: 1rem;
            height: 80vh; position: relative; box-shadow: inset 0 0 40px rgba(16, 185, 129, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; overflow: hidden; backdrop-filter: blur(10px);
        }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(15, 23, 42, 0.85); padding: 1rem 2rem; border-radius: 1rem;
            border: 2px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
        }

        .game-title { font-size: 2.2rem; font-weight: 900; color: #10B981; margin: 0; text-shadow: 0 0 10px rgba(16,185,129,0.5); }
        .stats { display: flex; gap: 1rem; }
        .stat-box { background: rgba(255, 255, 255, 0.1); padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; border: 1px solid rgba(255, 255, 255, 0.2); }
        .timer { color: #F87171; min-width: 80px; text-align: center; }
        .lives { color: #FCA5A5; }

        .question-box {
            background: rgba(15, 23, 42, 0.85); border: 2px solid rgba(16, 185, 129, 0.3); border-radius: 1.5rem;
            padding: 2.5rem; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); display: none;
        }

        .question-text { font-size: 2rem; font-weight: 700; margin-bottom: 2rem; direction: ltr; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .answer-btn {
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(16, 185, 129, 0.4); color: #FFFFFF;
            padding: 1.2rem; font-size: 1.3rem; font-weight: 700; border-radius: 1rem; cursor: pointer; transition: all 0.3s ease; text-align: left; direction: ltr;
        }
        .answer-btn:hover { background: rgba(16, 185, 129, 0.2); border-color: #10B981; transform: translateY(-3px); }
        .answer-btn.correct { background: rgba(16, 185, 129, 0.4); border-color: #10B981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); }
        .answer-btn.wrong { background: rgba(239, 68, 68, 0.2); border-color: #EF4444; }

        .start-btn {
            background: #10B981; border: none; color: #FFFFFF; padding: 1.5rem 3rem; font-size: 2rem; font-weight: 900;
            border-radius: 1rem; cursor: pointer; margin-top: 3rem; align-self: center; box-shadow: 0 10px 20px rgba(16,185,129,0.4);
        }

        /* Radar System */
        .radar-container {
            width: 300px; height: 300px; border-radius: 50%;
            background: rgba(2, 6, 23, 0.8);
            border: 4px solid #10B981; position: relative;
            box-shadow: 0 0 30px rgba(16, 185, 129, 0.5), inset 0 0 50px rgba(16, 185, 129, 0.2);
            overflow: hidden;
        }

        .radar-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 50%;
        }

        .radar-sweep {
            position: absolute; top: 50%; left: 50%; width: 50%; height: 2px;
            background: linear-gradient(90deg, #10B981, transparent);
            transform-origin: 0 50%; animation: sweep 3s linear infinite;
        }
        .radar-sweep::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 150px;
            background: conic-gradient(from 0deg at 0 0, rgba(16, 185, 129, 0.4) 0deg, transparent 60deg);
            transform-origin: 0 0;
        }

        @keyframes sweep { 100% { transform: rotate(360deg); } }

        .footprint {
            position: absolute; font-size: 2rem;
            opacity: 0; transform: translate(-50%, -50%) scale(0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 0 0 10px currentColor;
        }

        .footprint.danger { color: #EF4444; opacity: 1; transform: translate(-50%, -50%) scale(1); animation: blink 1s infinite alternate; }
        .footprint.safe { color: #10B981; opacity: 1; transform: translate(-50%, -50%) scale(1.2); filter: drop-shadow(0 0 10px #10B981); }

        @keyframes blink { 0% { opacity: 0.5; } 100% { opacity: 1; } }

        .alert-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85); z-index: 100;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .alert-overlay.active { opacity: 1; pointer-events: all; }
        .alert-box { background: #1E293B; padding: 3rem; border-radius: 2rem; text-align: center; border: 2px solid #10B981; }

        @media (max-width: 900px) {
            .layout-container { grid-template-columns: 1fr; }
            .right-col { height: 400px; }
        }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <h2 style="font-size: 2rem;">جاري التحميل...</h2>
    </div>

    <div class="layout-container">
        <div class="left-col">
            <div class="header" id="game-header" style="display: none;">
                <h1 class="game-title">متتبع البصمة الرقمية 👣</h1>
                <div class="stats">
                    <div class="stat-box lives" id="lives-display">❤️ 3</div>
                    <div class="stat-box timer">⏱️ <span id="timer">30.00</span></div>
                </div>
            </div>

            <button class="start-btn" id="start-btn" onclick="startGame()">تشغيل الرادار!</button>

            <div class="question-box" id="question-box">
                <div class="question-text" id="question-text"></div>
                <div class="options-grid" id="options-grid"></div>
            </div>
        </div>

        <div class="right-col" id="radar-section" style="display: none;">
            <div class="radar-container" id="radar">
                <div class="radar-circle" style="width: 250px; height: 250px;"></div>
                <div class="radar-circle" style="width: 180px; height: 180px;"></div>
                <div class="radar-circle" style="width: 100px; height: 100px;"></div>
                <div class="radar-sweep"></div>
                <!-- Footprints will be added here -->
            </div>
        </div>
    </div>

    <div class="alert-overlay" id="alert-overlay">
        <div class="alert-box">
            <div id="alert-icon" style="font-size: 5rem; margin-bottom: 1rem;"></div>
            <h2 id="alert-title" style="color: white; font-size: 2.5rem; margin-bottom: 1rem;"></h2>
            <p id="alert-message" style="color: #94A3B8; font-size: 1.5rem; margin-bottom: 2rem;"></p>
            <button class="answer-btn" id="alert-btn" style="background: #10B981; border: none; color: #FFFFFF; width: 100%; justify-content: center;" onclick="nextQuestion()"></button>
        </div>
    </div>

    <script>
        let audioCtx;
        function initAudio() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch(e) {}
        }

        function playTone(freq1, freq2, type, duration, vol=0.3) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq1, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq2, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playSweep() { playTone(600, 1200, 'sine', 0.3, 0.2); }
        function playWrong() { playTone(250, 100, 'sawtooth', 0.5, 0.5); }
        function playGameOver() { playTone(150, 50, 'square', 1.0, 0.4); }
        function playWin() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 1);
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.5);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 2);
        }

        window.onload = () => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        };

        const questions = [
            { q: "Everything you do on the internet leaves a digital .......... .", options: ["handprint", "footprint", "shoeprint", "blueprint"], correct: 1 },
            { q: "It's important to keep your passwords .......... from strangers.", options: ["public", "safe", "known", "visible"], correct: 1 },
            { q: "Websites can .......... what you search for online.", options: ["track", "trick", "build", "play"], correct: 0 },
            { q: "A digital footprint is a .......... of everything you do online.", options: ["secret", "picture", "record", "sound"], correct: 2 },
            { q: "You should never share your personal .......... with people you don't know.", options: ["information", "toys", "books", "food"], correct: 0 },
            { q: "Posting a photo online is an example of leaving a digital .......... .", options: ["trace", "race", "place", "space"], correct: 0 },
            { q: "We must be careful about our online .......... to protect our data.", options: ["height", "privacy", "weight", "color"], correct: 1 },
            { q: "A safe password should include a mix of letters, numbers, and .......... .", options: ["words", "spaces", "symbols", "sentences"], correct: 2 },
            { q: "Hackers try to steal your .......... to access your accounts.", options: ["money", "data", "time", "clothes"], correct: 1 },
            { q: "Think carefully before you .......... anything on social media.", options: ["read", "watch", "post", "buy"], correct: 2 }
        ];

        let currentIndex = 0;
        let lives = 3;
        let timerInterval;
        let timeRemaining = 30.00;
        let isWaitingForInput = true;
        let currentFootprint = null;

        function spawnFootprint() {
            const radar = document.getElementById('radar');
            if (currentFootprint) currentFootprint.remove();

            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 100 + 20; // 20 to 120
            const x = 150 + Math.cos(angle) * radius;
            const y = 150 + Math.sin(angle) * radius;

            const fp = document.createElement('div');
            fp.className = 'footprint danger';
            fp.innerText = '👣';
            fp.style.left = `${x}px`;
            fp.style.top = `${y}px`;
            radar.appendChild(fp);
            currentFootprint = fp;
        }

        function secureFootprint() {
            if (currentFootprint) {
                currentFootprint.classList.remove('danger');
                currentFootprint.classList.add('safe');
                currentFootprint.innerText = '🛡️';
            }
        }

        function startGame() {
            initAudio();
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('game-header').style.display = 'flex';
            document.getElementById('radar-section').style.display = 'flex';
            document.getElementById('question-box').style.display = 'block';
            renderQuestion();
        }

        function renderQuestion() {
            if (currentIndex >= questions.length || lives <= 0) {
                showGameOver();
                return;
            }

            isWaitingForInput = true;
            timeRemaining = 30.00;
            spawnFootprint();
            
            document.getElementById('lives-display').innerHTML = '❤️ ' + lives;
            const q = questions[currentIndex];
            document.getElementById('question-text').innerHTML = `<span style="color: #10B981;">Q${currentIndex + 1}:</span> ${q.q}`;
            
            const optsBox = document.getElementById('options-grid');
            optsBox.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, idx) => {
                optsBox.innerHTML += `
                    <button class="answer-btn" onclick="selectOption(${idx})">
                        <span style="background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 0.5rem;">${letters[idx]}</span>
                        ${opt}
                    </button>`;
            });

            clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 10);
        }

        function updateTimer() {
            if (!isWaitingForInput) return;
            timeRemaining -= 0.01;
            const timerEl = document.getElementById('timer');
            if (timeRemaining <= 0) {
                timeRemaining = 0;
                timerEl.innerText = "0.00";
                playWrong();
                handleFail("انتهى الوقت! ⚠️ تم اختراق البصمة!");
            } else {
                timerEl.innerText = timeRemaining.toFixed(2);
            }
        }

        function handleFail(msg) {
            isWaitingForInput = false;
            clearInterval(timerInterval);
            lives--;
            document.getElementById('lives-display').innerHTML = '❤️ ' + lives;
            if (currentFootprint) currentFootprint.innerText = '⚠️';
            if (lives <= 0) playGameOver();
            showAlert(false, msg);
        }

        function selectOption(idx) {
            if (!isWaitingForInput) return;
            isWaitingForInput = false;
            clearInterval(timerInterval);
            initAudio();

            const btns = document.querySelectorAll('.answer-btn');
            const correctIdx = questions[currentIndex].correct;

            if (idx === correctIdx) {
                btns[idx].classList.add('correct');
                currentIndex++;
                secureFootprint();
                playSweep();
                
                setTimeout(() => {
                    showAlert(true, "إجابة صحيحة! تم تأمين البصمة 🛡️✨");
                }, 800);
            } else {
                btns[idx].classList.add('wrong');
                btns[correctIdx].classList.add('correct');
                playWrong();
                setTimeout(() => handleFail("إجابة خاطئة! ❌ البصمة مكشوفة!"), 1000);
            }
        }

        function showAlert(isSuccess, message) {
            const overlay = document.getElementById('alert-overlay');
            const icon = document.getElementById('alert-icon');
            const title = document.getElementById('alert-title');
            const msg = document.getElementById('alert-message');
            const btn = document.getElementById('alert-btn');

            if (isSuccess) {
                icon.innerText = '🛡️'; title.innerText = 'رائع!'; title.style.color = '#10B981';
            } else {
                icon.innerText = '❌'; title.innerText = 'تحذير!'; title.style.color = '#EF4444';
            }
            msg.innerText = message;
            btn.innerText = lives <= 0 ? "أعد المحاولة 🔄" : "التالي ⏩";
            overlay.classList.add('active');
        }

        function nextQuestion() {
            document.getElementById('alert-overlay').classList.remove('active');
            if (lives <= 0) { 
                currentIndex = 0; lives = 3; 
            }
            renderQuestion();
        }

        function showGameOver() {
            const qBox = document.getElementById('question-box');
            qBox.innerHTML = `
                <div style="font-size: 6rem; text-align:center; margin-bottom: 1rem;">📡✨</div>
                <div class="question-text" style="color: white; text-align:center;">تهانينا! لقد تم تأمين جميع بصماتك الرقمية بنجاح! 🎉</div>
                <button class="start-btn" style="width: 100%;" onclick="location.reload()">العب مرة أخرى 🔄</button>
            `;

            document.body.style.filter = 'brightness(1.5)';
            const rightCol = document.getElementById('radar-section');
            rightCol.style.boxShadow = 'inset 0 0 100px rgba(16, 185, 129, 0.8)';
            rightCol.style.border = '4px solid #10B981';
            
            playWin();
        }
    </script>
</body>
</html>
