<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>فرقعة الفقاعات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #9b59b6; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #8e44ad; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-img { position: absolute; bottom: 20px; width: 150px; height: 150px; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 10px; z-index: 10;}
        .target-img img { width: 100%; height: 100%; object-fit: contain; }
        .bubble { position: absolute; width: 100px; height: 100px; background: rgba(52, 152, 219, 0.5); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 1.5rem; color: #fff; cursor: pointer; transition: transform 0.1s; backdrop-filter: blur(2px); z-index: 20;}
        .bubble:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>

        </div>
        <div class="target-img"><img id="target-image" src=""></div>
    </div>

        <button class="start" onclick="startGame()">العب!</button>
    </div>

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let level = 1;
        
        let currentWord = null;
        let bubbles = [];
        let spawnInterval, floatInterval;

        function setTarget() {
            currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
            document.getElementById('target-image').src = currentWord.img;
            speak(currentWord.word);
        }

        function spawnBubble() {
            const isCorrect = Math.random() > 0.6;
            const wordObj = isCorrect ? currentWord : wordsData[Math.floor(Math.random() * wordsData.length)];
            const el = document.createElement('div');
            el.className = 'bubble';
            el.textContent = wordObj.word;
            el.style.left = Math.random() * (document.getElementById('game-container').clientWidth - 100) + 'px';
            el.dataset.y = document.getElementById('game-container').clientHeight + 50;
            
            el.onclick = () => {
                if(wordObj.word === currentWord.word) {
                    speak('Pop!'); score+=10; document.getElementById('score').textContent=score;
                    el.remove(); bubbles = bubbles.filter(b=>b!==el); setTarget();
                } else {
                    speak('No!'); el.style.background = 'rgba(231, 76, 60, 0.8)'; setTimeout(()=>el.remove(), 300); bubbles = bubbles.filter(b=>b!==el);
                }
            };
            document.getElementById('game-container').appendChild(el);
            bubbles.push(el);
        }

        function floatBubbles() {
            for(let i=bubbles.length-1; i>=0; i--) {
                let el = bubbles[i];
                let y = parseFloat(el.dataset.y) - 2;
                el.dataset.y = y;
                el.style.top = y + 'px';
                if(y < -150) { el.remove(); bubbles.splice(i, 1); }
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            bubbles.forEach(b=>b.remove()); bubbles=[];
            score=0; document.getElementById('score').textContent=score;
            setTarget();
            clearInterval(spawnInterval); clearInterval(floatInterval);
            spawnInterval = setInterval(spawnBubble, 1500);
            floatInterval = setInterval(floatBubbles, 30);
        }
    </script>
