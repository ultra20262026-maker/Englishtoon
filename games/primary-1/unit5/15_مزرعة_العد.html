    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مزرعة العد</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #27ae60; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2ecc71; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f39c12; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #e67e22;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .question-box { background: white; border-radius: 20px; padding: 20px; font-size: 2.5rem; color: #27ae60; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); text-align: center; cursor: pointer;}
        
        .farm-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;}
        .farm-pen { background: rgba(255,255,255,0.9); border: 5px dashed #f1c40f; border-radius: 20px; padding: 20px; min-width: 150px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; cursor: pointer; font-size: 40px; transition: transform 0.2s;}
        .farm-pen:active { transform: scale(0.95); }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>مزرعة العد 🚜</div>
        </div>
        
        <div class="question-box" id="question-box" onclick="if(targetNum) speak(`how many cows? there are ${targetNum} cows`)">how many cows?</div>
        
        <div class="farm-grid" id="farm-grid"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">مزرعة العد 🚜</h1>
        <p style="font-size: 1.5rem;">اختر المزرعة التي تحتوي على العدد الصحيح من الأبقار!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let targetNum = 3;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            targetNum = Math.floor(Math.random() * 5) + 1; // 1 to 5
            
            document.getElementById('question-box').innerHTML = `How many cows?<br>There are ${targetNum} cows.`;
            speak(`how many cows? there are ${targetNum} cows`);
            
            const grid = document.getElementById('farm-grid');
            grid.innerHTML = '';
            
            let nums = [targetNum];
            while(nums.length < 3) {
                let r = Math.floor(Math.random() * 5) + 1;
                if(!nums.includes(r)) nums.push(r);
            }
            nums.sort(()=>0.5-Math.random());
            
            nums.forEach(n => {
                const pen = document.createElement('div');
                pen.className = 'farm-pen';
                pen.innerHTML = '🐄'.repeat(n);
                
                pen.onclick = () => {
                    if(!canClick) return;
                    if(n === targetNum) {
                        speak('Great!'); score+=10; document.getElementById('score').textContent=score;
                        pen.style.background = '#f1c40f'; pen.style.borderColor = 'white';
                        canClick = false; setTimeout(spawnLevel, 1500);
                    } else {
                        speak('No, that is ' + n); pen.style.background = '#e74c3c'; setTimeout(()=>pen.style.background='rgba(255,255,255,0.9)', 500);
                    }
                };
                grid.appendChild(pen);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
