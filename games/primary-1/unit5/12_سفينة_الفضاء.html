    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سفينة الفضاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #1a1a2e; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #16213e; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e94560; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .spaceship { position: absolute; bottom: 20px; background: white; border-radius: 20px; padding: 10px 20px; font-family: 'Fredoka One'; font-size: 2rem; color: #e94560; display: flex; align-items: center; gap: 10px; box-shadow: 0 0 20px rgba(255,255,255,0.5); z-index: 25; cursor: pointer; transition: left 0.2s;}
        .spaceship::after { content: '🚀'; font-size: 3rem; }
        
        .meteor { position: absolute; width: 80px; height: 80px; background: #0f3460; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5); color: white;}
        .meteor:active { transform: scale(0.9); }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>سفينة الفضاء 🛸</div>
        </div>
        
        <div class="spaceship" id="spaceship" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">سفينة الفضاء 🛸</h1>
        <p style="font-size: 1.5rem;">دمر النيازك التي لا تتطابق، والتقط النيزك الصحيح!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let meteors = [];
        let spawnInterval, loopInterval;

        function setTarget() {
            currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
            const ship = document.getElementById('spaceship');
            ship.innerHTML = `<span>${currentWord.word}</span>`;
            ship.style.left = '50%'; ship.style.transform = 'translateX(-50%)';
            speak(currentWord.word);
        }

        function spawnMeteor() {
            const isCorrect = Math.random() > 0.5;
            const wordObj = isCorrect ? currentWord : wordsData[Math.floor(Math.random() * wordsData.length)];
            const p = document.createElement('div');
            p.className = 'meteor';
            p.textContent = wordObj.image;
            
            p.dataset.x = Math.random() * (document.getElementById('game-container').clientWidth - 100);
            p.dataset.y = -100;
            p.dataset.speedY = Math.random() * 2 + 1;
            
            p.style.left = p.dataset.x + 'px';
            p.style.top = p.dataset.y + 'px';
            
            p.onclick = () => {
                if(wordObj.word === currentWord.word) {
                    speak('Got it!'); score+=10; document.getElementById('score').textContent=score;
                    const ship = document.getElementById('spaceship');
                    ship.style.left = p.dataset.x + 'px'; ship.style.transform = 'none';
                    p.style.transform = 'scale(0)';
                    setTimeout(()=>p.remove(), 200);
                    meteors = meteors.filter(x=>x!==p); setTarget();
                } else {
                    speak('Pew pew!'); p.innerHTML = '💥'; p.style.background = 'transparent'; p.style.boxShadow = 'none';
                    setTimeout(()=>p.remove(), 300);
                    meteors = meteors.filter(x=>x!==p);
                }
            };
            document.getElementById('game-container').appendChild(p);
            meteors.push(p);
        }
        
        function gameLoop() {
            for(let i=meteors.length-1; i>=0; i--) {
                let p = meteors[i];
                let y = parseFloat(p.dataset.y) + parseFloat(p.dataset.speedY);
                p.dataset.y = y;
                p.style.top = y + 'px';
                
                if(y > document.getElementById('game-container').clientHeight + 100) { 
                    p.remove(); meteors.splice(i, 1); 
                }
            }
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            meteors.forEach(p=>p.remove()); meteors=[];
            setTarget();
            clearInterval(spawnInterval); clearInterval(loopInterval);
            spawnInterval = setInterval(spawnMeteor, 1500);
            loopInterval = setInterval(gameLoop, 30);
        }
    </script>
</body>
</html>
