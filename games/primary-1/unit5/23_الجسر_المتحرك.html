<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الجسر المتحرك</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #34495e; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2c3e50; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #e74c3c; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .river { width: 100%; height: 150px; background: #2980b9; position: absolute; bottom: 0; z-index: 5;}
        .bridge { width: 60%; height: 20px; background: #7f8c8d; position: absolute; bottom: 150px; left: 20%; transform-origin: left; transform: rotate(-45deg); transition: transform 1s ease-in-out; z-index: 10;}
        .bridge.lowered { transform: rotate(0deg); }
        
        .knight { font-size: 80px; position: absolute; bottom: 150px; left: 10px; z-index: 15; transition: left 1.5s linear;}
        .castle { font-size: 100px; position: absolute; bottom: 150px; right: 10px; z-index: 5;}
        
        .options { display: flex; gap: 15px; position: absolute; bottom: 200px; z-index: 20;}
        .opt-btn { width: 80px; height: 80px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); transition: transform 0.2s;}
        .opt-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>الجسر المتحرك 🌉</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="options" id="options"></div>
        
        <div class="knight" id="knight">🛡️</div>
        <div class="bridge" id="bridge"></div>
        <div class="river"></div>
        <div class="castle">🏰</div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">الجسر المتحرك 🌉</h1>
        <p style="font-size: 1.5rem;">اختر الصورة الصحيحة لإنزال الجسر للفارس!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('bridge').classList.remove('lowered');
            document.getElementById('knight').style.left = '10px';
            document.getElementById('knight').style.transition = 'none';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            selected.forEach(w => {
                const btn = document.createElement('div');
                btn.className = 'opt-btn';
                btn.innerHTML = w.image;
                
                btn.onclick = () => {
                    if(!canClick) return;
                    canClick = false;
                    
                    if(w.word === currentWord.word) {
                        speak('Forward!'); score+=10; document.getElementById('score').textContent=score;
                        btn.style.background = '#2ecc71';
                        document.getElementById('bridge').classList.add('lowered');
                        
                        setTimeout(() => {
                            document.getElementById('knight').style.transition = 'left 1.5s linear';
                            document.getElementById('knight').style.left = '80%';
                            setTimeout(spawnLevel, 2000);
                        }, 1000);
                    } else {
                        speak('Halt!'); btn.style.background = '#e74c3c';
                        setTimeout(() => {
                            btn.style.background = 'white';
                            canClick = true;
                        }, 1000);
                    }
                };
                opts.appendChild(btn);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
