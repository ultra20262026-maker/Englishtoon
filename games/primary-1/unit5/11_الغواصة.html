<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الغواصة</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2980b9; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: linear-gradient(#3498db, #2c3e50); border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .camera-view { position: absolute; width: 200px; height: 200px; border: 5px solid rgba(255,255,255,0.5); border-radius: 50%; pointer-events: none; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 20;}
        .camera-view::before { content: ''; position: absolute; top: 50%; left: -20px; right: -20px; height: 2px; background: rgba(255,255,255,0.5); }
        .camera-view::after { content: ''; position: absolute; left: 50%; top: -20px; bottom: -20px; width: 2px; background: rgba(255,255,255,0.5); }
        
        .target-box { background: rgba(255,255,255,0.9); border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #2980b9; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .sub-item { position: absolute; font-size: 60px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));}
        .sub-item:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>الغواصة 🚢</div>
        </div>
        
        <div class="camera-view"></div>
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">الغواصة 🚢</h1>
        <p style="font-size: 1.5rem;">انقر على الصورة الصحيحة للكلمة في أعماق البحر!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let items = [];
        let spawnInterval, loopInterval;

        function setTarget() {
            currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
        }

        function spawnItem() {
            const isCorrect = Math.random() > 0.5;
            const wordObj = isCorrect ? currentWord : wordsData[Math.floor(Math.random() * wordsData.length)];
            const p = document.createElement('div');
            p.className = 'sub-item';
            p.textContent = wordObj.image;
            
            let fromLeft = Math.random() > 0.5;
            p.dataset.x = fromLeft ? -100 : document.getElementById('game-container').clientWidth;
            p.dataset.y = Math.random() * (document.getElementById('game-container').clientHeight - 200) + 150;
            p.dataset.speedX = (Math.random() * 3 + 1) * (fromLeft ? 1 : -1);
            if(!fromLeft) p.style.transform = 'scaleX(-1)';
            
            p.style.left = p.dataset.x + 'px';
            p.style.top = p.dataset.y + 'px';
            
            p.onclick = () => {
                if(wordObj.word === currentWord.word) {
                    speak('Snap!'); score+=10; document.getElementById('score').textContent=score;
                    
                    // Flash effect
                    const flash = document.createElement('div');
                    flash.style.position = 'absolute'; flash.style.inset = '0'; flash.style.background = 'white'; flash.style.zIndex = '50';
                    document.getElementById('game-container').appendChild(flash);
                    setTimeout(()=>flash.remove(), 100);
                    
                    p.remove(); items = items.filter(x=>x!==p); setTarget();
                } else {
                    speak('Blurry!'); p.style.filter = 'blur(5px)'; setTimeout(()=>p.style.filter='drop-shadow(0 5px 10px rgba(0,0,0,0.5))', 500);
                }
            };
            document.getElementById('game-container').appendChild(p);
            items.push(p);
        }
        
        function gameLoop() {
            for(let i=items.length-1; i>=0; i--) {
                let p = items[i];
                let x = parseFloat(p.dataset.x) + parseFloat(p.dataset.speedX);
                p.dataset.x = x;
                p.style.left = x + 'px';
                
                if(x < -150 || x > document.getElementById('game-container').clientWidth + 150) { 
                    p.remove(); items.splice(i, 1); 
                }
            }
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            items.forEach(p=>p.remove()); items=[];
            setTarget();
            clearInterval(spawnInterval); clearInterval(loopInterval);
            spawnInterval = setInterval(spawnItem, 2000);
            loopInterval = setInterval(gameLoop, 30);
        }
    </script>
</body>
</html>
