<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بائع الآيس كريم</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #ff9ff3; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #feca57; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #333; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #ee5253; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #b33939;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .customer-bubble { background: white; padding: 20px; border-radius: 50%; font-size: 70px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); position: relative;}
        .customer-bubble::after { content: ''; position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); border-width: 20px 20px 0; border-style: solid; border-color: white transparent transparent transparent; }
        
        .ice-cream-cone { width: 0; height: 0; border-left: 50px solid transparent; border-right: 50px solid transparent; border-top: 150px solid #d35400; position: relative; margin-top: 100px;}
        .scoop-place { position: absolute; top: -200px; left: -50px; width: 100px; height: 100px; background: rgba(255,255,255,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-family: 'Fredoka One'; color: white;}
        
        .scoops-container { display: flex; gap: 15px; position: absolute; bottom: 30px;}
        .scoop-btn { width: 90px; height: 90px; border-radius: 50%; border: none; background: #fff; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.1), 0 5px 10px rgba(0,0,0,0.2); cursor: pointer; font-family: 'Fredoka One'; font-size: 1.2rem; color: #333; transition: transform 0.2s; display: flex; align-items: center; justify-content: center;}
        .scoop-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>بائع الآيس كريم 🍦</div>
        </div>
        
        <div class="customer-bubble" id="customer-bubble" onclick="if(currentWord) speak(currentWord.word)"></div>
        
        <div class="ice-cream-cone">
            <div class="scoop-place" id="scoop-place"></div>
        </div>
        
        <div class="scoops-container" id="scoops-container"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #ff9ff3;">بائع الآيس كريم 🍦</h1>
        <p style="font-size: 1.5rem;">اختر نكهة الكلمة الصحيحة للزبون!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

const colors = ['#ff9ff3', '#feca57', '#ff6b6b', '#48dbfb', '#1dd1a1'];

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('scoop-place').innerHTML = '';
            document.getElementById('scoop-place').style.background = 'rgba(255,255,255,0.5)';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('customer-bubble').innerHTML = currentWord.image;
            speak(currentWord.word);
            
            const container = document.getElementById('scoops-container');
            container.innerHTML = '';
            
            selected.forEach((w, i) => {
                const btn = document.createElement('button');
                btn.className = 'scoop-btn';
                btn.style.backgroundColor = colors[i % colors.length];
                btn.textContent = w.word;
                
                btn.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Yummy!'); score+=10; document.getElementById('score').textContent=score;
                        const place = document.getElementById('scoop-place');
                        place.style.background = btn.style.backgroundColor;
                        place.textContent = w.word;
                        canClick = false; setTimeout(spawnLevel, 1500);
                    } else {
                        speak('Not this one!'); btn.style.transform = 'scale(0.8)'; setTimeout(()=>btn.style.transform='scale(1)', 300);
                    }
                };
                container.appendChild(btn);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
