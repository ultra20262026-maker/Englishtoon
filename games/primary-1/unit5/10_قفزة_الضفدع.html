    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قفزة الضفدع</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #3498db; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2980b9; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .frog { position: absolute; bottom: 20px; font-size: 60px; z-index: 20; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); transform: translateX(-50%); left: 50%;}
        
        .lilly-pad { position: absolute; width: 100px; height: 40px; background: #2ecc71; border-radius: 50%; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center;}
        .lilly-pad span { position: absolute; top: -30px; font-size: 40px; }
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #2980b9; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>قفزة الضفدع 🐸</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div id="pads-container"></div>
        <div class="frog" id="frog">🐸</div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">قفزة الضفدع 🐸</h1>
        <p style="font-size: 1.5rem;">اقفز على الورقة التي تحمل الصورة المطابقة للكلمة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;
        let frogY = 20;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('pads-container');
            container.innerHTML = '';
            
            const xPos = [20, 50, 80];
            const targetY = frogY + 120;
            
            selected.forEach((w, i) => {
                const pad = document.createElement('div');
                pad.className = 'lilly-pad';
                pad.innerHTML = `<span>${w.image}</span>`;
                
                pad.style.bottom = targetY + 'px';
                pad.style.left = `calc(${xPos[i]}% - 50px)`;
                
                pad.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Ribbit!'); score+=10; document.getElementById('score').textContent=score;
                        const frog = document.getElementById('frog');
                        frogY = targetY;
                        if(frogY > document.getElementById('game-container').clientHeight - 150) frogY = 20;
                        frog.style.bottom = frogY + 'px';
                        frog.style.left = `${xPos[i]}%`;
                        
                        canClick = false; setTimeout(spawnLevel, 1000);
                    } else {
                        speak('Splash!'); pad.style.background = '#e74c3c'; setTimeout(()=>pad.style.background='#2ecc71', 300);
                    }
                };
                container.appendChild(pad);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; frogY = 20; document.getElementById('score').textContent=score;
            document.getElementById('frog').style.bottom = frogY + 'px';
            document.getElementById('frog').style.left = '50%';
            spawnLevel(); 
        }
    </script>
</body>
</html>
