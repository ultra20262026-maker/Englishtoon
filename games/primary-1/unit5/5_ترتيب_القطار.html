    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ترتيب القطار</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #e67e22; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #f39c12; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .track { width: 100%; height: 20px; background: #7f8c8d; border-top: 5px dashed #bdc3c7; position: absolute; bottom: 100px; z-index: 5;}
        
        .train-container { display: flex; gap: 10px; z-index: 10; align-items: flex-end;}
        .locomotive { font-size: 80px; transform: scaleX(-1); margin-right: 20px;}
        .train-car { width: 100px; height: 80px; background: #3498db; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; border-bottom: 20px solid #2980b9;}
        .train-car::before, .train-car::after { content: ''; position: absolute; bottom: -10px; width: 20px; height: 20px; background: #2c3e50; border-radius: 50%; }
        .train-car::before { left: 10px; } .train-car::after { right: 10px; }
        .word-tag { position: absolute; top: -15px; background: white; padding: 2px 10px; border-radius: 10px; font-family: 'Fredoka One'; color: #2980b9; cursor: pointer;}
        
        .options { display: flex; gap: 15px; z-index: 20; position: absolute; top: 100px;}
        .opt-box { width: 70px; height: 70px; background: rgba(255,255,255,0.9); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); transition: transform 0.2s;}
        .opt-box:active { transform: translateY(5px); box-shadow: 0 0 0; }
        .car-content { font-size: 50px; position: absolute; top: 10px; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>ترتيب القطار 🚂</div>
        </div>
        
        <div class="options" id="options"></div>
        
        <div class="train-container" id="train-container">
            <div class="locomotive">🚂</div>
        </div>
        <div class="track"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">ترتيب القطار 🚂</h1>
        <p style="font-size: 1.5rem;">ضع الصور في العربات الصحيحة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let selectedLevelWords = [];
        let completed = 0;
        let currentTargetWord = null;
        let activeCar = null;

        function spawnLevel() {
            completed = 0;
            currentTargetWord = null;
            activeCar = null;
            selectedLevelWords = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            
            const trainC = document.getElementById('train-container');
            trainC.innerHTML = '<div class="locomotive">🚂</div>';
            
            selectedLevelWords.forEach((w, i) => {
                const car = document.createElement('div');
                car.className = 'train-car';
                car.innerHTML = `<div class="word-tag" onclick="speak('${w.word}')">${w.word}</div><div class="car-content"></div>`;
                car.dataset.word = w.word;
                
                car.onclick = () => {
                    if(car.classList.contains('filled')) return;
                    document.querySelectorAll('.train-car').forEach(c=>c.style.border = 'none');
                    car.style.border = '3px solid white';
                    activeCar = car;
                    currentTargetWord = w.word;
                    speak(w.word);
                };
                
                trainC.appendChild(car);
            });
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            let optionsArr = [...selectedLevelWords].sort(()=>0.5-Math.random());
            
            optionsArr.forEach(w => {
                const b = document.createElement('div');
                b.className = 'opt-box';
                b.innerHTML = w.image;
                
                b.onclick = () => {
                    if(!activeCar) { speak('Choose a train car first!'); return; }
                    
                    if(w.word === currentTargetWord) {
                        speak('Choo choo!'); score+=10; document.getElementById('score').textContent=score;
                        b.style.visibility = 'hidden';
                        activeCar.querySelector('.car-content').innerHTML = w.image;
                        activeCar.classList.add('filled');
                        activeCar.style.border = 'none';
                        activeCar = null; currentTargetWord = null;
                        completed++;
                        if(completed === 3) setTimeout(spawnLevel, 1500);
                    } else {
                        speak('Wrong car!'); b.style.background = '#e74c3c'; setTimeout(()=>b.style.background='rgba(255,255,255,0.9)', 300);
                    }
                };
                opts.appendChild(b);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
