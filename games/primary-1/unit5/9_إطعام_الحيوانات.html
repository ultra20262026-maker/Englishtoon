    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إطعام الحيوانات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2ecc71; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #27ae60; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f39c12; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #e67e22;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .animals-container { display: flex; gap: 20px; justify-content: center;}
        .animal-box { width: 100px; height: 100px; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 60px; box-shadow: 0 5px 10px rgba(0,0,0,0.2); position: relative; cursor: pointer;}
        .animal-box::before { content: attr(data-word); position: absolute; top: -30px; font-family: 'Fredoka One'; font-size: 1.2rem; color: white; background: #2c3e50; padding: 2px 10px; border-radius: 10px; }
        
        .food-box { background: #f1c40f; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>إطعام الحيوانات 🐾</div>
        </div>
        
        <div class="food-box" id="food-box" onclick="if(currentWord) speak('Who wants ' + currentWord.word)"></div>
        
        <div class="animals-container" id="animals-container"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">إطعام الحيوانات 🐾</h1>
        <p style="font-size: 1.5rem;">انقر على الحيوان الذي يطلب الطعام الموضح في الصورة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('food-box').innerHTML = currentWord.image;
            speak('Where is ' + currentWord.word + '?');
            
            const container = document.getElementById('animals-container');
            container.innerHTML = '';
            
            // Just use generic animal emojis for the holders, but the word is what matters
            const animals = ['🐻', '🐼', '🦁'];
            
            selected.forEach((w, i) => {
                const b = document.createElement('div');
                b.className = 'animal-box';
                b.innerHTML = animals[i];
                b.dataset.word = w.word;
                
                b.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Yummy!'); score+=10; document.getElementById('score').textContent=score;
                        b.style.transform = 'scale(1.2)'; b.style.background = '#f1c40f';
                        canClick = false; setTimeout(spawnLevel, 1000);
                    } else {
                        speak('No thanks!'); b.style.transform = 'translateX(10px)'; setTimeout(()=>b.style.transform='translateX(0)', 200);
                    }
                };
                container.appendChild(b);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
