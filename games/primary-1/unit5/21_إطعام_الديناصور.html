    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إطعام الديناصور</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #27ae60; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2ecc71; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #d35400; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #a04000;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #d35400; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .dino { position: absolute; font-size: 80px; bottom: 20px; cursor: pointer; transition: transform 0.2s;}
        .dino:active { transform: scale(0.9); }
        .dino-text { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-family: 'Fredoka One'; font-size: 1.5rem; color: white; background: #c0392b; padding: 2px 10px; border-radius: 10px;}
        
        .bone { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 40px; display: none; z-index: 20;}
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>إطعام الديناصور 🦖</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="bone" id="bone">🥩</div>
        <div id="dinos-container"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">إطعام الديناصور 🦖</h1>
        <p style="font-size: 1.5rem;">أطعم الديناصور الذي يحمل الكلمة المطابقة للصورة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').innerHTML = currentWord.image;
            speak(currentWord.word);
            
            const container = document.getElementById('dinos-container');
            container.innerHTML = '';
            
            const xPos = [10, 50, 80];
            const dinos = ['🦖', '🦕', '🦖'];
            
            selected.forEach((w, i) => {
                const d = document.createElement('div');
                d.className = 'dino';
                d.innerHTML = `<div class="dino-text">${w.word}</div>${dinos[i]}`;
                d.style.left = `calc(${xPos[i]}% - 40px)`;
                
                d.onclick = () => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const bone = document.getElementById('bone');
                    bone.style.display = 'block';
                    bone.style.left = '50%';
                    bone.style.bottom = '20px';
                    
                    // animate bone to dino
                    setTimeout(() => {
                        bone.style.transition = 'all 0.5s';
                        bone.style.left = `calc(${xPos[i]}% - 20px)`;
                        bone.style.bottom = '80px';
                    }, 50);
                    
                    setTimeout(() => {
                        bone.style.display = 'none';
                        bone.style.transition = 'none';
                        if(w.word === currentWord.word) {
                            speak('Roar!'); score+=10; document.getElementById('score').textContent=score;
                            d.style.transform = 'scale(1.2)';
                            setTimeout(spawnLevel, 1000);
                        } else {
                            speak('Grrr!'); d.style.filter = 'hue-rotate(90deg)';
                            setTimeout(() => {
                                d.style.filter = 'none';
                                canClick = true;
                            }, 1000);
                        }
                    }, 550);
                };
                container.appendChild(d);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
