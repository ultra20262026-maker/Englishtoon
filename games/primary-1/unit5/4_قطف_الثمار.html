    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قطف الثمار</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #27ae60; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #a2d9ce; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-between;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .tree { width: 300px; height: 300px; background: #2ecc71; border-radius: 50%; position: absolute; top: 50px; border: 10px solid #27ae60; z-index: 10;}
        .trunk { width: 60px; height: 200px; background: #8e44ad; position: absolute; bottom: 0; border-radius: 10px 10px 0 0; z-index: 5;}
        
        .target-box { background: white; border-radius: 50%; padding: 10px; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-bottom: 20px; font-size: 60px; cursor: pointer;}
        
        .fruit { position: absolute; width: 60px; height: 60px; background: #e74c3c; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 1rem; cursor: pointer; z-index: 15; box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2); transition: transform 0.2s;}
        .fruit::before { content: ''; position: absolute; top: -5px; width: 10px; height: 10px; background: #27ae60; border-radius: 5px; }
        .fruit:active { transform: scale(0.9); }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>قطف الثمار 🍎</div>
        </div>
        
        <div class="tree" id="tree"></div>
        <div class="trunk"></div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">قطف الثمار 🍎</h1>
        <p style="font-size: 1.5rem;">اقطف الثمرة التي تحمل الكلمة المطابقة للصورة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 5);
            currentWord = selected[Math.floor(Math.random()*5)];
            
            document.getElementById('target-box').innerHTML = currentWord.image;
            speak(currentWord.word);
            
            const tree = document.getElementById('tree');
            tree.innerHTML = '';
            
            selected.forEach(w => {
                const f = document.createElement('div');
                f.className = 'fruit';
                f.textContent = w.word;
                
                f.style.left = (Math.random() * 200 + 20) + 'px';
                f.style.top = (Math.random() * 200 + 20) + 'px';
                
                f.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Yummy!'); score+=10; document.getElementById('score').textContent=score;
                        f.style.transform = 'translateY(200px)';
                        canClick = false; setTimeout(spawnLevel, 1000);
                    } else {
                        speak('No!'); f.style.background = '#34495e'; setTimeout(()=>f.style.background='#e74c3c', 300);
                    }
                };
                tree.appendChild(f);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
