<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تجميع الروبوت</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #95a5a6; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #7f8c8d; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2c3e50; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #1a252f;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .robot-stage { width: 200px; height: 250px; position: relative; display: flex; flex-direction: column; align-items: center;}
        .robot-part { width: 100%; display: flex; align-items: center; justify-content: center; font-size: 60px; filter: grayscale(100%) opacity(0.3); transition: all 0.5s;}
        .robot-part.active { filter: grayscale(0%) opacity(1); }
        .head { height: 80px; } .body { height: 100px; } .legs { height: 70px; }
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #2c3e50; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; cursor: pointer;}
        
        .options { display: flex; gap: 15px; z-index: 20; padding-bottom: 20px;}
        .opt-btn { width: 80px; height: 80px; background: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 50px; transition: transform 0.2s;}
        .opt-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>تجميع الروبوت 🤖</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="robot-stage">
            <div class="robot-part head" id="r-head">🤖</div>
            <div class="robot-part body" id="r-body">🎛️</div>
            <div class="robot-part legs" id="r-legs">🦿</div>
        </div>
        
        <div class="options" id="options"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">تجميع الروبوت 🤖</h1>
        <p style="font-size: 1.5rem;">أجب بشكل صحيح لتجميع أجزاء الروبوت!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;
        let robotParts = ['r-legs', 'r-body', 'r-head'];
        let currentPart = 0;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            selected.forEach(w => {
                let btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerHTML = w.image;
                
                btn.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Power up!'); score+=10; document.getElementById('score').textContent=score;
                        btn.style.background = '#2ecc71'; 
                        
                        document.getElementById(robotParts[currentPart]).classList.add('active');
                        currentPart++;
                        
                        canClick = false; 
                        setTimeout(() => {
                            if(currentPart >= 3) {
                                speak('Robot complete!');
                                setTimeout(()=>{
                                    currentPart = 0;
                                    document.querySelectorAll('.robot-part').forEach(p=>p.classList.remove('active'));
                                    spawnLevel();
                                }, 2000);
                            } else {
                                spawnLevel();
                            }
                        }, 1000);
                    } else {
                        speak('Error!'); btn.style.background = '#e74c3c'; setTimeout(()=>btn.style.background='white', 500);
                    }
                };
                opts.appendChild(btn);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            currentPart = 0;
            document.querySelectorAll('.robot-part').forEach(p=>p.classList.remove('active'));
            spawnLevel(); 
        }
    </script>
</body>
</html>
