    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسلق الشجرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #87ceeb; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #a2d9ce; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #2c3e50; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .tree-trunk { width: 80px; height: 100%; background: #8e44ad; position: absolute; left: 50%; transform: translateX(-50%); z-index: 5;}
        
        .monkey { position: absolute; left: 50%; transform: translateX(-50%); bottom: 20px; font-size: 70px; z-index: 20; transition: bottom 0.5s ease;}
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #8e44ad; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .branches-container { position: absolute; inset: 0; pointer-events: none; z-index: 10;}
        .branch { position: absolute; background: #9b59b6; height: 30px; width: 120px; border-radius: 15px; display: flex; align-items: center; justify-content: center; pointer-events: auto; cursor: pointer; font-size: 50px; box-shadow: 0 5px 0 #732d91;}
        .branch.left { right: 50%; border-radius: 15px 0 0 15px; }
        .branch.right { left: 50%; border-radius: 0 15px 15px 0; }
        .branch:active { transform: translateY(5px); box-shadow: 0 0 0; }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>تسلق الشجرة 🐒</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="tree-trunk"></div>
        <div class="branches-container" id="branches-container"></div>
        <div class="monkey" id="monkey">🐒</div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">تسلق الشجرة 🐒</h1>
        <p style="font-size: 1.5rem;">انقر على الغصن الذي يحمل الصورة المطابقة للكلمة ليتسلق القرد!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "duck", image: "🦆", type: "emoji" },
  { word: "cow", image: "🐄", type: "emoji" },
  { word: "chicken", image: "🐔", type: "emoji" },
  { word: "horse", image: "🐎", type: "emoji" },
  { word: "mouse", image: "🐭", type: "emoji" },
  { word: "milk", image: "🥛", type: "emoji" },
  { word: "mango", image: "🥭", type: "emoji" },
  { word: "moon", image: "🌙", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "goat", image: "🐐", type: "emoji" },
  { word: "gloves", image: "🧤", type: "emoji" },
  { word: "grapes", image: "🍇", type: "emoji" },
  { word: "girl", image: "👧", type: "emoji" },
  { word: "guitar", image: "🎸", type: "emoji" },
  { word: "octopus", image: "🐙", type: "emoji" },
  { word: "olive", image: "🫒", type: "emoji" },
  { word: "ostrich", image: "🦤", type: "emoji" },
  { word: "fox", image: "🦊", type: "emoji" },
  { word: "fish", image: "🐟", type: "emoji" },
  { word: "fork", image: "🍴", type: "emoji" },
  { word: "frog", image: "🐸", type: "emoji" },
  { word: "fan", image: "🪭", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;
        let monkeyHeight = 20;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 2);
            currentWord = selected[Math.floor(Math.random()*2)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('branches-container');
            container.innerHTML = '';
            
            selected.forEach((w, i) => {
                const b = document.createElement('div');
                b.className = 'branch ' + (i===0?'left':'right');
                b.innerHTML = `<span style="transform:translateY(-30px); position:absolute;">${w.image}</span>`;
                b.style.bottom = (monkeyHeight + 100) + 'px';
                
                b.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Ooh ooh!'); score+=10; document.getElementById('score').textContent=score;
                        monkeyHeight += 100;
                        if(monkeyHeight > document.getElementById('game-container').clientHeight - 150) monkeyHeight = 20;
                        document.getElementById('monkey').style.bottom = monkeyHeight + 'px';
                        canClick = false; setTimeout(spawnLevel, 1000);
                    } else {
                        speak('No!'); b.style.background = '#e74c3c'; setTimeout(()=>b.style.background='#9b59b6', 300);
                    }
                };
                container.appendChild(b);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; monkeyHeight=20; document.getElementById('score').textContent=score;
            document.getElementById('monkey').style.bottom = monkeyHeight + 'px';
            spawnLevel(); 
        }
    </script>
</body>
</html>
