    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بناء الجمل</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #8e44ad; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #9b59b6; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-box { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .target-box img { width: 120px; height: 120px; object-fit: contain; }
        .drop-zone { display: flex; gap: 10px; min-height: 80px; padding: 20px; background: rgba(255,255,255,0.2); border: 3px dashed white; border-radius: 20px; margin-bottom: 30px; justify-content: center; align-items: center; width: 80%; direction: ltr; }
        .word-bank { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; direction: ltr; }
        .word-piece { padding: 10px 20px; background: #f39c12; color: white; font-family: 'Fredoka One'; font-size: 2rem; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 0 #d35400; transition: transform 0.1s; }
        .word-piece:active { transform: translateY(5px); box-shadow: 0 0 0; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>المستوى: <span id="level">1</span></div>
        </div>
        
        <div class="target-box" onclick="speakTarget()">
            <img id="game-img" src="">
            <div id="hint-btn" style="font-size: 2rem; cursor: pointer;">🔊</div>
        </div>
        
        <div class="drop-zone" id="drop-zone"></div>
        <div class="word-bank" id="word-bank"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">بناء الجمل 🧩</h1>
        <p style="font-size: 1.5rem;">رتب الكلمات لتكوين الجملة الصحيحة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "father", img: "../../../assets/images/words/father.jpg", category: "family" },

  { word: "pencil", img: "../../../assets/images/words/pencil.jpg", category: "p" },
  { word: "pizza", img: "../../../assets/images/words/pizza.jpg", category: "p" },
  { word: "parrot", img: "../../../assets/images/words/parrot.jpg", category: "p" },
  { word: "potato", img: "../../../assets/images/words/potato.jpg", category: "p" },

  { word: "house", img: "../../../assets/images/words/house.jpg", category: "h" },
  { word: "hat", img: "../../../assets/images/words/hat.jpg", category: "h" },
  { word: "hands", img: "../../../assets/images/words/hands.jpg", category: "h" },
  { word: "door", img: "../../../assets/images/words/door.jpg", category: "d" },
  { word: "doll", img: "../../../assets/images/words/doll.jpg", category: "d" },
  { word: "dog", img: "../../../assets/images/words/dog.jpg", category: "d" },
  { word: "drum", img: "../../../assets/images/words/drum.jpg", category: "d" },
  { word: "duck", img: "../../../assets/images/words/duck.jpg", category: "d" },
  { word: "flowers", img: "../../../assets/images/words/flowers.jpg", category: "numbers" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let level = 1;
        
        let sentences = [
            { text: "this is my father", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👨</text></svg>" },
            { text: "this is my mother", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👩</text></svg>" },
            { text: "they are my parents", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👪</text></svg>" },
            { text: "how many flowers", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>💐</text></svg>" },
            { text: "there are 2 flowers", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌸🌸</text></svg>" },
            { text: "who is this", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>❓</text></svg>" }
        ];
        
        let currentSentence = null;
        let currentWords = [];
        let droppedWords = [];
        
        function spawnLevel() {
            currentSentence = sentences[Math.floor(Math.random() * sentences.length)];
            document.getElementById('game-img').src = currentSentence.img;
            speakTarget();
            
            currentWords = currentSentence.text.split(' ');
            let shuffled = [...currentWords].sort(()=>0.5-Math.random());
            droppedWords = [];
            
            renderDropZone();
            renderWordBank(shuffled);
        }
        
        function speakTarget() { speak(currentSentence.text); }
        
        function renderDropZone() {
            const dz = document.getElementById('drop-zone');
            dz.innerHTML = '';
            droppedWords.forEach((w, index) => {
                let d = document.createElement('div');
                d.className = 'word-piece';
                d.textContent = w;
                d.onclick = () => returnWord(w, index);
                dz.appendChild(d);
            });
            checkWin();
        }
        
        function renderWordBank(words) {
            const wb = document.getElementById('word-bank');
            wb.innerHTML = '';
            words.forEach(w => {
                let d = document.createElement('div');
                d.className = 'word-piece';
                d.textContent = w;
                d.onclick = () => addWord(w);
                wb.appendChild(d);
            });
        }
        
        function addWord(w) {
            droppedWords.push(w);
            let remaining = [];
            let found = false;
            let currentBank = Array.from(document.getElementById('word-bank').children).map(c=>c.textContent);
            for(let i=0; i<currentBank.length; i++) {
                if(currentBank[i] === w && !found) { found = true; }
                else { remaining.push(currentBank[i]); }
            }
            renderWordBank(remaining);
            renderDropZone();
        }
        
        function returnWord(w, index) {
            droppedWords.splice(index, 1);
            let currentBank = Array.from(document.getElementById('word-bank').children).map(c=>c.textContent);
            currentBank.push(w);
            renderWordBank(currentBank);
            renderDropZone();
        }
        
        function checkWin() {
            if(droppedWords.length === currentWords.length) {
                if(droppedWords.join(' ') === currentSentence.text) {
                    speak("Excellent!"); score+=20; document.getElementById('score').textContent=score;
                    document.getElementById('drop-zone').style.borderColor = '#2ecc71';
                    setTimeout(() => {
                        document.getElementById('drop-zone').style.borderColor = 'white';
                        spawnLevel();
                    }, 1500);
                } else {
                    speak("Try again");
                    document.getElementById('drop-zone').style.borderColor = '#e74c3c';
                    setTimeout(() => { document.getElementById('drop-zone').style.borderColor = 'white'; }, 1000);
                }
            }
        }

        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; spawnLevel(); }
    </script>
</body>
</html>
