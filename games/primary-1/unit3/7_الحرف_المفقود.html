    <meta charset="UTF-8">

    <style>
        body { margin: 0; background: #16a085; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #1abc9c; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .image-box { width: 200px; height: 200px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; cursor: pointer;}
        .image-box img { width: 80%; height: 80%; object-fit: contain; }
        .word-box { display: flex; gap: 10px; font-family: 'Fredoka One'; font-size: 3rem; color: #fff; direction: ltr; }
        .letter-box { width: 60px; height: 60px; background: #f39c12; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 0 #d35400; text-transform: lowercase;}
        .missing { background: #ecf0f1; color: #2c3e50; }
        .options { display: flex; gap: 15px; margin-top: 40px; direction: ltr;}
        .opt-btn { width: 60px; height: 60px; font-family: 'Fredoka One'; font-size: 2.5rem; background: #3498db; border: none; border-radius: 10px; color: white; cursor: pointer; box-shadow: 0 5px 0 #2980b9; text-transform: lowercase;}
        .opt-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
    </style>
<script src="../../../js/game-enhancements.js"></script>

<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>

        </div>
        <div class="image-box" onclick="if(currentWord) speak(currentWord.word)"><img id="game-img" src=""></div>
        <div class="word-box" id="word-box"></div>
        <div class="options" id="options"></div>
    </div>
    <div id="start-screen" class="screen">

        <button class="start" onclick="startGame()">العب!</button>

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let level = 1;
        
        let currentWord = null;
        let missingIndex = 0;
        
        function spawnLevel() {
            currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
            document.getElementById('game-img').src = currentWord.img;
            speak(currentWord.word);
            
            missingIndex = Math.floor(Math.random() * currentWord.word.length);
            const box = document.getElementById('word-box');
            box.innerHTML = '';
            
            for(let i=0; i<currentWord.word.length; i++) {
                let l = document.createElement('div');
                l.className = 'letter-box';
                if(i === missingIndex) { l.classList.add('missing'); l.textContent = '_'; l.id = 'missing-box'; }
                else { l.textContent = currentWord.word[i]; }
                box.appendChild(l);
            }
            
            const correctLetter = currentWord.word[missingIndex].toLowerCase();
            let letters = [correctLetter];
            const alphabet = 'abcdefghijklmnopqrstuvwxyz';
            while(letters.length < 4) {
                let r = alphabet[Math.floor(Math.random()*26)];
                if(!letters.includes(r)) letters.push(r);
            }
            letters.sort(()=>0.5-Math.random());
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            letters.forEach(let => {
                let b = document.createElement('button');
                b.className = 'opt-btn'; b.textContent = let;
                b.onclick = () => {
                    if(let === correctLetter) {
                        document.getElementById('missing-box').textContent = let;
                        document.getElementById('missing-box').style.background = '#2ecc71';
                        document.getElementById('missing-box').style.color = 'white';
                        speak('Correct!'); score+=10; document.getElementById('score').textContent=score;
                        setTimeout(spawnLevel, 1500);
                    } else {
                        speak('Try again'); b.style.background = '#e74c3c'; setTimeout(()=>b.style.background='#3498db', 500);
                    }
                };
                opts.appendChild(b);
            });
        }
        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; spawnLevel(); }
    </script>
