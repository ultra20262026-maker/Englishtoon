    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بناء البرج</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #34495e; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2c3e50; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 20px;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .tower { display: flex; flex-direction: column-reverse; align-items: center; gap: 5px; margin-bottom: 20px; width: 100%; height: 50vh; justify-content: flex-start; }
        .block { width: 150px; height: 50px; background: #e67e22; border: 3px solid #d35400; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 1.5rem; color: white; box-shadow: 0 5px 10px rgba(0,0,0,0.3); transition: transform 0.3s; animation: dropIn 0.3s ease-out;}
        @keyframes dropIn { from { transform: translateY(-100px); opacity: 0;} to { transform: translateY(0); opacity: 1;} }
        
        .question-area { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .target-img { width: 100px; height: 100px; background: white; border-radius: 20px; padding: 10px; margin-bottom: 10px; cursor: pointer;}
        .target-img img { width: 100%; height: 100%; object-fit: contain; }
        
        .options { display: flex; gap: 15px; direction: ltr;}
        .opt-btn { padding: 10px 20px; font-family: 'Fredoka One'; font-size: 1.5rem; background: #3498db; border: none; border-radius: 10px; color: white; cursor: pointer; box-shadow: 0 5px 0 #2980b9; }
        .opt-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>البرج: <span id="tower-height">0</span></div>
        </div>
        
        <div class="tower" id="tower"></div>
        
        <div class="question-area">
            <div class="target-img" onclick="if(currentWord) speak(currentWord.word)"><img id="game-img" src=""></div>
            <div class="options" id="options"></div>
        </div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">بناء البرج 🏗️</h1>
        <p style="font-size: 1.5rem;">اختر الكلمة الصحيحة لتبني أعلى برج!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "father", img: "../../../assets/images/words/father.jpg", category: "family" },
  { word: "mother", img: "../../../assets/images/words/mother.jpg", category: "family" },
  { word: "brother", img: "../../../assets/images/words/brother.jpg", category: "family" },
  { word: "sister", img: "../../../assets/images/words/sister.jpg", category: "family" },
  { word: "parents", img: "../../../assets/images/words/parents.jpg", category: "family" },
  { word: "grandfather", img: "../../../assets/images/words/grandfather.jpg", category: "family" },
  { word: "grandmother", img: "../../../assets/images/words/grandmother.jpg", category: "family" },
  { word: "nose", img: "../../../assets/images/words/nose.jpg", category: "n" },
  { word: "nail", img: "../../../assets/images/words/nail.jpg", category: "n" },
  { word: "neck", img: "../../../assets/images/words/neck.jpg", category: "n" },
  { word: "nurse", img: "../../../assets/images/words/nurse.jpg", category: "n" },
  { word: "net", img: "../../../assets/images/words/net.jpg", category: "n" },
  { word: "pencil", img: "../../../assets/images/words/pencil.jpg", category: "p" },
  { word: "pizza", img: "../../../assets/images/words/pizza.jpg", category: "p" },
  { word: "parrot", img: "../../../assets/images/words/parrot.jpg", category: "p" },
  { word: "potato", img: "../../../assets/images/words/potato.jpg", category: "p" },
  { word: "panda", img: "../../../assets/images/words/panda.jpg", category: "p" },
  { word: "one", img: "../../../assets/images/words/one.jpg", category: "numbers" },
  { word: "two", img: "../../../assets/images/words/two.jpg", category: "numbers" },
  { word: "three", img: "../../../assets/images/words/three.jpg", category: "numbers" },
  { word: "four", img: "../../../assets/images/words/four.jpg", category: "numbers" },
  { word: "five", img: "../../../assets/images/words/five.jpg", category: "numbers" },
  { word: "hair", img: "../../../assets/images/words/hair.jpg", category: "h" },
  { word: "horse", img: "../../../assets/images/words/horse.jpg", category: "h" },
  { word: "house", img: "../../../assets/images/words/house.jpg", category: "h" },
  { word: "hat", img: "../../../assets/images/words/hat.jpg", category: "h" },
  { word: "hands", img: "../../../assets/images/words/hands.jpg", category: "h" },
  { word: "door", img: "../../../assets/images/words/door.jpg", category: "d" },
  { word: "doll", img: "../../../assets/images/words/doll.jpg", category: "d" },
  { word: "dog", img: "../../../assets/images/words/dog.jpg", category: "d" },
  { word: "drum", img: "../../../assets/images/words/drum.jpg", category: "d" },
  { word: "duck", img: "../../../assets/images/words/duck.jpg", category: "d" },
  { word: "flowers", img: "../../../assets/images/words/flowers.jpg", category: "numbers" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let towerHeight = 0;
        let currentWord = null;
        
        function spawnLevel() {
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0,3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('game-img').src = currentWord.img;
            speak(currentWord.word);
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            selected.forEach(w => {
                let b = document.createElement('button');
                b.className = 'opt-btn'; b.textContent = w.word;
                b.onclick = () => {
                    if(w.word === currentWord.word) {
                        speak('Great!'); score+=10; towerHeight++;
                        document.getElementById('score').textContent=score;
                        document.getElementById('tower-height').textContent=towerHeight;
                        addBlock(w.word);
                        if(towerHeight >= 8) {
                            setTimeout(() => {
                                document.getElementById('tower').innerHTML = ''; towerHeight = 0;
                                document.getElementById('tower-height').textContent=towerHeight;
                            }, 2000);
                        }
                        setTimeout(spawnLevel, 1000);
                    } else {
                        speak('Oops!'); b.style.background = '#e74c3c';
                        setTimeout(()=>b.style.background='#3498db', 500);
                        if(towerHeight > 0) {
                            let tower = document.getElementById('tower');
                            tower.removeChild(tower.lastChild);
                            towerHeight--;
                            document.getElementById('tower-height').textContent=towerHeight;
                        }
                    }
                };
                opts.appendChild(b);
            });
        }
        
        function addBlock(word) {
            const tower = document.getElementById('tower');
            const block = document.createElement('div');
            block.className = 'block';
            const colors = ['#e67e22', '#2ecc71', '#9b59b6', '#f1c40f', '#e74c3c'];
            block.style.background = colors[towerHeight % colors.length];
            block.textContent = word;
            tower.appendChild(block);
        }

        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; towerHeight=0; document.getElementById('tower').innerHTML=''; spawnLevel(); }
    </script>
</body>
</html>
