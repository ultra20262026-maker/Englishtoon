    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>السمكة الجائعة</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2980b9; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #3498db; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e67e22; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #d35400;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .fish { position: absolute; font-size: 5rem; z-index: 20; transition: left 0.1s, top 0.1s; transform-origin: center;}
        
        .food { position: absolute; width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid #f1c40f; box-shadow: 0 5px 10px rgba(0,0,0,0.2); transition: transform 0.1s;}
        .food img { width: 80%; height: 80%; object-fit: contain; }
        
        .word-target { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-family: 'Fredoka One'; font-size: 3rem; color: white; background: rgba(0,0,0,0.5); padding: 10px 30px; border-radius: 20px; z-index: 10;}
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>المستوى: <span id="level">1</span></div>
        </div>
        
        <div class="word-target" id="word-target" onclick="speak(currentWord.word)">word</div>
        
        <div class="fish" id="fish">🐟</div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">السمكة الجائعة 🐟</h1>
        <p style="font-size: 1.5rem;">اسحب السمكة لتأكل الصورة المطابقة للكلمة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "father", img: "../../../assets/images/words/father.jpg", category: "family" },
  { word: "mother", img: "../../../assets/images/words/mother.jpg", category: "family" },
  { word: "brother", img: "../../../assets/images/words/brother.jpg", category: "family" },
  { word: "sister", img: "../../../assets/images/words/sister.jpg", category: "family" },
  { word: "parents", img: "../../../assets/images/words/parents.jpg", category: "family" },
  { word: "grandfather", img: "../../../assets/images/words/grandfather.jpg", category: "family" },
  { word: "grandmother", img: "../../../assets/images/words/grandmother.jpg", category: "family" },
  { word: "nose", img: "../../../assets/images/words/nose.jpg", category: "n" },
  { word: "nail", img: "../../../assets/images/words/nail.jpg", category: "n" },
  { word: "neck", img: "../../../assets/images/words/neck.jpg", category: "n" },
  { word: "nurse", img: "../../../assets/images/words/nurse.jpg", category: "n" },
  { word: "net", img: "../../../assets/images/words/net.jpg", category: "n" },
  { word: "pencil", img: "../../../assets/images/words/pencil.jpg", category: "p" },
  { word: "pizza", img: "../../../assets/images/words/pizza.jpg", category: "p" },
  { word: "parrot", img: "../../../assets/images/words/parrot.jpg", category: "p" },
  { word: "potato", img: "../../../assets/images/words/potato.jpg", category: "p" },
  { word: "panda", img: "../../../assets/images/words/panda.jpg", category: "p" },
  { word: "one", img: "../../../assets/images/words/one.jpg", category: "numbers" },
  { word: "two", img: "../../../assets/images/words/two.jpg", category: "numbers" },
  { word: "three", img: "../../../assets/images/words/three.jpg", category: "numbers" },
  { word: "four", img: "../../../assets/images/words/four.jpg", category: "numbers" },
  { word: "five", img: "../../../assets/images/words/five.jpg", category: "numbers" },
  { word: "hair", img: "../../../assets/images/words/hair.jpg", category: "h" },
  { word: "horse", img: "../../../assets/images/words/horse.jpg", category: "h" },
  { word: "house", img: "../../../assets/images/words/house.jpg", category: "h" },
  { word: "hat", img: "../../../assets/images/words/hat.jpg", category: "h" },
  { word: "hands", img: "../../../assets/images/words/hands.jpg", category: "h" },
  { word: "door", img: "../../../assets/images/words/door.jpg", category: "d" },
  { word: "doll", img: "../../../assets/images/words/doll.jpg", category: "d" },
  { word: "dog", img: "../../../assets/images/words/dog.jpg", category: "d" },
  { word: "drum", img: "../../../assets/images/words/drum.jpg", category: "d" },
  { word: "duck", img: "../../../assets/images/words/duck.jpg", category: "d" },
  { word: "flowers", img: "../../../assets/images/words/flowers.jpg", category: "numbers" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let foods = [];
        let fishX = 100, fishY = 100;
        let spawnInterval, loopInterval;
        
        function setTarget() {
            currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
            document.getElementById('word-target').textContent = currentWord.word;
            speak(currentWord.word);
        }
        
        function spawnFood() {
            if(foods.length > 5) return;
            const isCorrect = Math.random() > 0.5;
            const wordObj = isCorrect ? currentWord : wordsData[Math.floor(Math.random() * wordsData.length)];
            const f = document.createElement('div');
            f.className = 'food';
            f.innerHTML = `<img src="${wordObj.img}">`;
            
            f.dataset.x = Math.random() * (document.getElementById('game-container').clientWidth - 100);
            f.dataset.y = -60;
            f.dataset.word = wordObj.word;
            f.dataset.speedY = Math.random() * 2 + 1;
            
            f.style.left = f.dataset.x + 'px';
            f.style.top = f.dataset.y + 'px';
            
            document.getElementById('game-container').appendChild(f);
            foods.push(f);
        }
        
        function gameLoop() {
            // move foods
            for(let i=foods.length-1; i>=0; i--) {
                let f = foods[i];
                let y = parseFloat(f.dataset.y) + parseFloat(f.dataset.speedY);
                f.dataset.y = y;
                f.style.top = y + 'px';
                
                // collision detection
                let fx = parseFloat(f.dataset.x) + 30;
                let fy = parseFloat(f.dataset.y) + 30;
                let dx = fishX + 40 - fx;
                let dy = fishY + 40 - fy;
                let distance = Math.sqrt(dx*dx + dy*dy);
                
                if(distance < 50) {
                    if(f.dataset.word === currentWord.word) {
                        speak('Yummy!'); score+=10; document.getElementById('score').textContent=score;
                        f.remove(); foods.splice(i, 1); setTarget();
                    } else {
                        speak('Yuck!'); f.style.borderColor = '#e74c3c'; 
                    }
                } else if(y > document.getElementById('game-container').clientHeight) { 
                    f.remove(); foods.splice(i, 1); 
                }
            }
        }
        
        document.getElementById('game-container').addEventListener('touchmove', (e) => {
            e.preventDefault();
            let touch = e.touches[0];
            updateFishPosition(touch.clientX, touch.clientY);
        });
        document.getElementById('game-container').addEventListener('mousemove', (e) => {
            updateFishPosition(e.clientX, e.clientY);
        });
        
        function updateFishPosition(x, y) {
            let container = document.getElementById('game-container').getBoundingClientRect();
            let targetX = x - container.left - 40;
            let targetY = y - container.top - 40;
            
            if(targetX > fishX) document.getElementById('fish').style.transform = 'scaleX(-1)';
            else document.getElementById('fish').style.transform = 'scaleX(1)';
            
            fishX = targetX; fishY = targetY;
            document.getElementById('fish').style.left = fishX + 'px';
            document.getElementById('fish').style.top = fishY + 'px';
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            foods.forEach(f=>f.remove()); foods=[];
            setTarget();
            clearInterval(spawnInterval); clearInterval(loopInterval);
            spawnInterval = setInterval(spawnFood, 2000);
            loopInterval = setInterval(gameLoop, 30);
        }
    </script>
</body>
</html>
