    <meta charset="UTF-8">

    <title>تصنيف الكلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #f39c12; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #e67e22; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .bins { display: flex; gap: 20px; margin-bottom: 40px; width: 100%; justify-content: center; }
        .bin { width: 150px; height: 150px; background: rgba(255,255,255,0.2); border: 5px dashed #fff; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Cairo'; font-size: 1.5rem; color: white; cursor: pointer; transition: background 0.3s;}
        .draggable-word { padding: 15px 30px; background: #fff; color: #333; font-family: 'Fredoka One'; font-size: 2.5rem; border-radius: 20px; cursor: pointer; user-select: none; box-shadow: 0 5px 0 #bdc3c7; }
        .draggable-word:active { transform: translateY(5px); box-shadow: 0 0 0;}
    </style>
<script src="../../../js/game-enhancements.js"></script>

    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>المستوى: <span id="level">1</span></div>
        </div>
        <div class="bins" id="bins"></div>
        <div class="draggable-word" id="drag-word">word</div>
    </div>
    <div id="start-screen" class="screen">

        <button class="start" onclick="startGame()">العب!</button>

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let level = 1;
        
        let categories = ['family', 'numbers', 'd', 'p', 'h', 'n'];
        let currentCategories = [];
        let currentWordObj = null;

        function spawnLevel() {
            currentCategories = [...categories].sort(()=>0.5-Math.random()).slice(0,2);
            
            let possibleWords = wordsData.filter(w => currentCategories.includes(w.category));
            currentWordObj = possibleWords[Math.floor(Math.random() * possibleWords.length)];
            
            document.getElementById('bins').innerHTML = '';
            currentCategories.forEach(c => {
                let bin = document.createElement('div');
                bin.className = 'bin';
                let title = c === 'family' ? 'العائلة' : (c==='numbers'?'الأرقام' : 'حرف ' + c.toUpperCase());
                bin.innerHTML = `<div>${title}</div>`;
                bin.onclick = () => {
                    if(currentWordObj.category === c) {
                        speak('Excellent!'); score+=10; document.getElementById('score').textContent=score;
                        bin.style.background = '#2ecc71'; setTimeout(spawnLevel, 1000);
                    } else {
                        speak('Wrong box!'); bin.style.background = '#e74c3c'; setTimeout(()=>bin.style.background='rgba(255,255,255,0.2)', 500);
                    }
                };
                document.getElementById('bins').appendChild(bin);
            });
            
            let wEl = document.getElementById('drag-word');
            wEl.textContent = currentWordObj.word;
            wEl.onclick = () => speak(currentWordObj.word);
            speak(currentWordObj.word);
        }
        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; spawnLevel(); }
