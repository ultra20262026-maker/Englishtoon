    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صائد الفراشات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #8e44ad; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #9b59b6; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-box { position: absolute; top: 80px; width: 150px; height: 150px; background: white; border-radius: 20px; padding: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 20;}
        .target-box img { width: 100%; height: 100%; object-fit: contain; }
        
        .butterfly { position: absolute; font-size: 3rem; font-family: 'Fredoka One'; color: white; cursor: pointer; user-select: none; transition: transform 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px;}
        .butterfly:active { transform: scale(0.8); }
        .butterfly .wings { font-size: 4rem; }
        .butterfly .word { background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 10px; font-size: 1.2rem;}
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>المستوى: <span id="level">1</span></div>
        </div>
        
        <div class="target-box" onclick="if(currentWord) speak(currentWord.word)">
            <img id="game-img" src="">
        </div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">صائد الفراشات 🦋</h1>
        <p style="font-size: 1.5rem;">اصطد الفراشة التي تحمل الكلمة الصحيحة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "father", img: "../../../assets/images/words/father.jpg", category: "family" },
  { word: "mother", img: "../../../assets/images/words/mother.jpg", category: "family" },
  { word: "brother", img: "../../../assets/images/words/brother.jpg", category: "family" },
  { word: "sister", img: "../../../assets/images/words/sister.jpg", category: "family" },
  { word: "parents", img: "../../../assets/images/words/parents.jpg", category: "family" },
  { word: "grandfather", img: "../../../assets/images/words/grandfather.jpg", category: "family" },
  { word: "grandmother", img: "../../../assets/images/words/grandmother.jpg", category: "family" },
  { word: "nose", img: "../../../assets/images/words/nose.jpg", category: "n" },
  { word: "nail", img: "../../../assets/images/words/nail.jpg", category: "n" },
  { word: "neck", img: "../../../assets/images/words/neck.jpg", category: "n" },
  { word: "nurse", img: "../../../assets/images/words/nurse.jpg", category: "n" },
  { word: "net", img: "../../../assets/images/words/net.jpg", category: "n" },
  { word: "pencil", img: "../../../assets/images/words/pencil.jpg", category: "p" },
  { word: "pizza", img: "../../../assets/images/words/pizza.jpg", category: "p" },
  { word: "parrot", img: "../../../assets/images/words/parrot.jpg", category: "p" },
  { word: "potato", img: "../../../assets/images/words/potato.jpg", category: "p" },
  { word: "panda", img: "../../../assets/images/words/panda.jpg", category: "p" },
  { word: "one", img: "../../../assets/images/words/one.jpg", category: "numbers" },
  { word: "two", img: "../../../assets/images/words/two.jpg", category: "numbers" },
  { word: "three", img: "../../../assets/images/words/three.jpg", category: "numbers" },
  { word: "four", img: "../../../assets/images/words/four.jpg", category: "numbers" },
  { word: "five", img: "../../../assets/images/words/five.jpg", category: "numbers" },
  { word: "hair", img: "../../../assets/images/words/hair.jpg", category: "h" },
  { word: "horse", img: "../../../assets/images/words/horse.jpg", category: "h" },
  { word: "house", img: "../../../assets/images/words/house.jpg", category: "h" },
  { word: "hat", img: "../../../assets/images/words/hat.jpg", category: "h" },
  { word: "hands", img: "../../../assets/images/words/hands.jpg", category: "h" },
  { word: "door", img: "../../../assets/images/words/door.jpg", category: "d" },
  { word: "doll", img: "../../../assets/images/words/doll.jpg", category: "d" },
  { word: "dog", img: "../../../assets/images/words/dog.jpg", category: "d" },
  { word: "drum", img: "../../../assets/images/words/drum.jpg", category: "d" },
  { word: "duck", img: "../../../assets/images/words/duck.jpg", category: "d" },
  { word: "flowers", img: "../../../assets/images/words/flowers.jpg", category: "numbers" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let butterflies = [];
        let spawnInterval, moveInterval;
        
        function setTarget() {
            currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
            document.getElementById('game-img').src = currentWord.img;
            speak(currentWord.word);
        }
        
        function spawnButterfly() {
            const isCorrect = Math.random() > 0.6;
            const wordObj = isCorrect ? currentWord : wordsData[Math.floor(Math.random() * wordsData.length)];
            const b = document.createElement('div');
            b.className = 'butterfly';
            b.innerHTML = `<div class="wings">🦋</div><div class="word">${wordObj.word}</div>`;
            
            b.dataset.x = Math.random() * (document.getElementById('game-container').clientWidth - 100);
            b.dataset.y = document.getElementById('game-container').clientHeight + 50;
            b.dataset.speedX = (Math.random() - 0.5) * 5;
            b.dataset.speedY = -(Math.random() * 2 + 1);
            
            b.style.left = b.dataset.x + 'px';
            b.style.top = b.dataset.y + 'px';
            
            b.onclick = () => {
                if(wordObj.word === currentWord.word) {
                    speak('Got it!'); score+=10; document.getElementById('score').textContent=score;
                    b.remove(); butterflies = butterflies.filter(x=>x!==b); setTarget();
                } else {
                    speak('Wrong!'); b.style.color = '#e74c3c'; setTimeout(()=>b.style.color='white', 300);
                }
            };
            document.getElementById('game-container').appendChild(b);
            butterflies.push(b);
        }
        
        function animateButterflies() {
            for(let i=butterflies.length-1; i>=0; i--) {
                let b = butterflies[i];
                let x = parseFloat(b.dataset.x) + parseFloat(b.dataset.speedX);
                let y = parseFloat(b.dataset.y) + parseFloat(b.dataset.speedY);
                
                if(x < 0 || x > document.getElementById('game-container').clientWidth - 100) b.dataset.speedX *= -1;
                
                b.dataset.x = x; b.dataset.y = y;
                b.style.left = x + 'px'; b.style.top = y + 'px';
                
                if(y < -150) { b.remove(); butterflies.splice(i, 1); }
            }
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            butterflies.forEach(b=>b.remove()); butterflies=[];
            setTarget();
            clearInterval(spawnInterval); clearInterval(moveInterval);
            spawnInterval = setInterval(spawnButterfly, 1500);
            moveInterval = setInterval(animateButterflies, 30);
        }
    </script>
</body>
</html>
