    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كرة السلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #e67e22; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #d35400; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-around;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .hoop-container { display: flex; gap: 30px; justify-content: center; width: 100%; }
        .hoop { width: 150px; height: 180px; background: rgba(255,255,255,0.1); border: 5px solid #fff; border-radius: 10px 10px 50px 50px; display: flex; flex-direction: column; align-items: center; font-family: 'Fredoka One'; font-size: 1.5rem; color: white; cursor: pointer; padding-top: 10px;}
        .hoop img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; background: white; border-radius: 10px; padding: 5px;}
        
        .ball-area { height: 150px; display: flex; align-items: center; justify-content: center;}
        .ball { width: 80px; height: 80px; background: #e74c3c; border-radius: 50%; box-shadow: inset -10px -10px 0 rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 4rem; transition: transform 0.5s ease-out, top 0.5s ease-out; position: absolute; bottom: 50px; user-select: none; z-index: 20;}
        .ball::before { content: ''; position: absolute; width: 100%; height: 2px; background: rgba(0,0,0,0.3); transform: rotate(45deg); }
        .ball::after { content: ''; position: absolute; width: 100%; height: 2px; background: rgba(0,0,0,0.3); transform: rotate(-45deg); }
        
        .word-tag { position: absolute; bottom: 140px; font-family: 'Fredoka One'; font-size: 3rem; color: white; text-shadow: 2px 2px 0 #000; z-index: 10; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>المستوى: <span id="level">1</span></div>
        </div>
        
        <div class="hoop-container" id="hoops"></div>
        
        <div class="word-tag" id="word-tag">word</div>
        <div class="ball" id="ball"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">كرة السلة 🏀</h1>
        <p style="font-size: 1.5rem;">سدد الكرة في السلة التي تطابق الكلمة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "father", img: "../../../assets/images/words/father.jpg", category: "family" },
  { word: "mother", img: "../../../assets/images/words/mother.jpg", category: "family" },
  { word: "brother", img: "../../../assets/images/words/brother.jpg", category: "family" },
  { word: "sister", img: "../../../assets/images/words/sister.jpg", category: "family" },
  { word: "parents", img: "../../../assets/images/words/parents.jpg", category: "family" },
  { word: "grandfather", img: "../../../assets/images/words/grandfather.jpg", category: "family" },
  { word: "grandmother", img: "../../../assets/images/words/grandmother.jpg", category: "family" },
  { word: "nose", img: "../../../assets/images/words/nose.jpg", category: "n" },
  { word: "nail", img: "../../../assets/images/words/nail.jpg", category: "n" },
  { word: "neck", img: "../../../assets/images/words/neck.jpg", category: "n" },
  { word: "nurse", img: "../../../assets/images/words/nurse.jpg", category: "n" },
  { word: "net", img: "../../../assets/images/words/net.jpg", category: "n" },
  { word: "pencil", img: "../../../assets/images/words/pencil.jpg", category: "p" },
  { word: "pizza", img: "../../../assets/images/words/pizza.jpg", category: "p" },
  { word: "parrot", img: "../../../assets/images/words/parrot.jpg", category: "p" },
  { word: "potato", img: "../../../assets/images/words/potato.jpg", category: "p" },
  { word: "panda", img: "../../../assets/images/words/panda.jpg", category: "p" },
  { word: "one", img: "../../../assets/images/words/one.jpg", category: "numbers" },
  { word: "two", img: "../../../assets/images/words/two.jpg", category: "numbers" },
  { word: "three", img: "../../../assets/images/words/three.jpg", category: "numbers" },
  { word: "four", img: "../../../assets/images/words/four.jpg", category: "numbers" },
  { word: "five", img: "../../../assets/images/words/five.jpg", category: "numbers" },
  { word: "hair", img: "../../../assets/images/words/hair.jpg", category: "h" },
  { word: "horse", img: "../../../assets/images/words/horse.jpg", category: "h" },
  { word: "house", img: "../../../assets/images/words/house.jpg", category: "h" },
  { word: "hat", img: "../../../assets/images/words/hat.jpg", category: "h" },
  { word: "hands", img: "../../../assets/images/words/hands.jpg", category: "h" },
  { word: "door", img: "../../../assets/images/words/door.jpg", category: "d" },
  { word: "doll", img: "../../../assets/images/words/doll.jpg", category: "d" },
  { word: "dog", img: "../../../assets/images/words/dog.jpg", category: "d" },
  { word: "drum", img: "../../../assets/images/words/drum.jpg", category: "d" },
  { word: "duck", img: "../../../assets/images/words/duck.jpg", category: "d" },
  { word: "flowers", img: "../../../assets/images/words/flowers.jpg", category: "numbers" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let isShooting = false;
        
        function spawnLevel() {
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0,3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('word-tag').textContent = currentWord.word;
            speak(currentWord.word);
            
            const hoops = document.getElementById('hoops');
            hoops.innerHTML = '';
            
            selected.forEach((w, i) => {
                let h = document.createElement('div');
                h.className = 'hoop';
                h.innerHTML = `<img src="${w.img}">`;
                h.onclick = (e) => {
                    if(!isShooting) shootBall(h, w);
                };
                hoops.appendChild(h);
            });
            
            resetBall();
        }
        
        function shootBall(hoopEl, wordObj) {
            isShooting = true;
            const ball = document.getElementById('ball');
            const hoopRect = hoopEl.getBoundingClientRect();
            const ballRect = ball.getBoundingClientRect();
            
            const targetX = hoopRect.left + hoopRect.width/2 - ballRect.width/2;
            const targetY = hoopRect.top + hoopRect.height/2 - ballRect.height/2;
            
            ball.style.transform = `translate(${targetX - ballRect.left}px, ${targetY - ballRect.top}px) scale(0.5)`;
            
            setTimeout(() => {
                if(wordObj.word === currentWord.word) {
                    speak('Score!'); score+=10; document.getElementById('score').textContent=score;
                    hoopEl.style.borderColor = '#2ecc71';
                    setTimeout(spawnLevel, 1000);
                } else {
                    speak('Miss!'); hoopEl.style.borderColor = '#e74c3c';
                    setTimeout(() => { hoopEl.style.borderColor = 'white'; resetBall(); }, 1000);
                }
            }, 500);
        }
        
        function resetBall() {
            isShooting = false;
            const ball = document.getElementById('ball');
            ball.style.transform = `translate(0, 0) scale(1)`;
        }

        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; document.getElementById('score').textContent=score; spawnLevel(); }
    </script>
</body>
</html>
