    <meta charset="UTF-8">

    <style>
        body { margin: 0; background: #e74c3c; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #c0392b; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; perspective: 1000px; }
        .mem-card { width: 100px; height: 120px; position: relative; transform-style: preserve-3d; transition: transform 0.5s; cursor: pointer; }
        .mem-card.flipped { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 10px rgba(0,0,0,0.3); border: 3px solid #fff; background: #fff;}
        .face.front { background: #34495e; color: #fff; font-size: 3rem; transform: rotateY(0deg); }
        .face.back { transform: rotateY(180deg); flex-direction: column; }
        .face.back img { width: 60%; height: 60%; object-fit: contain; }
        .face.back span { font-family: 'Fredoka One'; font-size: 1.2rem; color: #333; margin-top: 5px; }
        .matched { visibility: hidden; opacity: 0; transition: visibility 0s 0.5s, opacity 0.5s linear; }
    </style>
<script src="../../../js/game-enhancements.js"></script>

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let level = 1;
        
        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matches = 0;

        function spawnLevel() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            matches = 0;
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 4); // 4 pairs = 8 cards
            let cardsArray = [...selected, ...selected].sort(()=>0.5-Math.random());
            
            cardsArray.forEach(item => {
                let d = document.createElement('div');
                d.className = 'mem-card';
                d.dataset.word = item.word;
                d.innerHTML = `
                    <div class="face front">❓</div>
                    <div class="face back">
                        <img src="${item.img}">
                        <span>${item.word}</span>
                    </div>
                `;
                d.onclick = () => flipCard(d);
                grid.appendChild(d);
            });
        }

        function flipCard(card) {
            if (lockBoard) return;
            if (card === firstCard) return;

            card.classList.add('flipped');
            speak(card.dataset.word);

            if (!hasFlippedCard) {
                hasFlippedCard = true;
                firstCard = card;
                return;
            }

            secondCard = card;
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.word === secondCard.dataset.word;
            isMatch ? disableCards() : unflipCards();
        }

        function disableCards() {
            score+=10; document.getElementById('score').textContent=score;
            setTimeout(() => {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
                resetBoard();
                matches++;
                if(matches === 4) setTimeout(spawnLevel, 1000);
            }, 1000);
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1500);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; spawnLevel(); }
    </script>
