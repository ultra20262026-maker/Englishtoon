        body { margin: 0; background: #8e44ad; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #9b59b6; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-area { position: absolute; bottom: 20px; width: 150px; height: 150px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .target-area img { width: 80%; height: 80%; object-fit: contain; }
        .falling-word { position: absolute; font-family: 'Fredoka One'; font-size: 2rem; background: #f1c40f; padding: 10px; border-radius: 20px; cursor: pointer; direction: ltr; }
        
    </style>
<script src="../../../js/game-enhancements.js"></script>

    <div id="start-screen" class="screen">

        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">أحسنت!</h1>

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let level = 1;
        
        let currentTarget = null;
        let fallingInterval, spawnInterval;
        let activeWords = [];
        let speed = 2;
        const container = document.getElementById('game-container');
        
        function setTarget() {
            currentTarget = wordsData[Math.floor(Math.random() * wordsData.length)];
            document.getElementById('target-img').src = currentTarget.img;
            speak(currentTarget.word);
        }
        function spawnWord() {
            const wordData = Math.random() > 0.5 ? currentTarget : wordsData[Math.floor(Math.random() * wordsData.length)];
            const el = document.createElement('div');
            el.className = 'falling-word'; el.textContent = wordData.word;
            el.style.left = Math.random() * (container.clientWidth - 100) + 'px';
            el.dataset.y = -50;
            el.onclick = () => {
                if(wordData.word === currentTarget.word) {
                    score += 10; document.getElementById('score').textContent = score; speak("Good!");
                    el.remove(); activeWords = activeWords.filter(w=>w!==el); setTarget();
                    if(score >= 100) { clearInterval(fallingInterval); clearInterval(spawnInterval); document.getElementById('end-screen').classList.remove('hidden-screen'); }
                } else {
                    speak("No!"); el.style.background = 'red'; setTimeout(()=>el.remove(), 200); activeWords = activeWords.filter(w=>w!==el);
                }
            };
            container.appendChild(el); activeWords.push(el);
        }
        function gameLoop() {
            for(let i=activeWords.length-1; i>=0; i--) {
                let el = activeWords[i]; let y = parseFloat(el.dataset.y) + speed;
                el.dataset.y = y; el.style.top = y + 'px';
                if(y > container.clientHeight) { el.remove(); activeWords.splice(i,1); }
            }
        }
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            document.getElementById('end-screen').classList.add('hidden-screen');
            score = 0; document.getElementById('score').textContent = score; speed = 2;
            activeWords.forEach(w=>w.remove()); activeWords = [];
            setTarget();
            clearInterval(fallingInterval); clearInterval(spawnInterval);
            fallingInterval = setInterval(gameLoop, 30); spawnInterval = setInterval(spawnWord, 2000);
        }
        
    </script>
