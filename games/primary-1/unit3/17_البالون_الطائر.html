    <meta charset="UTF-8">

    <title>البالون الطائر</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #3498db; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: linear-gradient(#2980b9, #8e44ad); border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-between;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .balloon { width: 120px; height: 150px; background: #e74c3c; border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%; position: absolute; bottom: 100px; display: flex; flex-direction: column; align-items: center; transition: bottom 0.5s ease-out; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2);}
        .basket { width: 40px; height: 30px; background: #d35400; border-radius: 0 0 5px 5px; position: absolute; bottom: -40px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
        .ropes { position: absolute; bottom: -10px; width: 30px; height: 10px; border-left: 2px solid #333; border-right: 2px solid #333; }
        
        .target-box { margin-top: 50px; background: white; border-radius: 20px; padding: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 20; cursor: pointer;}
        .target-box img { width: 100px; height: 100px; object-fit: contain; }
        
        .options { position: absolute; bottom: 20px; display: flex; gap: 15px; z-index: 20; direction: ltr;}
        .opt-btn { padding: 10px 20px; font-family: 'Fredoka One'; font-size: 1.5rem; background: #2ecc71; border: none; border-radius: 10px; color: white; cursor: pointer; box-shadow: 0 5px 0 #27ae60; }
        .opt-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>الارتفاع: <span id="altitude">0</span>m</div>
        </div>
        
        <div class="target-box" onclick="if(currentWord) speak(currentWord.word)">
            <img id="game-img" src="">
        </div>
        
        <div class="balloon" id="balloon">
            <div class="ropes"></div>
            <div class="basket">🧍</div>
        </div>
        
        <div class="options" id="options"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">البالون الطائر 🎈</h1>
        <p style="font-size: 1.5rem;">أجب الإجابة الصحيحة ليرتفع البالون!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let altitude = 0;
        let currentWord = null;
        
        function spawnLevel() {
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0,3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('game-img').src = currentWord.img;
            speak(currentWord.word);
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            selected.forEach(w => {
                let b = document.createElement('button');
                b.className = 'opt-btn'; b.textContent = w.word;
                b.onclick = () => {
                    if(w.word === currentWord.word) {
                        speak('Up we go!'); score+=10; altitude+=50;
                        document.getElementById('score').textContent=score;
                        document.getElementById('altitude').textContent=altitude;
                        
                        let bottomVal = 100 + (altitude % 400); 
                        document.getElementById('balloon').style.bottom = bottomVal + 'px';
                        
                        setTimeout(spawnLevel, 1000);
                    } else {
                        speak('Going down!'); altitude = Math.max(0, altitude - 20);
                        document.getElementById('altitude').textContent=altitude;
                        let bottomVal = 100 + (altitude % 400); 
                        document.getElementById('balloon').style.bottom = bottomVal + 'px';
                        b.style.background = '#e74c3c'; setTimeout(()=>b.style.background='#2ecc71', 500);
                    }
                };
                opts.appendChild(b);
            });
        }

        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; altitude=0; document.getElementById('balloon').style.bottom='100px'; spawnLevel(); }
    </script>
