    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القطار السريع</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #3498db; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2980b9; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .train-track { width: 100%; height: 150px; background: #ecf0f1; position: absolute; bottom: 50px; display: flex; align-items: flex-end; padding-bottom: 10px; overflow: hidden;}
        .train { display: flex; align-items: flex-end; transition: transform 1s linear; transform: translateX(100vw); gap: 5px;}
        .engine { width: 120px; height: 100px; background: #e74c3c; border-radius: 20px 20px 0 0; position: relative; display: flex; align-items: center; justify-content: center; font-size: 4rem;}
        .carriage { width: 100px; height: 80px; background: #34495e; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-family: 'Fredoka One'; font-size: 1.5rem; border: 3px solid #fff;}
        .wheels { position: absolute; bottom: -10px; width: 100%; display: flex; justify-content: space-around; }
        .wheel { width: 20px; height: 20px; background: #333; border-radius: 50%; border: 2px solid #fff; }
        
        .question-box { width: 200px; height: 200px; background: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 200px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 20;}
        .question-box img { width: 80%; height: 80%; object-fit: contain; }
        
        .options { position: absolute; bottom: 220px; display: flex; gap: 20px; z-index: 20; direction: ltr;}
        .opt-btn { padding: 15px 30px; font-family: 'Fredoka One'; font-size: 1.8rem; background: #f39c12; border: none; border-radius: 10px; color: white; cursor: pointer; box-shadow: 0 5px 0 #d35400; }
        .opt-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>المستوى: <span id="level">1</span></div>
        </div>
        
        <div class="question-box" onclick="if(currentWord) speak(currentWord.word)">
            <img id="game-img" src="">
        </div>
        
        <div class="options" id="options"></div>
        
        <div class="train-track">
            <div class="train" id="train">
                <div class="engine">🚂</div>
            </div>
        </div>
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">القطار السريع 🚂</h1>
        <p style="font-size: 1.5rem;">أجب الإجابة الصحيحة لإضافة عربات للقطار!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let carriages = 0;
        let currentWord = null;
        
        function spawnLevel() {
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0,3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('game-img').src = currentWord.img;
            speak(currentWord.word);
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            selected.forEach(w => {
                let b = document.createElement('button');
                b.className = 'opt-btn'; b.textContent = w.word;
                b.onclick = () => {
                    if(w.word === currentWord.word) {
                        speak('Choo choo!'); score+=10; document.getElementById('score').textContent=score;
                        addCarriage(w.word);
                        setTimeout(spawnLevel, 1500);
                    } else {
                        speak('Try again!'); b.style.background = '#e74c3c'; setTimeout(()=>b.style.background='#f39c12', 500);
                    }
                };
                opts.appendChild(b);
            });
            
            document.getElementById('train').style.transform = `translateX(${100 - carriages*10}vw)`;
        }
        
        function addCarriage(word) {
            carriages++;
            const train = document.getElementById('train');
            const c = document.createElement('div');
            c.className = 'carriage';
            c.innerHTML = `
                ${word}
                <div class="wheels"><div class="wheel"></div><div class="wheel"></div></div>
            `;
            train.appendChild(c);
            document.getElementById('train').style.transform = `translateX(${50 - carriages*10}vw)`;
        }

        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; carriages=0; document.getElementById('train').innerHTML='<div class="engine">🚂<div class="wheels"><div class="wheel"></div><div class="wheel"></div></div></div>'; spawnLevel(); }
    </script>
