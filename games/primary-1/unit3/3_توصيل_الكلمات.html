    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>توصيل الكلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2ecc71; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #27ae60; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .game-area { display: flex; width: 100%; justify-content: space-around; align-items: center; height: 100%; z-index: 20; }
        .column { display: flex; flex-direction: column; gap: 15px; width: 30%; }
        .word-card { background: #f1c40f; padding: 15px; border-radius: 15px; font-family: 'Fredoka One'; font-size: 2rem; cursor: pointer; text-align: center; }
        .image-card { background: #fff; height: 80px; border-radius: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .image-card img { height: 80%; }
        .selected { border: 4px solid #3498db; }
        .matched { opacity: 0.5; pointer-events: none; }
        #svg-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; width: 100%; height: 100%; }
        
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>المستوى: <span id="level">1</span></div>
        </div>
        
        <svg id="svg-layer"></svg>
        <div class="game-area">
            <div class="column" id="col-words"></div>
            <div class="column" id="col-images"></div>
        </div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">توصيل الكلمات 🔗</h1>
        <p style="font-size: 1.5rem;">انقر على الكلمة ثم صورتها لتوصيلهما!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">أحسنت!</h1>
        <p style="font-size: 2rem;">لقد أنهيت اللعبة بنجاح!</p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>
    <script>
        
const wordsData = [
  { word: "father", img: "../../../assets/images/words/father.jpg", category: "family" },
  { word: "mother", img: "../../../assets/images/words/mother.jpg", category: "family" },
  { word: "brother", img: "../../../assets/images/words/brother.jpg", category: "family" },
  { word: "sister", img: "../../../assets/images/words/sister.jpg", category: "family" },
  { word: "parents", img: "../../../assets/images/words/parents.jpg", category: "family" },
  { word: "grandfather", img: "../../../assets/images/words/grandfather.jpg", category: "family" },
  { word: "grandmother", img: "../../../assets/images/words/grandmother.jpg", category: "family" },
  { word: "nose", img: "../../../assets/images/words/nose.jpg", category: "n" },
  { word: "nail", img: "../../../assets/images/words/nail.jpg", category: "n" },
  { word: "neck", img: "../../../assets/images/words/neck.jpg", category: "n" },
  { word: "nurse", img: "../../../assets/images/words/nurse.jpg", category: "n" },
  { word: "net", img: "../../../assets/images/words/net.jpg", category: "n" },
  { word: "pencil", img: "../../../assets/images/words/pencil.jpg", category: "p" },
  { word: "pizza", img: "../../../assets/images/words/pizza.jpg", category: "p" },
  { word: "parrot", img: "../../../assets/images/words/parrot.jpg", category: "p" },
  { word: "potato", img: "../../../assets/images/words/potato.jpg", category: "p" },
  { word: "panda", img: "../../../assets/images/words/panda.jpg", category: "p" },
  { word: "one", img: "../../../assets/images/words/one.jpg", category: "numbers" },
  { word: "two", img: "../../../assets/images/words/two.jpg", category: "numbers" },
  { word: "three", img: "../../../assets/images/words/three.jpg", category: "numbers" },
  { word: "four", img: "../../../assets/images/words/four.jpg", category: "numbers" },
  { word: "five", img: "../../../assets/images/words/five.jpg", category: "numbers" },
  { word: "hair", img: "../../../assets/images/words/hair.jpg", category: "h" },
  { word: "horse", img: "../../../assets/images/words/horse.jpg", category: "h" },
  { word: "house", img: "../../../assets/images/words/house.jpg", category: "h" },
  { word: "hat", img: "../../../assets/images/words/hat.jpg", category: "h" },
  { word: "hands", img: "../../../assets/images/words/hands.jpg", category: "h" },
  { word: "door", img: "../../../assets/images/words/door.jpg", category: "d" },
  { word: "doll", img: "../../../assets/images/words/doll.jpg", category: "d" },
  { word: "dog", img: "../../../assets/images/words/dog.jpg", category: "d" },
  { word: "drum", img: "../../../assets/images/words/drum.jpg", category: "d" },
  { word: "duck", img: "../../../assets/images/words/duck.jpg", category: "d" },
  { word: "flowers", img: "../../../assets/images/words/flowers.jpg", category: "numbers" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let level = 1;
        
        let selectedWord=null, selectedImg=null;
        let pairsCount = 0;
        function spawnLevel() {
            document.getElementById('col-words').innerHTML = ''; document.getElementById('col-images').innerHTML = ''; document.getElementById('svg-layer').innerHTML = '';
            selectedWord=null; selectedImg=null; pairsCount=0;
            let currentWords = [...wordsData].sort(()=>0.5-Math.random()).slice(0,5);
            let wordsCol = [...currentWords].sort(()=>0.5-Math.random());
            let imgsCol = [...currentWords].sort(()=>0.5-Math.random());
            
            wordsCol.forEach(w => {
                let d = document.createElement('div'); d.className='word-card'; d.textContent=w.word; d.dataset.w=w.word;
                d.onclick = () => { speak(w.word); if(selectedWord) selectedWord.classList.remove('selected'); selectedWord=d; d.classList.add('selected'); checkMatch(); };
                document.getElementById('col-words').appendChild(d);
            });
            imgsCol.forEach(w => {
                let d = document.createElement('div'); d.className='image-card'; d.dataset.w=w.word;
                let i = document.createElement('img'); i.src=w.img; d.appendChild(i);
                d.onclick = () => { if(selectedImg) selectedImg.classList.remove('selected'); selectedImg=d; d.classList.add('selected'); checkMatch(); };
                document.getElementById('col-images').appendChild(d);
            });
        }
        function drawLine(el1, el2) {
            const r1 = el1.getBoundingClientRect(), r2 = el2.getBoundingClientRect(), cr = document.getElementById('game-container').getBoundingClientRect();
            let line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', r1.right - cr.left); line.setAttribute('y1', r1.top + r1.height/2 - cr.top);
            line.setAttribute('x2', r2.left - cr.left); line.setAttribute('y2', r2.top + r2.height/2 - cr.top);
            line.setAttribute('stroke', 'red'); line.setAttribute('stroke-width', '5');
            document.getElementById('svg-layer').appendChild(line);
        }
        function checkMatch() {
            if(selectedWord && selectedImg) {
                if(selectedWord.dataset.w === selectedImg.dataset.w) {
                    speak("Correct!"); score+=10; document.getElementById('score').textContent=score;
                    selectedWord.classList.add('matched'); selectedImg.classList.add('matched');
                    selectedWord.classList.remove('selected'); selectedImg.classList.remove('selected');
                    drawLine(selectedWord, selectedImg);
                    selectedWord=null; selectedImg=null; pairsCount++;
                    if(pairsCount === 5) setTimeout(spawnLevel, 1500);
                } else {
                    speak("Try again"); selectedWord.classList.remove('selected'); selectedImg.classList.remove('selected');
                    selectedWord=null; selectedImg=null;
                }
            }
        }
        function startGame() { document.getElementById('start-screen').classList.add('hidden-screen'); score=0; document.getElementById('score').textContent=score; spawnLevel(); }
        
    </script>
</body>
</html>
