    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كشاف الظلام (What is this?)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #2c3e50;
            border-radius: 20px;
            border: 5px solid #bdc3c7;
            position: relative;
            display: flex;
            flex-direction: row; /* Split screen horizontally */
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* Left half for choices */
        .choices-area {
            flex: 1;
            background: #34495e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            border-right: 5px solid #2c3e50;
            z-index: 20;
        }

        .word-btn {
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            padding: 20px 40px;
            width: 80%;
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #d4ac0d;
            transition: transform 0.1s;
            direction: ltr;
        }

        .word-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }

        /* Right half for image and flashlight */
        .image-area {
            flex: 1;
            position: relative;
            background-color: white; /* Behind the dark layer */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .target-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
        }

        .darkness {
            position: absolute;
            inset: 0;
            background: #000;
            pointer-events: auto; /* Catch touch/mouse */
            touch-action: none;
            /* Bigger Flashlight effect using mask-image (radial gradient) */
            -webkit-mask-image: radial-gradient(circle 180px at 50% 50%, transparent 0%, black 100%);
            mask-image: radial-gradient(circle 180px at 50% 50%, transparent 0%, black 100%);
            z-index: 10;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #f1c40f; pointer-events: none; z-index: 30; text-shadow: 2px 2px 0 #000;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .game-container { flex-direction: column-reverse; } /* Stack on small screens */
            .choices-area { flex: 0.4; flex-direction: row; flex-wrap: wrap; border-right: none; border-top: 5px solid #2c3e50;}
            .word-btn { font-size: 1.8rem; padding: 10px 20px; width: auto; }
            .darkness { -webkit-mask-image: radial-gradient(circle 100px at 50% 50%, transparent 0%, black 100%); }
        }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>المرحلة: <span id="level">1</span></div>
            <div>نقاط: <span id="score">0</span></div>
        </div>

        <div class="choices-area" id="options">
            <!-- Buttons injected by JS -->
        </div>

        <div class="image-area">
            <img src="" class="target-img" id="target-img">
            <div class="darkness" id="darkness"></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">كشاف الظلام 🔦</h1>
        <p style="font-size: 1.5rem;">حرك إصبعك لاكتشاف الصورة في الظلام وأجب عن السؤال: What is this?</p>
        <button class="start" onclick="startGame()">اكتشف!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">عمل رائع! 🌟</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "in", img: "../../../assets/images/words/in.jpg" },
            { word: "ink", img: "../../../assets/images/words/ink.jpg" },
            { word: "insect", img: "../../../assets/images/words/insect.jpg" },
            { word: "ill", img: "../../../assets/images/words/ill.jpg" },
            { word: "chair", img: "../../../assets/images/words/chair.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" }
        ];

        let score = 0, level = 1;
        let currentTarget = null;
        
        const targetImg = document.getElementById('target-img');
        const darkness = document.getElementById('darkness');
        const optionsContainer = document.getElementById('options');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // Flashlight effect
        darkness.addEventListener('pointermove', (e) => {
            if(!e.isPrimary && e.type !== 'mousemove') return;
            const rect = darkness.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const radius = window.innerWidth > 768 ? 180 : 120; // Bigger flashlight
            darkness.style.webkitMaskImage = `radial-gradient(circle ${radius}px at ${x}px ${y}px, transparent 0%, black 100%)`;
            darkness.style.maskImage = `radial-gradient(circle ${radius}px at ${x}px ${y}px, transparent 0%, black 100%)`;
        });

        // Reset mask when touch ends so it hides again
        darkness.addEventListener('pointerleave', () => {
            darkness.style.webkitMaskImage = `radial-gradient(circle 0px at 50% 50%, transparent 0%, black 100%)`;
        });

        function spawnLevel() {
            currentTarget = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            targetImg.src = currentTarget.img;
            
            // Hide flashlight initially
            darkness.style.webkitMaskImage = `radial-gradient(circle 0px at 50% 50%, transparent 0%, black 100%)`;

            setTimeout(() => {
                speak("What is this?");
            }, 500);

            let options = vocabulary.filter(v => v.word !== currentTarget.word);
            shuffle(options);
            // 3 words total as requested
            let roundWords = [currentTarget.word, options[0].word, options[1].word];
            shuffle(roundWords);

            optionsContainer.innerHTML = '';
            roundWords.forEach(w => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = w;
                btn.addEventListener('click', () => handleAnswer(w, btn));
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(word, btn) {
            if (word === currentTarget.word) {
                score += 15;
                document.getElementById('score').textContent = score;
                btn.style.background = '#2ecc71';
                btn.style.color = 'white';
                speak('Yes! It is ' + currentTarget.word);
                
                // Reveal whole image
                darkness.style.webkitMaskImage = `none`;

                level++;
                document.getElementById('level').textContent = level;

                setTimeout(() => {
                    if(level > 10) endGame();
                    else spawnLevel();
                }, 2000);

            } else {
                score = Math.max(0, score - 5);
                document.getElementById('score').textContent = score;
                btn.style.background = '#e74c3c';
                btn.style.color = 'white';
                btn.style.pointerEvents = 'none';
                speak('No, try again');
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0; level = 1;
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            spawnLevel();
        }

        function endGame() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
