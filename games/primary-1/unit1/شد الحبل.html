    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شد الحبل (Tug of War)</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Fredoka One', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: manipulation;}
        #game-board { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        #player1-zone { flex: 1; background: #e74c3c; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; transform: rotate(180deg); padding: 20px; padding-top: 60px; box-sizing: border-box; }
        #player2-zone { flex: 1; background: #3498db; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; padding-top: 60px; box-sizing: border-box; }
        #rope-container { position: absolute; top: 50%; left: 0; width: 100%; height: 40px; transform: translateY(-50%); display: flex; justify-content: center; align-items: center; z-index: 5; pointer-events: none;}
        #rope { width: 20px; height: 100vh; background: repeating-linear-gradient(45deg, #d35400, #d35400 10px, #e67e22 10px, #e67e22 20px); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: 0.3s; }
        #flag { width: 60px; height: 40px; background: #f1c40f; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.5); z-index: 6; transition: 0.3s; }
        #center-zone { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; background: #ecf0f1; border-radius: 50%; border: 8px solid #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); z-index: 10; cursor: pointer; touch-action: manipulation;}
        #center-image { width: 80px; height: 80px; object-fit: contain; margin-bottom: 5px; }
        #word-display { color: #2c3e50; font-size: 1.8rem; font-weight: bold; letter-spacing: 2px; direction: ltr; display: flex; justify-content: center; unicode-bidi: isolate;}
        .missing { color: #e74c3c; border-bottom: 3px solid #e74c3c; display: inline-block; min-width: 20px; text-align: center; }
        .options-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; z-index: 20; direction: ltr; unicode-bidi: isolate;}
        .option-btn { width: 70px; height: 70px; font-size: 3rem; background: rgba(255,255,255,0.2); border: 3px solid white; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); transition: 0.1s; text-transform: uppercase; touch-action: manipulation; direction: ltr; unicode-bidi: isolate;}
        .option-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px;}
        .start-btn { font-size: 2.5rem; padding: 20px 60px; background: #f1c40f; border: none; border-radius: 50px; color: #2c3e50; cursor: pointer; box-shadow: 0 8px 0 #f39c12; font-weight: bold; touch-action: manipulation;}
        .start-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
        @keyframes correctPop { 0% { transform: scale(1); } 50% { transform: scale(1.2); background: #2ecc71; border-color: #27ae60;} 100% { transform: scale(1); } }
        @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); background: #c0392b;} 75% { transform: translateX(5px); background: #c0392b;} }
        @media (max-width: 500px) { #center-zone { width: 140px; height: 140px; } #center-image { width: 70px; height: 70px; } #word-display { font-size: 1.5rem;} .option-btn { width: 55px; height: 55px; font-size: 2.2rem; } }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="start-screen" class="screen"><h1 style="font-size: 3.5rem; margin-bottom: 20px; color: #f1c40f;">شد الحبل</h1><button class="start-btn" onpointerdown="startGame()">إبدأ التحدي</button></div>
    <div id="game-over-screen" class="screen hidden"><h1 id="winner-text" style="font-size: 4rem; margin-bottom: 20px; color: #2ecc71;">الفائز!</h1><button class="start-btn" onpointerdown="startGame()">العب مرة أخرى</button></div>
    <div id="game-board" class="hidden">
        <div id="player1-zone"><div class="options-container" id="p1-options"></div></div>
        <div id="rope-container"><div id="rope"></div><div id="flag"></div></div>
        <div id="center-zone" onpointerdown="playSound()"><img id="center-image" src="" alt="Target"><div id="word-display"></div></div>
        <div id="player2-zone"><div class="options-container" id="p2-options"></div></div>
    </div>
    <script>
let words = [
    { w: 'hello', i: "../../../assets/images/words/hello.jpg" },
    { w: 'goodbye', i: "../../../assets/images/words/goodbye.jpg" },
    { w: 'hany', i: "../../../assets/images/words/hany.jpg" },
    { w: 'hana', i: "../../../assets/images/words/hana.jpg" },
    { w: 'miss_mona', i: "../../../assets/images/words/miss_mona.jpg" },
    { w: 'play', i: "../../../assets/images/words/play.jpg" },
    { w: 'shake_hands', i: "../../../assets/images/words/shake_hands.jpg" },
    { w: 'bag', i: "../../../assets/images/words/bag.jpg" },
    { w: 'book', i: "../../../assets/images/words/book.jpg" },
    { w: 'bee', i: "../../../assets/images/words/bee.jpg" },
    { w: 'bus', i: "../../../assets/images/words/bus.jpg" },
    { w: 'blue', i: "../../../assets/images/words/blue.jpg" },
];

        let ropePos = 0, isPlaying = false, currentWordObj = null, correctLetter = "", canAnswer = false;
        const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
        function speak(text) { if('speechSynthesis' in window) { let u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; speechSynthesis.speak(u); } }
        function playSound() { if(currentWordObj && isPlaying) speak(currentWordObj.w.replace(/_/g, ' ')); }
        function shuffle(array) { let c = array.length, r; while (c != 0) { r = Math.floor(Math.random() * c); c--; [array[c], array[r]] = [array[r], array[c]]; } return array; }
        function updateRope() {
            let offset = ropePos * 10;
            document.getElementById('rope').style.transform = `translate(-50%, calc(-50% + ${offset}vh))`;
            document.getElementById('flag').style.transform = `translate(-50%, calc(-50% + ${offset}vh))`;
        }
        function nextRound() {
            canAnswer = false;
            let validWords = words.filter(w => w.w.trim() !== '');
            currentWordObj = validWords[Math.floor(Math.random() * validWords.length)];
            document.getElementById('center-image').src = currentWordObj.i;
            let wStr = currentWordObj.w.toLowerCase();
            let validIndices = []; for(let i=0; i<wStr.length; i++) { if(wStr[i] !== '_' && wStr[i] !== ' ') validIndices.push(i); }
            let missingIndex = validIndices[Math.floor(Math.random() * validIndices.length)];
            correctLetter = wStr[missingIndex];
            let displayHtml = '';
            for(let i=0; i<wStr.length; i++) {
                if(i === missingIndex) displayHtml += `<span class="missing">?</span>`;
                else if(wStr[i] === '_' || wStr[i] === ' ') displayHtml += `<span>&nbsp;</span>`;
                else displayHtml += `<span>${wStr[i]}</span>`;
            }
            document.getElementById('word-display').innerHTML = displayHtml;
            let options = [correctLetter]; while(options.length < 3) { let r = alphabet[Math.floor(Math.random() * alphabet.length)]; if(!options.includes(r)) options.push(r); }
            let p1Opts = shuffle([...options]), p2Opts = shuffle([...options]);
            function createBtnHtml(letter, playerNum) { return `<button class="option-btn" onpointerdown="checkAnswer(${playerNum}, '${letter}', this)">${letter}</button>`; }
            document.getElementById('p1-options').innerHTML = p1Opts.map(l => createBtnHtml(l, 1)).join('');
            document.getElementById('p2-options').innerHTML = p2Opts.map(l => createBtnHtml(l, 2)).join('');
            setTimeout(() => { playSound(); canAnswer = true; }, 500);
        }
        function checkAnswer(playerNum, selectedLetter, btn) {
            if(!isPlaying || !canAnswer) return;
            if(selectedLetter === correctLetter) {
                canAnswer = false; btn.style.animation = 'correctPop 0.5s';
                if(playerNum === 1) { ropePos -= 1; } else { ropePos += 1; }
                updateRope(); document.querySelector('.missing').innerText = correctLetter;
                if(ropePos <= -5 || ropePos >= 5) setTimeout(endGame, 1000); else setTimeout(nextRound, 1000);
            } else {
                btn.style.animation = 'wrongShake 0.4s'; btn.disabled = true; setTimeout(() => { btn.style.animation = ''; btn.disabled = false; }, 1000);
                if(playerNum === 1) { ropePos += 1; } else { ropePos -= 1; }
                updateRope();
                if(ropePos <= -5 || ropePos >= 5) { canAnswer = false; setTimeout(endGame, 1000); }
            }
        }
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden'); document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('game-board').classList.remove('hidden');
            ropePos = 0; updateRope(); isPlaying = true; nextRound();
        }
        function endGame() {
            isPlaying = false; document.getElementById('game-board').classList.add('hidden'); document.getElementById('game-over-screen').classList.remove('hidden');
            let winnerText = document.getElementById('winner-text');
            if(ropePos <= -5) { winnerText.innerText = "فاز اللاعب 1 (الأحمر)!"; winnerText.style.color = "#e74c3c"; }
            else if(ropePos >= 5) { winnerText.innerText = "فاز اللاعب 2 (الأزرق)!"; winnerText.style.color = "#3498db"; }
        }
    </script>
</body>
</html>
