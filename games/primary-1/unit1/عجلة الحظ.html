    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عجلة الحظ (Spin & Catch)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #9b59b6; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #8e44ad;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .target-word-container {
            margin-top: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 40px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
            text-align: center;
        }

        .target-word {
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            color: #8e44ad;
            direction: ltr;
            margin: 0;
        }

        .wheel-container {
            position: relative;
            margin-top: 40px;
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #f1c40f;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            /* Background conic gradient set by JS */
        }

        .wheel img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            position: absolute;
            z-index: 10;
        }

        /* Pointer at the top */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #e74c3c;
            z-index: 30;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }

        .spin-btn {
            margin-top: 40px;
            font-family: 'Cairo', sans-serif;
            font-size: 2rem;
            padding: 15px 50px;
            background: #f1c40f;
            border: none;
            border-radius: 50px;
            color: #8e44ad;
            cursor: pointer;
            box-shadow: 0 8px 0 #d4ac0d;
            transition: transform 0.1s;
            z-index: 20;
        }

        .spin-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .spin-btn:disabled { background: #95a5a6; color: #7f8c8d; box-shadow: 0 8px 0 #7f8c8d; cursor: not-allowed; }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="target-word-container">
            <h1 class="target-word" id="target-word">Word</h1>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel">
                <!-- Images injected here -->
            </div>
        </div>

        <button class="spin-btn" id="action-btn" onclick="handleAction()">إيقاف!</button>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">عجلة الحظ 🎡</h1>
        <p style="font-size: 1.5rem;">أوقف العجلة عندما يشير السهم إلى الصورة المطابقة للكلمة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "in", img: "../../../assets/images/words/in.jpg" },
            { word: "ink", img: "../../../assets/images/words/ink.jpg" },
            { word: "insect", img: "../../../assets/images/words/insect.jpg" },
            { word: "ill", img: "../../../assets/images/words/ill.jpg" },
            { word: "chair", img: "../../../assets/images/words/chair.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" }
        ];

        const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#e67e22', '#1abc9c', '#e84393'];
        
        let score = 0, lives = 5;
        let currentTarget = null;
        let isSpinning = false;
        let currentRotation = 0;
        let animationFrame;
        let speed = 2;
        
        const wheel = document.getElementById('wheel');
        const actionBtn = document.getElementById('action-btn');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function createWheel() {
            wheel.innerHTML = '';
            const angleStep = 360 / vocabulary.length;
            
            // Create conic gradient for segments
            let gradientStr = 'conic-gradient(';
            vocabulary.forEach((item, index) => {
                const startAngle = index * angleStep - (angleStep/2);
                const endAngle = (index + 1) * angleStep - (angleStep/2);
                gradientStr += `${colors[index % colors.length]} ${startAngle}deg ${endAngle}deg${index < vocabulary.length - 1 ? ', ' : ')'}`;
            });
            wheel.style.background = gradientStr;

            // Place images
            const radius = 90; // distance from center
            vocabulary.forEach((item, index) => {
                const angleDeg = index * angleStep;
                // Subtract 90 to start at top
                const angleRad = (angleDeg - 90) * (Math.PI / 180);
                // Center of wheel is 150,150. Image size 60x60, so half is 30
                const x = 150 + radius * Math.cos(angleRad) - 30;
                const y = 150 + radius * Math.sin(angleRad) - 30;
                
                const img = document.createElement('img');
                img.src = item.img;
                img.style.left = x + 'px';
                img.style.top = y + 'px';
                // Rotate image so bottom faces center
                img.style.transform = `rotate(${angleDeg}deg)`;
                
                wheel.appendChild(img);
            });
        }

        function spawnLevel() {
            currentTarget = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            document.getElementById('target-word').textContent = currentTarget.word;
            speak(currentTarget.word);
            
            wheel.style.border = "10px solid #f1c40f";
            
            // Start spinning
            isSpinning = true;
            function animate() {
                currentRotation += speed;
                wheel.style.transform = `rotate(${currentRotation}deg)`;
                if(isSpinning) animationFrame = requestAnimationFrame(animate);
            }
            animate();
            
            actionBtn.disabled = false;
        }

        function handleAction() {
            if(!isSpinning) return;
            isSpinning = false;
            cancelAnimationFrame(animationFrame);
            actionBtn.disabled = true;

            const angleStep = 360 / vocabulary.length;
            let normalizedRotation = currentRotation % 360;
            // Angle at the top pointer (0 deg)
            let topAngle = (360 - normalizedRotation) % 360;
            
            // We want to find the index of the segment at topAngle.
            // Since images are placed exactly at index * angleStep,
            // we find which index * angleStep is closest to topAngle.
            // We can shift topAngle by half angleStep to easily floor it.
            let selectedIndex = Math.floor(((topAngle + (angleStep / 2)) % 360) / angleStep);
            
            let selectedItem = vocabulary[selectedIndex];

            if (selectedItem.word === currentTarget.word) {
                score += 10;
                document.getElementById('score').textContent = score;
                speed += 0.5; // increase difficulty slowly
                speak('Excellent!');
                wheel.style.border = "10px solid #2ecc71";
                
                setTimeout(() => {
                    spawnLevel();
                }, 1500);

            } else {
                lives--;
                document.getElementById('lives').textContent = lives;
                speak('No, try again!');
                wheel.style.border = "10px solid #e74c3c";
                
                setTimeout(() => {
                    if (lives <= 0) endGame();
                    else spawnLevel();
                }, 1500);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0; lives = 5; speed = 2;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            createWheel();
            spawnLevel();
        }

        function endGame() {
            isSpinning = false;
            cancelAnimationFrame(animationFrame);
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
        
        createWheel(); // Init for background visual
    </script>
</body>
</html>
