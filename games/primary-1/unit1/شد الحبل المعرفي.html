    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>شد الحبل المعرفي (Tug of War)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 75vh;
            background: #ecf0f1;
            border-radius: 20px;
            border: 5px solid #bdc3c7;
            position: relative;
            display: flex;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }

        #player1 { background: rgba(231, 76, 60, 0.2); }
        #player2 { background: rgba(52, 152, 219, 0.2); }

        .rope-container {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 20px;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            z-index: 5;
        }

        .rope {
            width: 100%;
            height: 10px;
            background: repeating-linear-gradient(45deg, #8e44ad, #8e44ad 10px, #9b59b6 10px, #9b59b6 20px);
            position: absolute;
        }

        .flag {
            width: 40px;
            height: 60px;
            background: #f1c40f;
            position: absolute;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: left 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .target-img {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 2;
            object-fit: contain;
        }

        .word-btn {
            font-family: 'Fredoka One', sans-serif;
            font-size: 2.5rem;
            padding: 15px 30px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
            margin: 10px;
            direction: ltr;
        }

        .word-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }

        .p1-btn { background: #e74c3c; box-shadow: 0 8px 0 #c0392b; }
        .p2-btn { background: #3498db; box-shadow: 0 8px 0 #2980b9; }

        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
        
        .p1-rotate { transform: rotate(90deg); }
        .p2-rotate { transform: rotate(-90deg); }

        @media (max-width: 768px) {
            .game-container { flex-direction: column; }
            .rope-container { top: 0; left: 50%; width: 20px; height: 100%; transform: translateX(-50%); }
            .rope { width: 10px; height: 100%; background: repeating-linear-gradient(0deg, #8e44ad, #8e44ad 10px, #9b59b6 10px, #9b59b6 20px); }
            .flag { width: 60px; height: 40px; top: 50%; left: 0; transition: top 0.2s; transform: translate(-25%, -50%);}
            .target-img { width: 100px; height: 100px; }
            .word-btn { font-size: 1.5rem; padding: 10px 20px; }
            .p1-rotate { transform: rotate(180deg); }
            .p2-rotate { transform: rotate(0deg); }
        }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        
        <div id="player1" class="half p1-rotate">
            <div style="font-size: 2rem; color: #c0392b;">اللاعب 1</div>
            <div id="p1-options"></div>
        </div>

        <div class="rope-container">
            <div class="rope"></div>
            <div class="flag" id="flag"></div>
            <img src="" class="target-img" id="center-img" style="position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); border: 5px solid #2c3e50;">
        </div>

        <div id="player2" class="half p2-rotate">
            <div style="font-size: 2rem; color: #2980b9;">اللاعب 2</div>
            <div id="p2-options"></div>
        </div>

    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">شد الحبل المعرفي 🪢</h1>
        <p style="font-size: 1.5rem;">اضغط على الكلمة الصحيحة للصورة التي في المنتصف لتسحب الحبل نحوك!</p>
        <button class="start" onclick="startGame()">ابدأ التحدي!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <div id="winner-text" style="font-size: 4rem; color: #f1c40f;">اللاعب الفائز!</div>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "book", img: "../../../assets/images/words/book.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "pencil", img: "../../../assets/images/words/pencil.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" },
            { word: "board", img: "../../../assets/images/words/board.jpg" },
            { word: "sit down", img: "../../../assets/images/words/sit down.jpg" },
            { word: "stand up", img: "../../../assets/images/words/stand up.jpg" },
            { word: "open your books", img: "../../../assets/images/words/open your books.jpg" }
        ];

        let flagPosition = 50; // 50% is center. 0 is P1 win, 100 is P2 win
        let currentTarget = null;
        let isRoundActive = false;

        const flag = document.getElementById('flag');
        const centerImg = document.getElementById('center-img');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.2; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function updateFlag() {
            if(window.innerWidth > 768) {
                flag.style.left = flagPosition + '%';
                flag.style.top = '50%';
            } else {
                flag.style.top = flagPosition + '%';
                flag.style.left = '0';
            }
        }

        window.addEventListener('resize', updateFlag);

        function spawnRound() {
            isRoundActive = true;
            currentTarget = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            centerImg.src = currentTarget.img;
            speak(currentTarget.word);

            let options = vocabulary.filter(v => v.word !== currentTarget.word);
            shuffle(options);
            let roundWords = [currentTarget.word, options[0].word];
            
            // P1
            shuffle(roundWords);
            renderBtns('p1-options', roundWords, 1);
            
            // P2
            shuffle(roundWords);
            renderBtns('p2-options', roundWords, 2);
        }

        function renderBtns(containerId, words, playerNum) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            words.forEach(w => {
                const btn = document.createElement('button');
                btn.className = `word-btn p${playerNum}-btn`;
                btn.textContent = w;
                btn.dataset.word = w;
                btn.addEventListener('pointerdown', (e) => handleAnswer(e, playerNum));
                container.appendChild(btn);
            });
        }

        function handleAnswer(e, playerNum) {
            if(!isRoundActive) return;

            const clickedWord = e.target.dataset.word;
            if (clickedWord === currentTarget.word) {
                isRoundActive = false; // stop round
                
                // Pull rope
                if (playerNum === 1) flagPosition -= 15;
                else flagPosition += 15;

                updateFlag();
                e.target.style.background = '#2ecc71';
                speak('Yes!');

                if (flagPosition <= 5) {
                    endGame(1);
                } else if (flagPosition >= 95) {
                    endGame(2);
                } else {
                    setTimeout(spawnRound, 800);
                }
            } else {
                // penalty pull
                if (playerNum === 1) flagPosition += 10;
                else flagPosition -= 10;
                updateFlag();
                e.target.style.background = '#95a5a6';
                e.target.style.pointerEvents = 'none';
            }
        }

        function startGame() {
            flagPosition = 50;
            updateFlag();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            setTimeout(spawnRound, 500);
        }

        function endGame(winnerNum) {
            document.getElementById('winner-text').textContent = winnerNum === 1 ? "🎉 فاز اللاعب 1! 🎉" : "🎉 فاز اللاعب 2! 🎉";
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
