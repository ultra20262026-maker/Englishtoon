    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>السباق الثلاثي (Word Runner)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: none;}
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; pointer-events: none; z-index: 10;}
        
        .game-area { 
            width: 95vw; 
            height: 75vh; 
            background: linear-gradient(#34495e, #2c3e50); 
            border: 5px solid #bdc3c7; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5); 
            position: relative; 
            border-radius: 20px;
            overflow: hidden;
        }

        .center-image {
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.5);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 10px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #f1c40f;
        }

        .center-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .moving-word {
            position: absolute;
            font-family: 'Fredoka One', sans-serif;
            font-size: 2.5rem;
            color: white;
            background: rgba(231, 76, 60, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            white-space: nowrap;
            direction: ltr;
        }
        
        .moving-word:active { transform: scale(0.9); }

        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;}
        button.main-btn { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #3498db; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #2980b9; margin-top: 20px;}
        button.main-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .center-image { width: 100px; height: 100px; }
            .moving-word { font-size: 1.5rem; padding: 5px 15px; }
        }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="ui">
        <div>المرحلة: <span id="level">1</span>/10</div>
        <div>نقاط: <span id="score">0</span></div>
    </div>
    
    <div class="game-area" id="game-area">
        <div class="center-image">
            <img id="target-img" src="">
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #3498db;">السباق الثلاثي 🏃‍♂️</h1>
        <p style="font-size: 1.5rem;">اقنص الكلمة التي تطابق الصورة في المنتصف!</p>
        <button class="main-btn" onclick="startGame()">ابدأ اللعب</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">أداء مذهل! 🌟</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="main-btn" onclick="startGame()">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "book", img: "../../../assets/images/words/book.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "pencil", img: "../../../assets/images/words/pencil.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" },
            { word: "board", img: "../../../assets/images/words/board.jpg" },
            { word: "sit down", img: "../../../assets/images/words/sit down.jpg" },
            { word: "stand up", img: "../../../assets/images/words/stand up.jpg" },
            { word: "open your books", img: "../../../assets/images/words/open your books.jpg" }
        ];

        let level = 1;
        let score = 0;
        let currentTarget = null;
        let wordsInPlay = [];
        let animationFrameId;

        const gameArea = document.getElementById('game-area');
        const targetImg = document.getElementById('target-img');
        const levelEl = document.getElementById('level');
        const scoreEl = document.getElementById('score');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.2; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function spawnLevel() {
            // Remove old words
            document.querySelectorAll('.moving-word').forEach(w => w.remove());
            wordsInPlay = [];
            
            currentTarget = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            targetImg.src = currentTarget.img;
            targetImg.classList.add('hidden'); // hide briefly for effect
            setTimeout(() => {
                targetImg.classList.remove('hidden');
                speak(currentTarget.word);
            }, 300);

            // Generate 3 words (1 correct, 2 wrong)
            let options = vocabulary.filter(v => v.word !== currentTarget.word);
            shuffle(options);
            let levelWords = [currentTarget.word, options[0].word, options[1].word];
            shuffle(levelWords);

            const speed = 1 + (level * 0.2);

            levelWords.forEach((wordText, index) => {
                const wordEl = document.createElement('div');
                wordEl.className = 'moving-word';
                wordEl.textContent = wordText;
                wordEl.dataset.word = wordText;
                
                // Initial positions outside the box
                let x, y, dx, dy;
                const gw = gameArea.clientWidth;
                const gh = gameArea.clientHeight;

                if (index === 0) { // from top
                    x = Math.random() * gw; y = -50;
                    dx = (Math.random() > 0.5 ? 1 : -1) * speed; dy = speed;
                } else if (index === 1) { // from bottom
                    x = Math.random() * gw; y = gh + 50;
                    dx = (Math.random() > 0.5 ? 1 : -1) * speed; dy = -speed;
                } else { // from left/right
                    x = Math.random() > 0.5 ? -100 : gw + 100;
                    y = Math.random() * gh;
                    dx = (x < 0 ? 1 : -1) * speed; dy = (Math.random() > 0.5 ? 1 : -1) * speed;
                }

                wordEl.style.left = x + 'px';
                wordEl.style.top = y + 'px';

                wordEl.addEventListener('pointerdown', handleWordClick);

                gameArea.appendChild(wordEl);
                wordsInPlay.push({ el: wordEl, x, y, dx, dy });
            });
        }

        function handleWordClick(e) {
            if (e.target.dataset.word === currentTarget.word) {
                // Correct
                score += 20;
                scoreEl.textContent = score;
                speak('Yes!');
                
                // Highlight center
                document.querySelector('.center-image').style.background = '#2ecc71';
                setTimeout(() => document.querySelector('.center-image').style.background = 'white', 500);

                level++;
                levelEl.textContent = level;
                if (level > 10) {
                    endGame();
                } else {
                    spawnLevel();
                }
            } else {
                // Wrong
                score = Math.max(0, score - 10);
                scoreEl.textContent = score;
                e.target.style.background = '#7f8c8d';
                e.target.style.pointerEvents = 'none';
                speak('Try again');
            }
        }

        function animateWords() {
            const gw = gameArea.clientWidth;
            const gh = gameArea.clientHeight;

            wordsInPlay.forEach(w => {
                w.x += w.dx;
                w.y += w.dy;

                // Bounce off walls
                const rect = w.el.getBoundingClientRect();
                if (w.x <= 0 || w.x + rect.width >= gw) w.dx *= -1;
                if (w.y <= 0 || w.y + rect.height >= gh) w.dy *= -1;

                // keep inside bounds slightly if out
                w.x = Math.max(0, Math.min(w.x, gw - rect.width));
                w.y = Math.max(0, Math.min(w.y, gh - rect.height));

                w.el.style.left = w.x + 'px';
                w.el.style.top = w.y + 'px';
            });

            animationFrameId = requestAnimationFrame(animateWords);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            level = 1;
            score = 0;
            levelEl.textContent = level;
            scoreEl.textContent = score;

            cancelAnimationFrame(animationFrameId);
            animateWords();
            spawnLevel();
        }

        function endGame() {
            cancelAnimationFrame(animationFrameId);
            document.querySelectorAll('.moving-word').forEach(w => w.remove());
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
