    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الذاكرة (Memory Match)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #16a085; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #1abc9c;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding-top: 50px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            perspective: 1000px;
        }

        @media (max-width: 600px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        }

        .card {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            border: 4px solid #fff;
        }

        .card-front {
            background: #f1c40f;
            transform: rotateY(180deg);
        }

        .card-back {
            background: #e74c3c;
            font-size: 3rem;
            color: #fff;
        }

        .card img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .card .word-text {
            font-family: 'Fredoka One', sans-serif;
            font-size: 2.5rem;
            color: #2c3e50;
            direction: ltr;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #2c3e50; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>أزواج: <span id="score">0</span>/7</div>
            <div>محاولات: <span id="moves">0</span></div>
        </div>

        <div class="cards-grid" id="grid">
            <!-- Cards injected here -->
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">لعبة الذاكرة 🧠</h1>
        <p style="font-size: 1.5rem;">طابق الكلمة مع الصورة المناسبة لها!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">فزت باللعبة! 🎉</h1>
        <p style="font-size: 2rem;">عدد المحاولات: <span id="final-moves">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "in", img: "../../../assets/images/words/in.jpg" },
            { word: "ink", img: "../../../assets/images/words/ink.jpg" },
            { word: "insect", img: "../../../assets/images/words/insect.jpg" },
            { word: "ill", img: "../../../assets/images/words/ill.jpg" },
            { word: "chair", img: "../../../assets/images/words/chair.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" }
        ];

        let pairsFound = 0;
        let moves = 0;
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        
        const grid = document.getElementById('grid');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            grid.innerHTML = '';
            
            // Create array of 14 cards (7 words, 7 images)
            let cards = [];
            vocabulary.forEach(item => {
                cards.push({ type: 'word', content: item.word, match: item.word });
                cards.push({ type: 'img', content: item.img, match: item.word });
            });
            
            shuffle(cards);

            cards.forEach(cardData => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.match = cardData.match;
                card.dataset.type = cardData.type;

                const front = document.createElement('div');
                front.className = 'card-face card-front';
                
                if(cardData.type === 'word') {
                    front.innerHTML = `<div class="word-text">${cardData.content}</div>`;
                } else {
                    front.innerHTML = `<img src="${cardData.content}">`;
                }

                const back = document.createElement('div');
                back.className = 'card-face card-back';
                back.textContent = '?';

                card.appendChild(front);
                card.appendChild(back);

                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (lockBoard) return;
            if (card === firstCard) return;
            if (card.classList.contains('flipped')) return;

            card.classList.add('flipped');

            // Speak the word if a word card is flipped
            if(card.dataset.type === 'word') {
                speak(card.dataset.match);
            }

            if (!firstCard) {
                firstCard = card;
                return;
            }

            secondCard = card;
            moves++;
            document.getElementById('moves').textContent = moves;
            
            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.match === secondCard.dataset.match;
            
            if (isMatch) {
                disableCards();
                pairsFound++;
                document.getElementById('score').textContent = pairsFound;
                speak('Match!');
                
                if(pairsFound === vocabulary.length) {
                    setTimeout(endGame, 1000);
                }
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            // Make them green
            firstCard.querySelector('.card-front').style.border = '5px solid #2ecc71';
            secondCard.querySelector('.card-front').style.border = '5px solid #2ecc71';

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;
            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [firstCard, secondCard, lockBoard] = [null, null, false];
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            pairsFound = 0; moves = 0;
            document.getElementById('score').textContent = pairsFound;
            document.getElementById('moves').textContent = moves;
            createBoard();
        }

        function endGame() {
            document.getElementById('final-moves').textContent = moves;
            document.getElementById('end-screen').classList.remove('hidden');
            speak('Great job!');
        }
    </script>
</body>
</html>
