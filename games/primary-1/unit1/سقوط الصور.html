    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سقوط الصور (Catch the Image)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: none;}
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; pointer-events: none; z-index: 10;}
        
        #target-word-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 40px;
            border-radius: 50px;
            border: 5px solid #e74c3c;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 10;
        }

        #target-word { font-size: 3rem; color: #2c3e50; font-family: 'Fredoka One', sans-serif; margin: 0; line-height: 1;}

        .game-area { 
            width: 95vw; 
            height: 75vh; 
            background: linear-gradient(#1abc9c, #16a085); 
            border: 5px solid #bdc3c7; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5); 
            position: relative; 
            overflow: hidden; 
            border-radius: 20px;
        }

        .falling-img {
            position: absolute;
            width: 100px;
            height: 100px;
            cursor: pointer;
            border-radius: 15px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            background: white;
            padding: 5px;
            object-fit: contain;
            transition: transform 0.1s;
        }
        
        .falling-img:active { transform: scale(0.9); }

        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;}
        button { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b; margin-top: 20px;}
        button:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            #target-word { font-size: 2rem; }
            .falling-img { width: 80px; height: 80px; }
            button { font-size: 1.8rem; padding: 10px 30px; }
        }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="ui">
        <div>النقاط: <span id="score">0</span></div>
        <div>❤️ <span id="lives">3</span></div>
    </div>
    
    <div class="game-area" id="game-area">
        <div id="target-word-container">
            <h2 id="target-word">Word</h2>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">صياد الصور 🎯</h1>
        <p style="font-size: 1.5rem;">انقر على الصورة التي تطابق الكلمة قبل أن تسقط!</p>
        <button onclick="startGame()">ابدأ اللعب</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #e74c3c;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">مجموع النقاط: <span id="final-score">0</span></p>
        <button onclick="startGame()">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "book", img: "../../../assets/images/words/book.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "pencil", img: "../../../assets/images/words/pencil.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" },
            { word: "board", img: "../../../assets/images/words/board.jpg" },
            { word: "sit down", img: "../../../assets/images/words/sit down.jpg" },
            { word: "stand up", img: "../../../assets/images/words/stand up.jpg" },
            { word: "open your books", img: "../../../assets/images/words/open your books.jpg" }
        ];

        let score = 0;
        let lives = 3;
        let gameInterval;
        let spawnInterval;
        let items = [];
        let currentTarget = null;
        let gameSpeed = 2;

        const gameArea = document.getElementById('game-area');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const targetWordEl = document.getElementById('target-word');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.2; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function pickNewTarget() {
            currentTarget = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            targetWordEl.textContent = currentTarget.word;
            speak(currentTarget.word);
        }

        function spawnImage() {
            // 50% chance to spawn target, 50% random
            let vocabItem = Math.random() > 0.5 ? currentTarget : vocabulary[Math.floor(Math.random() * vocabulary.length)];
            
            const img = document.createElement('img');
            img.src = vocabItem.img;
            img.className = 'falling-img';
            img.dataset.word = vocabItem.word;
            
            // Random X position
            const maxX = gameArea.clientWidth - 100;
            const x = Math.random() * maxX;
            
            img.style.left = x + 'px';
            img.style.top = '-100px';
            
            img.addEventListener('pointerdown', handleItemClick);
            
            gameArea.appendChild(img);
            items.push({ el: img, y: -100, word: vocabItem.word });
        }

        function handleItemClick(e) {
            const clickedWord = e.target.dataset.word;
            if (clickedWord === currentTarget.word) {
                // Correct!
                score += 10;
                scoreEl.textContent = score;
                gameSpeed += 0.1; // Increase difficulty
                e.target.remove();
                items = items.filter(i => i.el !== e.target);
                
                // Add visual feedback
                const popup = document.createElement('div');
                popup.textContent = "+10";
                popup.style.position = 'absolute';
                popup.style.left = e.clientX + 'px';
                popup.style.top = e.clientY + 'px';
                popup.style.color = '#f1c40f';
                popup.style.fontSize = '2rem';
                popup.style.fontFamily = 'Fredoka One';
                popup.style.textShadow = '2px 2px #000';
                popup.style.zIndex = '1000';
                document.body.appendChild(popup);
                
                setTimeout(() => popup.remove(), 500);
                
                pickNewTarget();
            } else {
                // Wrong!
                lives--;
                livesEl.textContent = lives;
                e.target.style.background = '#e74c3c';
                setTimeout(() => e.target.remove(), 200);
                items = items.filter(i => i.el !== e.target);
                if (lives <= 0) endGame();
            }
        }

        function updateGame() {
            const bottomLimit = gameArea.clientHeight;
            
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                item.y += gameSpeed;
                item.el.style.top = item.y + 'px';
                
                if (item.y > bottomLimit) {
                    if (item.word === currentTarget.word) {
                        // Missed the target!
                        lives--;
                        livesEl.textContent = lives;
                        if (lives <= 0) endGame();
                    }
                    item.el.remove();
                    items.splice(i, 1);
                }
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            
            // Clear area
            const oldImages = document.querySelectorAll('.falling-img');
            oldImages.forEach(img => img.remove());
            items = [];
            
            score = 0;
            lives = 3;
            gameSpeed = 2;
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            
            pickNewTarget();
            
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            
            gameInterval = setInterval(updateGame, 20); // 50 fps
            spawnInterval = setInterval(spawnImage, 1500);
        }

        function endGame() {
            clearInterval(gameInterval);
            clearInterval(spawnInterval);
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
