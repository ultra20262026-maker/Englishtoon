    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التهجئة الذكية (Smart Spelling)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: none;}
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; pointer-events: none; z-index: 10;}
        
        .game-area { 
            width: 95vw; 
            height: 75vh; 
            background: linear-gradient(#8e44ad, #9b59b6); 
            border: 5px solid #bdc3c7; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5); 
            position: relative; 
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
        }

        #image-container {
            width: 250px;
            height: 250px;
            background: white;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }

        #word-slots {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            direction: ltr; /* English words */
        }

        .slot {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border: 3px dashed white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-family: 'Fredoka One', sans-serif;
            color: #f1c40f;
            text-shadow: 2px 2px #000;
        }

        #letters-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            direction: ltr;
            max-width: 90%;
        }

        .letter-btn {
            width: 60px;
            height: 60px;
            background: #f1c40f;
            border: none;
            border-bottom: 5px solid #f39c12;
            border-radius: 10px;
            font-size: 2.5rem;
            font-family: 'Fredoka One', sans-serif;
            color: #2c3e50;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .letter-btn:active {
            transform: translateY(5px);
            border-bottom-width: 0;
        }

        .letter-btn:disabled {
            background: #bdc3c7;
            border-color: #95a5a6;
            color: #7f8c8d;
            cursor: not-allowed;
            transform: translateY(5px);
            border-bottom-width: 0;
        }

        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;}
        button.main-btn { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b; margin-top: 20px;}
        button.main-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }

        @media (max-width: 768px) {
            #image-container { width: 150px; height: 150px; }
            .slot, .letter-btn { width: 45px; height: 45px; font-size: 1.8rem; }
            button.main-btn { font-size: 1.8rem; padding: 10px 30px; }
        }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="ui">
        <div>المرحلة: <span id="level">1</span>/8</div>
        <div style="pointer-events: auto;"><button id="clear-btn" style="font-size: 1.2rem; padding: 5px 15px; border-radius: 10px; border:none; background: #e74c3c; color: white; font-family: Cairo;">مسح 🗑️</button></div>
    </div>
    
    <div class="game-area">
        <div id="image-container">
            <img id="game-image" src="" alt="Vocabulary">
        </div>
        <div id="word-slots"></div>
        <div id="letters-container"></div>
    </div>

    <!-- Celebration Effect -->
    <div id="celebration" style="position: absolute; pointer-events: none; font-size: 5rem; z-index: 50; transition: transform 0.5s, opacity 0.5s; opacity: 0; transform: scale(0);">🌟</div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">التهجئة الذكية 🔠</h1>
        <p style="font-size: 1.5rem;">رتب الحروف لتكوين الكلمة الصحيحة للصورة!</p>
        <button class="main-btn" onclick="startGame()">ابدأ اللعب</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #2ecc71;">ممتاز! اكتملت اللعبة 🏆</h1>
        <button class="main-btn" onclick="startGame()">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "book", img: "../../../assets/images/words/book.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" },
            { word: "pencil", img: "../../../assets/images/words/pencil.jpg" },
            { word: "board", img: "../../../assets/images/words/board.jpg" },
            // Ignore long sentences for spelling for kids
        ];

        let currentWordIndex = 0;
        let currentSpelling = "";
        let targetWord = "";

        const imageEl = document.getElementById('game-image');
        const slotsContainer = document.getElementById('word-slots');
        const lettersContainer = document.getElementById('letters-container');
        const levelEl = document.getElementById('level');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.2; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        document.getElementById('clear-btn').addEventListener('click', () => {
            currentSpelling = "";
            updateSlots();
            // Re-enable all letter buttons
            const btns = document.querySelectorAll('.letter-btn');
            btns.forEach(b => b.disabled = false);
        });

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function loadLevel() {
            currentSpelling = "";
            const currentItem = vocabulary[currentWordIndex];
            targetWord = currentItem.word.toUpperCase().replace(/\s/g, ''); // Remove spaces just in case
            
            imageEl.src = currentItem.img;
            levelEl.textContent = currentWordIndex + 1;
            speak(currentItem.word);

            // Generate slots
            slotsContainer.innerHTML = '';
            for(let i=0; i<targetWord.length; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slotsContainer.appendChild(slot);
            }

            // Generate scattered letters
            lettersContainer.innerHTML = '';
            const letters = targetWord.split('');
            // Add some random extra letters to make it fun
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            letters.push(alphabet[Math.floor(Math.random()*26)]);
            letters.push(alphabet[Math.floor(Math.random()*26)]);
            
            shuffle(letters);

            letters.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'letter-btn';
                btn.textContent = letter;
                btn.onclick = () => handleLetterClick(letter, btn);
                lettersContainer.appendChild(btn);
            });
        }

        function handleLetterClick(letter, btnEl) {
            if (currentSpelling.length < targetWord.length) {
                currentSpelling += letter;
                btnEl.disabled = true;
                updateSlots();
                
                if (currentSpelling.length === targetWord.length) {
                    checkWin();
                }
            }
        }

        function updateSlots() {
            const slots = document.querySelectorAll('.slot');
            slots.forEach((slot, index) => {
                if (index < currentSpelling.length) {
                    slot.textContent = currentSpelling[index];
                    slot.style.borderStyle = 'solid';
                } else {
                    slot.textContent = '';
                    slot.style.borderStyle = 'dashed';
                }
            });
        }

        function checkWin() {
            if (currentSpelling === targetWord) {
                // Win!
                speak('Great job!');
                const celeb = document.getElementById('celebration');
                celeb.style.opacity = '1';
                celeb.style.transform = 'scale(1.5)';
                
                setTimeout(() => {
                    celeb.style.opacity = '0';
                    celeb.style.transform = 'scale(0)';
                    currentWordIndex++;
                    if (currentWordIndex < vocabulary.length) {
                        loadLevel();
                    } else {
                        document.getElementById('end-screen').classList.remove('hidden');
                    }
                }, 1500);

            } else {
                // Wrong spelling
                slotsContainer.style.animation = 'shake 0.5s';
                setTimeout(() => slotsContainer.style.animation = '', 500);
            }
        }

        // Add shake animation dynamic style
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                50% { transform: translateX(10px); }
                75% { transform: translateX(-10px); }
                100% { transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            currentWordIndex = 0;
            // shuffle vocabulary for variety
            shuffle(vocabulary);
            loadLevel();
        }
    </script>
</body>
</html>
