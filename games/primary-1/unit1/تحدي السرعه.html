    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي السرعة (Speed Match)</title>
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Fredoka One', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: manipulation;}
        #game-board { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        #player1-zone { flex: 1; background: #e74c3c; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotate(180deg); padding: 20px; box-sizing: border-box; border-bottom: 5px solid #c0392b; }
        #player2-zone { flex: 1; background: #3498db; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; border-top: 5px solid #2980b9; }
        #center-zone { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; background: #ecf0f1; border-radius: 50%; border: 8px solid #f1c40f; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); z-index: 10; cursor: pointer; touch-action: manipulation; }
        #center-image { width: 120px; height: 120px; object-fit: contain; }
        .options-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 20px; direction: ltr; unicode-bidi: isolate;}
        .option-btn { padding: 15px 30px; font-size: 2rem; background: rgba(255,255,255,0.2); border: 3px solid white; border-radius: 15px; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); transition: 0.1s; touch-action: manipulation; direction: ltr; unicode-bidi: isolate; }
        .option-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
        .score-display { font-size: 3rem; font-weight: bold; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); margin-bottom: 20px; pointer-events: none; }
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px;}
        .start-btn { font-size: 2.5rem; padding: 20px 60px; background: #f1c40f; border: none; border-radius: 50px; color: #2c3e50; cursor: pointer; box-shadow: 0 8px 0 #f39c12; font-weight: bold; touch-action: manipulation;}
        .start-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
        @keyframes correctPop { 0% { transform: scale(1); } 50% { transform: scale(1.2); background: #2ecc71; border-color: #27ae60;} 100% { transform: scale(1); } }
        @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); background: #c0392b;} 75% { transform: translateX(5px); background: #c0392b;} }
        @media (max-width: 500px) { #center-zone { width: 140px; height: 140px; } #center-image { width: 90px; height: 90px; } .option-btn { font-size: 1.5rem; padding: 10px 20px; } .score-display { font-size: 2rem; } }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="start-screen" class="screen"><h1 style="font-size: 3.5rem; margin-bottom: 20px; color: #f1c40f;">تحدي السرعة</h1><button class="start-btn" onpointerdown="startGame()">إبدأ التحدي</button></div>
    <div id="game-over-screen" class="screen hidden"><h1 id="winner-text" style="font-size: 4rem; margin-bottom: 20px; color: #2ecc71;">الفائز!</h1><button class="start-btn" onpointerdown="startGame()">العب مرة أخرى</button></div>
    <div id="game-board" class="hidden">
        <div id="player1-zone"><div class="score-display">اللاعب 1: <span id="p1-score">0</span></div><div class="options-container" id="p1-options"></div></div>
        <div id="center-zone" onpointerdown="playSound()"><img id="center-image" src="" alt="Target"></div>
        <div id="player2-zone"><div class="score-display">اللاعب 2: <span id="p2-score">0</span></div><div class="options-container" id="p2-options"></div></div>
    </div>
    <script>
let words = [
    { w: 'hello', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👋</text></svg>" },
    { w: 'goodbye', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👋</text></svg>" },
    { w: 'hany', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👦</text></svg>" },
    { w: 'hana', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👧</text></svg>" },
    { w: 'miss_mona', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👩‍🏫</text></svg>" },
    { w: 'play', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>⚽</text></svg>" },
    { w: 'shake_hands', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🤝</text></svg>" },
    { w: 'bag', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🎒</text></svg>" },
    { w: 'book', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>📖</text></svg>" },
    { w: 'bee', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐝</text></svg>" },
    { w: 'bus', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🚌</text></svg>" },
    { w: 'blue', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔵</text></svg>" },
];

        let p1Score = 0, p2Score = 0, isPlaying = false, currentWordObj = null, canAnswer = false;
        const WIN_SCORE = 10;
        function speak(text) { if('speechSynthesis' in window) { let u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; speechSynthesis.speak(u); } }
        function playSound() { if(currentWordObj && isPlaying) speak(currentWordObj.w.replace(/_/g, ' ')); }
        function shuffle(array) { let c = array.length, r; while (c != 0) { r = Math.floor(Math.random() * c); c--; [array[c], array[r]] = [array[r], array[c]]; } return array; }
        function nextRound() {
            canAnswer = false;
            let validWords = words.filter(w => w.w.trim() !== '');
            currentWordObj = validWords[Math.floor(Math.random() * validWords.length)];
            document.getElementById('center-image').src = currentWordObj.i;
            let options = [currentWordObj.w];
            while(options.length < 3) { let r = validWords[Math.floor(Math.random() * validWords.length)].w; if(!options.includes(r)) options.push(r); }
            let p1Opts = shuffle([...options]), p2Opts = shuffle([...options]);
            function createBtnHtml(word, playerNum) { return `<button class="option-btn" onpointerdown="checkAnswer(${playerNum}, '${word}', this)">${word.replace(/_/g, ' ').toUpperCase()}</button>`; }
            document.getElementById('p1-options').innerHTML = p1Opts.map(w => createBtnHtml(w, 1)).join('');
            document.getElementById('p2-options').innerHTML = p2Opts.map(w => createBtnHtml(w, 2)).join('');
            setTimeout(() => { playSound(); canAnswer = true; }, 500);
        }
        function checkAnswer(playerNum, selectedWord, btn) {
            if(!isPlaying || !canAnswer) return;
            if(selectedWord === currentWordObj.w) {
                canAnswer = false; btn.style.animation = 'correctPop 0.5s';
                if(playerNum === 1) { p1Score++; document.getElementById('p1-score').innerText = p1Score; } else { p2Score++; document.getElementById('p2-score').innerText = p2Score; }
                if(p1Score >= WIN_SCORE || p2Score >= WIN_SCORE) setTimeout(endGame, 1000); else setTimeout(nextRound, 1000);
            } else {
                btn.style.animation = 'wrongShake 0.4s'; btn.disabled = true; setTimeout(() => { btn.style.animation = ''; btn.disabled = false; }, 1000);
            }
        }
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden'); document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('game-board').classList.remove('hidden');
            p1Score = 0; p2Score = 0; document.getElementById('p1-score').innerText = p1Score; document.getElementById('p2-score').innerText = p2Score; isPlaying = true; nextRound();
        }
        function endGame() {
            isPlaying = false; document.getElementById('game-board').classList.add('hidden'); document.getElementById('game-over-screen').classList.remove('hidden');
            let winnerText = document.getElementById('winner-text');
            if(p1Score > p2Score) { winnerText.innerText = "فاز اللاعب 1 (الأحمر)!"; winnerText.style.color = "#e74c3c"; }
            else if(p2Score > p1Score) { winnerText.innerText = "فاز اللاعب 2 (الأزرق)!"; winnerText.style.color = "#3498db"; }
            else { winnerText.innerText = "تعادل !"; winnerText.style.color = "#f1c40f"; }
        }
    </script>
</body>
</html>
