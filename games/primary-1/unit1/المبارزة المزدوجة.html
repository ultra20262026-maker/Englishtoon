    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المبارزة المزدوجة (Split-Screen Duel)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column;}
        
        .half {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 5px solid #bdc3c7;
        }

        #player1 {
            background: linear-gradient(#e74c3c, #c0392b);
            transform: rotate(180deg); /* Faces the top player */
        }

        #player2 {
            background: linear-gradient(#3498db, #2980b9);
        }

        .score-board {
            position: absolute;
            top: 10px;
            font-size: 2rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .target-word {
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            direction: ltr;
        }

        .options {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .option-img {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 15px;
            padding: 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            object-fit: contain;
            transition: transform 0.1s;
        }

        .option-img:active { transform: scale(0.9); }

        .divider {
            height: 10px;
            background: #f1c40f;
            width: 100%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }

        .win-msg { font-size: 4rem; color: #f1c40f; animation: bounce 1s infinite; }
        @keyframes bounce { 0% { transform: translateY(0); } 50% { transform: translateY(-20px); } 100% { transform: translateY(0); } }

    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div id="player1" class="half">
        <div class="score-board">نقاط: <span id="score1">0</span></div>
        <div class="target-word p1-word">Word</div>
        <div class="options" id="options1"></div>
    </div>

    <div class="divider"></div>

    <div id="player2" class="half">
        <div class="score-board">نقاط: <span id="score2">0</span></div>
        <div class="target-word p2-word">Word</div>
        <div class="options" id="options2"></div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">المبارزة المزدوجة ⚔️</h1>
        <p style="font-size: 1.5rem;">ضع الجهاز بينك وبين زميلك. الأسرع في اختيار الصورة الصحيحة يفوز!</p>
        <p style="font-size: 1.5rem;">الهدف: 10 نقاط</p>
        <button onclick="startGame()">ابدأ التحدي!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <div id="winner-text" class="win-msg">اللاعب الفائز!</div>
        <button onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "book", img: "../../../assets/images/words/book.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "pencil", img: "../../../assets/images/words/pencil.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" },
            { word: "board", img: "../../../assets/images/words/board.jpg" },
            { word: "sit down", img: "../../../assets/images/words/sit down.jpg" },
            { word: "stand up", img: "../../../assets/images/words/stand up.jpg" },
            { word: "open your books", img: "../../../assets/images/words/open your books.jpg" }
        ];

        let score1 = 0;
        let score2 = 0;
        let currentTarget = null;
        let isRoundActive = false;

        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.2; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function spawnRound() {
            isRoundActive = true;
            currentTarget = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            
            document.querySelectorAll('.target-word').forEach(el => el.textContent = currentTarget.word);
            speak(currentTarget.word);

            let options = vocabulary.filter(v => v.word !== currentTarget.word);
            shuffle(options);
            let roundOptions = [currentTarget, options[0], options[1], options[2]];
            
            // Player 1 options
            shuffle(roundOptions);
            renderOptions('options1', roundOptions, 1);
            
            // Player 2 options
            shuffle(roundOptions);
            renderOptions('options2', roundOptions, 2);
        }

        function renderOptions(containerId, optionsList, playerNum) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            optionsList.forEach(item => {
                const img = document.createElement('img');
                img.src = item.img;
                img.className = 'option-img';
                img.dataset.word = item.word;
                img.addEventListener('pointerdown', (e) => handleAnswer(e, playerNum));
                container.appendChild(img);
            });
        }

        function handleAnswer(e, playerNum) {
            if(!isRoundActive) return;

            const clickedWord = e.target.dataset.word;
            if (clickedWord === currentTarget.word) {
                isRoundActive = false; // block other player
                e.target.style.border = "5px solid #2ecc71";
                
                if (playerNum === 1) {
                    score1++; document.getElementById('score1').textContent = score1;
                } else {
                    score2++; document.getElementById('score2').textContent = score2;
                }

                if (score1 >= 10 || score2 >= 10) {
                    setTimeout(() => endGame(playerNum), 1000);
                } else {
                    setTimeout(spawnRound, 1000);
                }
            } else {
                e.target.style.opacity = "0.3";
                e.target.style.pointerEvents = "none";
            }
        }

        function startGame() {
            score1 = 0; score2 = 0;
            document.getElementById('score1').textContent = score1;
            document.getElementById('score2').textContent = score2;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            setTimeout(spawnRound, 500);
        }

        function endGame(winnerNum) {
            document.getElementById('winner-text').textContent = winnerNum === 1 ? "🎉 فاز اللاعب الأحمر! 🎉" : "🎉 فاز اللاعب الأزرق! 🎉";
            if(winnerNum === 1) {
                document.getElementById('winner-text').style.transform = "rotate(180deg)";
            } else {
                document.getElementById('winner-text').style.transform = "rotate(0deg)";
            }
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
