    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ترتيب الحروف (Word Scramble)</title>
    <style>
        body { margin: 0; background: linear-gradient(135deg, #16a085, #f39c12); color: white; font-family: 'Fredoka One', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: manipulation;}
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; text-shadow: 2px 2px 0 #000; pointer-events: none;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px;}
        button { font-size: 2rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b; transition: 0.1s;}
        button:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
        #game-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #word-image { width: 200px; height: 200px; object-fit: contain; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; cursor: pointer; transition: 0.2s;}
        #word-image:active { transform: scale(0.95); }
        .slots-container { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; direction: ltr; unicode-bidi: isolate;}
        .slot { width: 50px; height: 60px; border-bottom: 5px solid white; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; text-transform: uppercase; color: #f1c40f; text-shadow: 2px 2px 0 #000; cursor: pointer;}
        .letters-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; direction: ltr; unicode-bidi: isolate;}
        .letter-btn { width: 60px; height: 60px; background: #3498db; border: none; border-radius: 10px; color: white; font-size: 2.5rem; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 0 #2980b9; transition: 0.1s; display: flex; align-items: center; justify-content: center; touch-action: manipulation;}
        .letter-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
        .letter-btn.used { opacity: 0; pointer-events: none; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } }
        .celebrate { animation: pop 0.5s; color: #2ecc71 !important; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @media (max-width: 500px) {
            #word-image { width: 150px; height: 150px; }
            .slot { width: 40px; height: 50px; font-size: 2.5rem; }
            .letter-btn { width: 50px; height: 50px; font-size: 2rem; }
        }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="ui"><div>المحاولات: <span id="lives">❤️❤️❤️</span></div><div>النقاط: <span id="score">0</span></div></div>
    <div id="start-screen" class="screen"><h1 style="font-size: 4rem; margin-bottom: 20px; color: #f1c40f;">ترتيب الحروف</h1><button onpointerdown="startGame()">إبدأ اللعب</button></div>
    <div id="game-over-screen" class="screen hidden"><h1 style="font-size: 4rem; margin-bottom: 20px; color: #e74c3c;">انتهت اللعبة!</h1><p style="font-size: 2rem; margin-bottom: 40px;">النقاط: <span id="final-score">0</span></p><button onpointerdown="startGame()">العب مرة أخرى</button></div>
    <div id="game-container" class="hidden">
        <img id="word-image" src="" alt="word image" onpointerdown="playSound()">
        <div class="slots-container" id="slots"></div>
        <div class="letters-container" id="letters"></div>
    </div>
    <script>
let words = [
    { w: 'hello', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👋</text></svg>" },
    { w: 'goodbye', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👋</text></svg>" },
    { w: 'hany', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👦</text></svg>" },
    { w: 'hana', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👧</text></svg>" },
    { w: 'miss_mona', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👩‍🏫</text></svg>" },
    { w: 'play', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>⚽</text></svg>" },
    { w: 'shake_hands', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🤝</text></svg>" },
    { w: 'bag', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🎒</text></svg>" },
    { w: 'book', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>📖</text></svg>" },
    { w: 'bee', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐝</text></svg>" },
    { w: 'bus', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🚌</text></svg>" },
    { w: 'blue', i: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔵</text></svg>" },
];

        let isPlaying = false, score = 0, lives = 3;
        let currentWordObj = null, currentWordStr = "", filledSlots = [];
        function speak(text) { if('speechSynthesis' in window) { let u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; speechSynthesis.speak(u); } }
        function playSound() { if(currentWordStr) speak(currentWordStr); }
        function shuffle(array) { let c = array.length, r; while (c != 0) { r = Math.floor(Math.random() * c); c--; [array[c], array[r]] = [array[r], array[c]]; } return array; }
        function setTarget() {
            let validWords = words.filter(w => w.w.trim().length > 0);
            currentWordObj = validWords[Math.floor(Math.random() * validWords.length)];
            currentWordStr = currentWordObj.w.replace(/_/g, ' ').toLowerCase();
            document.getElementById('word-image').src = currentWordObj.i;
            let slotsHtml = ''; filledSlots = [];
            for(let i=0; i<currentWordStr.length; i++) {
                if(currentWordStr[i] === ' ') { slotsHtml += `<div class="slot" style="border:none; width: 20px;"></div>`; filledSlots.push(' '); }
                else { slotsHtml += `<div class="slot" id="slot-${i}" onpointerdown="removeLetter(${i})"></div>`; filledSlots.push(''); }
            }
            document.getElementById('slots').innerHTML = slotsHtml;
            let chars = shuffle(currentWordStr.replace(/ /g, '').split(''));
            let lettersHtml = chars.map((c, i) => `<button class="letter-btn" id="letter-${i}" onpointerdown="addLetter('${c}', ${i})">${c}</button>`).join('');
            document.getElementById('letters').innerHTML = lettersHtml;
            setTimeout(playSound, 500);
        }
        function addLetter(c, btnIndex) {
            if(!isPlaying) return;
            let emptyIdx = filledSlots.indexOf('');
            if(emptyIdx !== -1) {
                filledSlots[emptyIdx] = {c: c, idx: btnIndex};
                document.getElementById('slot-'+emptyIdx).innerText = c;
                document.getElementById('letter-'+btnIndex).classList.add('used');
                if(!filledSlots.includes('')) checkWord();
            }
        }
        function removeLetter(slotIdx) {
            if(!isPlaying || !filledSlots[slotIdx]) return;
            let item = filledSlots[slotIdx];
            filledSlots[slotIdx] = '';
            document.getElementById('slot-'+slotIdx).innerText = '';
            document.getElementById('letter-'+item.idx).classList.remove('used');
        }
        function checkWord() {
            let guess = filledSlots.map(s => s === ' ' ? ' ' : s.c).join('');
            if(guess === currentWordStr) {
                document.getElementById('slots').classList.add('celebrate');
                score += 10; document.getElementById('score').innerText = score;
                setTimeout(() => { document.getElementById('slots').classList.remove('celebrate'); setTarget(); }, 1000);
            } else {
                document.getElementById('slots').classList.add('shake');
                lives--; document.getElementById('lives').innerText = '❤️'.repeat(lives);
                setTimeout(() => { 
                    document.getElementById('slots').classList.remove('shake');
                    if(lives <= 0) endGame(); else {
                        filledSlots.forEach((s, i) => { if(s && s !== ' ') removeLetter(i); });
                    }
                }, 500);
            }
        }
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden'); document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('game-container').classList.remove('hidden');
            isPlaying = true; score = 0; lives = 3; document.getElementById('score').innerText = score; document.getElementById('lives').innerText = '❤️'.repeat(lives); setTarget();
        }
        function endGame() {
            isPlaying = false; document.getElementById('game-container').classList.add('hidden'); document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
