    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>غزو الفضاء (Space Defender)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 75vh;
            background: radial-gradient(circle at bottom, #2c3e50, #000);
            border-radius: 20px;
            border: 5px solid #bdc3c7;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(52, 152, 219, 0.5);
        }

        /* Stars background effect */
        .stars { position: absolute; inset: 0; pointer-events: none; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        .base {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px #3498db;
            z-index: 10;
        }

        .base-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px white);
        }

        .alien-word {
            position: absolute;
            font-family: 'Fredoka One', sans-serif;
            font-size: 2rem;
            color: white;
            background: rgba(231, 76, 60, 0.8);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: crosshair;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.5);
            border: 2px solid #ff7979;
            direction: ltr;
        }

        .alien-word:active { transform: scale(0.9); }

        .laser {
            position: absolute;
            width: 4px;
            background: #2ecc71;
            box-shadow: 0 0 10px #2ecc71;
            z-index: 5;
            transform-origin: bottom center;
            transition: all 0.2s;
        }

        .ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: white; pointer-events: none; z-index: 20;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #3498db; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #2980b9;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }

        .explosion {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #f1c40f, #e74c3c, transparent);
            border-radius: 50%;
            animation: explode 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 15;
        }

        @keyframes explode {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container" id="game-area">
        <div class="stars" id="stars"></div>
        <div class="ui">
            <div>المستوى: <span id="level">1</span></div>
            <div>نقاط: <span id="score">0</span></div>
            <div>الطاقة: <span id="health">❤️❤️❤️</span></div>
        </div>

        <div class="base" id="base">
            <img src="" class="base-img" id="target-img">
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #3498db;">غزو الفضاء 🚀</h1>
        <p style="font-size: 1.5rem;">دمر الكلمات الفضائية التي تطابق الصورة قبل أن تضرب القاعدة!</p>
        <button class="start" onclick="startGame()">انطلق!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #e74c3c;">انتهت اللعبة! 💥</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">حاول مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "in", img: "../../../assets/images/words/in.jpg" },
            { word: "ink", img: "../../../assets/images/words/ink.jpg" },
            { word: "insect", img: "../../../assets/images/words/insect.jpg" },
            { word: "ill", img: "../../../assets/images/words/ill.jpg" },
            { word: "chair", img: "../../../assets/images/words/chair.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" }
        ];

        let score = 0, level = 1, health = 3;
        let currentTarget = null;
        let aliens = [];
        let spawnTimer, gameLoop;
        let speedMultiplier = 1;

        const gameArea = document.getElementById('game-area');
        const targetImg = document.getElementById('target-img');
        const synth = window.speechSynthesis;

        // Generate stars
        for(let i=0; i<50; i++){
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random()*3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random()*100 + '%';
            star.style.top = Math.random()*100 + '%';
            star.style.animationDuration = Math.random()*2+1 + 's';
            document.getElementById('stars').appendChild(star);
        }

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.2; utterThis.rate = 1;
            synth.speak(utterThis);
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('health').textContent = '❤️'.repeat(health);
        }

        function newTarget() {
            currentTarget = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            targetImg.src = currentTarget.img;
            targetImg.style.transform = 'scale(0.5)';
            setTimeout(() => targetImg.style.transform = 'scale(1)', 200);
            speak(currentTarget.word);
        }

        function shootLaser(x, y) {
            const baseRect = document.getElementById('base').getBoundingClientRect();
            const gameRect = gameArea.getBoundingClientRect();
            
            const baseX = baseRect.left - gameRect.left + baseRect.width/2;
            const baseY = baseRect.top - gameRect.top;

            const laser = document.createElement('div');
            laser.className = 'laser';
            laser.style.left = baseX + 'px';
            laser.style.top = baseY + 'px';
            
            const dx = x - baseX;
            const dy = y - baseY;
            const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            laser.style.height = dist + 'px';
            laser.style.transform = `rotate(${angle}deg)`;
            
            gameArea.appendChild(laser);
            setTimeout(() => laser.remove(), 200);
        }

        function createExplosion(x, y) {
            const exp = document.createElement('div');
            exp.className = 'explosion';
            exp.style.left = (x - 25) + 'px';
            exp.style.top = (y - 25) + 'px';
            gameArea.appendChild(exp);
            setTimeout(() => exp.remove(), 500);
        }

        function spawnAlien() {
            // Pick a word (could be target or not)
            const isTarget = Math.random() > 0.5;
            let vocabItem = currentTarget;
            if(!isTarget) {
                let options = vocabulary.filter(v => v.word !== currentTarget.word);
                vocabItem = options[Math.floor(Math.random() * options.length)];
            }

            const alien = document.createElement('div');
            alien.className = 'alien-word';
            alien.textContent = vocabItem.word;
            alien.dataset.word = vocabItem.word;
            
            const gw = gameArea.clientWidth;
            alien.style.left = Math.random() * (gw - 100) + 'px';
            alien.style.top = '-50px';

            alien.addEventListener('pointerdown', function(e) {
                const rect = this.getBoundingClientRect();
                const gameRect = gameArea.getBoundingClientRect();
                const rx = rect.left - gameRect.left + rect.width/2;
                const ry = rect.top - gameRect.top + rect.height/2;

                shootLaser(rx, ry);

                if (this.dataset.word === currentTarget.word) {
                    createExplosion(rx, ry);
                    score += 10;
                    if(score % 50 === 0) { level++; speedMultiplier += 0.2; }
                    updateUI();
                    this.remove();
                    aliens = aliens.filter(a => a.el !== this);
                    newTarget();
                } else {
                    this.style.background = 'gray';
                    this.style.pointerEvents = 'none';
                    health--;
                    updateUI();
                    if(health <= 0) endGame();
                }
            });

            gameArea.appendChild(alien);
            aliens.push({ el: alien, y: -50, speed: (Math.random() * 2 + 1) * speedMultiplier });
        }

        function updateGame() {
            const gh = gameArea.clientHeight;
            const baseRect = document.getElementById('base').getBoundingClientRect();
            const gameRect = gameArea.getBoundingClientRect();
            const baseY = baseRect.top - gameRect.top;

            for(let i = aliens.length - 1; i >= 0; i--) {
                let a = aliens[i];
                a.y += a.speed;
                a.el.style.top = a.y + 'px';

                // Reached base
                if (a.y > baseY - 40) {
                    if (a.el.dataset.word === currentTarget.word) {
                        // Missed the correct word
                        health--;
                        updateUI();
                        gameArea.style.boxShadow = "inset 0 0 50px red";
                        setTimeout(() => gameArea.style.boxShadow = "0 0 50px rgba(52, 152, 219, 0.5)", 200);
                        if(health <= 0) endGame();
                        newTarget();
                    }
                    a.el.remove();
                    aliens.splice(i, 1);
                }
            }

            if(health > 0) gameLoop = requestAnimationFrame(updateGame);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            
            document.querySelectorAll('.alien-word').forEach(e => e.remove());
            aliens = [];
            score = 0; level = 1; health = 3; speedMultiplier = 1;
            updateUI();
            
            newTarget();
            
            clearInterval(spawnTimer);
            cancelAnimationFrame(gameLoop);
            
            spawnTimer = setInterval(spawnAlien, 1500);
            updateGame();
        }

        function endGame() {
            clearInterval(spawnTimer);
            cancelAnimationFrame(gameLoop);
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
