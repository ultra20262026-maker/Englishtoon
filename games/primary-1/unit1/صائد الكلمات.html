    <div id="ui">
        <div>النقاط: <span id="score">0</span></div>
        <div id="lives" style="color:#ff7675;">❤️❤️❤️</div>
    </div>
    <div id="target-word">أطلق على: <span id="target-span"></span></div>
    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="screen" id="start-screen">
        <h1 style="font-size: 5rem; color: #f1c40f;">صائد الكلمات</h1>
        <p style="font-size: 2rem;">ركز جيداً وصوّب بسرعة نحو الصورة الصحيحة!</p>
        <button onclick="startGame()">ابدأ القنص</button>
    </div>
    <div class="screen hidden" id="game-over-screen">
        <h1 style="font-size: 5rem; color: #d63031;">انتهت اللعبة!</h1>
        <button onclick="startGame()">العب مرة أخرى</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const words = [
            {w: 'Hello', i: "../../../assets/images/words/Hello.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👋</text></svg>'}, {w: 'Goodbye', i: "../../../assets/images/words/Goodbye.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👋</text></svg>'},
            {w: 'shake hands', i: "../../../assets/images/words/shake hands.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🤝</text></svg>'}, {w: 'play', i: "../../../assets/images/words/play.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>⚽</text></svg>'},
            {w: 'table', i: "../../../assets/images/words/table.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🪑</text></svg>'}, {w: 'tomato', i: "../../../assets/images/words/tomato.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🍅</text></svg>'},
            {w: 'tiger', i: "../../../assets/images/words/tiger.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐯</text></svg>'}, {w: 'teacher', i: "../../../assets/images/words/teacher.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>👩‍🏫</text></svg>'},
            {w: 'tree', i: "../../../assets/images/words/tree.jpg"http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌳</text></svg>'}
        ];
        
        let images = {};
        words.forEach(w => { let img = new Image(); img.src = w.i; images[w.w] = img; });

        let isPlaying = false, score = 0, lives = 3;
        let targets = [], currentWord = '', spawnTimer = 0, speed = 100;

        function speak(text) { if('speechSynthesis' in window) { let u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; speechSynthesis.speak(u); } }

        function setTarget() {
            currentWord = words[Math.floor(Math.random() * words.length)].w;
            document.getElementById('target-span').innerText = currentWord;
            speak(currentWord);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            isPlaying = true; score = 0; lives = 3; targets = []; speed = 100;
            document.getElementById('score').innerText = score; document.getElementById('lives').innerText = '❤️'.repeat(lives);
            setTarget();
            gameLoop();
        }

        function spawnTarget() {
            let isCorrect = Math.random() > 0.4;
            let word = isCorrect ? currentWord : words[Math.floor(Math.random() * words.length)].w;
            let r = 50;
            targets.push({ x: Math.random() * (canvas.width - 2*r) + r, y: Math.random() * (canvas.height - 2*r) + r, r: r, word: word, life: 100, maxLife: 100 });
        }

        function gameLoop() {
            if(!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            spawnTimer++;
            if(spawnTimer > speed) { spawnTarget(); spawnTimer = 0; if(speed > 40) speed -= 2; }

            for(let i=targets.length-1; i>=0; i--) {
                let t = targets[i]; t.life--;
                ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fillStyle = `rgba(255, 255, 255, ${t.life/t.maxLife})`; ctx.fill(); ctx.lineWidth = 3; ctx.strokeStyle = t.word===currentWord ? '#2ecc71' : '#e74c3c'; ctx.stroke();
                let img = images[t.word];
                if(img && img.complete) { ctx.globalAlpha = t.life/t.maxLife; ctx.drawImage(img, t.x-40, t.y-40, 80, 80); ctx.globalAlpha = 1.0; }
                if(t.life <= 0) {
                    if(t.word === currentWord) { lives--; document.getElementById('lives').innerText = '❤️'.repeat(lives); document.getElementById('snd-wrong').play(); document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'), 500); if(lives<=0) {isPlaying=false; document.getElementById('game-over-screen').classList.remove('hidden');} }
                    targets.splice(i, 1);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        ['mousedown', 'touchstart'].forEach(evt => canvas.addEventListener(evt, e => {
            if (e.type === 'touchstart') e.preventDefault();
            if(!isPlaying) return; document.getElementById('snd-shoot').play(); 
            let rect = canvas.getBoundingClientRect(); 
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let scaleX = canvas.width / rect.width; let scaleY = canvas.height / rect.height;
            let x = (clientX - rect.left) * scaleX, y = (clientY - rect.top) * scaleY;
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();
            for(let i=targets.length-1; i>=0; i--) {
                let dx = x - targets[i].x, dy = y - targets[i].y;
                if(Math.sqrt(dx*dx + dy*dy) < targets[i].r) {
                    if(targets[i].word === currentWord) { score += 10; document.getElementById('score').innerText = score; document.getElementById('snd-correct').play(); setTarget(); }
                    else { lives--; document.getElementById('lives').innerText = '❤️'.repeat(lives); document.getElementById('snd-wrong').play(); document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'), 500); if(lives<=0) {isPlaying=false; document.getElementById('game-over-screen').classList.remove('hidden');} }
                    targets.splice(i, 1); break;
                }
            }
        }));
    </script>
