                if(img && img.complete) { ctx.globalAlpha = t.life/t.maxLife; ctx.drawImage(img, t.x-40, t.y-40, 80, 80); ctx.globalAlpha = 1.0; }
                if(t.life <= 0) {
                    if(t.word === currentWord) { lives--; document.getElementById('lives').innerText = '❤️'.repeat(lives); document.getElementById('snd-wrong').play(); document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'), 500); if(lives<=0) {isPlaying=false; document.getElementById('game-over-screen').classList.remove('hidden');} }
                    targets.splice(i, 1);
                }
            }
            requestAnimationFrame(gameLoop);
        }

        ['mousedown', 'touchstart'].forEach(evt => canvas.addEventListener(evt, e => {
            if (e.type === 'touchstart') e.preventDefault();
            if(!isPlaying) return; document.getElementById('snd-shoot').play(); 
            let rect = canvas.getBoundingClientRect(); 
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let scaleX = canvas.width / rect.width; let scaleY = canvas.height / rect.height;
            let x = (clientX - rect.left) * scaleX, y = (clientY - rect.top) * scaleY;
            ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI*2); ctx.fill();
            for(let i=targets.length-1; i>=0; i--) {
                let dx = x - targets[i].x, dy = y - targets[i].y;
                if(Math.sqrt(dx*dx + dy*dy) < targets[i].r) {
                    if(targets[i].word === currentWord) { score += 10; document.getElementById('score').innerText = score; document.getElementById('snd-correct').play(); setTarget(); }
                    else { lives--; document.getElementById('lives').innerText = '❤️'.repeat(lives); document.getElementById('snd-wrong').play(); document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'), 500); if(lives<=0) {isPlaying=false; document.getElementById('game-over-screen').classList.remove('hidden');} }
                    targets.splice(i, 1); break;
                }
            }
        }));
    </script>
</body>
</html>
