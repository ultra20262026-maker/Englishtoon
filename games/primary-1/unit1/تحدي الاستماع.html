    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الاستماع (Listen & Whack)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; color: white; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: none;}
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; pointer-events: none; z-index: 10;}
        
        .game-area { 
            width: 95vw; 
            height: 75vh; 
            background: linear-gradient(#e67e22, #d35400); 
            border: 5px solid #bdc3c7; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5); 
            position: relative; 
            border-radius: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            box-sizing: border-box;
        }

        .hole-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
        }

        .hole {
            width: 120px;
            height: 40px;
            background: #2c3e50;
            border-radius: 50%;
            position: absolute;
            bottom: 10px;
            box-shadow: inset 0 10px 10px rgba(0,0,0,0.8);
        }

        .mole-img {
            width: 100px;
            height: 100px;
            position: absolute;
            bottom: -100px; /* hidden initially */
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.5));
        }

        .mole-img.up {
            bottom: 30px;
        }

        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;}
        button.main-btn { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60; margin-top: 20px;}
        button.main-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }

        .speaker-btn {
            font-size: 3rem;
            background: white;
            border: none;
            border-radius: 50%;
            width: 80px; height: 80px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: auto;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
            70% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 0 20px rgba(255,255,255,0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        @media (max-width: 768px) {
            .hole { width: 80px; height: 30px; }
            .mole-img { width: 70px; height: 70px; }
            .speaker-btn { width: 60px; height: 60px; font-size: 2rem; }
        }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="ui">
        <div>النقاط: <span id="score">0</span></div>
        <div>الوقت: <span id="time">30</span>ث</div>
    </div>
    
    <div class="game-area" id="game-area">
        <!-- 6 holes -->
        <div class="hole-container"><div class="hole"></div><img class="mole-img" src=""></div>
        <div class="hole-container"><div class="hole"></div><img class="mole-img" src=""></div>
        <div class="hole-container"><div class="hole"></div><img class="mole-img" src=""></div>
        <div class="hole-container"><div class="hole"></div><img class="mole-img" src=""></div>
        <div class="hole-container"><div class="hole"></div><img class="mole-img" src=""></div>
        <div class="hole-container"><div class="hole"></div><img class="mole-img" src=""></div>
        
        <button class="speaker-btn" onclick="speakTarget()">🔊</button>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">تحدي الاستماع 🎧</h1>
        <p style="font-size: 1.5rem;">استمع للكلمة جيداً واصطد الصورة المطابقة لها!</p>
        <button class="main-btn" onclick="startGame()">ابدأ اللعب</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهى الوقت! ⏰</h1>
        <p style="font-size: 2rem;">لقد جمعت <span id="final-score">0</span> نقطة!</p>
        <button class="main-btn" onclick="startGame()">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "book", img: "../../../assets/images/words/book.jpg" },
            { word: "bag", img: "../../../assets/images/words/bag.jpg" },
            { word: "pencil", img: "../../../assets/images/words/pencil.jpg" },
            { word: "desk", img: "../../../assets/images/words/desk.jpg" },
            { word: "board", img: "../../../assets/images/words/board.jpg" },
            { word: "sit down", img: "../../../assets/images/words/sit down.jpg" },
            { word: "stand up", img: "../../../assets/images/words/stand up.jpg" },
            { word: "open your books", img: "../../../assets/images/words/open your books.jpg" }
        ];

        let score = 0;
        let timeLeft = 30;
        let currentTarget = null;
        let gameTimer, moleTimer;
        const synth = window.speechSynthesis;

        const scoreEl = document.getElementById('score');
        const timeEl = document.getElementById('time');
        const moles = document.querySelectorAll('.mole-img');

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.2; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function speakTarget() {
            if(currentTarget) speak(currentTarget.word);
        }

        function setNewTarget() {
            currentTarget = vocabulary[Math.floor(Math.random() * vocabulary.length)];
            speakTarget();
        }

        function randomHole() {
            return moles[Math.floor(Math.random() * moles.length)];
        }

        function peep() {
            const mole = randomHole();
            if(mole.classList.contains('up')) return;

            // 50% chance to show the correct image, 50% random
            const vocabItem = Math.random() > 0.5 ? currentTarget : vocabulary[Math.floor(Math.random() * vocabulary.length)];
            
            mole.src = vocabItem.img;
            mole.dataset.word = vocabItem.word;
            mole.classList.add('up');
            
            // Random time to stay up (between 800ms to 1500ms)
            const time = Math.random() * 700 + 800;
            
            setTimeout(() => {
                mole.classList.remove('up');
            }, time);
        }

        moles.forEach(mole => mole.addEventListener('pointerdown', function(e) {
            if(!e.isTrusted) return; // fake click
            if(!this.classList.contains('up')) return;
            
            if (this.dataset.word === currentTarget.word) {
                score += 10;
                scoreEl.textContent = score;
                this.classList.remove('up');
                
                // Show floating text
                const floatTxt = document.createElement('div');
                floatTxt.textContent = "صح!";
                floatTxt.style.position = 'absolute';
                floatTxt.style.left = e.clientX + 'px';
                floatTxt.style.top = e.clientY + 'px';
                floatTxt.style.color = '#2ecc71';
                floatTxt.style.fontSize = '2rem';
                floatTxt.style.fontFamily = 'Cairo';
                floatTxt.style.zIndex = 100;
                document.body.appendChild(floatTxt);
                setTimeout(() => floatTxt.remove(), 500);

                setNewTarget(); // New word after correct hit
            } else {
                score = Math.max(0, score - 5);
                scoreEl.textContent = score;
                this.classList.remove('up');
                this.style.background = 'red';
                setTimeout(() => this.style.background = 'transparent', 200);
            }
        }));

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0;
            timeLeft = 30;
            scoreEl.textContent = score;
            timeEl.textContent = timeLeft;
            moles.forEach(m => m.classList.remove('up'));

            setNewTarget();

            clearInterval(gameTimer);
            clearInterval(moleTimer);

            gameTimer = setInterval(() => {
                timeLeft--;
                timeEl.textContent = timeLeft;
                if(timeLeft <= 0) endGame();
            }, 1000);

            moleTimer = setInterval(peep, 800); // Try to pop a mole every 800ms
        }

        function endGame() {
            clearInterval(gameTimer);
            clearInterval(moleTimer);
            moles.forEach(m => m.classList.remove('up'));
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
