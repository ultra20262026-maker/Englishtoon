<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الحرف الناقص (Missing Letter)</title>
    <style>
        body { margin: 0; background: linear-gradient(135deg, #8e44ad, #3498db); color: white; font-family: 'Fredoka One', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: manipulation;}
        #ui { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; text-shadow: 2px 2px 0 #000; pointer-events: none;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px;}
        button { font-size: 2rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b; transition: 0.1s; touch-action: manipulation;}
        button:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
        #game-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #word-image { width: 220px; height: 220px; object-fit: contain; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; cursor: pointer; transition: 0.2s; touch-action: manipulation;}
        #word-image:active { transform: scale(0.95); }
        #word-display { display: flex; gap: 10px; margin-bottom: 40px; font-size: 4rem; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; text-shadow: 3px 3px 0 #000; direction: ltr; unicode-bidi: isolate;}
        .missing { color: #f1c40f; border-bottom: 5px solid #f1c40f; min-width: 40px; display: inline-block; text-align: center;}
        .options-container { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; direction: ltr; unicode-bidi: isolate;}
        .option-btn { width: 70px; height: 70px; background: #2ecc71; border: none; border-radius: 15px; color: white; font-size: 3rem; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 0 6px 0 #27ae60; transition: 0.1s; display: flex; align-items: center; justify-content: center; touch-action: manipulation;}
        .option-btn:active { transform: translateY(6px); box-shadow: 0 0 0; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } }
        .celebrate { animation: pop 0.5s; color: #2ecc71 !important; }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @media (max-width: 500px) { #word-image { width: 160px; height: 160px; } #word-display { font-size: 3rem; margin-bottom: 30px;} .option-btn { width: 55px; height: 55px; font-size: 2.2rem; } }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div id="ui"><div>المحاولات: <span id="lives">❤️❤️❤️</span></div><div>النقاط: <span id="score">0</span></div></div>
    <div id="start-screen" class="screen"><h1 style="font-size: 4rem; margin-bottom: 20px; color: #f1c40f;">الحرف الناقص</h1><button onpointerdown="startGame()">إبدأ اللعب</button></div>
    <div id="game-over-screen" class="screen hidden"><h1 style="font-size: 4rem; margin-bottom: 20px; color: #e74c3c;">انتهت اللعبة!</h1><p style="font-size: 2rem; margin-bottom: 40px;">النقاط: <span id="final-score">0</span></p><button onpointerdown="startGame()">العب مرة أخرى</button></div>
    <div id="game-container" class="hidden">
        <img id="word-image" src="" alt="word image" onpointerdown="playSound()">
        <div id="word-display"></div>
        <div class="options-container" id="options"></div>
    </div>
    <script>
let words = [
    { w: 'hello', i: "../../../assets/images/words/hello.jpg" },
    { w: 'goodbye', i: "../../../assets/images/words/goodbye.jpg" },
    { w: 'hany', i: "../../../assets/images/words/hany.jpg" },
    { w: 'hana', i: "../../../assets/images/words/hana.jpg" },
    { w: 'miss_mona', i: "../../../assets/images/words/miss_mona.jpg" },
    { w: 'play', i: "../../../assets/images/words/play.jpg" },
    { w: 'shake_hands', i: "../../../assets/images/words/shake_hands.jpg" },
    { w: 'bag', i: "../../../assets/images/words/bag.jpg" },
    { w: 'book', i: "../../../assets/images/words/book.jpg" },
    { w: 'bee', i: "../../../assets/images/words/bee.jpg" },
    { w: 'bus', i: "../../../assets/images/words/bus.jpg" },
    { w: 'blue', i: "../../../assets/images/words/blue.jpg" },
];

        let isPlaying = false, score = 0, lives = 3;
        let currentWordObj = null, currentWordStr = "", correctLetter = "", missingIndex = -1;
        const alphabet = "abcdefghijklmnopqrstuvwxyz".split("");
        function speak(text) { if('speechSynthesis' in window) { let u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; speechSynthesis.speak(u); } }
        function playSound() { if(currentWordStr) speak(currentWordStr); }
        function shuffle(array) { let c = array.length, r; while (c != 0) { r = Math.floor(Math.random() * c); c--; [array[c], array[r]] = [array[r], array[c]]; } return array; }
        function setTarget() {
            let validWords = words.filter(w => w.w.trim().length > 0);
            currentWordObj = validWords[Math.floor(Math.random() * validWords.length)];
            currentWordStr = currentWordObj.w.toLowerCase();
            document.getElementById('word-image').src = currentWordObj.i;
            
            let validIndices = [];
            for(let i=0; i<currentWordStr.length; i++) { if(currentWordStr[i] !== '_' && currentWordStr[i] !== ' ') validIndices.push(i); }
            missingIndex = validIndices[Math.floor(Math.random() * validIndices.length)];
            correctLetter = currentWordStr[missingIndex];
            
            let displayHtml = '';
            for(let i=0; i<currentWordStr.length; i++) {
                if(i === missingIndex) displayHtml += `<span class="missing">?</span>`;
                else if(currentWordStr[i] === '_' || currentWordStr[i] === ' ') displayHtml += `<span>&nbsp;</span>`;
                else displayHtml += `<span>${currentWordStr[i]}</span>`;
            }
            document.getElementById('word-display').innerHTML = displayHtml;
            
            let opts = [correctLetter];
            while(opts.length < 4) { let r = alphabet[Math.floor(Math.random() * alphabet.length)]; if(!opts.includes(r)) opts.push(r); }
            opts = shuffle(opts);
            
            document.getElementById('options').innerHTML = opts.map(l => `<button class="option-btn" onpointerdown="checkAnswer('${l}')">${l}</button>`).join('');
            setTimeout(playSound, 500);
        }
        function checkAnswer(letter) {
            if(!isPlaying) return;
            if(letter === correctLetter) {
                document.querySelector('.missing').innerText = correctLetter;
                document.querySelector('.missing').classList.add('celebrate');
                score += 10; document.getElementById('score').innerText = score;
                setTimeout(() => { document.querySelector('.missing').classList.remove('celebrate'); setTarget(); }, 1000);
            } else {
                document.getElementById('word-display').classList.add('shake');
                lives--; document.getElementById('lives').innerText = '❤️'.repeat(lives);
                setTimeout(() => { 
                    document.getElementById('word-display').classList.remove('shake');
                    if(lives <= 0) endGame();
                }, 500);
            }
        }
        function startGame() {
            document.getElementById('start-screen').classList.add('hidden'); document.getElementById('game-over-screen').classList.add('hidden'); document.getElementById('game-container').classList.remove('hidden');
            isPlaying = true; score = 0; lives = 3; document.getElementById('score').innerText = score; document.getElementById('lives').innerText = '❤️'.repeat(lives); setTarget();
        }
        function endGame() {
            isPlaying = false; document.getElementById('game-container').classList.add('hidden'); document.getElementById('game-over-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
        }
    </script>
</body>
</html>
