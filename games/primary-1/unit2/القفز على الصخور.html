    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القفز على الصخور (River Crossing)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2ecc71; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: linear-gradient(180deg, #3498db 0%, #2980b9 100%);
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .target-word-container {
            margin-top: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 40px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
            text-align: center;
        }

        .target-word {
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            color: #2c3e50;
            direction: ltr;
            margin: 0;
        }

        .river {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70%;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 100px;
        }

        .rock {
            width: 100px;
            height: 80px;
            background: #7f8c8d;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: inset -5px -10px 0 rgba(0,0,0,0.2), 0 10px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
            z-index: 10;
        }

        .rock:active {
            transform: translateY(5px);
        }

        .rock img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            pointer-events: none;
            transform: translateY(-10px);
        }

        .frog {
            width: 60px;
            height: 60px;
            background: #27ae60;
            border-radius: 50%;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: inset -5px -5px 0 rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.3);
            z-index: 15;
            transition: all 0.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #2c3e50; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="target-word-container">
            <h1 class="target-word" id="target-word">Word</h1>
        </div>

        <div class="river" id="river">
            <!-- Rocks injected here -->
        </div>

        <div class="frog" id="frog">🐸</div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">القفز على الصخور 🐸</h1>
        <p style="font-size: 1.5rem;">اقفز على الصخرة التي تحمل الصورة الصحيحة لتعبر النهر!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "sky", img: "../../../assets/images/words/sky.jpg" },
            { word: "butterfly", img: "../../../assets/images/words/butterfly.jpg" },
            { word: "bird", img: "../../../assets/images/words/bird.jpg" },
            { word: "tree", img: "../../../assets/images/words/tree.jpg" },
            { word: "grass", img: "../../../assets/images/words/grass.jpg" },
            { word: "flower", img: "../../../assets/images/words/flower.jpg" },
            { word: "spider", img: "../../../assets/images/words/spider.jpg" },
            { word: "sun", img: "../../../assets/images/words/sun.jpg" },
            { word: "spoon", img: "../../../assets/images/words/spoon.jpg" },
            { word: "snake", img: "../../../assets/images/words/snake.jpg" },
            { word: "star", img: "../../../assets/images/words/star.jpg" }
        ];

        let score = 0, lives = 5;
        let currentTarget = null;
        let isJumping = false;
        
        const river = document.getElementById('river');
        const frog = document.getElementById('frog');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function spawnRocks() {
            river.innerHTML = '';
            
            let shuffled = [...vocabulary].sort(() => 0.5 - Math.random());
            let choices = shuffled.slice(0, 3);
            currentTarget = choices[Math.floor(Math.random() * 3)];
            
            document.getElementById('target-word').textContent = currentTarget.word;
            speak(currentTarget.word);

            choices.forEach((item, index) => {
                const rock = document.createElement('div');
                rock.className = 'rock';
                
                const img = document.createElement('img');
                img.src = item.img;
                rock.appendChild(img);
                
                rock.onclick = () => jumpToRock(rock, item);
                river.appendChild(rock);
            });

            // Reset frog position visually slowly falling back down to prepare for next jump
            frog.style.transition = 'all 0.5s';
            frog.style.bottom = '20px';
            frog.style.left = '50%';
            frog.style.transform = 'translateX(-50%) scale(1)';
        }

        function jumpToRock(rockElement, item) {
            if (isJumping) return;
            isJumping = true;

            const rockRect = rockElement.getBoundingClientRect();
            const containerRect = document.querySelector('.game-container').getBoundingClientRect();
            
            const targetX = rockRect.left - containerRect.left + (rockRect.width / 2);
            const targetY = containerRect.bottom - rockRect.top - (rockRect.height / 2);

            // Jump animation
            frog.style.transition = 'all 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
            frog.style.left = targetX + 'px';
            frog.style.bottom = targetY + 'px';
            frog.style.transform = 'translateX(-50%) scale(1.5)'; // simulate height

            setTimeout(() => {
                frog.style.transform = 'translateX(-50%) scale(1)'; // land
                
                if (item.word === currentTarget.word) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    speak('Nice jump!');
                    rockElement.style.background = '#2ecc71';
                } else {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    speak('Oops!');
                    rockElement.style.background = '#e74c3c';
                    
                    // splash animation
                    frog.style.opacity = '0';
                    setTimeout(() => frog.style.opacity = '1', 500);
                }

                setTimeout(() => {
                    if (lives <= 0) {
                        endGame();
                    } else {
                        isJumping = false;
                        spawnRocks();
                    }
                }, 1000);
            }, 400);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0; lives = 5;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            isJumping = false;
            frog.style.opacity = '1';
            spawnRocks();
        }

        function endGame() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
