    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>قطار الكلمات (Word Train)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #3498db; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #a4b0be;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-image: linear-gradient(to bottom, #7bed9f, #2ed573);
        }

        .sky-bg {
            position: absolute;
            top: 0;
            width: 100%;
            height: 60%;
            background: #70a1ff;
            z-index: 1;
        }

        .target-word-container {
            margin-top: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 40px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
            text-align: center;
        }

        .target-word {
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            color: #2f3542;
            direction: ltr;
            margin: 0;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            z-index: 20;
        }

        .choice {
            width: 100px;
            height: 100px;
            background: #fff;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #dfe4ea;
            transition: transform 0.1s;
        }

        .choice:active { transform: translateY(8px); box-shadow: 0 0 0; }
        
        .choice img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .train-container {
            position: absolute;
            bottom: 20px;
            left: -500px; /* starts off-screen */
            display: flex;
            align-items: flex-end;
            z-index: 10;
            transition: left 2s ease-out;
        }

        .train-loco {
            width: 120px;
            height: 100px;
            background: #eccc68;
            border-radius: 20px 20px 0 0;
            position: relative;
            box-shadow: inset -10px 0 0 rgba(0,0,0,0.1);
        }
        
        .train-loco::before {
            content: ''; position: absolute; bottom: 0; left: 10px; width: 30px; height: 30px; background: #2f3542; border-radius: 50%; box-shadow: 60px 0 0 #2f3542;
        }
        .train-loco::after {
            content: '🚂'; position: absolute; font-size: 4rem; top: -10px; right: 10px;
        }

        .train-car {
            width: 100px;
            height: 80px;
            background: #ff7f50;
            border-radius: 10px 10px 0 0;
            margin-right: 10px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset -10px 0 0 rgba(0,0,0,0.1);
        }

        .train-car::before {
            content: ''; position: absolute; bottom: -10px; left: 10px; width: 25px; height: 25px; background: #2f3542; border-radius: 50%; box-shadow: 50px 0 0 #2f3542;
        }

        .train-car img {
            width: 60px; height: 60px; object-fit: contain; animation: dropIn 0.5s bounce;
        }

        @keyframes dropIn {
            0% { transform: translateY(-200px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #eccc68; border: none; border-radius: 50px; color: #2f3542; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="sky-bg"></div>
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="target-word-container">
            <h1 class="target-word" id="target-word">Word</h1>
        </div>

        <div class="choices" id="choices">
            <!-- Choices injected here -->
        </div>

        <div class="train-container" id="train">
            <!-- Cars are created dynamically -->
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #eccc68;">قطار الكلمات 🚂</h1>
        <p style="font-size: 1.5rem;">انقر على الصورة الصحيحة لتحميلها في القطار!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #eccc68;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "sky", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌤️</text></svg>" },
            { word: "butterfly", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🦋</text></svg>" },
            { word: "bird", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐦</text></svg>" },
            { word: "tree", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌳</text></svg>" },
            { word: "grass", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌿</text></svg>" },
            { word: "flower", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌸</text></svg>" },
            { word: "spider", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🕷️</text></svg>" },
            { word: "sun", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>☀️</text></svg>" },
            { word: "spoon", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🥄</text></svg>" },
            { word: "snake", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐍</text></svg>" },
            { word: "star", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>⭐</text></svg>" }
        ];

        let score = 0, lives = 5;
        let currentTarget = null;
        let loadedItems = 0;
        
        const choicesDiv = document.getElementById('choices');
        const train = document.getElementById('train');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function createTrain() {
            train.innerHTML = '';
            train.style.transition = 'none';
            train.style.left = '-500px'; // Reset position
            
            const loco = document.createElement('div');
            loco.className = 'train-loco';
            train.appendChild(loco);

            for(let i=0; i<3; i++) {
                const car = document.createElement('div');
                car.className = 'train-car';
                car.id = `car-${i}`;
                train.appendChild(car);
            }

            // Animate train entering
            setTimeout(() => {
                train.style.transition = 'left 2s ease-out';
                train.style.left = '50px';
                spawnLevel();
            }, 100);
        }

        function spawnLevel() {
            choicesDiv.innerHTML = '';
            
            let shuffled = [...vocabulary].sort(() => 0.5 - Math.random());
            let choices = shuffled.slice(0, 3);
            currentTarget = choices[Math.floor(Math.random() * 3)];
            
            document.getElementById('target-word').textContent = currentTarget.word;
            speak(currentTarget.word);

            choices.forEach((item) => {
                const choice = document.createElement('div');
                choice.className = 'choice';
                
                const img = document.createElement('img');
                img.src = item.img;
                choice.appendChild(img);
                
                choice.onclick = () => loadTrain(item);
                choicesDiv.appendChild(choice);
            });
        }

        function loadTrain(item) {
            if (item.word === currentTarget.word) {
                score += 10;
                document.getElementById('score').textContent = score;
                speak('Great!');
                
                // Add image to train car
                const car = document.getElementById(`car-${loadedItems}`);
                const img = document.createElement('img');
                img.src = item.img;
                car.appendChild(img);
                
                loadedItems++;

                if (loadedItems >= 3) {
                    // Train full, depart!
                    choicesDiv.innerHTML = '';
                    train.style.transition = 'left 2s ease-in';
                    train.style.left = '100vw'; // move offscreen right
                    
                    setTimeout(() => {
                        loadedItems = 0;
                        createTrain();
                    }, 2000);

                } else {
                    setTimeout(spawnLevel, 500);
                }

            } else {
                lives--;
                document.getElementById('lives').textContent = lives;
                speak('Try again!');
                if (lives <= 0) endGame();
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0; lives = 5; loadedItems = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            createTrain();
        }

        function endGame() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
