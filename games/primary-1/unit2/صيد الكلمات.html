    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صيد الكلمات (Word Catcher)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #8e44ad; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #9b59b6;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .target-area {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            z-index: 20;
        }

        .target-area img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .falling-word {
            position: absolute;
            top: -50px;
            font-family: 'Fredoka One', sans-serif;
            font-size: 2rem;
            color: #2c3e50;
            background: #f1c40f;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 5px 0 #d4ac0d;
            transition: transform 0.1s;
            user-select: none;
            direction: ltr;
        }

        .falling-word:active { transform: translateY(5px); box-shadow: 0 0 0; }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="target-area">
            <img id="target-img" src="" alt="target">
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">صيد الكلمات 🎯</h1>
        <p style="font-size: 1.5rem;">انقر على الكلمة المتساقطة التي تطابق الصورة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const wordsData = [
            { word: "ant", img: "../../../assets/images/words/ant.jpg" },
            { word: "axe", img: "../../../assets/images/words/axe.jpg" },
            { word: "arrow", img: "../../../assets/images/words/arrow.jpg" },
            { word: "arm", img: "../../../assets/images/words/arm.jpg" },
            { word: "apple", img: "../../../assets/images/words/apple.jpg" }
        ];

        let score = 0, lives = 5;
        let currentTarget = null;
        let fallingInterval, spawnInterval;
        let activeWords = [];
        let speed = 2;
        
        const container = document.getElementById('game-container');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function setTarget() {
            currentTarget = wordsData[Math.floor(Math.random() * wordsData.length)];
            document.getElementById('target-img').src = currentTarget.img;
            speak(currentTarget.word);
        }

        function spawnWord() {
            const wordData = Math.random() > 0.5 ? currentTarget : wordsData[Math.floor(Math.random() * wordsData.length)];
            const el = document.createElement('div');
            el.className = 'falling-word';
            el.textContent = wordData.word;
            
            // Random X position
            const maxX = container.clientWidth - 100;
            const startX = Math.random() * maxX;
            el.style.left = startX + 'px';
            el.dataset.y = -50;
            
            el.onclick = () => handleCatch(el, wordData.word);
            
            container.appendChild(el);
            activeWords.push(el);
        }

        function handleCatch(el, text) {
            if(text === currentTarget.word) {
                score += 10;
                speed += 0.1;
                document.getElementById('score').textContent = score;
                speak("Great!");
                el.remove();
                activeWords = activeWords.filter(w => w !== el);
                setTarget();
            } else {
                lives--;
                document.getElementById('lives').textContent = lives;
                speak("Oops!");
                el.style.background = '#e74c3c';
                setTimeout(() => el.remove(), 200);
                activeWords = activeWords.filter(w => w !== el);
                
                if(lives <= 0) endGame();
            }
        }

        function gameLoop() {
            for(let i = activeWords.length - 1; i >= 0; i--) {
                const el = activeWords[i];
                let y = parseFloat(el.dataset.y);
                y += speed;
                el.dataset.y = y;
                el.style.top = y + 'px';
                
                if(y > container.clientHeight) {
                    // Missed it
                    if(el.textContent === currentTarget.word) {
                        lives--;
                        document.getElementById('lives').textContent = lives;
                        if(lives <= 0) endGame();
                    }
                    el.remove();
                    activeWords.splice(i, 1);
                }
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            document.getElementById('end-screen').classList.add('hidden-screen');
            score = 0; lives = 5; speed = 2;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            
            activeWords.forEach(w => w.remove());
            activeWords = [];
            
            setTarget();
            
            clearInterval(fallingInterval);
            clearInterval(spawnInterval);
            
            fallingInterval = setInterval(gameLoop, 30);
            spawnInterval = setInterval(spawnWord, 2000);
        }

        function endGame() {
            clearInterval(fallingInterval);
            clearInterval(spawnInterval);
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden-screen');
        }
    </script>
</body>
</html>
