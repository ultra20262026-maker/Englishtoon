<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>توصيل الجمل (Match & Connect)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #e67e22; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #d35400;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-around;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding-top: 50px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 40%;
            height: 90%;
            justify-content: center;
            z-index: 20;
        }

        .sentence-card {
            background: #f1c40f;
            padding: 15px;
            border-radius: 15px;
            font-family: 'Fredoka One', sans-serif;
            font-size: 1.5rem;
            color: #2c3e50;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #d4ac0d;
            direction: ltr;
            transition: transform 0.1s, background 0.3s;
        }

        .sentence-card:active { transform: translateY(5px); box-shadow: 0 0 0; }
        
        .image-card {
            background: rgba(255,255,255,0.9);
            height: 80px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, background 0.3s;
        }

        .image-card:active { transform: translateY(5px); box-shadow: 0 0 0; }

        .image-card img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            pointer-events: none;
        }

        .selected { background: #3498db !important; box-shadow: 0 5px 0 #2980b9 !important; color: white; }
        .matched { background: #2ecc71 !important; box-shadow: 0 5px 0 #27ae60 !important; color: white; pointer-events: none; opacity: 0.8;}
        
        #svg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>مستوى: <span id="level">1</span></div>
        </div>

        <svg id="svg-layer"></svg>

        <div class="column" id="col-sentences"></div>
        <div class="column" id="col-images"></div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">توصيل الجمل 🔌</h1>
        <p style="font-size: 1.5rem;">انقر على الجملة ثم الصورة المناسبة لربطهما معاً!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">عمل رائع!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const pairs = [
            { id: 1, text: "The sky is blue", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌤️</text></svg>" },
            { id: 2, text: "The grass is green", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌿</text></svg>" },
            { id: 3, text: "The sun is yellow", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>☀️</text></svg>" },
            { id: 4, text: "The flower is red", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌹</text></svg>" },
            { id: 5, text: "This is a circle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔴</text></svg>" },
            { id: 6, text: "This is a square", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔲</text></svg>" },
            { id: 7, text: "This is a triangle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔺</text></svg>" },
            { id: 8, text: "There is 1 yellow rectangle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🟨</text></svg>" }
        ];

        let score = 0, level = 1;
        let selectedSentence = null;
        let selectedImage = null;
        let matchedPairs = 0;
        
        const colSentences = document.getElementById('col-sentences');
        const colImages = document.getElementById('col-images');
        const svgLayer = document.getElementById('svg-layer');
        const container = document.getElementById('game-container');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function drawLine(el1, el2, color) {
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();
            const cRect = container.getBoundingClientRect();
            
            // Adjust RTL: sentences are on the right technically if dir=rtl, 
            // but column layout depends on DOM order. 
            // col-sentences is first, so right. col-images is left.
            
            const x1 = rect1.left - cRect.left;
            const y1 = rect1.top + rect1.height / 2 - cRect.top;
            
            const x2 = rect2.right - cRect.left;
            const y2 = rect2.top + rect2.height / 2 - cRect.top;

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', '4');
            svgLayer.appendChild(line);
        }

        function spawnLevel() {
            colSentences.innerHTML = '';
            colImages.innerHTML = '';
            svgLayer.innerHTML = '';
            matchedPairs = 0;
            selectedSentence = null;
            selectedImage = null;
            
            let shuffled = [...pairs].sort(() => 0.5 - Math.random()).slice(0, 4);
            
            let sentenceCards = [...shuffled].sort(() => 0.5 - Math.random());
            let imageCards = [...shuffled].sort(() => 0.5 - Math.random());

            sentenceCards.forEach(item => {
                const div = document.createElement('div');
                div.className = 'sentence-card';
                div.textContent = item.text;
                div.dataset.id = item.id;
                div.onclick = () => {
                    speak(item.text);
                    if(div.classList.contains('matched')) return;
                    
                    if(selectedSentence) selectedSentence.classList.remove('selected');
                    selectedSentence = div;
                    div.classList.add('selected');
                    checkMatch();
                };
                colSentences.appendChild(div);
            });

            imageCards.forEach(item => {
                const div = document.createElement('div');
                div.className = 'image-card';
                div.dataset.id = item.id;
                const img = document.createElement('img');
                img.src = item.img;
                div.appendChild(img);
                div.onclick = () => {
                    if(div.classList.contains('matched')) return;
                    
                    if(selectedImage) selectedImage.classList.remove('selected');
                    selectedImage = div;
                    div.classList.add('selected');
                    checkMatch();
                };
                colImages.appendChild(div);
            });
        }

        function checkMatch() {
            if(selectedSentence && selectedImage) {
                if(selectedSentence.dataset.id === selectedImage.dataset.id) {
                    // Match!
                    score += 10;
                    document.getElementById('score').textContent = score;
                    speak("Correct!");
                    
                    selectedSentence.classList.remove('selected');
                    selectedImage.classList.remove('selected');
                    selectedSentence.classList.add('matched');
                    selectedImage.classList.add('matched');
                    
                    drawLine(selectedSentence, selectedImage, '#2ecc71');
                    
                    selectedSentence = null;
                    selectedImage = null;
                    matchedPairs++;
                    
                    if(matchedPairs === 4) {
                        level++;
                        document.getElementById('level').textContent = level;
                        setTimeout(spawnLevel, 1500);
                    }
                } else {
                    // Wrong
                    speak("Oops!");
                    selectedSentence.classList.remove('selected');
                    selectedImage.classList.remove('selected');
                    selectedSentence.style.background = '#e74c3c';
                    selectedImage.style.background = '#e74c3c';
                    
                    let s = selectedSentence, i = selectedImage;
                    setTimeout(() => {
                        if(!s.classList.contains('matched')) s.style.background = '#f1c40f';
                        if(!i.classList.contains('matched')) i.style.background = 'rgba(255,255,255,0.9)';
                    }, 800);
                    
                    selectedSentence = null;
                    selectedImage = null;
                }
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            document.getElementById('end-screen').classList.add('hidden-screen');
            score = 0; level = 1;
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            spawnLevel();
        }
    </script>
</body>
</html>
