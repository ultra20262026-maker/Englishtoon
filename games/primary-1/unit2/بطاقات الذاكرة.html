    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بطاقات الذاكرة للجمل (Sentence Memory)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #34495e; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #2c3e50;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 800px;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .card-front {
            background: #f1c40f;
            transform: rotateY(180deg);
            direction: ltr;
        }

        .card-back {
            background: #e74c3c;
            color: white;
            font-size: 3rem;
        }

        .card-front img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .card-front .text {
            font-family: 'Fredoka One', sans-serif;
            font-size: 1.2rem;
            color: #2c3e50;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #3498db; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #2980b9;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="moves">0</span></div>
        </div>

        <div class="grid" id="grid"></div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">ذاكرة الجمل 🧠</h1>
        <p style="font-size: 1.5rem;">اقلب البطاقات لربط الجملة بصورتها الصحيحة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">أحسنت!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const pairs = [
            { id: 1, text: "The sky is blue", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌤️</text></svg>" },
            { id: 2, text: "The grass is green", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌿</text></svg>" },
            { id: 3, text: "The sun is yellow", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>☀️</text></svg>" },
            { id: 4, text: "The flower is red", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌹</text></svg>" },
            { id: 5, text: "This is a circle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔴</text></svg>" },
            { id: 6, text: "This is a square", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔲</text></svg>" },
            { id: 7, text: "This is a triangle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔺</text></svg>" },
            { id: 8, text: "There is 1 yellow rectangle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🟨</text></svg>" }
        ];

        let score = 0, moves = 0;
        let flippedCards = [];
        let matchedPairs = 0;
        
        const grid = document.getElementById('grid');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function spawnLevel() {
            grid.innerHTML = '';
            flippedCards = [];
            matchedPairs = 0;
            score = 0; moves = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('moves').textContent = moves;
            
            // Choose 4 random pairs
            let shuffledPairs = [...pairs].sort(() => 0.5 - Math.random()).slice(0, 4);
            
            let cards = [];
            shuffledPairs.forEach(p => {
                cards.push({ id: p.id, type: 'text', content: p.text });
                cards.push({ id: p.id, type: 'img', content: p.img, textToSpeak: p.text }); // attach text to speak on img click
            });
            
            cards.sort(() => 0.5 - Math.random());

            cards.forEach(c => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.id = c.id;
                
                const front = document.createElement('div');
                front.className = 'card-face card-front';
                
                if(c.type === 'text') {
                    front.innerHTML = `<div class="text">${c.content}</div>`;
                } else {
                    front.innerHTML = `<img src="${c.content}" alt="img">`;
                }
                
                const back = document.createElement('div');
                back.className = 'card-face card-back';
                back.innerHTML = '❓';
                
                card.appendChild(front);
                card.appendChild(back);
                
                card.onclick = () => flipCard(card, c);
                grid.appendChild(card);
            });
        }

        function flipCard(card, data) {
            if(flippedCards.length >= 2 || card.classList.contains('flipped')) return;
            
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if(data.type === 'text') speak(data.content);
            
            if(flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            
            if(c1.dataset.id === c2.dataset.id) {
                // Match
                score += 20;
                document.getElementById('score').textContent = score;
                speak("Match!");
                matchedPairs++;
                flippedCards = [];
                
                if(matchedPairs === 4) {
                    setTimeout(() => {
                        document.getElementById('final-score').textContent = score;
                        document.getElementById('end-screen').classList.remove('hidden-screen');
                    }, 1000);
                }
            } else {
                // Wrong
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            document.getElementById('end-screen').classList.add('hidden-screen');
            spawnLevel();
        }
    </script>
</body>
</html>
