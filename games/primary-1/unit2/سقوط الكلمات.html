    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سقوط الكلمات (Word Drop)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #e67e22; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #d35400;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 10%, transparent 10%);
            background-size: 30px 30px;
        }

        .falling-word {
            position: absolute;
            top: -50px;
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            color: #fff;
            background: #2c3e50;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 15;
            transition: top 0.05s linear;
            direction: ltr;
        }

        .baskets {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            box-sizing: border-box;
            z-index: 20;
        }

        .basket {
            width: 90px;
            height: 90px;
            background: rgba(255,255,255,0.9);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .basket:active { transform: translateY(5px); }

        .basket img {
            width: 70%;
            height: 70%;
            object-fit: contain;
            pointer-events: none;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #d35400; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="baskets" id="baskets">
            <!-- Baskets here -->
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">سقوط الكلمات 🍎</h1>
        <p style="font-size: 1.5rem;">انقر على السلة التي تحمل الصورة الصحيحة لالتقاط الكلمة الساقطة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "sky", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌤️</text></svg>" },
            { word: "butterfly", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🦋</text></svg>" },
            { word: "bird", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐦</text></svg>" },
            { word: "tree", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌳</text></svg>" },
            { word: "grass", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌿</text></svg>" },
            { word: "flower", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌸</text></svg>" },
            { word: "spider", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🕷️</text></svg>" },
            { word: "sun", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>☀️</text></svg>" },
            { word: "spoon", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🥄</text></svg>" },
            { word: "snake", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐍</text></svg>" },
            { word: "star", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>⭐</text></svg>" }
        ];

        let score = 0, lives = 5;
        let isPlaying = false;
        let gameSpeed = 2;
        let activeWord = null;
        let animationFrame;
        
        const container = document.getElementById('game-container');
        const basketsContainer = document.getElementById('baskets');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function spawnLevel() {
            if(!isPlaying) return;
            if(activeWord) {
                activeWord.el.remove();
            }

            basketsContainer.innerHTML = '';
            
            let shuffled = [...vocabulary].sort(() => 0.5 - Math.random());
            let choices = shuffled.slice(0, 3);
            let targetItem = choices[Math.floor(Math.random() * 3)];

            // Create baskets
            choices.forEach(item => {
                const basket = document.createElement('div');
                basket.className = 'basket';
                
                const img = document.createElement('img');
                img.src = item.img;
                basket.appendChild(img);
                
                basket.onclick = () => catchWord(item);
                basketsContainer.appendChild(basket);
            });

            // Create falling word
            const el = document.createElement('div');
            el.className = 'falling-word';
            el.textContent = targetItem.word;
            // Center horizontally
            el.style.left = '50%';
            el.style.transform = 'translateX(-50%)';
            el.style.top = '-50px';
            container.appendChild(el);

            activeWord = { el, word: targetItem.word, y: -50 };
            speak(targetItem.word);
        }

        function catchWord(item) {
            if(!isPlaying || !activeWord) return;

            if(item.word === activeWord.word) {
                // Correct catch
                score += 10;
                gameSpeed += 0.2;
                document.getElementById('score').textContent = score;
                speak('Caught it!');
                
                // Show floating animation text
                activeWord.el.style.background = '#2ecc71';
                setTimeout(() => spawnLevel(), 500);

            } else {
                // Wrong basket
                lives--;
                document.getElementById('lives').textContent = lives;
                speak('Wrong one!');
                
                activeWord.el.style.background = '#e74c3c';
                
                if(lives <= 0) {
                    setTimeout(() => endGame(), 500);
                } else {
                    setTimeout(() => spawnLevel(), 500);
                }
            }
            // Pause falling during result
            activeWord.y = -9999; 
        }

        function updateGame() {
            if(!isPlaying) return;

            if(activeWord && activeWord.y > -9000) {
                activeWord.y += gameSpeed;
                activeWord.el.style.top = activeWord.y + 'px';

                // Check if hit the ground
                const containerRect = container.getBoundingClientRect();
                const wordRect = activeWord.el.getBoundingClientRect();

                if(wordRect.bottom >= containerRect.bottom - 100) {
                    // Touched the basket area without being caught
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    speak('Missed it!');
                    
                    if(lives <= 0) {
                        endGame();
                    } else {
                        spawnLevel();
                    }
                }
            }

            animationFrame = requestAnimationFrame(updateGame);
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0; lives = 5; gameSpeed = 2;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            isPlaying = true;
            spawnLevel();
            animationFrame = requestAnimationFrame(updateGame);
        }

        function endGame() {
            isPlaying = false;
            cancelAnimationFrame(animationFrame);
            if(activeWord) activeWord.el.remove();
            activeWord = null;
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
