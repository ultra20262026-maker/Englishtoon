    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>توصيل الكلمات (Word Match)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2ecc71; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #27ae60;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-around;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding-top: 40px;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 35%;
            height: 90%;
            justify-content: center;
            z-index: 20;
        }

        .word-card {
            background: #f1c40f;
            padding: 15px;
            border-radius: 15px;
            font-family: 'Fredoka One', sans-serif;
            font-size: 2rem;
            color: #2c3e50;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 5px 0 #d4ac0d;
            direction: ltr;
            transition: transform 0.1s, background 0.3s;
        }

        .word-card:active { transform: translateY(5px); box-shadow: 0 0 0; }
        
        .image-card {
            background: rgba(255,255,255,0.9);
            height: 80px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s, background 0.3s;
        }

        .image-card:active { transform: translateY(5px); box-shadow: 0 0 0; }

        .image-card img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            pointer-events: none;
        }

        .selected { background: #3498db !important; box-shadow: 0 5px 0 #2980b9 !important; color: white; }
        .matched { background: #e74c3c !important; box-shadow: 0 5px 0 #c0392b !important; color: white; pointer-events: none; opacity: 0.8;}
        
        #svg-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #d35400; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
    </style>
</head>
<body>
    
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
        </div>

        <svg id="svg-layer"></svg>

        <div class="column" id="col-words"></div>
        <div class="column" id="col-images"></div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">توصيل الكلمات 🔗</h1>
        <p style="font-size: 1.5rem;">انقر على الكلمة ثم صورتها لتوصيلهما معاً!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">أحسنت!</h1>
        <p style="font-size: 2rem;">لقد قمت بتوصيل جميع الكلمات بنجاح!</p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

        ];

        let score = 0;
        let selectedWord = null;
        let selectedImage = null;
        let matchedPairs = 0;
        
        const colWords = document.getElementById('col-words');
        const colImages = document.getElementById('col-images');
        const svgLayer = document.getElementById('svg-layer');
        const container = document.getElementById('game-container');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function drawLine(el1, el2, color) {
            const rect1 = el1.getBoundingClientRect();
            const rect2 = el2.getBoundingClientRect();
            const cRect = container.getBoundingClientRect();
            
            const x1 = rect1.left - cRect.left;
            const y1 = rect1.top + rect1.height / 2 - cRect.top;
            
            const x2 = rect2.right - cRect.left;
            const y2 = rect2.top + rect2.height / 2 - cRect.top;

            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', x1);
            line.setAttribute('y1', y1);
            line.setAttribute('x2', x2);
            line.setAttribute('y2', y2);
            line.setAttribute('stroke', color);
            line.setAttribute('stroke-width', '5');
            svgLayer.appendChild(line);
        }

        function spawnLevel() {
            colWords.innerHTML = '';
            colImages.innerHTML = '';
            svgLayer.innerHTML = '';
            matchedPairs = 0;
            selectedWord = null;
            selectedImage = null;
            
            let wordCards = [...pairs].sort(() => 0.5 - Math.random());
            let imageCards = [...pairs].sort(() => 0.5 - Math.random());

            wordCards.forEach(item => {
                const div = document.createElement('div');
                div.className = 'word-card';
                div.textContent = item.word;
                div.dataset.id = item.id;
                div.onclick = () => {
                    speak(item.word);
                    if(div.classList.contains('matched')) return;
                    
                    if(selectedWord) selectedWord.classList.remove('selected');
                    selectedWord = div;
                    div.classList.add('selected');
                    checkMatch();
                };
                colWords.appendChild(div);
            });

            imageCards.forEach(item => {
                const div = document.createElement('div');
                div.className = 'image-card';
                div.dataset.id = item.id;
                const img = document.createElement('img');
                img.src = item.img;
                div.appendChild(img);
                div.onclick = () => {
                    if(div.classList.contains('matched')) return;
                    
                    if(selectedImage) selectedImage.classList.remove('selected');
                    selectedImage = div;
                    div.classList.add('selected');
                    checkMatch();
                };
                colImages.appendChild(div);
            });
        }

        function checkMatch() {
            if(selectedWord && selectedImage) {
                if(selectedWord.dataset.id === selectedImage.dataset.id) {
                    // Match
                    score += 10;
                    document.getElementById('score').textContent = score;
                    speak("Correct!");
                    
                    selectedWord.classList.remove('selected');
                    selectedImage.classList.remove('selected');
                    selectedWord.classList.add('matched');
                    selectedImage.classList.add('matched');
                    
                    drawLine(selectedWord, selectedImage, '#e74c3c');
                    
                    selectedWord = null;
                    selectedImage = null;
                    matchedPairs++;
                    
                    if(matchedPairs === pairs.length) {
                        setTimeout(() => {
                            document.getElementById('end-screen').classList.remove('hidden-screen');
                        }, 1000);
                    }
                } else {
                    // Wrong
                    speak("Try again!");
                    selectedWord.classList.remove('selected');
                    selectedImage.classList.remove('selected');
                    selectedWord.style.background = '#8e44ad';
                    selectedImage.style.background = '#8e44ad';
                    
                    let w = selectedWord, i = selectedImage;
                    setTimeout(() => {
                        if(!w.classList.contains('matched')) w.style.background = '#f1c40f';
                        if(!i.classList.contains('matched')) i.style.background = 'rgba(255,255,255,0.9)';
                    }, 800);
                    
                    selectedWord = null;
                    selectedImage = null;
                }
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            document.getElementById('end-screen').classList.add('hidden-screen');
            score = 0;
            document.getElementById('score').textContent = score;
            spawnLevel();
        }
    </script>
</body>
</html>
