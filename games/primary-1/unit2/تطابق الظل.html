    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تطابق الظل (Shadow Match)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #8e44ad; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #9b59b6;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .shadow-container {
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 50px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            transition: all 0.5s;
        }

        .shadow-img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: brightness(0); /* Make it black */
            transition: filter 0.5s ease-in-out, transform 0.5s;
        }

        .shadow-img.revealed {
            filter: brightness(1);
            transform: scale(1.1);
        }

        .words-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
        }

        .word-btn {
            font-family: 'Fredoka One', sans-serif;
            font-size: 2.5rem;
            padding: 15px 40px;
            background: #f1c40f;
            border: none;
            border-radius: 20px;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 8px 0 #d4ac0d;
            transition: transform 0.1s, background 0.3s;
            direction: ltr;
        }

        .word-btn:active { transform: translateY(8px); box-shadow: 0 0 0; }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="shadow-container" id="shadow-container">
            <img id="main-image" class="shadow-img" src="" alt="shadow">
        </div>

        <div class="words-container" id="words-container">
            <!-- Buttons injected here -->
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">تطابق الظل 🌑</h1>
        <p style="font-size: 1.5rem;">انقر على الكلمة الصحيحة التي تطابق الظل المعروض!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "sky", img: "../../../assets/images/words/sky.jpg" },
            { word: "butterfly", img: "../../../assets/images/words/butterfly.jpg" },
            { word: "bird", img: "../../../assets/images/words/bird.jpg" },
            { word: "tree", img: "../../../assets/images/words/tree.jpg" },
            { word: "grass", img: "../../../assets/images/words/grass.jpg" },
            { word: "flower", img: "../../../assets/images/words/flower.jpg" },
            { word: "spider", img: "../../../assets/images/words/spider.jpg" },
            { word: "sun", img: "../../../assets/images/words/sun.jpg" },
            { word: "spoon", img: "../../../assets/images/words/spoon.jpg" },
            { word: "snake", img: "../../../assets/images/words/snake.jpg" },
            { word: "star", img: "../../../assets/images/words/star.jpg" }
        ];

        let score = 0, lives = 5;
        let currentTarget = null;
        let isWaiting = false;
        
        const mainImage = document.getElementById('main-image');
        const wordsContainer = document.getElementById('words-container');
        const shadowContainer = document.getElementById('shadow-container');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function spawnLevel() {
            isWaiting = false;
            wordsContainer.innerHTML = '';
            mainImage.classList.remove('revealed');
            shadowContainer.style.background = 'rgba(255,255,255,0.1)';
            
            let shuffled = [...vocabulary].sort(() => 0.5 - Math.random());
            let choices = shuffled.slice(0, 3);
            currentTarget = choices[Math.floor(Math.random() * 3)];
            
            mainImage.src = currentTarget.img;

            choices.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = item.word;
                
                btn.onclick = () => handleChoice(item.word, btn);
                wordsContainer.appendChild(btn);
            });
        }

        function handleChoice(selectedWord, btn) {
            if(isWaiting) return;
            isWaiting = true;
            
            speak(selectedWord);

            if(selectedWord === currentTarget.word) {
                score += 10;
                document.getElementById('score').textContent = score;
                btn.style.background = '#2ecc71';
                shadowContainer.style.background = 'rgba(46, 204, 113, 0.4)';
                mainImage.classList.add('revealed');
                
                setTimeout(() => {
                    spawnLevel();
                }, 2000);
            } else {
                lives--;
                document.getElementById('lives').textContent = lives;
                btn.style.background = '#e74c3c';
                
                setTimeout(() => {
                    if (lives <= 0) endGame();
                    else {
                        btn.style.background = '#f1c40f'; // reset
                        isWaiting = false;
                    }
                }, 1000);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0; lives = 5;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            spawnLevel();
        }

        function endGame() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
