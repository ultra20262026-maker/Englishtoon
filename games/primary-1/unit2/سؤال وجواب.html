    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سؤال وجواب (Q&A Master)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #9b59b6; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #8e44ad;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .question {
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            color: #fff;
            background: rgba(0,0,0,0.2);
            padding: 15px 40px;
            border-radius: 30px;
            margin-bottom: 20px;
            direction: ltr;
        }

        .image-container {
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .image-container img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .answers-area {
            display: flex;
            gap: 20px;
            flex-direction: column;
            width: 80%;
            direction: ltr;
        }

        .answer-btn {
            font-family: 'Fredoka One', sans-serif;
            font-size: 2rem;
            padding: 15px;
            background: #f1c40f;
            border: none;
            border-radius: 15px;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 6px 0 #d4ac0d;
            transition: transform 0.1s, background 0.3s;
        }

        .answer-btn:active { transform: translateY(6px); box-shadow: 0 0 0; }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="question">What shape is this?</div>

        <div class="image-container">
            <img id="main-image" src="" alt="target">
        </div>

        <div class="answers-area" id="answers-area">
            <!-- Answers go here -->
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">سؤال وجواب 🗣️</h1>
        <p style="font-size: 1.5rem;">استمع للسؤال واختر الإجابة الصحيحة التي تصف الشكل!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const questions = [
            { (img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔴</text></svg>", answer: "This is a circle."), wrong: ["This is a square.", "This is a triangle."] },
            { (img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔲</text></svg>", answer: "This is a square."), wrong: ["This is a circle.", "There is 1 yellow rectangle."] },
            { (img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔺</text></svg>", answer: "This is a triangle."), wrong: ["This is a circle.", "The sun is yellow."] },
            { (img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🟨</text></svg>", answer: "There is 1 yellow rectangle."), wrong: ["This is a square.", "The sky is blue."] }
        ];

        let score = 0, lives = 5;
        let currentTarget = null;
        let isWaiting = false;
        
        const mainImage = document.getElementById('main-image');
        const answersArea = document.getElementById('answers-area');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function spawnLevel() {
            isWaiting = false;
            answersArea.innerHTML = '';
            
            currentTarget = questions[Math.floor(Math.random() * questions.length)];
            mainImage.src = currentTarget.img;
            
            let choices = [currentTarget.answer, ...currentTarget.wrong];
            choices.sort(() => 0.5 - Math.random());
            
            speak("What shape is this?");

            choices.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = text;
                
                btn.onclick = () => handleChoice(text, btn);
                answersArea.appendChild(btn);
            });
        }

        function handleChoice(text, btn) {
            if(isWaiting) return;
            isWaiting = true;
            
            speak(text);

            if(text === currentTarget.answer) {
                score += 10;
                document.getElementById('score').textContent = score;
                btn.style.background = '#2ecc71';
                setTimeout(spawnLevel, 1500);
            } else {
                lives--;
                document.getElementById('lives').textContent = lives;
                btn.style.background = '#e74c3c';
                
                setTimeout(() => {
                    if (lives <= 0) endGame();
                    else {
                        btn.style.background = '#f1c40f';
                        isWaiting = false;
                    }
                }, 1000);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            document.getElementById('end-screen').classList.add('hidden-screen');
            score = 0; lives = 5;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            spawnLevel();
        }

        function endGame() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden-screen');
        }
    </script>
</body>
</html>
