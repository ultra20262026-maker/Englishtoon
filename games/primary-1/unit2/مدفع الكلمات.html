<html lang="ar" dir="rtl">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مدفع الكلمات (Word Cannon)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #34495e;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .target-word-container {
            margin-top: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 40px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
            text-align: center;
        }

        .target-word {
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            color: #c0392b;
            direction: ltr;
            margin: 0;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="target-word-container">
            <h1 class="target-word" id="target-word">Word</h1>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">مدفع الكلمات 💣</h1>
        <p style="font-size: 1.5rem;">انقر لتوجيه المدفع وإطلاق النار على الصورة المطابقة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <!-- Hidden images for Canvas -->
    <div id="images" style="display:none;"></div>

    <script>
        const vocabulary = [
            { word: "sky", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌤️</text></svg>" },
            { word: "butterfly", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🦋</text></svg>" },
            { word: "bird", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐦</text></svg>" },
            { word: "tree", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌳</text></svg>" },
            { word: "grass", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌿</text></svg>" },
            { word: "flower", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌸</text></svg>" },
            { word: "spider", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🕷️</text></svg>" },
            { word: "sun", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>☀️</text></svg>" },
            { word: "spoon", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🥄</text></svg>" },
            { word: "snake", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🐍</text></svg>" },
            { word: "star", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>⭐</text></svg>" }
        ];

        let score = 0, lives = 5;
        let currentTarget = null;
        let isPlaying = false;
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const synth = window.speechSynthesis;

        // Load images
        const loadedImages = {};
        vocabulary.forEach(v => {
            const img = new Image();
            img.src = v.img;
            loadedImages[v.word] = img;
        });

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        // Game objects
        let cannonAngle = 0;
        let bullets = [];
        let targets = [];

        function spawnTargets() {
            targets = [];
            // Pick 3 random words, one must be the target
            let shuffled = [...vocabulary].sort(() => 0.5 - Math.random());
            let choices = shuffled.slice(0, 3);
            currentTarget = choices[Math.floor(Math.random() * 3)];
            
            document.getElementById('target-word').textContent = currentTarget.word;
            speak(currentTarget.word);

            // Position them at the top
            let spacing = canvas.width / 4;
            choices.forEach((item, index) => {
                targets.push({
                    word: item.word,
                    x: spacing * (index + 1),
                    y: 150,
                    radius: 40,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() * 0.5) + 0.5
                });
            });
        }

        function drawCannon() {
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height - 20);
            ctx.rotate(cannonAngle);
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(-15, -60, 30, 60);
            ctx.beginPath();
            ctx.arc(0, 0, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function gameLoop() {
            if (!isPlaying) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Targets
            targets.forEach(t => {
                t.x += t.vx;
                t.y += t.vy;
                
                // Bounce
                if(t.x < t.radius || t.x > canvas.width - t.radius) t.vx *= -1;
                
                // Draw Bubble
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.radius + 10, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fill();
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 4;
                ctx.stroke();

                // Draw Image
                if(loadedImages[t.word].complete) {
                    ctx.drawImage(loadedImages[t.word], t.x - t.radius, t.y - t.radius, t.radius*2, t.radius*2);
                }
            });

            // Draw Bullets
            for(let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                
                ctx.beginPath();
                ctx.arc(b.x, b.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#f1c40f';
                ctx.fill();

                // Collision
                let hit = false;
                for(let j = targets.length - 1; j >= 0; j--) {
                    let t = targets[j];
                    let dx = b.x - t.x;
                    let dy = b.y - t.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < t.radius + 10 + 8) {
                        hit = true;
                        if(t.word === currentTarget.word) {
                            score += 10;
                            document.getElementById('score').textContent = score;
                            speak("Excellent!");
                            spawnTargets();
                        } else {
                            lives--;
                            document.getElementById('lives').textContent = lives;
                            speak("Oh no!");
                            if(lives <= 0) {
                                endGame();
                            }
                        }
                        break;
                    }
                }

                if(hit || b.y < 0 || b.x < 0 || b.x > canvas.width) {
                    bullets.splice(i, 1);
                }
            }

            drawCannon();

            // Check if targets fell too far
            if(targets.some(t => t.y > canvas.height - 100)) {
                lives--;
                document.getElementById('lives').textContent = lives;
                speak("Too slow!");
                if(lives <= 0) endGame();
                else spawnTargets();
            }

            requestAnimationFrame(gameLoop);
        }

        // Interaction
        canvas.addEventListener('pointermove', (e) => {
            if(!isPlaying) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - canvas.width / 2;
            const y = e.clientY - rect.top - (canvas.height - 20);
            cannonAngle = Math.atan2(y, x) + Math.PI / 2;
        });

        canvas.addEventListener('pointerdown', (e) => {
            if(!isPlaying) return;
            // Shoot
            const speed = 10;
            const angle = cannonAngle - Math.PI / 2;
            bullets.push({
                x: canvas.width / 2 + Math.cos(angle) * 60,
                y: canvas.height - 20 + Math.sin(angle) * 60,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed
            });
        });

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0; lives = 5;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            bullets = [];
            resizeCanvas();
            isPlaying = true;
            spawnTargets();
            gameLoop();
        }

        function endGame() {
            isPlaying = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
