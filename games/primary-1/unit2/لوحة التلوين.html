    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة التلوين (Color Splash)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2ecc71; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #27ae60;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .sentence {
            font-family: 'Fredoka One', sans-serif;
            font-size: 2.5rem;
            color: #fff;
            background: rgba(0,0,0,0.2);
            padding: 10px 30px;
            border-radius: 30px;
            margin-bottom: 20px;
            direction: ltr;
        }

        .canvas-area {
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.9);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .canvas-area img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: grayscale(1) brightness(1.2);
            transition: filter 1s ease;
        }

        .canvas-area img.colored {
            filter: grayscale(0) brightness(1);
        }

        .colors-area {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .color-bucket {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 5px solid #fff;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        .color-bucket:active { transform: translateY(8px); box-shadow: 0 0 0; }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #d35400; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="sentence" id="sentence-text">The sky is blue.</div>

        <div class="canvas-area">
            <img id="main-image" src="" alt="target">
        </div>

        <div class="colors-area">
            <div class="color-bucket" style="background: #e74c3c;" onclick="handleColor('red')"></div>
            <div class="color-bucket" style="background: #3498db;" onclick="handleColor('blue')"></div>
            <div class="color-bucket" style="background: #f1c40f;" onclick="handleColor('yellow')"></div>
            <div class="color-bucket" style="background: #2ecc71;" onclick="handleColor('green')"></div>
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">لوحة التلوين 🎨</h1>
        <p style="font-size: 1.5rem;">استمع للجملة وانقر على اللون الصحيح لتلوين الصورة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const tasks = [
            { text: "The sky is blue", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌤️</text></svg>", color: "blue" },
            { text: "The grass is green", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌿</text></svg>", color: "green" },
            { text: "The sun is yellow", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>☀️</text></svg>", color: "yellow" },
            { text: "The flower is red", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌹</text></svg>", color: "red" },
            { text: "There is 1 yellow rectangle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🟨</text></svg>", color: "yellow" },
            { text: "This is a red circle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔴</text></svg>", color: "red" },
            { text: "This is a blue square", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🟦</text></svg>", color: "blue" }
        ];

        let score = 0, lives = 5;
        let currentTarget = null;
        let isWaiting = false;
        
        const mainImage = document.getElementById('main-image');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function spawnLevel() {
            isWaiting = false;
            mainImage.classList.remove('colored');
            
            currentTarget = tasks[Math.floor(Math.random() * tasks.length)];
            mainImage.src = currentTarget.img;
            document.getElementById('sentence-text').textContent = currentTarget.text;
            
            speak(currentTarget.text);
        }

        function handleColor(selectedColor) {
            if(isWaiting) return;
            isWaiting = true;
            
            speak(selectedColor);

            if(selectedColor === currentTarget.color) {
                score += 10;
                document.getElementById('score').textContent = score;
                mainImage.classList.add('colored');
                speak("Great job!");
                setTimeout(spawnLevel, 2000);
            } else {
                lives--;
                document.getElementById('lives').textContent = lives;
                speak("Try again!");
                
                setTimeout(() => {
                    if (lives <= 0) endGame();
                    else isWaiting = false;
                }, 1000);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            document.getElementById('end-screen').classList.add('hidden-screen');
            score = 0; lives = 5;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            spawnLevel();
        }

        function endGame() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden-screen');
        }
    </script>
</body>
</html>
