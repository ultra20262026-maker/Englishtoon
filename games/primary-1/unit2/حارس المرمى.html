    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حارس المرمى (Goalkeeper)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #27ae60; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #2ecc71;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-image: 
                linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .target-word-container {
            margin-top: 20px;
            background: rgba(255,255,255,0.9);
            padding: 10px 40px;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 20;
            text-align: center;
        }

        .target-word {
            font-family: 'Fredoka One', sans-serif;
            font-size: 3rem;
            color: #2c3e50;
            direction: ltr;
            margin: 0;
        }

        .goal {
            position: absolute;
            bottom: 0;
            width: 250px;
            height: 100px;
            border: 10px solid #ecf0f1;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            background: rgba(255,255,255,0.2);
            z-index: 5;
        }

        .gloves {
            position: absolute;
            bottom: 110px; /* Above the goal */
            width: 100px;
            height: 50px;
            background: #e74c3c;
            border-radius: 25px;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
            cursor: grab;
            transition: left 0.1s;
        }

        .gloves:active { cursor: grabbing; }

        .falling-item {
            position: absolute;
            width: 70px;
            height: 70px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 15;
            transition: top 0.05s linear;
        }

        .falling-item img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
            <div>محاولات: <span id="lives">5</span></div>
        </div>

        <div class="target-word-container">
            <h1 class="target-word" id="target-word">Word</h1>
        </div>

        <div class="goal" id="goal"></div>
        <div class="gloves" id="gloves">🧤</div>

        <!-- Items injected dynamically -->
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">حارس المرمى 🧤</h1>
        <p style="font-size: 1.5rem;">حرك القفاز لصد الصور الخاطئة، ودع الصورة الصحيحة تدخل المرمى!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 style="font-size: 4rem; color: #f1c40f;">انتهت اللعبة!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const vocabulary = [
            { word: "sky", img: "../../../assets/images/words/sky.jpg" },
            { word: "butterfly", img: "../../../assets/images/words/butterfly.jpg" },
            { word: "bird", img: "../../../assets/images/words/bird.jpg" },
            { word: "tree", img: "../../../assets/images/words/tree.jpg" },
            { word: "grass", img: "../../../assets/images/words/grass.jpg" },
            { word: "flower", img: "../../../assets/images/words/flower.jpg" },
            { word: "spider", img: "../../../assets/images/words/spider.jpg" },
            { word: "sun", img: "../../../assets/images/words/sun.jpg" },
            { word: "spoon", img: "../../../assets/images/words/spoon.jpg" },
            { word: "snake", img: "../../../assets/images/words/snake.jpg" },
            { word: "star", img: "../../../assets/images/words/star.jpg" }
        ];

        let score = 0, lives = 5;
        let currentTarget = null;
        let isPlaying = false;
        let activeItems = [];
        let gameSpeed = 3;
        let animationFrame;
        
        const container = document.getElementById('game-container');
        const gloves = document.getElementById('gloves');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        // Glove movement
        container.addEventListener('pointermove', (e) => {
            if (!isPlaying) return;
            const rect = container.getBoundingClientRect();
            let x = e.clientX - rect.left;
            // Constrain
            x = Math.max(50, Math.min(x, rect.width - 50));
            gloves.style.left = (x - 50) + 'px';
        });

        function spawnLevel() {
            // Remove existing items
            activeItems.forEach(i => i.el.remove());
            activeItems = [];
            
            let shuffled = [...vocabulary].sort(() => 0.5 - Math.random());
            let choices = shuffled.slice(0, 3);
            currentTarget = choices[Math.floor(Math.random() * 3)];
            
            document.getElementById('target-word').textContent = currentTarget.word;
            speak(currentTarget.word);

            // Spawn the 3 items sequentially
            choices.forEach((item, index) => {
                setTimeout(() => {
                    if(!isPlaying) return;
                    const el = document.createElement('div');
                    el.className = 'falling-item';
                    
                    const img = document.createElement('img');
                    img.src = item.img;
                    el.appendChild(img);
                    
                    // Position randomly within the goal width area roughly
                    const containerWidth = container.clientWidth;
                    const x = (containerWidth / 2 - 100) + Math.random() * 130; 
                    
                    el.style.left = x + 'px';
                    el.style.top = '-70px';
                    container.appendChild(el);
                    
                    activeItems.push({ el, word: item.word, y: -70, x: x });
                }, index * 1500); // Stagger spawns
            });
        }

        function checkCollisions() {
            if (!isPlaying) return;
            
            const glovesRect = gloves.getBoundingClientRect();
            const goalRect = document.getElementById('goal').getBoundingClientRect();
            
            for(let i = activeItems.length - 1; i >= 0; i--) {
                let item = activeItems[i];
                item.y += gameSpeed;
                item.el.style.top = item.y + 'px';
                
                const itemRect = item.el.getBoundingClientRect();
                
                // Check Gloves Collision
                if(itemRect.bottom > glovesRect.top && itemRect.top < glovesRect.bottom &&
                   itemRect.right > glovesRect.left && itemRect.left < glovesRect.right) {
                    
                    // Blocked
                    item.el.remove();
                    activeItems.splice(i, 1);
                    
                    if(item.word === currentTarget.word) {
                        // Bad! Blocked the correct answer
                        lives--;
                        document.getElementById('lives').textContent = lives;
                        speak("No, that was it!");
                        if(lives <= 0) { endGame(); return; }
                        else { setTimeout(spawnLevel, 1000); }
                    } else {
                        // Good! Blocked incorrect
                        speak("Blocked!");
                    }
                    continue;
                }
                
                // Check Goal Collision (passed the gloves)
                if(itemRect.top > goalRect.top) {
                    item.el.remove();
                    activeItems.splice(i, 1);
                    
                    if(item.word === currentTarget.word) {
                        // GOOOAL
                        score += 10;
                        gameSpeed += 0.2;
                        document.getElementById('score').textContent = score;
                        speak("Goal!");
                        setTimeout(spawnLevel, 1000);
                    } else {
                        // Wrong item went in
                        lives--;
                        document.getElementById('lives').textContent = lives;
                        speak("Oops!");
                        if(lives <= 0) { endGame(); return; }
                    }
                }
            }
            
            // If all items are gone but level hasn't respawned because correct answer was blocked or missed
            // Actually it handles it above. If activeItems is empty and we haven't spawned a new level..
            // It might hang if the last item is blocked and it was incorrect.
            // Let's ensure level advances if the correct item isn't on screen.
            
            animationFrame = requestAnimationFrame(checkCollisions);
        }

        // We need a loop to check if we need to spawn level if all items are resolved
        setInterval(() => {
            if(!isPlaying) return;
            if(activeItems.length === 0 && !container.querySelector('.falling-item')) {
                // If the correct item was missed, we need to respawn.
                // But avoid multiple spawns.
            }
        }, 1000);

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            score = 0; lives = 5; gameSpeed = 3;
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            activeItems.forEach(i => i.el.remove());
            activeItems = [];
            isPlaying = true;
            spawnLevel();
            animationFrame = requestAnimationFrame(checkCollisions);
            
            // Center gloves
            gloves.style.left = (container.clientWidth / 2 - 50) + 'px';
        }

        function endGame() {
            isPlaying = false;
            cancelAnimationFrame(animationFrame);
            document.getElementById('final-score').textContent = score;
            document.getElementById('end-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
