    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بناء الجمل (Sentence Builder)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #3498db; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        
        .game-container {
            width: 95vw;
            height: 85vh;
            background: #2980b9;
            border-radius: 20px;
            border: 5px solid #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .image-container {
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.2);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .image-container img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
        }

        .sentence-area {
            min-height: 80px;
            min-width: 80%;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            border: 3px dashed #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            direction: ltr;
        }

        .words-area {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 20px;
            direction: ltr;
        }

        .word-btn {
            font-family: 'Fredoka One', sans-serif;
            font-size: 2rem;
            padding: 10px 25px;
            background: #f1c40f;
            border: none;
            border-radius: 15px;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 6px 0 #d4ac0d;
            transition: transform 0.1s, background 0.3s;
        }

        .word-btn:active { transform: translateY(6px); box-shadow: 0 0 0; }
        .word-btn.hidden { opacity: 0; pointer-events: none; }

        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30;}
        
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    
    <div class="game-container">
        <div class="ui-top">
            <div>نقاط: <span id="score">0</span></div>
        </div>

        <div class="image-container">
            <img id="main-image" src="" alt="target">
        </div>

        <div class="sentence-area" id="sentence-area">
            <!-- Selected words go here -->
        </div>

        <div class="words-area" id="words-area">
            <!-- Scrambled words go here -->
        </div>
    </div>

    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">بناء الجمل 🏗️</h1>
        <p style="font-size: 1.5rem;">انقر على الكلمات بالترتيب الصحيح لتكوين الجملة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>

    <div id="end-screen" class="screen hidden-screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">عمل رائع!</h1>
        <p style="font-size: 2rem;">نقاطك: <span id="final-score">0</span></p>
        <button class="start" onclick="startGame()" style="margin-top: 30px;">العب مرة أخرى</button>
    </div>

    <script>
        const sentences = [
            { text: "The sky is blue", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌤️</text></svg>" },
            { text: "The grass is green", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌿</text></svg>" },
            { text: "The sun is yellow", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>☀️</text></svg>" },
            { text: "The flower is red", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🌹</text></svg>" },
            { text: "This is a circle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔴</text></svg>" },
            { text: "This is a square", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔲</text></svg>" },
            { text: "This is a triangle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔺</text></svg>" },
            { text: "The triangle has 3 sides", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🔺</text></svg>" },
            { text: "There is 1 yellow rectangle", img: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-size='80'>🟨</text></svg>" }
        ];

        let score = 0;
        let currentTarget = null;
        let wordsTarget = [];
        let currentWordIndex = 0;
        
        const mainImage = document.getElementById('main-image');
        const sentenceArea = document.getElementById('sentence-area');
        const wordsArea = document.getElementById('words-area');
        const synth = window.speechSynthesis;

        function speak(text) {
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.pitch = 1.3; utterThis.rate = 0.9;
            synth.speak(utterThis);
        }

        function spawnLevel() {
            sentenceArea.innerHTML = '';
            wordsArea.innerHTML = '';
            currentWordIndex = 0;
            
            currentTarget = sentences[Math.floor(Math.random() * sentences.length)];
            mainImage.src = currentTarget.img;
            
            wordsTarget = currentTarget.text.split(" ");
            let shuffled = [...wordsTarget].sort(() => 0.5 - Math.random());
            
            speak(currentTarget.text);

            shuffled.forEach(word => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                
                btn.onclick = () => handleChoice(word, btn);
                wordsArea.appendChild(btn);
            });
        }

        function handleChoice(word, btn) {
            if(word === wordsTarget[currentWordIndex]) {
                speak(word);
                btn.classList.add('hidden');
                
                const placedWord = document.createElement('div');
                placedWord.className = 'word-btn';
                placedWord.textContent = word;
                placedWord.style.cursor = 'default';
                placedWord.style.background = '#2ecc71';
                placedWord.style.color = '#fff';
                sentenceArea.appendChild(placedWord);
                
                currentWordIndex++;
                
                if(currentWordIndex === wordsTarget.length) {
                    score += 10;
                    document.getElementById('score').textContent = score;
                    speak(currentTarget.text);
                    setTimeout(spawnLevel, 2000);
                }
            } else {
                speak("Try again");
                btn.style.background = '#e74c3c';
                setTimeout(() => btn.style.background = '#f1c40f', 500);
            }
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden-screen');
            document.getElementById('end-screen').classList.add('hidden-screen');
            score = 0;
            document.getElementById('score').textContent = score;
            spawnLevel();
        }
    </script>
</body>
</html>
