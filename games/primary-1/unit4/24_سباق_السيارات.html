    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سباق السيارات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #e74c3c; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #c0392b; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-between;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .road { width: 100%; flex-grow: 1; background: #34495e; position: relative; border-top: 10px solid #2c3e50; border-bottom: 10px solid #2c3e50; overflow: hidden; margin-top: 50px; display: flex; align-items: center;}
        .lines { width: 200%; height: 5px; background: repeating-linear-gradient(90deg, transparent, transparent 50px, white 50px, white 100px); animation: moveLines 1s linear infinite;}
        @keyframes moveLines { from { transform: translateX(0); } to { transform: translateX(100px); } }
        
        .car { position: absolute; left: 20px; font-size: 5rem; transition: left 0.5s ease-out; z-index: 20; transform: scaleX(-1);}
        
        .question-box { background: rgba(255,255,255,0.9); border-radius: 15px; padding: 10px 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-bottom: 20px; font-size: 3rem; color: #c0392b;}
        
        .options { display: flex; gap: 15px; z-index: 20; padding-bottom: 20px;}
        .opt-btn { width: 80px; height: 80px; background: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
        .opt-btn:active { transform: translateY(5px); box-shadow: 0 0 0; }
        .opt-btn img { width: 80%; height: 80%; object-fit: contain; }
        .opt-btn.emoji-mode { font-size: 50px; }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>سباق السيارات 🏎️</div>
        </div>
        
        <div class="road">
            <div class="lines"></div>
            <div class="car" id="car">🏎️</div>
        </div>
        
        <div class="question-box" id="question-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="options" id="options"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">سباق السيارات 🏎️</h1>
        <p style="font-size: 1.5rem;">اختر الصورة الصحيحة لتسرع سيارتك!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "eye", image: "../images_unit4/pixar_eye_1782050332022.png", type: "img" },
  { word: "mouth", image: "../images_unit4/pixar_mouth_1782050342052.png", type: "img" },
  { word: "ear", image: "../images_unit4/pixar_ear_1782050353890.png", type: "img" },
  { word: "head", image: "../images_unit4/pixar_head_1782050365861.png", type: "img" },
  { word: "tongue", image: "../images_unit4/pixar_tongue_1782050382757.png", type: "img" },
  { word: "arm", image: "../images_unit4/pixar_arm_1782050393224.png", type: "img" },
  { word: "leg", image: "../images_unit4/pixar_leg_1782050404201.png", type: "img" },
  { word: "foot", image: "../images_unit4/pixar_foot_1782050415844.png", type: "img" },
  { word: "feet", image: "../images_unit4/pixar_feet_1782050434707.png", type: "img" },
  { word: "toes", image: "../images_unit4/pixar_toes_1782050446071.png", type: "img" },
  { word: "red", image: "../images_unit4/pixar_red_1782050458088.png", type: "img" },
  { word: "rocket", image: "../images_unit4/pixar_rocket_1782050469083.png", type: "img" },
  { word: "ring", image: "../images_unit4/pixar_ring_1782050484208.png", type: "img" },
  { word: "rabbit", image: "../images_unit4/pixar_rabbit_1782050494082.png", type: "img" },
  { word: "robot", image: "../images_unit4/pixar_robot_1782050505802.png", type: "img" },
  { word: "egg", image: "../images_unit4/pixar_egg_1782050517755.png", type: "img" },
  { word: "eggplant", image: "🍆", type: "emoji" },
  { word: "enter", image: "🚪", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "elbow", image: "💪", type: "emoji" },
  { word: "touch", image: "👆", type: "emoji" },
  { word: "hear", image: "👂", type: "emoji" },
  { word: "see", image: "👀", type: "emoji" },
  { word: "taste", image: "👅", type: "emoji" },
  { word: "smell", image: "👃", type: "emoji" },
  { word: "car", image: "🚗", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "carrot", image: "🥕", type: "emoji" },
  { word: "cup", image: "☕", type: "emoji" },
  { word: "cake", image: "🎂", type: "emoji" },
  { word: "kite", image: "🪁", type: "emoji" },
  { word: "king", image: "👑", type: "emoji" },
  { word: "kitchen", image: "🍳", type: "emoji" },
  { word: "key", image: "🔑", type: "emoji" },
  { word: "hand", image: "✋", type: "emoji" },
  { word: "nose", image: "👃", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let carPos = 20;
        let currentWord = null;
        let canClick = true;
        
        function renderOption(w) {
            if(w.type === 'emoji') return `<span class="emoji-mode">${w.image}</span>`;
            return `<img src="${w.image}">`;
        }

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('question-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            selected.forEach(w => {
                let btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerHTML = renderOption(w);
                
                btn.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Vroom!'); score+=10; carPos+=40;
                        document.getElementById('score').textContent=score;
                        document.getElementById('car').style.left = carPos + 'px';
                        btn.style.background = '#2ecc71'; 
                        canClick = false; setTimeout(spawnLevel, 1000);
                        if(carPos > document.getElementById('game-container').clientWidth - 150) carPos = 20;
                    } else {
                        speak('Crash!'); carPos = Math.max(20, carPos - 20);
                        document.getElementById('car').style.left = carPos + 'px';
                        btn.style.background = '#e74c3c'; setTimeout(()=>btn.style.background='white', 500);
                    }
                };
                opts.appendChild(btn);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; carPos=20; document.getElementById('car').style.left = carPos + 'px';
            document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
