<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحدي الحواس الخمس</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #8e44ad; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #9b59b6; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .question-box { background: white; color: #8e44ad; padding: 20px 40px; border-radius: 20px; font-family: 'Fredoka One'; font-size: 2.5rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-align: center;}
        
        .options { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;}
        .opt-box { background: #f1c40f; border-radius: 15px; padding: 20px; width: 100px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 0 #d4ac0d;}
        .opt-box:active { transform: translateY(5px); box-shadow: 0 0 0; }
        .opt-content { display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 1.5rem;}
        .opt-content img { width: 80px; height: 80px; object-fit: contain; }
        .opt-content.emoji-mode { font-size: 60px; }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>الحواس الخمس 🖐️</div>
        </div>
        
        <div class="question-box" id="question-box" onclick="if(currentSentence) speak(currentSentence.q)"></div>
        <div class="options" id="options"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">تحدي الحواس الخمس 🖐️</h1>
        <p style="font-size: 1.5rem;">أكمل الجملة واختار الكلمة أو العضو المناسب!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "eye", image: "../images_unit4/pixar_eye_1782050332022.png", type: "img" },
  { word: "mouth", image: "../images_unit4/pixar_mouth_1782050342052.png", type: "img" },
  { word: "ear", image: "../images_unit4/pixar_ear_1782050353890.png", type: "img" },
  { word: "head", image: "../images_unit4/pixar_head_1782050365861.png", type: "img" },
  { word: "tongue", image: "../images_unit4/pixar_tongue_1782050382757.png", type: "img" },
  { word: "arm", image: "../images_unit4/pixar_arm_1782050393224.png", type: "img" },
  { word: "leg", image: "../images_unit4/pixar_leg_1782050404201.png", type: "img" },
  { word: "foot", image: "../images_unit4/pixar_foot_1782050415844.png", type: "img" },
  { word: "feet", image: "../images_unit4/pixar_feet_1782050434707.png", type: "img" },
  { word: "toes", image: "../images_unit4/pixar_toes_1782050446071.png", type: "img" },
  { word: "red", image: "../images_unit4/pixar_red_1782050458088.png", type: "img" },
  { word: "rocket", image: "../images_unit4/pixar_rocket_1782050469083.png", type: "img" },
  { word: "ring", image: "../images_unit4/pixar_ring_1782050484208.png", type: "img" },
  { word: "rabbit", image: "../images_unit4/pixar_rabbit_1782050494082.png", type: "img" },
  { word: "robot", image: "../images_unit4/pixar_robot_1782050505802.png", type: "img" },
  { word: "egg", image: "../images_unit4/pixar_egg_1782050517755.png", type: "img" },
  { word: "eggplant", image: "🍆", type: "emoji" },
  { word: "enter", image: "🚪", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "elbow", image: "💪", type: "emoji" },
  { word: "touch", image: "👆", type: "emoji" },
  { word: "hear", image: "👂", type: "emoji" },
  { word: "see", image: "👀", type: "emoji" },
  { word: "taste", image: "👅", type: "emoji" },
  { word: "smell", image: "👃", type: "emoji" },
  { word: "car", image: "🚗", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "carrot", image: "🥕", type: "emoji" },
  { word: "cup", image: "☕", type: "emoji" },
  { word: "cake", image: "🎂", type: "emoji" },
  { word: "kite", image: "🪁", type: "emoji" },
  { word: "king", image: "👑", type: "emoji" },
  { word: "kitchen", image: "🍳", type: "emoji" },
  { word: "key", image: "🔑", type: "emoji" },
  { word: "hand", image: "✋", type: "emoji" },
  { word: "nose", image: "👃", type: "emoji" }
];

const sentences = [
    { q: "I can taste with my ___", ans: "tongue" },
    { q: "I can hear with my ___", ans: "ear" },
    { q: "I can touch with my ___", ans: "hand" },
    { q: "I can see with my ___", ans: "eye" },
    { q: "I can smell with my ___", ans: "nose" },
    { q: "I have 2 ___", ans: "eye" },
    { q: "I have one ___", ans: "mouth" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentSentence = null;
        let canClick = true;
        
        function renderOption(w) {
            if(w.type === 'emoji') return `<div class="opt-content emoji-mode">${w.image}</div>`;
            return `<div class="opt-content"><img src="${w.image}"></div>`;
        }

        function spawnLevel() {
            canClick = true;
            currentSentence = sentences[Math.floor(Math.random()*sentences.length)];
            
            document.getElementById('question-box').textContent = currentSentence.q;
            speak(currentSentence.q);
            
            let correctWordObj = wordsData.find(x => x.word === currentSentence.ans);
            let others = wordsData.filter(x => x.word !== currentSentence.ans).sort(()=>0.5-Math.random()).slice(0,2);
            let optionsArr = [correctWordObj, ...others].sort(()=>0.5-Math.random());
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            optionsArr.forEach(w => {
                let box = document.createElement('div');
                box.className = 'opt-box';
                box.innerHTML = renderOption(w);
                
                box.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentSentence.ans) {
                        let fullSentence = currentSentence.q.replace("___", w.word);
                        document.getElementById('question-box').textContent = fullSentence;
                        speak(fullSentence); 
                        score+=10; document.getElementById('score').textContent=score;
                        box.style.background = '#2ecc71'; 
                        canClick = false; setTimeout(spawnLevel, 2000);
                    } else {
                        speak('Try again'); box.style.background = '#e74c3c'; setTimeout(()=>box.style.background='#f1c40f', 500);
                    }
                };
                opts.appendChild(box);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
