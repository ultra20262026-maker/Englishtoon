    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>توصيل البطاقات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #27ae60; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2ecc71; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .columns { display: flex; width: 100%; justify-content: space-around; position: relative;}
        
        .col { display: flex; flex-direction: column; gap: 20px;}
        .card-box { width: 120px; height: 80px; background: white; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 1.5rem; color: #27ae60; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 0 rgba(0,0,0,0.2); position: relative;}
        .card-box:active { transform: scale(0.95); box-shadow: 0 0 0; }
        .card-box.selected { border: 4px solid #f1c40f; }
        .card-box.matched { visibility: hidden; }
        
        .card-box img { width: 60%; height: 60%; object-fit: contain; }
        .card-box.emoji-mode { font-size: 40px; }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>توصيل البطاقات 🔗</div>
        </div>
        
        <div class="columns" id="columns">
            <div class="col" id="col-words"></div>
            <div class="col" id="col-imgs"></div>
        </div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">توصيل البطاقات 🔗</h1>
        <p style="font-size: 1.5rem;">انقر على الكلمة ثم صورتها لتوصيلهم!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "eye", image: "../images_unit4/pixar_eye_1782050332022.png", type: "img" },
  { word: "mouth", image: "../images_unit4/pixar_mouth_1782050342052.png", type: "img" },
  { word: "ear", image: "../images_unit4/pixar_ear_1782050353890.png", type: "img" },
  { word: "head", image: "../images_unit4/pixar_head_1782050365861.png", type: "img" },
  { word: "tongue", image: "../images_unit4/pixar_tongue_1782050382757.png", type: "img" },
  { word: "arm", image: "../images_unit4/pixar_arm_1782050393224.png", type: "img" },
  { word: "leg", image: "../images_unit4/pixar_leg_1782050404201.png", type: "img" },
  { word: "foot", image: "../images_unit4/pixar_foot_1782050415844.png", type: "img" },
  { word: "feet", image: "../images_unit4/pixar_feet_1782050434707.png", type: "img" },
  { word: "toes", image: "../images_unit4/pixar_toes_1782050446071.png", type: "img" },
  { word: "red", image: "../images_unit4/pixar_red_1782050458088.png", type: "img" },
  { word: "rocket", image: "../images_unit4/pixar_rocket_1782050469083.png", type: "img" },
  { word: "ring", image: "../images_unit4/pixar_ring_1782050484208.png", type: "img" },
  { word: "rabbit", image: "../images_unit4/pixar_rabbit_1782050494082.png", type: "img" },
  { word: "robot", image: "../images_unit4/pixar_robot_1782050505802.png", type: "img" },
  { word: "egg", image: "../images_unit4/pixar_egg_1782050517755.png", type: "img" },
  { word: "eggplant", image: "🍆", type: "emoji" },
  { word: "enter", image: "🚪", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "elbow", image: "💪", type: "emoji" },
  { word: "touch", image: "👆", type: "emoji" },
  { word: "hear", image: "👂", type: "emoji" },
  { word: "see", image: "👀", type: "emoji" },
  { word: "taste", image: "👅", type: "emoji" },
  { word: "smell", image: "👃", type: "emoji" },
  { word: "car", image: "🚗", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "carrot", image: "🥕", type: "emoji" },
  { word: "cup", image: "☕", type: "emoji" },
  { word: "cake", image: "🎂", type: "emoji" },
  { word: "kite", image: "🪁", type: "emoji" },
  { word: "king", image: "👑", type: "emoji" },
  { word: "kitchen", image: "🍳", type: "emoji" },
  { word: "key", image: "🔑", type: "emoji" },
  { word: "hand", image: "✋", type: "emoji" },
  { word: "nose", image: "👃", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let selectedNode = null;
        let matches = 0;

        function spawnLevel() {
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 4);
            matches = 0;
            
            let wordsCol = document.getElementById('col-words');
            let imgsCol = document.getElementById('col-imgs');
            wordsCol.innerHTML = ''; imgsCol.innerHTML = '';
            
            let wordsArr = [...selected].sort(()=>0.5-Math.random());
            let imgsArr = [...selected].sort(()=>0.5-Math.random());
            
            wordsArr.forEach(w => {
                let box = document.createElement('div');
                box.className = 'card-box word-node';
                box.textContent = w.word;
                box.dataset.word = w.word;
                box.onclick = () => handleSelect(box, 'word');
                wordsCol.appendChild(box);
            });
            
            imgsArr.forEach(w => {
                let box = document.createElement('div');
                box.className = 'card-box img-node';
                if(w.type === 'emoji') { box.classList.add('emoji-mode'); box.innerHTML = w.image; }
                else { box.innerHTML = `<img src="${w.image}">`; }
                box.dataset.word = w.word;
                box.onclick = () => handleSelect(box, 'img');
                imgsCol.appendChild(box);
            });
        }
        
        function handleSelect(node, type) {
            if(node.classList.contains('matched')) return;
            
            if(type === 'word') speak(node.dataset.word);
            
            if(!selectedNode) {
                selectedNode = {node, type};
                node.classList.add('selected');
                return;
            }
            
            if(selectedNode.type === type) {
                selectedNode.node.classList.remove('selected');
                selectedNode = {node, type};
                node.classList.add('selected');
                return;
            }
            
            // Check match
            if(selectedNode.node.dataset.word === node.dataset.word) {
                speak('Perfect!'); score+=10; document.getElementById('score').textContent=score;
                selectedNode.node.classList.add('matched');
                node.classList.add('matched');
                selectedNode = null;
                matches++;
                if(matches === 4) setTimeout(spawnLevel, 1000);
            } else {
                speak('Try again');
                selectedNode.node.classList.remove('selected');
                selectedNode = null;
                node.style.background = '#e74c3c'; node.style.color = 'white';
                setTimeout(()=>{node.style.background='white'; node.style.color='#27ae60';}, 500);
            }
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
