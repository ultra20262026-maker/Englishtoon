    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صيد الأسماك</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #3498db; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2980b9; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e67e22; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #d35400;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .word-board { background: white; color: #2980b9; padding: 10px 40px; border-radius: 50px; font-family: 'Fredoka One'; font-size: 3rem; box-shadow: 0 5px 0 #1f618d; cursor: pointer; z-index: 20; margin-top: 50px;}
        
        .fish-tank { position: absolute; inset: 150px 0 0 0; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><path d="M0,50 Q25,30 50,50 T100,50 L100,100 L0,100 Z" fill="%233498db" opacity="0.3"/></svg>'); }
        
        .fish { position: absolute; background: white; border-radius: 50px; border: 3px solid #f1c40f; padding: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 1.5rem; cursor: pointer; color: #333; transition: transform 0.1s;}
        .fish:active { transform: scale(0.9); }
        .fish::before { content: '🐟'; font-size: 2rem; margin-left: 10px; }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>صيد الأسماك 🎣</div>
        </div>
        
        <div class="word-board" id="word-board" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="fish-tank" id="fish-tank"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">صيد الأسماك 🎣</h1>
        <p style="font-size: 1.5rem;">اصطد السمكة التي تحمل الكلمة المطابقة للصورة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "eye", image: "../images_unit4/pixar_eye_1782050332022.png", type: "img" },
  { word: "mouth", image: "../images_unit4/pixar_mouth_1782050342052.png", type: "img" },
  { word: "ear", image: "../images_unit4/pixar_ear_1782050353890.png", type: "img" },
  { word: "head", image: "../images_unit4/pixar_head_1782050365861.png", type: "img" },
  { word: "tongue", image: "../images_unit4/pixar_tongue_1782050382757.png", type: "img" },
  { word: "arm", image: "../images_unit4/pixar_arm_1782050393224.png", type: "img" },
  { word: "leg", image: "../images_unit4/pixar_leg_1782050404201.png", type: "img" },
  { word: "foot", image: "../images_unit4/pixar_foot_1782050415844.png", type: "img" },
  { word: "feet", image: "../images_unit4/pixar_feet_1782050434707.png", type: "img" },
  { word: "toes", image: "../images_unit4/pixar_toes_1782050446071.png", type: "img" },
  { word: "red", image: "../images_unit4/pixar_red_1782050458088.png", type: "img" },
  { word: "rocket", image: "../images_unit4/pixar_rocket_1782050469083.png", type: "img" },
  { word: "ring", image: "../images_unit4/pixar_ring_1782050484208.png", type: "img" },
  { word: "rabbit", image: "../images_unit4/pixar_rabbit_1782050494082.png", type: "img" },
  { word: "robot", image: "../images_unit4/pixar_robot_1782050505802.png", type: "img" },
  { word: "egg", image: "../images_unit4/pixar_egg_1782050517755.png", type: "img" },
  { word: "eggplant", image: "🍆", type: "emoji" },
  { word: "enter", image: "🚪", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "elbow", image: "💪", type: "emoji" },
  { word: "touch", image: "👆", type: "emoji" },
  { word: "hear", image: "👂", type: "emoji" },
  { word: "see", image: "👀", type: "emoji" },
  { word: "taste", image: "👅", type: "emoji" },
  { word: "smell", image: "👃", type: "emoji" },
  { word: "car", image: "🚗", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "carrot", image: "🥕", type: "emoji" },
  { word: "cup", image: "☕", type: "emoji" },
  { word: "cake", image: "🎂", type: "emoji" },
  { word: "kite", image: "🪁", type: "emoji" },
  { word: "king", image: "👑", type: "emoji" },
  { word: "kitchen", image: "🍳", type: "emoji" },
  { word: "key", image: "🔑", type: "emoji" },
  { word: "hand", image: "✋", type: "emoji" },
  { word: "nose", image: "👃", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let fishes = [];
        let spawnInterval, loopInterval;
        
        function renderOption(w) {
            if(w.type === 'emoji') return `<span class="emoji-mode" style="font-size:50px">${w.image}</span>`;
            return `<img src="${w.image}" style="width:60px;height:60px;object-fit:contain;">`;
        }

        function setTarget() {
            currentWord = wordsData[Math.floor(Math.random() * wordsData.length)];
            document.getElementById('word-board').innerHTML = renderOption(currentWord);
            speak(currentWord.word);
        }
        
        function spawnFish() {
            const isCorrect = Math.random() > 0.6;
            const wordObj = isCorrect ? currentWord : wordsData[Math.floor(Math.random() * wordsData.length)];
            const f = document.createElement('div');
            f.className = 'fish';
            f.textContent = wordObj.word;
            
            let fromLeft = Math.random() > 0.5;
            f.dataset.x = fromLeft ? -100 : document.getElementById('game-container').clientWidth;
            f.dataset.y = Math.random() * (document.getElementById('fish-tank').clientHeight - 100);
            f.dataset.speedX = fromLeft ? (Math.random() * 2 + 1) : -(Math.random() * 2 + 1);
            if(!fromLeft) f.style.transform = 'scaleX(-1)';
            
            f.style.left = f.dataset.x + 'px';
            f.style.top = f.dataset.y + 'px';
            
            f.onclick = () => {
                if(wordObj.word === currentWord.word) {
                    speak('Got it!'); score+=10; document.getElementById('score').textContent=score;
                    f.remove(); fishes = fishes.filter(x=>x!==f); setTarget();
                } else {
                    speak('Wrong fish!'); f.style.borderColor = '#e74c3c'; setTimeout(()=>f.style.borderColor='#f1c40f', 300);
                }
            };
            document.getElementById('fish-tank').appendChild(f);
            fishes.push(f);
        }
        
        function gameLoop() {
            for(let i=fishes.length-1; i>=0; i--) {
                let f = fishes[i];
                let x = parseFloat(f.dataset.x) + parseFloat(f.dataset.speedX);
                f.dataset.x = x;
                f.style.left = x + 'px';
                
                if(x < -150 || x > document.getElementById('game-container').clientWidth + 50) { 
                    f.remove(); fishes.splice(i, 1); 
                }
            }
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            fishes.forEach(f=>f.remove()); fishes=[];
            setTarget();
            clearInterval(spawnInterval); clearInterval(loopInterval);
            spawnInterval = setInterval(spawnFish, 1500);
            loopInterval = setInterval(gameLoop, 30);
        }
    </script>
</body>
</html>
