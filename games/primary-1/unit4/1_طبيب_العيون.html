<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>طبيب العيون</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #ecf0f1; border-radius: 20px; border: 5px solid #bdc3c7; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #2c3e50; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #3498db; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #2980b9;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .word-board { background: #34495e; color: white; padding: 20px 50px; border-radius: 15px; font-family: 'Fredoka One'; font-size: 4rem; box-shadow: 0 10px 0 #2c3e50; cursor: pointer;}
        
        .options { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; width: 100%;}
        .opt-box { width: 150px; height: 150px; background: white; border-radius: 15px; border: 4px solid #bdc3c7; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; position: relative; overflow: hidden;}
        .opt-box:active { transform: scale(0.95); }
        .opt-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; filter: blur(20px); transition: filter 5s linear; }
        .opt-content img { width: 80%; height: 80%; object-fit: contain; }
        .opt-content.emoji-mode { font-size: 80px; }
        
        .opt-box.correct { border-color: #2ecc71; background: #e8f8f5; }
        .opt-box.wrong { border-color: #e74c3c; background: #fdedec; }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>طبيب العيون 👓</div>
        </div>
        
        <div class="word-board" id="word-board" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="options" id="options"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #3498db;">طبيب العيون 👓</h1>
        <p style="font-size: 1.5rem;">انظر جيداً واختر الصورة الصحيحة قبل أن تتضح الرؤية!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "eye", image: "../images_unit4/pixar_eye_1782050332022.png", type: "img" },
  { word: "mouth", image: "../images_unit4/pixar_mouth_1782050342052.png", type: "img" },
  { word: "ear", image: "../images_unit4/pixar_ear_1782050353890.png", type: "img" },
  { word: "head", image: "../images_unit4/pixar_head_1782050365861.png", type: "img" },
  { word: "tongue", image: "../images_unit4/pixar_tongue_1782050382757.png", type: "img" },
  { word: "arm", image: "../images_unit4/pixar_arm_1782050393224.png", type: "img" },
  { word: "leg", image: "../images_unit4/pixar_leg_1782050404201.png", type: "img" },
  { word: "foot", image: "../images_unit4/pixar_foot_1782050415844.png", type: "img" },
  { word: "feet", image: "../images_unit4/pixar_feet_1782050434707.png", type: "img" },
  { word: "toes", image: "../images_unit4/pixar_toes_1782050446071.png", type: "img" },
  { word: "red", image: "../images_unit4/pixar_red_1782050458088.png", type: "img" },
  { word: "rocket", image: "../images_unit4/pixar_rocket_1782050469083.png", type: "img" },
  { word: "ring", image: "../images_unit4/pixar_ring_1782050484208.png", type: "img" },
  { word: "rabbit", image: "../images_unit4/pixar_rabbit_1782050494082.png", type: "img" },
  { word: "robot", image: "../images_unit4/pixar_robot_1782050505802.png", type: "img" },
  { word: "egg", image: "../images_unit4/pixar_egg_1782050517755.png", type: "img" },
  { word: "eggplant", image: "🍆", type: "emoji" },
  { word: "enter", image: "🚪", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "elbow", image: "💪", type: "emoji" },
  { word: "touch", image: "👆", type: "emoji" },
  { word: "hear", image: "👂", type: "emoji" },
  { word: "see", image: "👀", type: "emoji" },
  { word: "taste", image: "👅", type: "emoji" },
  { word: "smell", image: "👃", type: "emoji" },
  { word: "car", image: "🚗", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "carrot", image: "🥕", type: "emoji" },
  { word: "cup", image: "☕", type: "emoji" },
  { word: "cake", image: "🎂", type: "emoji" },
  { word: "kite", image: "🪁", type: "emoji" },
  { word: "king", image: "👑", type: "emoji" },
  { word: "kitchen", image: "🍳", type: "emoji" },
  { word: "key", image: "🔑", type: "emoji" },
  { word: "hand", image: "✋", type: "emoji" },
  { word: "nose", image: "👃", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;
        
        function renderOption(w) {
            let content = '';
            if(w.type === 'emoji') {
                content = `<div class="opt-content emoji-mode">${w.image}</div>`;
            } else {
                content = `<div class="opt-content"><img src="${w.image}"></div>`;
            }
            return content;
        }

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0,3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('word-board').textContent = currentWord.word;
            speak(currentWord.word);
            
            const opts = document.getElementById('options');
            opts.innerHTML = '';
            
            selected.forEach(w => {
                let box = document.createElement('div');
                box.className = 'opt-box';
                box.innerHTML = renderOption(w);
                
                // Start unblurring
                setTimeout(() => {
                    const c = box.querySelector('.opt-content');
                    if(c) c.style.filter = 'blur(0px)';
                }, 100);
                
                box.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Excellent!'); score+=10; document.getElementById('score').textContent=score;
                        box.classList.add('correct');
                        box.querySelector('.opt-content').style.filter = 'blur(0px)';
                        canClick = false;
                        setTimeout(spawnLevel, 1500);
                    } else {
                        speak('Try again'); box.classList.add('wrong');
                        setTimeout(()=>box.classList.remove('wrong'), 500);
                    }
                };
                opts.appendChild(box);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
