<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لغز الكلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #34495e; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .puzzle-stage { width: 200px; height: 200px; background: white; border-radius: 20px; position: relative; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center;}
        .puzzle-stage img { width: 80%; height: 80%; object-fit: contain; }
        .puzzle-stage.emoji-mode { font-size: 100px; }
        
        .covers { position: absolute; inset: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;}
        .cover { background: #f1c40f; border: 1px solid #d4ac0d; transition: opacity 0.5s;}
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 80%; max-width: 400px;}
        .opt-box { background: #e74c3c; color: white; border-radius: 15px; padding: 15px; font-family: 'Fredoka One'; font-size: 2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.2s; box-shadow: 0 5px 0 #c0392b;}
        .opt-box:active { transform: scale(0.95); box-shadow: 0 0 0;}
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>لغز الكلمات 🧩</div>
        </div>
        
        <div class="puzzle-stage" id="puzzle-stage">
            <div id="img-container"></div>
            <div class="covers" id="covers">
                <div class="cover"></div><div class="cover"></div><div class="cover"></div><div class="cover"></div>
            </div>
        </div>
        
        <div class="grid" id="grid"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">لغز الكلمات 🧩</h1>
        <p style="font-size: 1.5rem;">احزر الكلمة قبل أن تنكشف الصورة بالكامل!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "eye", image: "../images_unit4/pixar_eye_1782050332022.png", type: "img" },
  { word: "mouth", image: "../images_unit4/pixar_mouth_1782050342052.png", type: "img" },
  { word: "ear", image: "../images_unit4/pixar_ear_1782050353890.png", type: "img" },
  { word: "head", image: "../images_unit4/pixar_head_1782050365861.png", type: "img" },
  { word: "tongue", image: "../images_unit4/pixar_tongue_1782050382757.png", type: "img" },
  { word: "arm", image: "../images_unit4/pixar_arm_1782050393224.png", type: "img" },
  { word: "leg", image: "../images_unit4/pixar_leg_1782050404201.png", type: "img" },
  { word: "foot", image: "../images_unit4/pixar_foot_1782050415844.png", type: "img" },
  { word: "feet", image: "../images_unit4/pixar_feet_1782050434707.png", type: "img" },
  { word: "toes", image: "../images_unit4/pixar_toes_1782050446071.png", type: "img" },
  { word: "red", image: "../images_unit4/pixar_red_1782050458088.png", type: "img" },
  { word: "rocket", image: "../images_unit4/pixar_rocket_1782050469083.png", type: "img" },
  { word: "ring", image: "../images_unit4/pixar_ring_1782050484208.png", type: "img" },
  { word: "rabbit", image: "../images_unit4/pixar_rabbit_1782050494082.png", type: "img" },
  { word: "robot", image: "../images_unit4/pixar_robot_1782050505802.png", type: "img" },
  { word: "egg", image: "../images_unit4/pixar_egg_1782050517755.png", type: "img" },
  { word: "eggplant", image: "🍆", type: "emoji" },
  { word: "enter", image: "🚪", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "elbow", image: "💪", type: "emoji" },
  { word: "touch", image: "👆", type: "emoji" },
  { word: "hear", image: "👂", type: "emoji" },
  { word: "see", image: "👀", type: "emoji" },
  { word: "taste", image: "👅", type: "emoji" },
  { word: "smell", image: "👃", type: "emoji" },
  { word: "car", image: "🚗", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "carrot", image: "🥕", type: "emoji" },
  { word: "cup", image: "☕", type: "emoji" },
  { word: "cake", image: "🎂", type: "emoji" },
  { word: "kite", image: "🪁", type: "emoji" },
  { word: "king", image: "👑", type: "emoji" },
  { word: "kitchen", image: "🍳", type: "emoji" },
  { word: "key", image: "🔑", type: "emoji" },
  { word: "hand", image: "✋", type: "emoji" },
  { word: "nose", image: "👃", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;
        let revealInterval;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 4);
            currentWord = selected[Math.floor(Math.random()*4)];
            
            const stage = document.getElementById('puzzle-stage');
            const imgC = document.getElementById('img-container');
            stage.classList.remove('emoji-mode');
            if(currentWord.type === 'emoji') {
                imgC.innerHTML = currentWord.image;
                stage.classList.add('emoji-mode');
            } else {
                imgC.innerHTML = `<img src="${currentWord.image}">`;
            }
            
            const covers = document.querySelectorAll('.cover');
            covers.forEach(c => c.style.opacity = '1');
            
            let coverIndex = 0;
            clearInterval(revealInterval);
            revealInterval = setInterval(() => {
                if(coverIndex < covers.length) {
                    covers[coverIndex].style.opacity = '0';
                    coverIndex++;
                }
            }, 1000);
            
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            selected.forEach(w => {
                let box = document.createElement('div');
                box.className = 'opt-box';
                box.textContent = w.word;
                
                box.onclick = () => {
                    if(!canClick) return;
                    if(w.word === currentWord.word) {
                        speak('Genius!'); score+=10; document.getElementById('score').textContent=score;
                        box.style.background = '#2ecc71'; 
                        clearInterval(revealInterval);
                        covers.forEach(c => c.style.opacity = '0');
                        canClick = false; setTimeout(spawnLevel, 2000);
                    } else {
                        speak('Try again'); box.style.background = '#34495e'; setTimeout(()=>box.style.background='#e74c3c', 500);
                    }
                };
                grid.appendChild(box);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
