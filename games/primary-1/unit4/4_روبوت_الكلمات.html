<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>روبوت الكلمات</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #34495e; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2c3e50; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-between;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .robot { width: 200px; height: 250px; background: #95a5a6; border-radius: 30px 30px 10px 10px; margin-top: 50px; position: relative; display: flex; flex-direction: column; align-items: center; box-shadow: inset 0 -10px 0 rgba(0,0,0,0.2); transition: transform 0.2s;}
        .robot.eating { transform: scale(1.1); background: #2ecc71; }
        .robot-eye { width: 120px; height: 40px; background: #34495e; border-radius: 20px; margin-top: 30px; display: flex; justify-content: space-evenly; align-items: center;}
        .eye-dot { width: 20px; height: 20px; background: #f1c40f; border-radius: 50%; box-shadow: 0 0 10px #f1c40f;}
        .robot-mouth { width: 100px; height: 60px; background: #2c3e50; border-radius: 10px 10px 40px 40px; margin-top: 20px; color: white; display: flex; align-items: center; justify-content: center; font-family: 'Fredoka One'; font-size: 3rem;}
        
        .conveyor { width: 100%; height: 120px; background: #7f8c8d; position: absolute; bottom: 0; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 5px solid #bdc3c7;}
        
        .item-box { background: white; border-radius: 10px; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 5px 0 #bdc3c7; transition: transform 0.2s;}
        .item-box:active { transform: translateY(5px); box-shadow: 0 0 0; }
        .item-box img { width: 80%; height: 80%; object-fit: contain; }
        .item-box.emoji-mode { font-size: 50px; }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>روبوت الكلمات 🤖</div>
        </div>
        
        <div class="robot" id="robot" onclick="if(targetLetter) speak('I want words starting with ' + targetLetter)">
            <div class="robot-eye">
                <div class="eye-dot"></div><div class="eye-dot"></div>
            </div>
            <div class="robot-mouth" id="target-letter">R</div>
        </div>
        
        <div class="conveyor" id="conveyor"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">روبوت الكلمات 🤖</h1>
        <p style="font-size: 1.5rem;">أطعم الروبوت الكلمات التي تبدأ بالحرف المطلوب!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "eye", image: "../images_unit4/pixar_eye_1782050332022.png", type: "img" },
  { word: "mouth", image: "../images_unit4/pixar_mouth_1782050342052.png", type: "img" },
  { word: "ear", image: "../images_unit4/pixar_ear_1782050353890.png", type: "img" },
  { word: "head", image: "../images_unit4/pixar_head_1782050365861.png", type: "img" },
  { word: "tongue", image: "../images_unit4/pixar_tongue_1782050382757.png", type: "img" },
  { word: "arm", image: "../images_unit4/pixar_arm_1782050393224.png", type: "img" },
  { word: "leg", image: "../images_unit4/pixar_leg_1782050404201.png", type: "img" },
  { word: "foot", image: "../images_unit4/pixar_foot_1782050415844.png", type: "img" },
  { word: "feet", image: "../images_unit4/pixar_feet_1782050434707.png", type: "img" },
  { word: "toes", image: "../images_unit4/pixar_toes_1782050446071.png", type: "img" },
  { word: "red", image: "../images_unit4/pixar_red_1782050458088.png", type: "img" },
  { word: "rocket", image: "../images_unit4/pixar_rocket_1782050469083.png", type: "img" },
  { word: "ring", image: "../images_unit4/pixar_ring_1782050484208.png", type: "img" },
  { word: "rabbit", image: "../images_unit4/pixar_rabbit_1782050494082.png", type: "img" },
  { word: "robot", image: "../images_unit4/pixar_robot_1782050505802.png", type: "img" },
  { word: "egg", image: "../images_unit4/pixar_egg_1782050517755.png", type: "img" },
  { word: "eggplant", image: "🍆", type: "emoji" },
  { word: "enter", image: "🚪", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "elbow", image: "💪", type: "emoji" },
  { word: "touch", image: "👆", type: "emoji" },
  { word: "hear", image: "👂", type: "emoji" },
  { word: "see", image: "👀", type: "emoji" },
  { word: "taste", image: "👅", type: "emoji" },
  { word: "smell", image: "👃", type: "emoji" },
  { word: "car", image: "🚗", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "carrot", image: "🥕", type: "emoji" },
  { word: "cup", image: "☕", type: "emoji" },
  { word: "cake", image: "🎂", type: "emoji" },
  { word: "kite", image: "🪁", type: "emoji" },
  { word: "king", image: "👑", type: "emoji" },
  { word: "kitchen", image: "🍳", type: "emoji" },
  { word: "key", image: "🔑", type: "emoji" },
  { word: "hand", image: "✋", type: "emoji" },
  { word: "nose", image: "👃", type: "emoji" }
];

const targetLetters = ['r', 'e', 'c', 'k'];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 0.8; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let targetLetter = null;
        let canClick = true;
        
        function renderOption(w) {
            if(w.type === 'emoji') return `<div class="item-box emoji-mode">${w.image}</div>`;
            return `<div class="item-box"><img src="${w.image}"></div>`;
        }

        function spawnLevel() {
            canClick = true;
            targetLetter = targetLetters[Math.floor(Math.random()*targetLetters.length)];
            
            document.getElementById('target-letter').textContent = targetLetter.toUpperCase();
            speak(targetLetter.toUpperCase());
            
            let correctWords = wordsData.filter(x => x.word.startsWith(targetLetter));
            let correctWordObj = correctWords[Math.floor(Math.random()*correctWords.length)];
            let others = wordsData.filter(x => !x.word.startsWith(targetLetter)).sort(()=>0.5-Math.random()).slice(0,3);
            let optionsArr = [correctWordObj, ...others].sort(()=>0.5-Math.random());
            
            const conveyor = document.getElementById('conveyor');
            conveyor.innerHTML = '';
            
            optionsArr.forEach(w => {
                let div = document.createElement('div');
                div.innerHTML = renderOption(w);
                let box = div.firstElementChild;
                
                box.onclick = () => {
                    if(!canClick) return;
                    if(w.word.startsWith(targetLetter)) {
                        speak(w.word + '! Yummy!'); score+=10; document.getElementById('score').textContent=score;
                        box.style.display = 'none';
                        const robot = document.getElementById('robot');
                        robot.classList.add('eating');
                        canClick = false; 
                        setTimeout(() => { robot.classList.remove('eating'); spawnLevel(); }, 1500);
                    } else {
                        speak('No! I want ' + targetLetter); box.style.background = '#e74c3c'; setTimeout(()=>box.style.background='white', 500);
                    }
                };
                conveyor.appendChild(box);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
