    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الرماية</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #27ae60; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2ecc71; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .word-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #27ae60; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .bow { font-size: 80px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 20;}
        .arrow { font-size: 60px; position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%) rotate(-90deg); z-index: 15; transition: all 0.4s ease-in;}
        
        .targets-container { display: flex; gap: 30px; position: absolute; top: 200px; width: 100%; justify-content: center; flex-wrap: wrap;}
        .target { width: 100px; height: 100px; background: repeating-radial-gradient(#e74c3c, #e74c3c 10px, white 10px, white 20px); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; position: relative; box-shadow: 0 5px 10px rgba(0,0,0,0.3);}
        .target span { background: rgba(255,255,255,0.8); border-radius: 50%; padding: 5px;}
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>الرماية 🏹</div>
        </div>
        
        <div class="word-box" id="word-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="targets-container" id="targets-container"></div>
        
        <div class="bow" id="bow">🏹</div>
        <div class="arrow" id="arrow">➵</div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">الرماية 🏹</h1>
        <p style="font-size: 1.5rem;">أطلق السهم على الهدف الذي يحمل الصورة الصحيحة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('arrow').style.bottom = '40px';
            document.getElementById('arrow').style.opacity = '1';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('word-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('targets-container');
            container.innerHTML = '';
            
            selected.forEach(w => {
                const target = document.createElement('div');
                target.className = 'target';
                target.innerHTML = `<span>${w.image}</span>`;
                
                target.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const arrow = document.getElementById('arrow');
                    const targetRect = e.target.closest('.target').getBoundingClientRect();
                    const containerRect = document.getElementById('game-container').getBoundingClientRect();
                    
                    const targetX = targetRect.left - containerRect.left + 50;
                    
                    arrow.style.left = targetX + 'px';
                    arrow.style.bottom = (containerRect.height - targetRect.top + containerRect.top - 50) + 'px';
                    
                    setTimeout(() => {
                        if(w.word === currentWord.word) {
                            speak('Hit!'); score+=10; document.getElementById('score').textContent=score;
                            target.style.transform = 'scale(0)';
                            setTimeout(spawnLevel, 1000);
                        } else {
                            speak('Miss!'); arrow.style.opacity = '0';
                            target.style.filter = 'grayscale(100%)';
                            setTimeout(() => {
                                arrow.style.bottom = '40px';
                                arrow.style.left = '50%';
                                arrow.style.opacity = '1';
                                target.style.filter = 'none';
                                canClick = true;
                            }, 1000);
                        }
                    }, 400);
                };
                container.appendChild(target);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            document.getElementById('arrow').style.left = '50%';
            spawnLevel(); 
        }
    </script>
</body>
</html>
