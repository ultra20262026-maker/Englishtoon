    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>صيد السمك</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #3498db; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: linear-gradient(to bottom, #85c1e9 30%, #2980b9 30%); border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e67e22; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #d35400;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .boat { font-size: 80px; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); z-index: 20;}
        .hook { position: absolute; width: 4px; background: #fff; left: 50%; top: 30%; height: 0; transition: height 0.5s ease; z-index: 15; transform: translateX(-50%);}
        .hook::after { content: '🪝'; font-size: 30px; position: absolute; bottom: -20px; left: -13px;}
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #2980b9; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .fishes-container { display: flex; gap: 30px; position: absolute; bottom: 50px; justify-content: center; width: 100%;}
        .fish-item { width: 80px; height: 80px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; transition: transform 0.2s;}
        .fish-item:active { transform: scale(0.9); }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>صيد السمك 🎣</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="boat" id="boat">🛶</div>
        <div class="hook" id="hook"></div>
        
        <div class="fishes-container" id="fishes-container"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">صيد السمك 🎣</h1>
        <p style="font-size: 1.5rem;">اصطد الصورة المطلوبة بالصنارة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('hook').style.height = '0';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('fishes-container');
            container.innerHTML = '';
            
            selected.forEach(w => {
                const f = document.createElement('div');
                f.className = 'fish-item';
                f.innerHTML = w.image;
                
                f.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const hook = document.getElementById('hook');
                    const boat = document.getElementById('boat');
                    const targetX = e.target.getBoundingClientRect().left - document.getElementById('game-container').getBoundingClientRect().left + 40;
                    
                    boat.style.transition = 'left 0.5s';
                    boat.style.left = targetX + 'px';
                    hook.style.transition = 'left 0.5s';
                    hook.style.left = targetX + 'px';
                    
                    setTimeout(() => {
                        const hookY = hook.getBoundingClientRect().top;
                        const targetY = e.target.getBoundingClientRect().top;
                        hook.style.transition = 'height 0.5s ease';
                        hook.style.height = (targetY - hookY) + 'px';
                        
                        setTimeout(() => {
                            hook.style.height = '0';
                            
                            if(w.word === currentWord.word) {
                                speak('Got it!'); score+=10; document.getElementById('score').textContent=score;
                                e.target.style.transform = `translateY(-${targetY - hookY}px) scale(0)`;
                                setTimeout(spawnLevel, 1000);
                            } else {
                                speak('Miss!'); e.target.style.background = 'rgba(231,76,60,0.8)';
                                setTimeout(() => {
                                    e.target.style.background = 'rgba(255,255,255,0.2)';
                                    canClick = true;
                                }, 1000);
                            }
                        }, 500);
                    }, 500);
                };
                container.appendChild(f);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
