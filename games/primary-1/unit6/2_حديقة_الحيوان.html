<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script id="guard-script">
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            alert('عذراً، لا يمكنك الدخول لهذه اللعبة مباشرة. يرجى تسجيل الدخول أولاً.');
            window.location.href = window.location.origin + (window.location.pathname.includes('/Englishtoon/') ? '/Englishtoon/' : '/');
        }
    </script>
    <script src="../../../js/game-enhancements.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حديقة الحيوان</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #e67e22; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #f39c12; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .cages-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%;}
        .cage { background: rgba(255,255,255,0.9); border: 5px solid #7f8c8d; border-radius: 20px; height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: transform 0.2s;}
        .cage::after { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(90deg, transparent, transparent 20px, #bdc3c7 20px, #bdc3c7 30px); border-radius: 15px; opacity: 0.5; pointer-events: none;}
        .cage:active { transform: scale(0.95); }
        .cage-label { font-size: 2rem; color: #2c3e50; font-family: 'Fredoka One'; z-index: 10; background: white; padding: 2px 10px; border-radius: 10px; margin-bottom: 10px;}
        .cage-animal { font-size: 50px; z-index: 5;}
        
        .target-box { background: white; border-radius: 50%; padding: 20px; font-size: 4rem; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; display: flex; align-items: center; justify-content: center; width: 80px; height: 80px;}
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>حديقة الحيوان 🦁</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="cages-container" id="cages-container"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">حديقة الحيوان 🦁</h1>
        <p style="font-size: 1.5rem;">ضع الصورة المعروضة في القفص الذي يحمل اسمها!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 4);
            currentWord = selected[Math.floor(Math.random()*4)];
            
            document.getElementById('target-box').innerHTML = currentWord.image;
            speak(currentWord.word);
            
            const container = document.getElementById('cages-container');
            container.innerHTML = '';
            
            selected.forEach(w => {
                const cage = document.createElement('div');
                cage.className = 'cage';
                cage.innerHTML = `<div class="cage-label">${w.word}</div><div class="cage-animal"></div>`;
                
                cage.onclick = () => {
                    if(!canClick) return;
                    
                    if(w.word === currentWord.word) {
                        speak('In the cage!'); score+=10; document.getElementById('score').textContent=score;
                        cage.querySelector('.cage-animal').innerHTML = currentWord.image;
                        cage.style.background = '#2ecc71';
                        canClick = false; setTimeout(spawnLevel, 1500);
                    } else {
                        speak('Wrong cage!'); cage.style.background = '#e74c3c';
                        setTimeout(() => {
                            cage.style.background = 'rgba(255,255,255,0.9)';
                        }, 1000);
                    }
                };
                container.appendChild(cage);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
