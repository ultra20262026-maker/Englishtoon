<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>القفز بالمظلة</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #3498db; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: linear-gradient(to bottom, #85c1e9 0%, #2ecc71 100%); border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #2c3e50; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #e74c3c; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #c0392b;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #2980b9; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .parachutist { font-size: 80px; position: absolute; top: 150px; left: 50%; transform: translateX(-50%); z-index: 20; transition: all 1.5s ease-in;}
        .parachutist::before { content: '🪂'; position: absolute; top: -50px;}
        
        .lands-container { display: flex; gap: 30px; position: absolute; bottom: 30px; justify-content: center; width: 100%;}
        .land { width: 100px; height: 100px; background: rgba(255,255,255,0.8); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.3); z-index: 10; border: 5px solid white;}
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>القفز بالمظلة 🪂</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="parachutist" id="parachutist">👦</div>
        
        <div class="lands-container" id="lands-container"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">القفز بالمظلة 🪂</h1>
        <p style="font-size: 1.5rem;">انقر على نقطة الهبوط التي تحمل الصورة الصحيحة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('parachutist').style.transition = 'none';
            document.getElementById('parachutist').style.top = '150px';
            document.getElementById('parachutist').style.left = '50%';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('lands-container');
            container.innerHTML = '';
            
            selected.forEach(w => {
                const land = document.createElement('div');
                land.className = 'land';
                land.innerHTML = w.image;
                
                land.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const parachutist = document.getElementById('parachutist');
                    parachutist.style.transition = 'all 1.5s ease-in';
                    
                    const targetRect = e.target.closest('.land').getBoundingClientRect();
                    const containerRect = document.getElementById('game-container').getBoundingClientRect();
                    
                    parachutist.style.left = (targetRect.left - containerRect.left + 50) + 'px';
                    parachutist.style.top = (targetRect.top - containerRect.top - 60) + 'px';
                    
                    setTimeout(() => {
                        if(w.word === currentWord.word) {
                            speak('Landed!'); score+=10; document.getElementById('score').textContent=score;
                            land.style.borderColor = '#2ecc71';
                            setTimeout(spawnLevel, 1500);
                        } else {
                            speak('Oops!'); land.style.borderColor = '#e74c3c';
                            setTimeout(() => {
                                land.style.borderColor = 'white';
                                parachutist.style.transition = 'none';
                                parachutist.style.top = '150px';
                                parachutist.style.left = '50%';
                                canClick = true;
                            }, 1000);
                        }
                    }, 1500);
                };
                container.appendChild(land);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
