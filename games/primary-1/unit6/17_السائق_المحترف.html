    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>السائق المحترف</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #34495e; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2c3e50; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f39c12; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #e67e22;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .road { width: 100%; height: 300px; background: #7f8c8d; position: absolute; bottom: 50px; border-top: 10px solid #95a5a6; border-bottom: 10px solid #95a5a6; display: flex; align-items: center; justify-content: space-evenly;}
        .road::after { content: ''; position: absolute; width: 100%; height: 10px; background: repeating-linear-gradient(90deg, white, white 50px, transparent 50px, transparent 100px);}
        
        .bike { font-size: 80px; position: absolute; bottom: 150px; right: 20px; z-index: 20; transition: right 1s ease-in-out; transform: scaleX(-1);}
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #2c3e50; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .destinations { display: flex; gap: 30px; position: absolute; bottom: 50px; justify-content: space-evenly; width: 100%;}
        .dest { width: 100px; height: 100px; background: rgba(255,255,255,0.9); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 60px; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.3); z-index: 25; transition: transform 0.2s;}
        .dest:active { transform: scale(0.9); }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>السائق المحترف 🚲</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="road">
            <div class="bike" id="bike">🚲</div>
        </div>
        
        <div class="destinations" id="destinations"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f39c12;">السائق المحترف 🚲</h1>
        <p style="font-size: 1.5rem;">قُد الدراجة إلى الوجهة الصحيحة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('bike').style.transition = 'none';
            document.getElementById('bike').style.right = '20px';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const dests = document.getElementById('destinations');
            dests.innerHTML = '';
            
            selected.forEach(w => {
                const d = document.createElement('div');
                d.className = 'dest';
                d.innerHTML = w.image;
                
                d.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const bike = document.getElementById('bike');
                    bike.style.transition = 'right 1s ease-in-out';
                    
                    const targetRight = document.getElementById('game-container').clientWidth - e.target.getBoundingClientRect().right;
                    bike.style.right = targetRight + 'px';
                    
                    setTimeout(() => {
                        if(w.word === currentWord.word) {
                            speak('Arrived!'); score+=10; document.getElementById('score').textContent=score;
                            d.style.background = '#2ecc71';
                            setTimeout(spawnLevel, 1000);
                        } else {
                            speak('Wrong way!'); d.style.background = '#e74c3c';
                            setTimeout(() => {
                                d.style.background = 'white';
                                canClick = true;
                                bike.style.transition = 'right 0.5s';
                                bike.style.right = '20px';
                            }, 1000);
                        }
                    }, 1000);
                };
                dests.appendChild(d);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
