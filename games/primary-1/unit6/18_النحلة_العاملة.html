    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>النحلة العاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #27ae60; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #2ecc71; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: space-evenly;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #27ae60; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; cursor: pointer;}
        
        .bee { font-size: 80px; position: absolute; top: 100px; left: 50%; transform: translateX(-50%); z-index: 30; transition: all 0.8s ease-in-out;}
        
        .flowers-container { display: flex; gap: 40px; justify-content: center; width: 100%; flex-wrap: wrap;}
        .flower { width: 120px; height: 120px; background: white; border-radius: 50px 50px 10px 10px; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; position: relative; box-shadow: 0 5px 10px rgba(0,0,0,0.2); transition: transform 0.2s;}
        .flower::before { content: '🌸'; position: absolute; top: -30px; font-size: 60px; z-index: -1;}
        .flower:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>النحلة العاملة 🐝</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="bee" id="bee">🐝</div>
        
        <div class="flowers-container" id="flowers-container"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">النحلة العاملة 🐝</h1>
        <p style="font-size: 1.5rem;">وجه النحلة إلى الزهرة التي تحمل الصورة الصحيحة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('bee').style.top = '100px';
            document.getElementById('bee').style.left = '50%';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('flowers-container');
            container.innerHTML = '';
            
            selected.forEach(w => {
                const flower = document.createElement('div');
                flower.className = 'flower';
                flower.innerHTML = `<span>${w.image}</span>`;
                
                flower.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const bee = document.getElementById('bee');
                    const targetRect = e.target.closest('.flower').getBoundingClientRect();
                    const containerRect = document.getElementById('game-container').getBoundingClientRect();
                    
                    bee.style.left = (targetRect.left - containerRect.left + 20) + 'px';
                    bee.style.top = (targetRect.top - containerRect.top - 50) + 'px';
                    
                    setTimeout(() => {
                        if(w.word === currentWord.word) {
                            speak('Buzz!'); score+=10; document.getElementById('score').textContent=score;
                            flower.style.background = '#f1c40f';
                            setTimeout(spawnLevel, 1000);
                        } else {
                            speak('Ouch!'); flower.style.filter = 'grayscale(100%)';
                            setTimeout(() => {
                                flower.style.filter = 'none';
                                bee.style.top = '100px';
                                bee.style.left = '50%';
                                canClick = true;
                            }, 1000);
                        }
                    }, 800);
                };
                container.appendChild(flower);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
