    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطعم الحروف</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #d35400; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #e67e22; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #2ecc71; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #27ae60;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .boy { font-size: 150px; position: absolute; top: 100px;}
        .speech-bubble { position: absolute; top: 60px; right: 60%; background: white; border-radius: 20px; padding: 10px 20px; font-size: 2.5rem; font-family: 'Fredoka One'; color: #d35400; font-weight: bold; box-shadow: 0 5px 10px rgba(0,0,0,0.2); cursor: pointer;}
        .speech-bubble::after { content: ''; position: absolute; bottom: -20px; right: 20px; border: 10px solid transparent; border-top-color: white; border-right-color: white;}
        
        .table { width: 100%; height: 200px; background: #7f8c8d; position: absolute; bottom: 0; border-top: 10px solid #95a5a6; display: flex; align-items: center; justify-content: center; gap: 30px;}
        
        .plate { width: 100px; height: 100px; background: white; border-radius: 50%; box-shadow: inset 0 -10px 0 #ecf0f1, 0 10px 10px rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; font-size: 60px; cursor: pointer; transition: transform 0.2s;}
        .plate:active { transform: scale(0.9); }
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>مطعم الحروف 🍱</div>
        </div>
        
        <div class="boy" id="boy">👦</div>
        <div class="speech-bubble" id="speech-bubble" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="table" id="table"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">مطعم الحروف 🍱</h1>
        <p style="font-size: 1.5rem;">قدم الطلب الصحيح للولد الجائع!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('boy').innerHTML = '👦';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('speech-bubble').textContent = currentWord.word;
            speak(currentWord.word);
            
            const table = document.getElementById('table');
            table.innerHTML = '';
            
            selected.forEach(w => {
                const plate = document.createElement('div');
                plate.className = 'plate';
                plate.innerHTML = w.image;
                
                plate.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    if(w.word === currentWord.word) {
                        speak('Yummy!'); score+=10; document.getElementById('score').textContent=score;
                        document.getElementById('boy').innerHTML = '😋';
                        
                        const clone = plate.cloneNode(true);
                        const rect = plate.getBoundingClientRect();
                        clone.style.position = 'absolute';
                        clone.style.left = rect.left + 'px';
                        clone.style.top = rect.top + 'px';
                        clone.style.transition = 'all 0.5s ease-in';
                        document.body.appendChild(clone);
                        plate.style.visibility = 'hidden';
                        
                        setTimeout(() => {
                            const boyRect = document.getElementById('boy').getBoundingClientRect();
                            clone.style.left = boyRect.left + 50 + 'px';
                            clone.style.top = boyRect.top + 50 + 'px';
                            clone.style.transform = 'scale(0.5)';
                            clone.style.opacity = '0';
                        }, 50);
                        
                        setTimeout(() => {
                            clone.remove();
                            spawnLevel();
                        }, 1000);
                        
                    } else {
                        speak('Ew!'); document.getElementById('boy').innerHTML = '🤢';
                        setTimeout(() => {
                            document.getElementById('boy').innerHTML = '👦';
                            canClick = true;
                        }, 1000);
                    }
                };
                table.appendChild(plate);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
