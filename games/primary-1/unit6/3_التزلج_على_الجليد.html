    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>التزلج على الجليد</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #ecf0f1; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #bdc3c7; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #2c3e50; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #3498db; border: none; border-radius: 50px; color: white; cursor: pointer; box-shadow: 0 8px 0 #2980b9;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .ice-rink { width: 100%; height: 100%; position: absolute; top: 0; background: radial-gradient(circle, #e0e6ed 0%, #bdc3c7 100%); display: flex; align-items: center; justify-content: center;}
        
        .skater { font-size: 80px; position: absolute; z-index: 20; transition: all 0.5s ease-out; transform: translate(-50%, -50%);}
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #3498db; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; position: absolute; top: 50px; cursor: pointer;}
        
        .item-box { position: absolute; width: 80px; height: 80px; background: rgba(255,255,255,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.2); transform: translate(-50%, -50%);}
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>التزلج على الجليد ⛸️</div>
        </div>
        
        <div class="ice-rink" id="ice-rink"></div>
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="skater" id="skater">⛸️</div>
        <div id="items-container"></div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #3498db;">التزلج على الجليد ⛸️</h1>
        <p style="font-size: 1.5rem;">انقر على الصورة الصحيحة ليتزلج إليها اللاعب!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 4);
            currentWord = selected[Math.floor(Math.random()*4)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('items-container');
            container.innerHTML = '';
            
            const positions = [
                {x: 20, y: 30}, {x: 80, y: 30},
                {x: 20, y: 80}, {x: 80, y: 80}
            ];
            
            selected.forEach((w, i) => {
                const item = document.createElement('div');
                item.className = 'item-box';
                item.innerHTML = w.image;
                item.style.left = positions[i].x + '%';
                item.style.top = positions[i].y + '%';
                
                item.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const skater = document.getElementById('skater');
                    skater.style.left = item.style.left;
                    skater.style.top = item.style.top;
                    
                    setTimeout(() => {
                        if(w.word === currentWord.word) {
                            speak('Glide!'); score+=10; document.getElementById('score').textContent=score;
                            item.style.transform = 'translate(-50%, -50%) scale(1.5)';
                            item.style.opacity = '0';
                            setTimeout(spawnLevel, 1000);
                        } else {
                            speak('Slip!'); item.style.background = '#e74c3c';
                            setTimeout(() => {
                                item.style.background = 'rgba(255,255,255,0.9)';
                                skater.style.left = '50%';
                                skater.style.top = '50%';
                                canClick = true;
                            }, 1000);
                        }
                    }, 500);
                };
                container.appendChild(item);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            document.getElementById('skater').style.left = '50%';
            document.getElementById('skater').style.top = '50%';
            spawnLevel(); 
        }
    </script>
</body>
</html>
