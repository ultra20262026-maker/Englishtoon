    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>رمي السهام</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #e74c3c; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #c0392b; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #c0392b; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .dart { position: absolute; bottom: 20px; font-size: 60px; left: 50%; transform: translateX(-50%) rotate(-45deg); z-index: 20; transition: all 0.3s ease-in;}
        
        .balloons-container { display: flex; gap: 20px; position: absolute; top: 200px; width: 100%; justify-content: center; flex-wrap: wrap;}
        .balloon { width: 80px; height: 100px; background: #3498db; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; position: relative; box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2);}
        .balloon::after { content: ''; position: absolute; bottom: -10px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-bottom: 10px solid inherit; border-bottom-color: inherit;}
        .balloon.popped { transform: scale(1.5); opacity: 0; transition: all 0.2s;}
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>رمي السهام 🎯</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="balloons-container" id="balloons-container"></div>
        
        <div class="dart" id="dart">🎯</div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">رمي السهام 🎯</h1>
        <p style="font-size: 1.5rem;">صوّب السهم نحو البالون الذي يحمل الصورة المطابقة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

const colors = ['#3498db', '#2ecc71', '#f1c40f', '#9b59b6'];

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('dart').style.bottom = '20px';
            document.getElementById('dart').style.opacity = '1';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 4);
            currentWord = selected[Math.floor(Math.random()*4)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('balloons-container');
            container.innerHTML = '';
            
            selected.forEach((w, i) => {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.backgroundColor = colors[i % colors.length];
                b.style.borderBottomColor = colors[i % colors.length];
                b.innerHTML = w.image;
                
                b.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const dart = document.getElementById('dart');
                    const targetX = e.target.getBoundingClientRect().left + 40;
                    const targetY = e.target.getBoundingClientRect().bottom;
                    
                    dart.style.left = targetX + 'px';
                    dart.style.bottom = (document.getElementById('game-container').clientHeight - targetY) + 'px';
                    
                    setTimeout(() => {
                        dart.style.opacity = '0';
                        if(w.word === currentWord.word) {
                            speak('Bullseye!'); score+=10; document.getElementById('score').textContent=score;
                            b.classList.add('popped');
                            setTimeout(spawnLevel, 1000);
                        } else {
                            speak('Miss!'); b.style.filter = 'grayscale(100%)';
                            setTimeout(() => {
                                dart.style.bottom = '20px';
                                dart.style.left = '50%';
                                dart.style.opacity = '1';
                                b.style.filter = 'none';
                                canClick = true;
                            }, 1000);
                        }
                    }, 300);
                };
                container.appendChild(b);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            spawnLevel(); 
        }
    </script>
</body>
</html>
