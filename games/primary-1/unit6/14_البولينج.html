    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>البولينج</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Cairo:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #2c3e50; font-family: 'Cairo', 'Fredoka One', sans-serif; overflow: hidden; touch-action: none; display: flex; align-items: center; justify-content: center; height: 100vh;}
        .game-container { width: 95vw; height: 85vh; background: #e74c3c; border-radius: 20px; border: 5px solid #fff; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center;}
        .ui-top { position: absolute; top: 10px; left: 10px; right: 10px; display: flex; justify-content: space-between; font-size: 1.5rem; color: #fff; pointer-events: none; z-index: 30; font-weight: bold;}
        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; color: white;}
        button.start { font-family: 'Cairo', sans-serif; font-size: 2.5rem; padding: 15px 50px; background: #f1c40f; border: none; border-radius: 50px; color: #333; cursor: pointer; box-shadow: 0 8px 0 #d4ac0d;}
        button.start:active { transform: translateY(8px); box-shadow: 0 0 0; }
        .hidden-screen { display: none !important; }
        
        .target-box { background: white; border-radius: 20px; padding: 10px 30px; font-size: 3rem; color: #e74c3c; font-family: 'Fredoka One'; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 25; margin-top: 50px; cursor: pointer;}
        
        .lane { width: 80%; height: 60%; background: #c0392b; position: absolute; bottom: 0; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; align-items: center;}
        
        .ball { font-size: 60px; position: absolute; bottom: 20px; z-index: 20; transition: all 0.5s ease-in;}
        
        .pins-container { display: flex; gap: 30px; position: absolute; top: 50px; width: 100%; justify-content: center;}
        .pin { width: 70px; height: 120px; background: white; border-radius: 50px 50px 10px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; position: relative; box-shadow: 0 5px 10px rgba(0,0,0,0.3); transition: transform 0.3s;}
        .pin::before { content: ''; position: absolute; top: 30px; width: 100%; height: 10px; background: #e74c3c;}
        .pin span { z-index: 10; margin-top: 20px;}
        
        .pin.knocked { transform: rotate(90deg) translate(20px, 20px); opacity: 0; pointer-events: none;}
    </style>
<script src="../../../js/game-enhancements.js"></script>
</head>
<body>
    <div class="game-container" id="game-container">
        <div class="ui-top">
            <div>النقاط: <span id="score">0</span></div>
            <div>البولينج 🎳</div>
        </div>
        
        <div class="target-box" id="target-box" onclick="if(currentWord) speak(currentWord.word)">word</div>
        
        <div class="lane">
            <div class="pins-container" id="pins-container"></div>
            <div class="ball" id="ball">🎳</div>
        </div>
        
    </div>
    <div id="start-screen" class="screen">
        <h1 style="font-size: 4rem; color: #f1c40f;">البولينج 🎳</h1>
        <p style="font-size: 1.5rem;">اختر الدبوس الذي يحمل الصورة المطابقة لتسديد الكرة!</p>
        <button class="start" onclick="startGame()">العب!</button>
    </div>
    <script>
        
const wordsData = [
  { word: "lion", image: "🦁", type: "emoji" },
  { word: "tiger", image: "🐯", type: "emoji" },
  { word: "monkey", image: "🐒", type: "emoji" },
  { word: "snake", image: "🐍", type: "emoji" },
  { word: "elephant", image: "🐘", type: "emoji" },
  { word: "giraffe", image: "🦒", type: "emoji" },
  { word: "banana", image: "🍌", type: "emoji" },
  { word: "boy", image: "👦", type: "emoji" },
  { word: "ball", image: "⚽", type: "emoji" },
  { word: "bird", image: "🐦", type: "emoji" },
  { word: "bike", image: "🚲", type: "emoji" },
  { word: "lunch", image: "🍱", type: "emoji" },
  { word: "leaf", image: "🍃", type: "emoji" },
  { word: "lamp", image: "🪔", type: "emoji" },
  { word: "lemon", image: "🍋", type: "emoji" },
  { word: "cat", image: "🐱", type: "emoji" },
  { word: "turtle", image: "🐢", type: "emoji" },
  { word: "dog", image: "🐶", type: "emoji" },
  { word: "couch", image: "🛋️", type: "emoji" },
  { word: "on", image: "🔛", type: "emoji" },
  { word: "in", image: "📥", type: "emoji" },
  { word: "under", image: "⬇️", type: "emoji" },
  { word: "chair", image: "🪑", type: "emoji" },
  { word: "cage", image: "🦜", type: "emoji" },
  { word: "table", image: "🪟", type: "emoji" },
  { word: "umbrella", image: "☂️", type: "emoji" },
  { word: "up", image: "⬆️", type: "emoji" },
  { word: "unlock", image: "🔓", type: "emoji" },
  { word: "jam", image: "🍯", type: "emoji" },
  { word: "jacket", image: "🧥", type: "emoji" },
  { word: "jellyfish", image: "🪼", type: "emoji" },
  { word: "jar", image: "🫙", type: "emoji" },
  { word: "jeans", image: "👖", type: "emoji" }
];

const synth = window.speechSynthesis;
function speak(text) {
    const utterThis = new SpeechSynthesisUtterance(text);
    utterThis.pitch = 1.3; utterThis.rate = 0.9;
    synth.speak(utterThis);
}

        let score = 0;
        let currentWord = null;
        let canClick = true;

        function spawnLevel() {
            canClick = true;
            document.getElementById('ball').style.bottom = '20px';
            document.getElementById('ball').style.opacity = '1';
            
            let selected = [...wordsData].sort(()=>0.5-Math.random()).slice(0, 3);
            currentWord = selected[Math.floor(Math.random()*3)];
            
            document.getElementById('target-box').textContent = currentWord.word;
            speak(currentWord.word);
            
            const container = document.getElementById('pins-container');
            container.innerHTML = '';
            
            selected.forEach(w => {
                const pin = document.createElement('div');
                pin.className = 'pin';
                pin.innerHTML = `<span>${w.image}</span>`;
                
                pin.onclick = (e) => {
                    if(!canClick) return;
                    canClick = false;
                    
                    const ball = document.getElementById('ball');
                    const targetRect = e.target.closest('.pin').getBoundingClientRect();
                    const laneRect = document.querySelector('.lane').getBoundingClientRect();
                    
                    const targetX = targetRect.left - laneRect.left + 5;
                    
                    ball.style.left = targetX + 'px';
                    ball.style.bottom = 'calc(100% - 150px)';
                    ball.style.transform = 'scale(0.5) rotate(360deg)';
                    
                    setTimeout(() => {
                        ball.style.opacity = '0';
                        if(w.word === currentWord.word) {
                            speak('Strike!'); score+=10; document.getElementById('score').textContent=score;
                            pin.classList.add('knocked');
                            setTimeout(() => {
                                ball.style.transform = 'scale(1) rotate(0deg)';
                                spawnLevel();
                            }, 1000);
                        } else {
                            speak('Gutter ball!'); pin.style.background = '#bdc3c7';
                            setTimeout(() => {
                                ball.style.bottom = '20px';
                                ball.style.left = '50%';
                                ball.style.transform = 'translateX(-50%) scale(1) rotate(0deg)';
                                ball.style.opacity = '1';
                                pin.style.background = 'white';
                                canClick = true;
                            }, 1000);
                        }
                    }, 500);
                };
                container.appendChild(pin);
            });
        }

        function startGame() { 
            document.getElementById('start-screen').classList.add('hidden-screen'); 
            score=0; document.getElementById('score').textContent=score;
            document.getElementById('ball').style.left = '50%';
            document.getElementById('ball').style.transform = 'translateX(-50%)';
            spawnLevel(); 
        }
    </script>
</body>
</html>
