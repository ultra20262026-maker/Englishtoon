<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Toon — ألعاب الوحدة</title>
    <link rel="stylesheet" href="css/style.css?v=20260722_v3">
</head>
<body>

    

    <!-- Cyber Background Mesh -->
    <div class="cyber-bg">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>

    <!-- Main Container -->
    <div class="page-animate">

        <!-- App Floating Header with 4 Tabs -->
        <header class="app-header">
            <a href="dashboard.html" class="header-brand">
                <div class="header-logo-wrap">
                    <img src="images/logo_icon.png" alt="English Toon" class="header-logo-img">
                </div>
                <div class="brand-text">
                    <span class="brand-title">English Toon</span>
                    <span class="brand-subtitle" id="unit-header-sub">ألعاب الوحدة</span>
                </div>
            </a>

            <!-- Navigation Tabs -->
            <nav class="header-nav-links">
                <a href="books.html" class="nav-tab-item">📖 الكتب التفاعلية</a>
                <a href="dashboard.html" class="nav-tab-item">🏠 الرئيسية</a>
                <a href="games.html" class="nav-tab-item active">🎮 الألعاب</a>
                </nav>

            <div class="header-actions">
                <button onclick="logout()" class="btn-nav-action btn-logout">خروج 🚪</button>
            </div>
        </header>

        <!-- Breadcrumb & Back Nav -->
        <div class="breadcrumb-container">
            <ul class="breadcrumb-list">
                <li><a href="dashboard.html" class="breadcrumb-link">🏠 الرئيسية</a></li>
                <li class="breadcrumb-separator">›</li>
                <li><a href="#" id="breadcrumb-grade-link" class="breadcrumb-link">الصف</a></li>
                <li class="breadcrumb-separator">›</li>
                <li class="breadcrumb-current" id="breadcrumb-unit-title">الوحدة</li>
            </ul>

            <a href="#" id="back-to-grade-btn" class="btn-back">← العودة للوحدات</a>
        </div>

        <!-- Section Title & Grid -->
        <div class="section-title-wrap">
            <h2 class="section-h2">
                <span class="section-icon-badge">🎮</span>
                الألعاب والتحديات التفاعلية
            </h2>
            <span class="section-count-pill" id="games-count-badge">جاري التحميل...</span>
        </div>

        <!-- Games Cards Grid -->
        <div class="cards-grid" id="games-container"></div>

    </div>

    <!-- Mobile Bottom Navigation Dock -->
        <!-- Mobile Bottom Navigation Dock with 5 Tabs -->
        <!-- Mobile Bottom Navigation Dock with 3 Tabs -->
    <nav class="mobile-bottom-dock">
        <a href="dashboard.html" class="dock-item">
            <span class="dock-icon">🏠</span>
            <span>الرئيسية</span>
        </a>
        <a href="games.html" class="dock-item">
            <span class="dock-icon">📚</span>
            <span>الألعاب</span>
        </a>
        <a href="books.html" class="dock-item">
            <span class="dock-icon">📖</span>
            <span>كتب تفاعلية</span>
        </a>
    </nav>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>

    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const gradeId  = urlParams.get('grade');
        const unitId   = urlParams.get('unit');

        // Security Authorization Check
        const allowedGrade = localStorage.getItem('allowedGrade') || 'all';
        const isAdmin = localStorage.getItem('currentUser') === 'admin';
        let allowedUnits = 'all';
        try { allowedUnits = JSON.parse(localStorage.getItem('allowedUnits') || '"all"'); } catch(e) {}

        if (!isAdmin) {
            if (allowedGrade !== 'all' && allowedGrade !== gradeId) {
                alert('عذراً، غير مصرح لك بدخول هذا الصف.');
                window.location.href = 'dashboard.html';
            }
            if (allowedUnits !== 'all' && !allowedUnits.includes(parseInt(unitId))) {
                alert('عذراً، غير مصرح لك بدخول هذه الوحدة.');
                window.location.href = `grade.html?id=${gradeId}`;
            }
        }

        // Navigation Links
        document.getElementById('back-to-grade-btn').href = `grade.html?id=${gradeId}`;
        document.getElementById('breadcrumb-grade-link').href = `grade.html?id=${gradeId}`;

        const grade = GRADES_DATA.find(g => g.id === gradeId);

        // Smart Game Visual & Emoji Mapper based on Game Name
        function getGameVisual(gameName) {
            const name = (gameName || '').toLowerCase();
            
            if (name.includes('archery') || name.includes('سهام') || name.includes('رمي') || name.includes('رماية')) {
                return { emoji: '🎯', bg: 'linear-gradient(135deg, #FF416C, #FF4B2B)' };
            }
            if (name.includes('space') || name.includes('فضاء') || name.includes('سفينة') || name.includes('صواريخ')) {
                return { emoji: '🚀', bg: 'linear-gradient(135deg, #654ea3, #eaafc8)' };
            }
            if (name.includes('bubble') || name.includes('فقاعات') || name.includes('سكر')) {
                return { emoji: '🫧', bg: 'linear-gradient(135deg, #00c6ff, #0072ff)' };
            }
            if (name.includes('snake') || name.includes('ثعبان') || name.includes('ثرثار')) {
                return { emoji: '🐍', bg: 'linear-gradient(135deg, #11998e, #38ef7d)' };
            }
            if (name.includes('صيد') || name.includes('سمك') || name.includes('أسماك')) {
                return { emoji: '🎣', bg: 'linear-gradient(135deg, #2193b0, #6dd5ed)' };
            }
            if (name.includes('بناء') || name.includes('برج') || name.includes('جمل')) {
                return { emoji: '🏗️', bg: 'linear-gradient(135deg, #FF8008, #FFC837)' };
            }
            if (name.includes('بالون') || name.includes('بالونات')) {
                return { emoji: '🎈', bg: 'linear-gradient(135deg, #FF4E50, #F9D423)' };
            }
            if (name.includes('سيارات') || name.includes('سباق') || name.includes('سائق')) {
                return { emoji: '🏎️', bg: 'linear-gradient(135deg, #F00000, #DC281E)' };
            }
            if (name.includes('عجلة') || name.includes('حظ')) {
                return { emoji: '🎡', bg: 'linear-gradient(135deg, #8E2DE2, #4A00E0)' };
            }
            if (name.includes('ذاكرة') || name.includes('بطاقات')) {
                return { emoji: '🧠', bg: 'linear-gradient(135deg, #f857a6, #ff5858)' };
            }
            if (name.includes('حيوان') || name.includes('حيوانات') || name.includes('دلفين')) {
                return { emoji: '🦁', bg: 'linear-gradient(135deg, #56ab2f, #a8e063)' };
            }
            if (name.includes('قطار')) {
                return { emoji: '🚂', bg: 'linear-gradient(135deg, #36D1DC, #5B86E5)' };
            }
            if (name.includes('متاهة') || name.includes('هروب')) {
                return { emoji: '🌀', bg: 'linear-gradient(135deg, #3A1C71, #D76D77)' };
            }
            
            return { emoji: '🎮', bg: 'linear-gradient(135deg, #6366F1, #8B5CF6)' };
        }

        if (!grade || !unitId) {
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('unit-header-sub').textContent = `الوحدة ${unitId}`;
            document.getElementById('breadcrumb-grade-link').textContent = grade.name;
            document.getElementById('breadcrumb-unit-title').textContent = `الوحدة ${unitId}`;

            const container = document.getElementById('games-container');
            let unitGames = [];
            let grammarGames = [];

            if (typeof GAMES_MAP !== 'undefined' && GAMES_MAP[gradeId] && GAMES_MAP[gradeId][unitId]) {
                unitGames = GAMES_MAP[gradeId][unitId];
            }
            if (typeof GRAMMAR_GAMES_MAP !== 'undefined' && GRAMMAR_GAMES_MAP[gradeId] && GRAMMAR_GAMES_MAP[gradeId][unitId]) {
                grammarGames = GRAMMAR_GAMES_MAP[gradeId][unitId];
            }

            const totalCount = unitGames.length + grammarGames.length;
            document.getElementById('games-count-badge').textContent = `${totalCount} لعبة متاحة`;

            container.innerHTML = '';

            // 1. Render SINGLE Grammar Games Icon/Tile if available
            if (grammarGames.length > 0) {
                const grammarTile = document.createElement('div');
                grammarTile.className = 'game-tile';
                grammarTile.style.cssText = "cursor: pointer; border: 2px solid #f39c12;";
                grammarTile.onclick = () => openGrammarModal();

                grammarTile.innerHTML = `
                    <div class="game-thumb-container" style="background: linear-gradient(135deg, #f39c12, #d35400);">
                        <span class="game-emoji-badge">📝</span>
                        <div class="game-play-hover-overlay">
                            <div class="play-action-circle">▶</div>
                        </div>
                    </div>
                    <div class="game-info-box">
                        <h3 class="game-info-title" style="color:#f1c40f;">Grammar Games 📝</h3>
                        <div class="game-info-meta">
                            <span class="game-cta-text" style="color:#f39c12;">🎮 5 ألعاب قواعد تفاعلية</span>
                            <span class="badge-new-game" style="background:#f39c12; color:#111;">★ مميز</span>
                        </div>
                    </div>
                `;
                container.appendChild(grammarTile);
            }

            if (unitGames.length === 0 && grammarGames.length === 0) {
                container.innerHTML = `
                    <div class="empty-box" style="grid-column: 1 / -1;">
                        <div class="empty-icon">🚀</div>
                        <h3>قريباً جداً!</h3>
                        <p>جاري تصميم وإضافة ألعاب تفاعلية جديدة لهذه الوحدة.</p>
                    </div>`;
            } else {
                unitGames.forEach((game, idx) => {
                    const visual = getGameVisual(game.name);
                    const gamePath = `games/${gradeId}/unit${unitId}/${game.file}`;

                    const tile = document.createElement('a');
                    tile.href = gamePath;
                    tile.className = 'game-tile';

                    tile.innerHTML = `
                        <div class="game-thumb-container" style="background: ${visual.bg};">
                            <span class="game-emoji-badge">${visual.emoji}</span>
                            <div class="game-play-hover-overlay">
                                <div class="play-action-circle">▶</div>
                            </div>
                        </div>
                        <div class="game-info-box">
                            <h3 class="game-info-title">${game.name}</h3>
                            <div class="game-info-meta">
                                <span class="game-cta-text">⚡ العب الآن</span>
                                ${idx === 0 ? '<span class="badge-new-game">⭐ مميز</span>' : ''}
                            </div>
                        </div>
                    `;
                    container.appendChild(tile);
                });
            }
        }

        function openGrammarModal() {
            const modal = document.getElementById('grammar-modal');
            const grid = document.getElementById('grammar-modal-grid');
            grid.innerHTML = '';

            if (grammarGames.length > 0) {
                grammarGames.forEach((game) => {
                    const visual = getGameVisual(game.name);
                    const gamePath = `games/${gradeId}/unit${unitId}/${game.file}`;

                    const tile = document.createElement('a');
                    tile.href = gamePath;
                    tile.className = 'game-tile';
                    tile.innerHTML = `
                        <div class="game-thumb-container" style="background: ${visual.bg};">
                            <span class="game-emoji-badge">${visual.emoji}</span>
                            <div class="game-play-hover-overlay">
                                <div class="play-action-circle">▶</div>
                            </div>
                        </div>
                        <div class="game-info-box">
                            <h3 class="game-info-title">${game.name}</h3>
                            <div class="game-info-meta">
                                <span class="game-cta-text" style="color:#f39c12;">⚡ ابدأ اللعبة</span>
                                <span class="badge-new-game" style="background:#f39c12; color:#111;">📝 جرامر</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(tile);
                });
            }
            modal.style.display = 'flex';
        }

        function closeGrammarModal() {
            document.getElementById('grammar-modal').style.display = 'none';
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>

    <!-- Grammar Games Modal Popup -->
    <div id="grammar-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: #1e293b; border: 2px solid #f39c12; border-radius: 24px; width: 100%; max-width: 900px; max-height: 90vh; overflow-y: auto; padding: 30px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.8);">
            <button onclick="closeGrammarModal()" style="position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 1.5rem; width: 44px; height: 44px; border-radius: 50%; cursor: pointer;">✕</button>
            <div style="text-align: center; margin-bottom: 25px;">
                <h2 style="font-size: 2rem; color: #f1c40f; font-weight: 800;">Grammar Games 📝</h2>
                <p style="color: #94a3b8; font-size: 1.1rem; margin-top: 6px;">اختر لعبة من ألعاب القواعد والجرامر الـ 5 المخصصة لهذه الوحدة</p>
            </div>
            <div class="cards-grid" id="grammar-modal-grid"></div>
        </div>
    </div>
</body>
</html>
