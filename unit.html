<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألعاب الوحدة | English Toon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-bg">

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="dashboard-wrapper page-content">

        <!-- Sticky Header -->
        <header class="site-header">
            <a href="dashboard.html" class="header-brand">
                <img src="images/logo_icon.png" alt="Logo" class="header-logo">
                <span class="header-brand-name">English Toon</span>
            </a>
            <div class="header-center">
                <h1 class="header-title" id="unit-title">جاري التحميل...</h1>
            </div>
            <div class="header-actions">
                <button onclick="logout()" class="logout-btn">خروج 🚪</button>
            </div>
        </header>

        <!-- Breadcrumb -->
        <nav class="breadcrumb">
            <a href="dashboard.html">🏠 الرئيسية</a>
            <span class="breadcrumb-sep">›</span>
            <a href="#" id="breadcrumb-grade-link">الصف</a>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current" id="breadcrumb-unit">الوحدة</span>
        </nav>

        <!-- Back Button -->
        <a id="back-link" href="#" class="back-btn">← العودة للوحدات</a>

        <!-- Games Count Bar -->
        <div class="games-count-bar" id="games-count-bar" style="display:none;">
            <span>🎮</span>
            <span id="games-count-text">جاري تحميل الألعاب...</span>
        </div>

        <!-- Games Grid -->
        <div class="games-grid" id="games-container"></div>

    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/game-enhancements.js"></script>

    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const gradeId  = urlParams.get('grade');
        const unitId   = urlParams.get('unit');

        // Security check
        const allowedGrade = localStorage.getItem('allowedGrade') || 'all';
        const isAdmin = localStorage.getItem('currentUser') === 'admin';
        let allowedUnits = 'all';
        try { allowedUnits = JSON.parse(localStorage.getItem('allowedUnits') || '"all"'); } catch(e) {}

        if (!isAdmin) {
            if (allowedGrade !== 'all' && allowedGrade !== gradeId) {
                alert('عذراً، غير مصرح لك بدخول هذا الصف.');
                window.location.href = 'dashboard.html';
            }
            if (allowedUnits !== 'all' && !allowedUnits.includes(parseInt(unitId))) {
                alert('عذراً، غير مصرح لك بدخول هذه الوحدة.');
                window.location.href = `grade.html?id=${gradeId}`;
            }
        }

        // Back link & breadcrumb
        document.getElementById('back-link').href = `grade.html?id=${gradeId}`;
        document.getElementById('breadcrumb-grade-link').href = `grade.html?id=${gradeId}`;

        const grade = GRADES_DATA.find(g => g.id === gradeId);
        if (!grade || !unitId) {
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('unit-title').textContent = `${grade.name} — الوحدة ${unitId}`;
            document.getElementById('breadcrumb-grade-link').textContent = grade.name;
            document.getElementById('breadcrumb-unit').textContent = `الوحدة ${unitId}`;

            const container = document.getElementById('games-container');
            let unitGames = [];

            if (typeof GAMES_MAP !== 'undefined' && GAMES_MAP[gradeId] && GAMES_MAP[gradeId][unitId]) {
                unitGames = GAMES_MAP[gradeId][unitId];
            }

            const countBar = document.getElementById('games-count-bar');
            countBar.style.display = 'flex';

            if (unitGames.length === 0) {
                document.getElementById('games-count-text').textContent = 'لا توجد ألعاب مضافة بعد';
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🚀</div>
                        <h3>قريباً!</h3>
                        <p>لم تُضف ألعاب لهذه الوحدة بعد. ترقبوا التحديثات!</p>
                    </div>`;
            } else {
                document.getElementById('games-count-text').textContent = unitGames.length + ' ألعاب متاحة في هذه الوحدة';

                // Game image pool (cycles through available icons)
                const gameImages = [
                    'images/game_icon_1.png',
                    'images/game_icon_2.png',
                    'images/game_icon_3.png',
                    'images/game_icon_4.png'
                ];

                unitGames.forEach((game, index) => {
                    const imgSrc = gameImages[index % gameImages.length];
                    // Build path: try gradeId/unitX/ first (primary grades), fallback handled by logic
                    let gamePath = `games/${gradeId}/unit${unitId}/${game.file}`;

                    const card = document.createElement('a');
                    card.href = gamePath;
                    card.className = 'game-card';

                    const isNew = index === 0;

                    card.innerHTML = `
                        <div class="game-card-top-bar"></div>
                        <div class="game-card-img-wrap">
                            <img class="game-icon-img" src="${imgSrc}" alt="${game.name}" loading="lazy">
                            <div class="game-play-overlay">
                                <div class="play-btn-circle">▶</div>
                            </div>
                        </div>
                        <div class="game-card-body">
                            <div class="game-title">${game.name}</div>
                            <div class="game-card-footer">
                                <span class="game-play-text">▶ العب الآن</span>
                                ${isNew ? '<span class="game-new-badge">⭐ جديد</span>' : ''}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>
</body>
</html>
