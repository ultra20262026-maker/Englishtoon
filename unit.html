<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Toon — ألعاب الوحدة</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sticky WhatsApp Expiry Warning Banner -->
    <a href="https://wa.me/201208609509?text=%D8%A7%D9%84%D8%B3%D9%84%D8%A7%D9%85%20%D8%B9%D9%84%D9%8A%D9%83%D9%85%D8%8C%20%D8%A3%D8%B1%D9%8A%D8%AF%20%D8%A7%D9%84%D8%A7%D8%B4%D8%AA%D8%B1%D8%A7%D9%83%20%D9%81%D9%8A%20%D9%85%D9%88%D9%82%D8%B9%20English%20Toon" target="_blank" class="warning-license-banner">
        <span>⚠️ أنت الآن تستخدم النسخة المجانية للموقع وسيتم حذفك قريباً! للاشتراك تواصل واتس: 01208609509</span>
        <span class="warning-wa-btn">💬 اشترك عبر الواتساب</span>
    </a>

    <!-- Cyber Background Mesh & Ambient Glowing Orbs -->
    <div class="cyber-bg">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>

    <!-- Main Container -->
    <div class="page-animate">

        <!-- App Floating Header -->
        <header class="app-header">
            <a href="dashboard.html" class="header-brand">
                <div class="header-logo-wrap">
                    <img src="images/logo_icon.png" alt="English Toon" class="header-logo-img">
                </div>
                <div class="brand-text">
                    <span class="brand-title">English Toon</span>
                    <span class="brand-subtitle" id="unit-header-sub">ألعاب الوحدة</span>
                </div>
            </a>

            <div class="header-center-title">
                <span id="unit-header-title">ألعاب الوحدة</span>
            </div>

            <div class="header-actions">
                <button onclick="logout()" class="btn-nav-action btn-logout">خروج 🚪</button>
            </div>
        </header>

        <!-- Breadcrumb & Back Nav -->
        <div class="breadcrumb-container">
            <ul class="breadcrumb-list">
                <li><a href="dashboard.html" class="breadcrumb-link">🏠 الرئيسية</a></li>
                <li class="breadcrumb-separator">›</li>
                <li><a href="#" id="breadcrumb-grade-link" class="breadcrumb-link">الصف</a></li>
                <li class="breadcrumb-separator">›</li>
                <li class="breadcrumb-current" id="breadcrumb-unit-title">الوحدة</li>
            </ul>

            <a href="#" id="back-to-grade-btn" class="btn-back">← العودة للوحدات</a>
        </div>

        <!-- Section Title & Grid -->
        <div class="section-title-wrap">
            <h2 class="section-h2">
                <span class="section-icon-badge">🎮</span>
                الألعاب والتحديات التفاعلية
            </h2>
            <span class="section-count-pill" id="games-count-badge">جاري التحميل...</span>
        </div>

        <!-- Games Cards Grid -->
        <div class="cards-grid" id="games-container"></div>

    </div>

    <!-- Mobile Bottom Navigation Dock -->
    <nav class="mobile-bottom-dock">
        <a href="dashboard.html" class="dock-item">
            <span class="dock-icon">🏠</span>
            <span>الرئيسية</span>
        </a>
        <a href="dashboard.html" class="dock-item active">
            <span class="dock-icon">🎮</span>
            <span>الألعاب</span>
        </a>
        <a href="#" onclick="logout()" class="dock-item">
            <span class="dock-icon">🚪</span>
            <span>خروج</span>
        </a>
    </nav>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>

    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const gradeId  = urlParams.get('grade');
        const unitId   = urlParams.get('unit');

        // Security Authorization Check
        const allowedGrade = localStorage.getItem('allowedGrade') || 'all';
        const isAdmin = localStorage.getItem('currentUser') === 'admin';
        let allowedUnits = 'all';
        try { allowedUnits = JSON.parse(localStorage.getItem('allowedUnits') || '"all"'); } catch(e) {}

        if (!isAdmin) {
            if (allowedGrade !== 'all' && allowedGrade !== gradeId) {
                alert('عذراً، غير مصرح لك بدخول هذا الصف.');
                window.location.href = 'dashboard.html';
            }
            if (allowedUnits !== 'all' && !allowedUnits.includes(parseInt(unitId))) {
                alert('عذراً، غير مصرح لك بدخول هذه الوحدة.');
                window.location.href = `grade.html?id=${gradeId}`;
            }
        }

        // Navigation Links
        document.getElementById('back-to-grade-btn').href = `grade.html?id=${gradeId}`;
        document.getElementById('breadcrumb-grade-link').href = `grade.html?id=${gradeId}`;

        const grade = GRADES_DATA.find(g => g.id === gradeId);

        if (!grade || !unitId) {
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('unit-header-title').textContent = `${grade.name} — الوحدة ${unitId}`;
            document.getElementById('unit-header-sub').textContent = `الوحدة ${unitId}`;
            document.getElementById('breadcrumb-grade-link').textContent = grade.name;
            document.getElementById('breadcrumb-unit-title').textContent = `الوحدة ${unitId}`;

            const container = document.getElementById('games-container');
            let unitGames = [];

            if (typeof GAMES_MAP !== 'undefined' && GAMES_MAP[gradeId] && GAMES_MAP[gradeId][unitId]) {
                unitGames = GAMES_MAP[gradeId][unitId];
            }

            if (unitGames.length === 0) {
                document.getElementById('games-count-badge').textContent = '0 لعبة';
                container.innerHTML = `
                    <div class="empty-box" style="grid-column: 1 / -1;">
                        <div class="empty-icon">🚀</div>
                        <h3>قريباً جداً!</h3>
                        <p>جاري تصميم وإضافة ألعاب تفاعلية جديدة لهذه الوحدة.</p>
                    </div>`;
            } else {
                document.getElementById('games-count-badge').textContent = `${unitGames.length} ألعاب متاحة`;

                const gameThumbPool = [
                    'images/game_icon_1.png',
                    'images/game_icon_2.png',
                    'images/game_icon_3.png',
                    'images/game_icon_4.png'
                ];

                unitGames.forEach((game, idx) => {
                    const imgSrc = gameThumbPool[idx % gameThumbPool.length];
                    const gamePath = `games/${gradeId}/unit${unitId}/${game.file}`;

                    const tile = document.createElement('a');
                    tile.href = gamePath;
                    tile.className = 'game-tile';

                    tile.innerHTML = `
                        <div class="game-thumb-container">
                            <img src="${imgSrc}" alt="${game.name}" class="game-thumb-img" loading="lazy">
                            <div class="game-play-hover-overlay">
                                <div class="play-action-circle">▶</div>
                            </div>
                        </div>
                        <div class="game-info-box">
                            <h3 class="game-info-title">${game.name}</h3>
                            <div class="game-info-meta">
                                <span class="game-cta-text">⚡ العب الآن</span>
                                ${idx === 0 ? '<span class="badge-new-game">⭐ مميز</span>' : ''}
                            </div>
                        </div>
                    `;
                    container.appendChild(tile);
                });
            }
        }

        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>
</body>
</html>
