<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Toon — تسجيل الدخول</title>
    <meta name="description" content="بوابة الألعاب التعليمية التفاعلية لتعلم اللغة الإنجليزية بسهولة وتسلية">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Cyber Background Mesh & Ambient Glowing Orbs -->
    <div class="cyber-bg">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>

    <!-- Login Container -->
    <div class="login-page-container page-animate">
        <div class="login-card-modern">

            <!-- Logo & Brand Header -->
            <div class="login-brand-header">
                <img src="images/logo_icon.png" alt="English Toon" class="login-header-logo">
                <h1 class="login-brand-title">English Toon</h1>
                <p class="login-subtitle">🎮 بوابة الألعاب التعليمية التفاعلية</p>
            </div>

            <!-- Error / Success Alert -->
            <div id="error-msg" class="alert-box alert-danger"></div>

            <!-- Login Form -->
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">👤 اسم المستخدم</label>
                    <div class="form-input-wrapper">
                        <input type="text" id="username" class="form-input" required placeholder="أدخل اسم المستخدم" autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">🔒 كلمة المرور</label>
                    <div class="form-input-wrapper">
                        <input type="password" id="password" class="form-input" required placeholder="أدخل كلمة المرور" autocomplete="current-password">
                        <button type="button" class="pwd-toggle-btn" id="toggle-pass" title="إظهار/إخفاء كلمة المرور">👁️</button>
                    </div>
                </div>

                <button type="submit" class="btn-submit-main" id="login-btn">⚡ دخول المحطة التعليمية</button>
            </form>

        </div>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        // Toggle password visibility
        document.getElementById('toggle-pass').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            const isHidden = pwd.type === 'password';
            pwd.type = isHidden ? 'text' : 'password';
            this.textContent = isHidden ? '🙈' : '👁️';
        });

        // Form Submit Logic
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('login-btn');
            const errorDiv = document.getElementById('error-msg');

            btn.innerHTML = '⏳ جاري التحقق...';
            btn.disabled = true;
            btn.style.opacity = '0.85';

            const result = await login(user, pass);

            if (result.success) {
                btn.innerHTML = '✅ تم الدخول! جاري التوجيه...';
                btn.style.background = 'linear-gradient(135deg, #10B981 0%, #059669 100%)';
                setTimeout(() => window.location.href = 'dashboard.html', 500);
            } else {
                errorDiv.innerHTML = '❌ ' + result.message;
                errorDiv.style.display = 'block';
                btn.innerHTML = '⚡ دخول المحطة التعليمية';
                btn.disabled = false;
                btn.style.opacity = '1';
                
                // Card shake animation
                const card = document.querySelector('.login-card-modern');
                card.style.animation = 'none';
                card.offsetHeight; // Reflow
                card.style.animation = 'shakeCard 0.4s ease';
            }
        });

        // Shake keyframes injection
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shakeCard {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-10px); }
                40% { transform: translateX(10px); }
                60% { transform: translateX(-6px); }
                80% { transform: translateX(6px); }
            }
        `;
        document.head.appendChild(style);

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>
</body>
</html>
