<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Toon — الوحدات الدراسية</title>
    <link rel="stylesheet" href="css/style.css?v=20260722_v3">
</head>
<body>

    

    <!-- Cyber Background Mesh -->
    <div class="cyber-bg">
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>
        <div class="glow-orb glow-orb-3"></div>
    </div>

    <!-- Main Container -->
    <div class="page-animate">

        <!-- App Floating Header with 4 Tabs -->
        <header class="app-header">
            <a href="dashboard.html" class="header-brand">
                <div class="header-logo-wrap">
                    <img src="images/logo_icon.png" alt="English Toon" class="header-logo-img">
                </div>
                <div class="brand-text">
                    <span class="brand-title">English Toon</span>
                    <span class="brand-subtitle" id="grade-subtitle">الوحدات الدراسية</span>
                </div>
            </a>

            <!-- Navigation Tabs -->
            <nav class="header-nav-links">
                <a href="interactive-books.html" class="nav-tab-item">📖 الكتب التفاعلية</a>
                <a href="dashboard.html" class="nav-tab-item">🏠 الرئيسية</a>
                <a href="games.html" class="nav-tab-item active">🎮 الألعاب</a>
                </nav>

            <div class="header-actions">
                <button onclick="logout()" class="btn-nav-action btn-logout">خروج 🚪</button>
            </div>
        </header>

        <!-- Breadcrumb & Back Nav -->
        <div class="breadcrumb-container">
            <ul class="breadcrumb-list">
                <li><a href="dashboard.html" class="breadcrumb-link">🏠 الرئيسية</a></li>
                <li class="breadcrumb-separator">›</li>
                <li class="breadcrumb-current" id="breadcrumb-grade-title">الوحدات</li>
            </ul>

            <a href="dashboard.html" class="btn-back">← العودة للصفوف</a>
        </div>

        <!-- Section Title & Grid -->
        <div class="section-title-wrap">
            <h2 class="section-h2">
                <span class="section-icon-badge">📖</span>
                الوحدات الدراسية المتاحة
            </h2>
            <span class="section-count-pill">٦ وحدات كاملة</span>
        </div>

        <!-- Units Cards Grid -->
        <div class="cards-grid" id="units-container"></div>

    </div>

    <!-- Mobile Bottom Navigation Dock -->
        <!-- Mobile Bottom Navigation Dock with 5 Tabs -->
        <!-- Mobile Bottom Navigation Dock with 3 Tabs -->
    <nav class="mobile-bottom-dock">
        <a href="dashboard.html" class="dock-item">
            <span class="dock-icon">🏠</span>
            <span>الرئيسية</span>
        </a>
        <a href="games.html" class="dock-item">
            <span class="dock-icon">📚</span>
            <span>الألعاب</span>
        </a>
        <a href="interactive-books.html" class="dock-item">
            <span class="dock-icon">📖</span>
            <span>كتب تفاعلية</span>
        </a>
    </nav>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>

    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const gradeId = urlParams.get('id');
        const grade = GRADES_DATA.find(g => g.id === gradeId);

        if (!grade) {
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('grade-subtitle').textContent = grade.name;
            document.getElementById('breadcrumb-grade-title').textContent = grade.name;

            const container = document.getElementById('units-container');
            const allowedUnitsStr = localStorage.getItem('allowedUnits');
            let allowedUnits = 'all';
            try { allowedUnits = JSON.parse(allowedUnitsStr || '"all"'); } catch(e) {}

            const unitIcons = ['🌟', '🚀', '🌊', '⚡', '💡', '🏆'];
            const unitTitles = ['الوحدة الأولى', 'الوحدة الثانية', 'الوحدة الثالثة', 'الوحدة الرابعة', 'الوحدة الخامسة', 'الوحدة السادسة'];

            for (let i = 1; i <= UNITS_PER_GRADE; i++) {
                if (allowedUnits !== 'all' && !allowedUnits.includes(i) && localStorage.getItem('currentUser') !== 'admin') continue;

                const tile = document.createElement('a');
                tile.className = 'unit-tile';
                tile.style.backgroundImage = `linear-gradient(180deg, rgba(7,10,18,0.35), rgba(7,10,18,0.92)), url('images/unit_${i}.png')`;

                tile.innerHTML = `
                    <span class="unit-big-num">0${i}</span>
                    <div class="unit-icon-box">${unitIcons[i-1] || '📖'}</div>
                    <div class="unit-info-body">
                        <span class="unit-label-small">الوحدة</span>
                        <h3 class="unit-main-title">${unitTitles[i-1] || `الوحدة ${i}`}</h3>
                        <span class="unit-sub-en">Unit ${i}</span>
                    </div>
                    <div class="unit-tile-hover-bar">⚡ دخول الألعاب والتحديات ←</div>
                `;

                tile.onclick = () => window.location.href = `unit.html?grade=${gradeId}&unit=${i}`;
                container.appendChild(tile);
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>
</body>
</html>
