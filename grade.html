<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الوحدات الدراسية | English Toon</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-bg">

    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <div class="dashboard-wrapper page-content">

        <!-- Sticky Header -->
        <header class="site-header">
            <a href="dashboard.html" class="header-brand">
                <img src="images/logo_icon.png" alt="Logo" class="header-logo">
                <span class="header-brand-name">English Toon</span>
            </a>
            <div class="header-center">
                <h1 class="header-title" id="grade-title">الوحدات الدراسية</h1>
            </div>
            <div class="header-actions">
                <button onclick="logout()" class="logout-btn">خروج 🚪</button>
            </div>
        </header>

        <!-- Breadcrumb -->
        <nav class="breadcrumb" id="breadcrumb-nav">
            <a href="dashboard.html">🏠 الرئيسية</a>
            <span class="breadcrumb-sep">›</span>
            <span class="breadcrumb-current" id="breadcrumb-grade">...</span>
        </nav>

        <!-- Back Button -->
        <a href="dashboard.html" class="back-btn">← العودة للصفوف</a>

        <!-- Section Title -->
        <div class="section-heading">
            <div class="section-heading-icon">📖</div>
            <h2>اختر الوحدة</h2>
            <span>٦ وحدات</span>
        </div>

        <!-- Units Grid -->
        <div class="grid-container" id="units-container"></div>

    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>

    <script>
        checkAuth();

        const urlParams = new URLSearchParams(window.location.search);
        const gradeId = urlParams.get('id');
        const grade = GRADES_DATA.find(g => g.id === gradeId);

        if (!grade) {
            window.location.href = 'dashboard.html';
        } else {
            document.getElementById('grade-title').textContent = grade.name;
            document.getElementById('breadcrumb-grade').textContent = grade.name;

            const container = document.getElementById('units-container');
            const allowedUnitsStr = localStorage.getItem('allowedUnits');
            let allowedUnits = 'all';
            try { allowedUnits = JSON.parse(allowedUnitsStr || '"all"'); } catch(e) {}

            const unitEmojis = ['🌟', '🚀', '🌊', '🔥', '💡', '🏆'];
            const unitNames  = ['الأولى', 'الثانية', 'الثالثة', 'الرابعة', 'الخامسة', 'السادسة'];

            for (let i = 1; i <= UNITS_PER_GRADE; i++) {
                if (allowedUnits !== 'all' && !allowedUnits.includes(i) && localStorage.getItem('currentUser') !== 'admin') continue;

                const card = document.createElement('div');
                card.className = 'unit-card';
                card.innerHTML = `
                    <div class="unit-number-big">${i}</div>
                    <div class="unit-icon-wrap">${unitEmojis[i-1] || '📚'}</div>
                    <div class="unit-card-text">
                        <div class="unit-card-label">الوحدة</div>
                        <div class="unit-card-name">${unitNames[i-1] || i}</div>
                        <div class="unit-card-sub">Unit ${i}</div>
                    </div>
                    <div class="unit-hover-cta">🎮 ابدأ الألعاب ←</div>
                `;
                card.onclick = () => window.location.href = `unit.html?grade=${gradeId}&unit=${i}`;
                container.appendChild(card);
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
        }
    </script>
</body>
</html>
