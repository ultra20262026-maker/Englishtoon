<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - إنشاء حسابات</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-bg">
    <div class="dashboard-header">
        <h2 style="color: white; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">لوحة الإدارة ⚙️</h2>
        <div>
            <button onclick="window.location.href='dashboard.html'" class="admin-btn" style="background: rgba(59, 130, 246, 0.8);">العودة للألعاب</button>
            <button onclick="logout()" class="logout-btn">تسجيل الخروج</button>
        </div>
    </div>

    <div class="login-wrapper" style="min-height: calc(100vh - 80px); align-items: flex-start; padding-top: 50px;">
        <div class="glass-container login-box" style="max-width: 600px;">
            <div class="logo-container" style="margin-bottom: 20px;">
                <div class="logo-text" style="font-size: 1.8rem;">إنشاء كود طالب جديد</div>
            </div>
            
            <div id="status-msg"></div>

            <form id="create-user-form">
                <div class="input-group">
                    <label for="new-username">اسم المستخدم للطالب</label>
                    <input type="text" id="new-username" required placeholder="مثال: ahmed123">
                </div>
                <div class="input-group">
                    <label for="new-password">كلمة المرور</label>
                    <input type="text" id="new-password" required placeholder="مثال: 0000">
                </div>

                <div class="input-group">
                    <label for="grade-select">السماح بدخول الصف:</label>
                    <select id="grade-select" onchange="toggleUnitSelect()" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; font-size: 1rem;">
                        <option value="all">كل الصفوف (صلاحية كاملة)</option>
                        <option value="primary-1">الصف الأول الابتدائي</option>
                        <option value="primary-2">الصف الثاني الابتدائي</option>
                        <option value="primary-3">الصف الثالث الابتدائي</option>
                        <option value="primary-4">الصف الرابع الابتدائي</option>
                        <option value="primary-5">الصف الخامس الابتدائي</option>
                        <option value="primary-6">الصف السادس الابتدائي</option>
                        <option value="prep-1">الصف الأول الإعدادي</option>
                        <option value="prep-2">الصف الثاني الإعدادي</option>
                        <option value="prep-3">الصف الثالث الإعدادي</option>
                    </select>
                </div>

                <div class="input-group" id="unit-select-group" style="display: none;">
                    <label>السماح بدخول الوحدات:</label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px;">
                        <label class="checkbox-group" style="grid-column: span 2;">
                            <input type="checkbox" id="all-units-checkbox" checked onchange="toggleSpecificUnits()">
                            كل الوحدات في هذا الصف
                        </label>
                        <div id="specific-units-group" style="display: none; grid-column: span 2; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <label class="checkbox-group"><input type="checkbox" class="unit-checkbox" value="1"> الوحدة 1</label>
                            <label class="checkbox-group"><input type="checkbox" class="unit-checkbox" value="2"> الوحدة 2</label>
                            <label class="checkbox-group"><input type="checkbox" class="unit-checkbox" value="3"> الوحدة 3</label>
                            <label class="checkbox-group"><input type="checkbox" class="unit-checkbox" value="4"> الوحدة 4</label>
                            <label class="checkbox-group"><input type="checkbox" class="unit-checkbox" value="5"> الوحدة 5</label>
                            <label class="checkbox-group"><input type="checkbox" class="unit-checkbox" value="6"> الوحدة 6</label>
                        </div>
                    </div>
                </div>

                <label class="checkbox-group">
                    <input type="checkbox" id="multi-user-checkbox">
                    يوزر متعدد (يسمح بدخول أكثر من جهاز في نفس الوقت)
                </label>
                <button type="submit" class="btn" style="background: linear-gradient(135deg, #10b981, #059669);">حفظ وإضافة الطالب</button>
            </form>
        </div>
        
        <!-- Users Table -->
        <div class="glass-container users-table-container">
            <h3 style="color: white; margin: 0 0 15px 0; text-align: center;">الطلاب المسجلين</h3>
            <table class="users-table">
                <thead>
                    <tr>
                        <th>اسم المستخدم</th>
                        <th>كلمة المرور</th>
                        <th>الصلاحيات</th>
                        <th>الحالة</th>
                        <th>النوع</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr><td colspan="5" style="text-align: center;">جاري التحميل...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Only allow if logged in, ideally only admin, but for this simple app we just check login
        checkAuth();
        if (localStorage.getItem('currentUser') !== 'admin') {
            alert('عذراً، هذه الصفحة مخصصة للأدمن فقط.');
            window.location.href = 'dashboard.html';
        }

        function toggleUnitSelect() {
            const gradeSelect = document.getElementById('grade-select');
            const unitGroup = document.getElementById('unit-select-group');
            if (gradeSelect.value === 'all') {
                unitGroup.style.display = 'none';
            } else {
                unitGroup.style.display = 'block';
            }
        }

        function toggleSpecificUnits() {
            const allChecked = document.getElementById('all-units-checkbox').checked;
            const specificGroup = document.getElementById('specific-units-group');
            if (allChecked) {
                specificGroup.style.display = 'none';
            } else {
                specificGroup.style.display = 'grid';
            }
        }

        document.getElementById('create-user-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('new-username').value.trim();
            const pass = document.getElementById('new-password').value.trim();
            const isMultiUser = document.getElementById('multi-user-checkbox').checked;
            
            const gradeSelect = document.getElementById('grade-select').value;
            let allowedUnits = 'all';
            
            if (gradeSelect !== 'all') {
                const allUnitsChecked = document.getElementById('all-units-checkbox').checked;
                if (!allUnitsChecked) {
                    const checkboxes = document.querySelectorAll('.unit-checkbox:checked');
                    allowedUnits = Array.from(checkboxes).map(cb => parseInt(cb.value));
                    if (allowedUnits.length === 0) {
                        alert('يجب اختيار وحدة واحدة على الأقل!');
                        return;
                    }
                }
            }

            const btn = document.querySelector('.btn');
            const statusDiv = document.getElementById('status-msg');
            
            btn.innerText = 'جاري الإضافة...';
            btn.disabled = true;

            try {
                // Save to Firestore directly
                await db.collection("codes").doc(user).set({
                    password: pass,
                    used: false,
                    isMultiUser: isMultiUser,
                    allowedGrade: gradeSelect,
                    allowedUnits: allowedUnits
                });

                statusDiv.className = 'success-msg';
                statusDiv.innerText = 'تم إضافة الطالب بنجاح! يمكنه الدخول الآن.';
                statusDiv.style.display = 'block';
                
                // Reset form
                document.getElementById('new-username').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('multi-user-checkbox').checked = false;
                document.getElementById('grade-select').value = 'all';
                toggleUnitSelect();
                document.getElementById('all-units-checkbox').checked = true;
                toggleSpecificUnits();

                // Refresh Table
                loadUsers();
            } catch (error) {
                console.error(error);
                statusDiv.className = 'error-msg';
                statusDiv.innerText = 'حدث خطأ أثناء الإضافة: ' + error.message;
                statusDiv.style.display = 'block';
            }

            btn.innerText = 'حفظ وإضافة الطالب';
            btn.disabled = false;
        });

        // Load Users
        async function loadUsers() {
            const tbody = document.getElementById('users-tbody');
            try {
                const snapshot = await db.collection("codes").get();
                tbody.innerHTML = '';
                
                if (snapshot.empty) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا يوجد طلاب مسجلين بعد.</td></tr>';
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const username = doc.id;
                    const usedText = data.used ? '<span style="color:#f87171;">مستخدم 🔴</span>' : '<span style="color:#34d399;">غير مستخدم 🟢</span>';
                    const typeText = data.isMultiUser ? '<span style="color:#60a5fa;">متعدد 👥</span>' : 'فردي 👤';
                    
                    let gradeText = 'كل الصفوف';
                    if (data.allowedGrade && data.allowedGrade !== 'all') {
                        gradeText = data.allowedGrade;
                        if (data.allowedUnits && data.allowedUnits !== 'all') {
                            gradeText += ` (وحدات: ${data.allowedUnits.join(', ')})`;
                        } else {
                            gradeText += ' (كل الوحدات)';
                        }
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${username}</td>
                        <td>${data.password}</td>
                        <td style="font-size: 0.85rem; color: #fbbf24;">${gradeText}</td>
                        <td>${usedText}</td>
                        <td>${typeText}</td>
                        <td>
                            <button class="action-btn reset-btn" onclick="resetUser('${username}')">تصفير المحاولات</button>
                            <button class="action-btn delete-btn" onclick="deleteUser('${username}')">حذف</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error loading users:", error);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: red;">حدث خطأ في جلب البيانات</td></tr>';
            }
        }

        // Delete User
        window.deleteUser = async function(username) {
            if(confirm(`هل أنت متأكد أنك تريد حذف الطالب "${username}" بشكل نهائي؟`)) {
                try {
                    await db.collection("codes").doc(username).delete();
                    alert('تم الحذف بنجاح.');
                    loadUsers();
                } catch (error) {
                    alert('حدث خطأ أثناء الحذف: ' + error.message);
                }
            }
        }

        // Reset User Device
        window.resetUser = async function(username) {
            if(confirm(`هل أنت متأكد أنك تريد تصفير المحاولات للطالب "${username}"؟`)) {
                try {
                    await db.collection("codes").doc(username).update({
                        used: false,
                        deviceId: firebase.firestore.FieldValue.delete()
                    });
                    alert('تم تصفير المحاولات بنجاح.');
                    loadUsers();
                } catch (error) {
                    alert('حدث خطأ: ' + error.message);
                }
            }
        }

        // Initial Load
        loadUsers();

        // Register Service Worker for Offline PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js');
            });
        }
    </script>
</body>
</html>
